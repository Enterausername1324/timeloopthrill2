<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeloop Games | Home</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* Modern Popup Styling */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 9999;
        }
        .popup-content {
            background: #111;
            color: white;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            margin: 20vh auto;
            border: 1px solid #00ffff;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }
        .popup-content h3 { font-family: 'Orbitron', sans-serif; color: #00ffff; margin-bottom: 15px; }
        .popup-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .popup-content button {
            width: 100%;
            padding: 12px;
            background: #00ffff;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        .popup-content button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #close { float: right; cursor: pointer; color: #666; font-size: 20px; }
    </style>
</head>

<body>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-text">TIMELOOP<span class="logo-accent">GAMES</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge">INDIE GAME STUDIO</div>
            <h1 class="hero-title">TIMELOOP<span class="text-accent"> GAMES</span></h1>
            <p class="hero-subtitle">Crafting worlds beyond time.</p>
            <div class="hero-actions">
                <a href="about.html" class="btn btn-primary">Discover More</a>
            </div>
        </div>
    </section>

    <div id="emailPopup" class="popup-overlay">
        <div class="popup-content">
            <span id="close">&times;</span>
            <h3>JOIN THE ARCHIVE</h3>
            <p>Get notified about new game releases.</p>
            <form id="emailForm" action="https://formspree.io/f/xlgwlarr" method="POST">
                <input type="email" name="email" placeholder="Enter your email" required>
                <button type="submit" id="subscribeBtn">Subscribe</button>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-bottom">
            &copy; 2026 Timeloop Games — All Rights Reserved
        </div>
    </footer>

    <script>
        const popup = document.getElementById("emailPopup");
        const closeBtn = document.getElementById("close");
        const emailForm = document.getElementById("emailForm");

        // Check if user is already subscribed
        window.onload = function() {
            const isSubscribed = localStorage.getItem("emailSubscribed");
            
            if (!isSubscribed) {
                setTimeout(() => {
                    popup.style.display = "block";
                }, 2000); // Shows after 2 seconds
            }
        };

        // Close button logic
        closeBtn.onclick = function() {
            popup.style.display = "none";
        };

        // Subscription logic: Saves "true" to browser so it stops asking
        emailForm.onsubmit = function() {
            localStorage.setItem("emailSubscribed", "true");
            // Form still submits to Formspree naturally
        };

        // Close if clicking outside the box
        window.onclick = function(event) {
            if (event.target == popup) {
                popup.style.display = "none";
            }
        };
    </script>

</body>
</html>
