<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeloop Games | Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0F0F0F;
    --bg-2:     #161616;
    --bg-3:     #1E1E1E;
    --bg-4:     #272727;
    --border:   rgba(255,255,255,0.07);
    --text:     #E8E4DE;
    --muted:    #7A7670;
    --faint:    #3A3835;
    --orange:   #FF6B1A;
    --orange-d: #D95710;
    --orange-g: rgba(255,107,26,0.08);
  }

  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 4rem; height: 68px;
    background: rgba(10,10,10,0.88); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.18em; color: var(--text); text-decoration: none; }
  .nav-logo span { color: var(--orange); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--orange); }

  /* TICKER */
  .ticker { background: var(--orange); padding: 0.55rem 0; overflow: hidden; margin-top: 68px; }
  .ticker-inner { display: flex; gap: 4rem; white-space: nowrap; animation: ticker 24s linear infinite; width: max-content; }
  .ticker-inner span { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #fff; }
  .ticker-inner .dot { color: rgba(255,255,255,0.4); }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* HERO */
  .hero {
    position: relative; min-height: calc(100vh - 68px);
    display: flex; align-items: center; overflow: hidden;
    background: var(--bg); padding: 0 4rem;
  }
  .hero-grid-lines {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,107,26,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,26,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .hero-bg {
    position: absolute; top: 50%; right: -6%;
    transform: translateY(-50%);
    width: 580px; height: 580px; opacity: 0.1;
    animation: slowspin 80s linear infinite;
  }
  @keyframes slowspin { from { transform: translateY(-50%) rotate(0deg); } to { transform: translateY(-50%) rotate(360deg); } }
  .hero-content { position: relative; z-index: 2; max-width: 680px; }
  .hero-eyebrow {
    display: inline-block; font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.28em; text-transform: uppercase; color: var(--orange);
    margin-bottom: 1.75rem; padding: 0.4rem 0.9rem;
    border: 1px solid rgba(255,107,26,0.4); border-radius: 2px;
    background: var(--orange-g);
  }
  .hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.8rem, 6.5vw, 5.5rem);
    font-weight: 900; line-height: 0.95;
    letter-spacing: -0.03em; color: var(--text);
    margin-bottom: 1.75rem;
  }
  .hero h1 .accent { color: var(--orange); }
  .hero h1 .dim { color: var(--faint); }
  .hero-sub { font-size: 1.05rem; font-weight: 300; color: var(--muted); line-height: 1.8; max-width: 480px; margin-bottom: 2.5rem; }
  .btn-primary {
    display: inline-block; padding: 0.9rem 2rem; background: var(--orange);
    color: #fff; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; text-decoration: none; border-radius: 2px;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--orange-d); transform: translateY(-1px); }
  .btn-ghost {
    display: inline-block; padding: 0.9rem 2rem; border: 1px solid var(--border);
    color: var(--muted); font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none;
    border-radius: 2px; margin-left: 1rem; transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  /* STATS BAR — UPDATED */
  .stats-bar {
    background: var(--bg-3); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(4, 1fr);
  }
  .stat { padding: 2.5rem; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; color: var(--orange); letter-spacing: -0.03em; line-height: 1; margin-bottom: 0.5rem; }
  .stat-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

  /* GAMES SECTION */
  .games { padding: 6rem 4rem; background: var(--bg-2); }
  .sec-hd { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 3rem; }
  .sec-label { font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--orange); margin-bottom: 0.5rem; }
  .sec-title { font-family: 'Orbitron', sans-serif; font-size: clamp(1.3rem, 2.5vw, 1.8rem); font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .sec-link { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 2px; transition: color 0.2s, border-color 0.2s; }
  .sec-link:hover { color: var(--orange); border-color: var(--orange); }

  .games-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1px; background: var(--border); }

  /* MANIFESTO */
  .manifesto {
    background: var(--bg); padding: 6rem 4rem;
    display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center;
    border-top: 1px solid var(--border);
  }
  .manifesto-label { font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--orange); margin-bottom: 1.25rem; }
  .manifesto h2 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 3vw, 2.4rem); font-weight: 700; color: var(--text); line-height: 1.2; letter-spacing: -0.02em; }
  .manifesto-right p { font-size: 1rem; font-weight: 300; color: var(--muted); line-height: 1.9; margin-bottom: 1.5rem; }
  .manifesto-right p:last-child { margin-bottom: 0; }

  /* PILLARS */
  .pillars { padding: 6rem 4rem; background: var(--bg-2); border-top: 1px solid var(--border); }
  .pillars-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .pillar { background: var(--bg-3); padding: 2.5rem; transition: background 0.25s; }
  .pillar:hover { background: var(--bg-4); }
  .pillar-num { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.18em; color: var(--orange); margin-bottom: 1.5rem; }
  .pillar h3 { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
  .pillar p { font-size: 0.85rem; font-weight: 300; color: var(--muted); line-height: 1.85; }

  /* PROCESS */
  .process { padding: 6rem 4rem; background: var(--bg-3); border-top: 1px solid var(--border); }
  .process-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); margin-top: 3rem; }
  .process-step { background: var(--bg-3); padding: 2rem 2rem 2.5rem; position: relative; }
  .step-num { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; color: var(--border); line-height: 1; margin-bottom: 1rem; letter-spacing: -0.04em; }
  .step-title { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 0.6rem; }
  .step-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.8; font-weight: 300; }
  .step-bar { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--orange); width: 0; transition: width 0.4s; }
  .process-step:hover .step-bar { width: 100%; }

  /* NEWSLETTER */
  .newsletter {
    padding: 6rem 4rem; background: var(--bg);
    display: grid; grid-template-columns: 1fr 1fr; gap: 6rem;
    align-items: center; border-top: 1px solid var(--border);
  }
  .newsletter h2 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.3rem, 2.5vw, 1.9rem); font-weight: 700; color: var(--text); line-height: 1.2; letter-spacing: -0.02em; }
  .newsletter p { font-size: 0.9rem; color: var(--muted); margin-top: 0.75rem; font-weight: 300; }
  .email-form { display: flex; }
  .email-form input {
    flex: 1; padding: 0.9rem 1.25rem; border: 1px solid var(--border); border-right: none;
    font-family: 'Inter', sans-serif; font-size: 0.9rem; color: var(--text);
    background: var(--bg-3); outline: none; border-radius: 2px 0 0 2px; transition: border-color 0.2s;
  }
  .email-form input::placeholder { color: var(--faint); }
  .email-form input:focus { border-color: var(--orange); }
  .email-form button {
    padding: 0.9rem 1.75rem; background: var(--orange); border: none; color: #fff;
    font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
    border-radius: 0 2px 2px 0; transition: background 0.2s;
  }
  .email-form button:hover { background: var(--orange-d); }

  /* FOOTER */
  footer { background: var(--bg-2); border-top: 1px solid var(--border); }
  .footer-main { padding: 4rem; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4rem; border-bottom: 1px solid var(--border); }
  .footer-brand p { font-size: 0.82rem; color: var(--muted); margin-top: 1rem; font-weight: 300; line-height: 1.7; max-width: 220px; }
  .footer-col-title { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--orange); margin-bottom: 1.25rem; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .footer-col a { font-size: 0.82rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .footer-col a:hover { color: var(--text); }
  .footer-bottom { padding: 1.5rem 4rem; display: flex; align-items: center; justify-content: space-between; }
  .footer-logo { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.18em; color: var(--text); text-decoration: none; }
  .footer-logo span { color: var(--orange); }
  .footer-copy { font-size: 0.72rem; color: var(--faint); }

  @media (max-width: 900px) {
    nav { padding: 0 1.5rem; }
    .hero { padding: 4rem 1.5rem 4rem; }
    .hero-bg { width: 300px; height: 300px; opacity: 0.06; right: -15%; }
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .stat { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .games { padding: 4rem 1.5rem; }
    .games-grid { grid-template-columns: 1fr; }
    .manifesto, .newsletter { grid-template-columns: 1fr; gap: 2.5rem; padding: 4rem 1.5rem; }
    .pillars { padding: 4rem 1.5rem; }
    .pillars-grid { grid-template-columns: 1fr; }
    .process { padding: 4rem 1.5rem; }
    .process-steps { grid-template-columns: 1fr 1fr; }
    .footer-main { grid-template-columns: 1fr; gap: 2.5rem; padding: 2.5rem 1.5rem; }
    .footer-bottom { padding: 1.5rem; flex-direction: column; gap: 0.75rem; }
