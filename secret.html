<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 49.3_STABLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; color: #00ffcc; z-index: 10000; cursor: pointer; border: 4px solid #00ffcc; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()"><h1>[ V49.3_RE-INITIALIZE ]</h1></div>
<div id="crosshair"></div>

<script>
let scene, camera, renderer, clock, player, mouth, fridgeDoor;
let active = false, yaw = 0, pitch = 0, heldItem = null;
let keys = {}, interactables = [], butters = [];
let fridgeOpen = false, lastInteract = 0;
let gravity = -9.8, verticalVelocity = 0;
const raycaster = new THREE.Raycaster();

function setup() { 
    active = true; 
    document.getElementById('overlay').style.display = 'none'; 
    document.body.requestPointerLock(); 
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    // Move camera slightly forward so it doesn't clip the back of the "face"
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 2, 8); // Start slightly in air to test gravity

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; player.add(head);
    
    // THE SMILE: Using a Sprite to ensure it renders on top of the head
    const mouthTex = new THREE.DataTexture(new Uint8Array([0,0,0,255]), 1, 1, THREE.RGBAFormat);
    const mouthMat = new THREE.SpriteMaterial({color: 0x000000});
    mouth = new THREE.Sprite(mouthMat);
    mouth.position.set(0, 1.6, 0.31); 
    mouth.scale.set(0.2, 0.05, 1);
    head.add(mouth);

    // KITCHEN SINK & COUNTER
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshStandardMaterial({color: 0x111111}));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
    
    const counter = new THREE.Mesh(new THREE.BoxGeometry(6, 1.1, 2.5), new THREE.MeshStandardMaterial({color: 0x221105}));
    counter.position.set(2, 0.55, -4); scene.add(counter);

    // FRIDGE (HOLLOW)
    const fridge = new THREE.Group(); fridge.position.set(-4, 0, -4.5); scene.add(fridge);
    const fMat = new THREE.MeshStandardMaterial({color: 0x444444});
    const shell = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.5, 2.2), fMat);
    shell.position.y = 2.25; fridge.add(shell);

    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(1.2, 2.25, 1.1); fridge.add(fridgeDoor);
    const door = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.5, 0.1), new THREE.MeshStandardMaterial({color: 0x666666}));
    door.position.set(-1.25, 0, 0); door.name = "fridge_door"; fridgeDoor.add(door);

    // BUTTERS
    for(let i=0; i<3; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x00ffcc}));
        b.position.set(-4, 1, -4); b.name = "butter"; scene.add(b); butters.push(b);
    }

    // MIRROR
    const mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), { clipBias: 0.003, color: 0x888888 });
    mirror.position.set(2, 3, -5.2); scene.add(mirror);
    scene.add(new THREE.PointLight(0xffaa44, 2, 30), new THREE.AmbientLight(0xffffff, 0.3));

    window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyE') doInteract(); });
    window.addEventListener('keyup', e => delete keys[e.code]);
    window.addEventListener('mousedown', () => { if(active) doInteract(); });
    window.addEventListener('mousemove', e => { if(active) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});

    animate();
}

function doInteract() {
    const now = Date.now();
    if(now - lastInteract < 250) return; // Cooldown to prevent "double click" bug
    lastInteract = now;

    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    
    if(hits.length > 0) {
        let obj = hits[0].object;
        if(heldItem) {
            // Drop Logic
            scene.attach(heldItem);
            heldItem.userData.isFalling = true; // Trigger gravity on the item
            heldItem = null;
        } else {
            if(obj.name === "butter") { 
                heldItem = obj; player.add(heldItem); 
                heldItem.position.set(0.5, 1.2, -0.8);
                heldItem.userData.isFalling = false;
            }
            else if(obj.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta();

    // PLAYER GRAVITY
    if(player.position.y > 0) {
        verticalVelocity += gravity * dt;
        player.position.y += verticalVelocity * dt;
    } else {
        player.position.y = 0;
        verticalVelocity = 0;
    }

    player.rotation.y = yaw;
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
    camera.position.set(player.position.x, 1.65, player.position.z);

    fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.5 : 0, 0.1);

    // BUTTER GRAVITY
    butters.forEach(b => {
        if(b.userData.isFalling && b.position.y > 0.15) {
            b.position.y += gravity * dt;
        } else if (b.position.y <= 0.15) {
            b.position.y = 0.15;
            b.userData.isFalling = false;
        }
    });

    // MOVEMENT
    let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
    let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
    if(moveX || moveZ) {
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, moveZ * 7 * dt);
        player.position.addScaledVector(side, moveX * 7 * dt);
    }

    // SMILE CREEP (Check mirror after 5s)
    let t = clock.getElapsedTime();
    if(t > 5) { 
        mouth.scale.x = 0.2 + (t-5) * 0.1;
        mouth.position.z = 0.31 + (t-5) * 0.001;
    }

    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
