<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 55.0_FOOD_TRUCK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; cursor: pointer; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #bar-box { width: 200px; height: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); display: none; margin-top: 10px; border-radius: 4px; overflow: hidden; }
        #bar-fill { height: 100%; width: 0%; background: #ffcc00; }
        #label { color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        #joystick-wrapper { position: absolute; bottom: 50px; left: 50px; width: 80px; height: 80px; background: rgba(255,255,255,0.05); border-radius: 50%; display: none; border: 1px solid rgba(255,255,255,0.2); }
        #joystick-stick { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: #fff; border-radius: 50%; opacity: 0.3; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1 style="font-weight: 200; letter-spacing: 10px;">VORTEX TRUCK</h1>
    <p>[ CLICK TO ENTER KITCHEN ]</p>
</div>

<div id="ui">
    <div id="label">SYSTEM READY</div>
    <div id="bar-box"><div id="bar-fill"></div></div>
</div>
<div id="joystick-wrapper"><div id="joystick-stick"></div></div>

<script>
let scene, camera, renderer, clock, player, head, fridgeDoor, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null;
let keys = {}, butters = [], isMobile = false;
let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
let touchLook = { active: false, lastX: 0, lastY: 0 };
let colliders = [];

const STAGES = [0xfff0ad, 0xffe066, 0xffcc00, 0x8b4513, 0x331100, 0x000000];
const LABELS = ["FRESH", "WARM", "SIZZLE", "GOLDEN", "BURNT", "VOID"];

function createTexture(c1, c2, type) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = c1; ctx.fillRect(0,0,512,512);
    for(let i=0; i<1500; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? c1 : c2;
        let w = type === 'brushed' ? 128 : 4;
        let h = type === 'brushed' ? 2 : 4;
        ctx.globalAlpha = 0.15;
        ctx.fillRect(Math.random()*512, Math.random()*512, w, h);
    }
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
}

const tSteel = createTexture('#999', '#bbb', 'brushed');
const tFloor = createTexture('#111', '#222', 'noise');

function setup() { 
    active = true; 
    document.getElementById('overlay').style.display = 'none'; 
    if(!isMobile) document.body.requestPointerLock();
}

function init() {
    isMobile = ('ontouchstart' in window);
    if(isMobile) document.getElementById('joystick-wrapper').style.display = 'block';

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 1); // Start inside truck

    head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00, metalness: 0.6}));
    head.position.y = 1.65; player.add(head);

    // --- TRUCK SHELL (8x5 Interior) ---
    const truckMat = new THREE.MeshStandardMaterial({map: tSteel, metalness: 0.8, roughness: 0.2, side: THREE.DoubleSide});
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 12), new THREE.MeshStandardMaterial({map: tFloor, roughness: 0.8}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);

    // Walls
    const wallLeft = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 12), truckMat);
    wallLeft.position.set(-4, 2, 0); scene.add(wallLeft); colliders.push(new THREE.Box3().setFromObject(wallLeft));
    
    const wallRight = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 12), truckMat);
    wallRight.position.set(4, 2, 0); scene.add(wallRight); colliders.push(new THREE.Box3().setFromObject(wallRight));

    const wallBack = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 0.2), truckMat);
    wallBack.position.set(0, 2, -6); scene.add(wallBack); colliders.push(new THREE.Box3().setFromObject(wallBack));

    const wallFront = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 0.2), truckMat);
    wallFront.position.set(0, 2, 6); scene.add(wallFront); colliders.push(new THREE.Box3().setFromObject(wallFront));

    // --- KITCHEN UNITS ---
    const fridge = new THREE.Group(); fridge.position.set(-3.2, 0.01, -4.5); scene.add(fridge);
    const fBody = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3.5, 1.5), truckMat);
    fBody.position.y = 1.75; fridge.add(fBody);
    colliders.push(new THREE.Box3().setFromObject(fBody).translate(new THREE.Vector3(-3.2, 0, -4.5)));

    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(0.75, 1.75, 0.75); fridge.add(fridgeDoor);
    const dMesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3.5, 0.1), truckMat);
    dMesh.position.set(-0.75, 0, 0); dMesh.name = "fridge_door"; fridgeDoor.add(dMesh);

    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0xfff0ad}));
        b.position.set((i%2)*0.5 - 0.25, 0.8 + (Math.floor(i/3)*1), 0);
        b.name = "butter"; b.userData.cookTime = 0; fridge.add(b); butters.push(b);
    }

    const counter = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.1, 6), new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.1}));
    counter.position.set(3.2, 0.56, -2); scene.add(counter);
    colliders.push(new THREE.Box3().setFromObject(counter));

    const fryer = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.2), new THREE.MeshStandardMaterial({color: 0x111111}));
    fryer.position.set(3.2, 1.11, -2); fryer.name = "fryer"; scene.add(fryer);

    // Service Window
    const winCut = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 3), new THREE.MeshStandardMaterial({color: 0x000000}));
    winCut.position.set(4, 2, 2); scene.add(winCut);

    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const pL = new THREE.PointLight(0xffffff, 1.2, 20); pL.position.set(0, 3.5, 0); scene.add(pL);

    // Interaction & Inputs
    window.addEventListener('touchstart', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) { joy.active = true; joy.startX = t.clientX; joy.startY = t.clientY; }
            else { touchLook.active = true; touchLook.lastX = t.clientX; touchLook.lastY = t.clientY; doInteract(); }
        }
    });
    window.addEventListener('touchmove', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(joy.active) {
                let dx = t.clientX - joy.startX, dy = t.clientY - joy.startY;
                joy.x = Math.max(-1, Math.min(1, dx/40)); joy.y = Math.max(-1, Math.min(1, dy/40));
                document.getElementById('joystick-stick').style.transform = `translate(${joy.x*20}px, ${joy.y*20}px)`;
            } else if(touchLook.active) {
                yaw -= (t.clientX - touchLook.lastX) * 0.005;
                pitch -= (t.clientY - touchLook.lastY) * 0.005;
                touchLook.lastX = t.clientX; touchLook.lastY = t.clientY;
            }
        }
    });
    window.addEventListener('touchend', () => { joy.active = false; joy.x = joy.y = 0; touchLook.active = false; document.getElementById('joystick-stick').style.transform = `translate(0,0)`; });
    window.addEventListener('mousemove', e => { if(document.pointerLockElement === document.body) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; }});
    window.addEventListener('mousedown', () => { if(active && !isMobile) doInteract(); });

    animate();
}

function doInteract() {
    const r = new THREE.Raycaster();
    r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let obj = hits[0].object;
        if(heldItem) {
            if(obj.name === "fryer") {
                cookingButter = heldItem; scene.attach(heldItem); heldItem.position.set(3.2, 1.3, -2); heldItem = null;
                document.getElementById('bar-box').style.display = "block";
            } else { scene.attach(heldItem); heldItem.position.y = 0.1; heldItem = null; }
        } else {
            if(obj.name === "butter") { 
                heldItem = obj; player.add(heldItem); heldItem.position.set(0.4, 1.2, -0.6);
                if(heldItem === cookingButter) { cookingButter = null; document.getElementById('bar-box').style.display = "none"; }
            } else if(obj.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

function checkCollision(newPos) {
    const playerBB = new THREE.Box3().setFromCenterAndSize(newPos, new THREE.Vector3(0.6, 2, 0.6));
    for(let box of colliders) {
        if(playerBB.intersectsBox(box)) return true;
    }
    return false;
}

let fridgeOpen = false;
function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta(), t = clock.getElapsedTime();
    if(active) {
        player.rotation.y = yaw;
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        camera.position.set(player.position.x, 1.65, player.position.z);
        fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.8 : 0, 0.1);

        if(cookingButter) {
            cookingButter.userData.cookTime += dt;
            let p = Math.min(cookingButter.userData.cookTime / 30, 1.0);
            cookingButter.material.color.set(STAGES[Math.floor(p*5.99)]);
            document.getElementById('bar-fill').style.width = (p*100)+"%";
            document.getElementById('label').innerText = LABELS[Math.floor(p*5.99)];
        }

        let mZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0) + joy.y;
        let mX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0) + joy.x;
        if(mX || mZ) {
            let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
            let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
            let moveVec = new THREE.Vector3().addScaledVector(fwd, mZ * 4 * dt).addScaledVector(side, mX * 4 * dt);
            let testPos = player.position.clone().add(moveVec);
            if(!checkCollision(testPos)) player.position.copy(testPos);
        }
    }
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
