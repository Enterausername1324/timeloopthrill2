<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 46.3_MOVE_FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        :root { --neon: #00ffcc; --horror: #ff0055; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 9999; cursor: pointer; }
        #hud { position: absolute; top: 20px; left: 20px; color: #444; pointer-events: none; z-index: 10; font-size: 10px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1.5px solid #333; border-radius: 50%; }
        #joy-base { position: absolute; bottom: 60px; left: 60px; width: 120px; height: 120px; border: 1px solid #222; border-radius: 50%; display: none; z-index: 2000; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 45px; height: 45px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.1; }
        #mobile-e { position: absolute; bottom: 60px; right: 60px; width: 90px; height: 90px; background: rgba(0,255,204,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-size: 32px; z-index: 2000; }
    </style>
</head>
<body>

    <div id="overlay"><h1>VORTEX_v46.3</h1><p>[ CLICK TO MOVE ]</p></div>
    <div id="hud"><div id="timer">SMILE_IDX: 0.00</div></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let active = false, yaw = 0, pitch = 0, moveDir = {x:0, z:0};
        let joyID = null, lookID = null, lastTouch = {x:0, y:0};
        let player, body, mouth, mirror, pointLight, butter, fryer;
        let held = null, target = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            player = new THREE.Group();
            scene.add(player);
            player.position.set(0, 0, 7);

            body = new THREE.Group();
            player.add(body);
            body.position.z = -0.2; // Keep fix for looking down

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            head.position.y = 1.65; body.add(head);

            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
            shirt.position.y = 0.9; body.add(shirt);

            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouth.position.set(0, 1.6, 0.28); head.add(mouth);

            camera.position.set(0, 1.65, 0);

            // Kitchen Objects (Kept exactly same)
            const add = (w, h, d, x, y, z, col) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: col}));
                m.position.set(x, y, z); m.receiveShadow = true; scene.add(m); return m;
            };
            add(30, 0.1, 30, 0, 0, 0, 0x1a0f05); // Floor
            add(20, 10, 0.5, 0, 5, -5, 0x110a05); // Wall
            add(12, 1, 2.5, 0, 0.5, -4, 0x221105); // Counter

            mirror = new THREE.Reflector(new THREE.PlaneGeometry(3.5, 2.5), {
                clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0x888888
            });
            mirror.position.set(2, 2.9, -4.73); scene.add(mirror);

            fryer = add(1.5, 0.4, 1.5, -1, 1.1, -4, 0x444444);
            butter = add(0.4, 0.4, 0.4, 1.5, 1.2, -4, 0x00ffcc);
            butter.material.emissive.set(0x00ffcc);

            pointLight = new THREE.PointLight(0xffaa44, 1.5, 20);
            pointLight.position.set(0, 4, -2); scene.add(pointLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));

            setupHandlers();
            animate();
        }

        function setupHandlers() {
            const start = () => {
                active = true;
                document.getElementById('overlay').style.display = 'none';
                if(('ontouchstart' in window)) {
                    document.getElementById('joy-base').style.display = 'block';
                    document.getElementById('mobile-e').style.display = 'flex';
                } else {
                    document.body.requestPointerLock();
                }
            };
            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { 
                keys[e.code] = true; 
                if(e.code === 'KeyE') interact(); 
            });
            window.addEventListener('keyup', (e) => { keys[e.code] = false; });
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });
            // Mobile controls kept for cross-platform
            window.addEventListener('touchstart', (e) => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) joyID = t.identifier;
                    else if(t.target.id != "mobile-e") { lookID = t.identifier; lastTouch.x = t.clientX; lastTouch.y = t.clientY; }
                }
            });
            window.addEventListener('touchmove', (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier == joyID) {
                        const r = document.getElementById('joy-base').getBoundingClientRect();
                        moveDir.x = (t.clientX - (r.left+60))/60; moveDir.z = (t.clientY - (r.top+60))/60;
                    } 
                    if(t.identifier == lookID) {
                        yaw -= (t.clientX - lastTouch.x)*0.006; pitch -= (t.clientY - lastTouch.y)*0.006;
                        lastTouch.x = t.clientX; lastTouch.y = t.clientY;
                    }
                }
            });
            window.addEventListener('touchend', (e) => { for(let t of e.changedTouches) { if(t.identifier == joyID) moveDir = {x:0, z:0}; } });
        }

        function interact() {
            if(player.position.distanceTo(butter.position) < 3 && !held) held = butter;
            else if(player.position.distanceTo(fryer.position) < 3 && held) { held = null; butter.position.set(-1, 1.25, -4); }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            if(active) {
                player.rotation.y = yaw;
                camera.rotation.x = pitch;

                // --- ROBUST MOVEMENT CALC ---
                let speed = 6.0;
                let moveX = 0, moveZ = 0;
                
                if(keys['KeyW']) moveZ -= 1;
                if(keys['KeyS']) moveZ += 1;
                if(keys['KeyA']) moveX -= 1;
                if(keys['KeyD']) moveX += 1;
                
                // Add mobile support back in
                moveX += moveDir.x;
                moveZ += moveDir.z;

                if(moveX !== 0 || moveZ !== 0) {
                    let forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                    let right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                    
                    let direction = new THREE.Vector3()
                        .addScaledVector(forward, moveZ)
                        .addScaledVector(right, moveX)
                        .normalize();

                    player.position.addScaledVector(direction, speed * dt);
                }

                if(held) {
                    let holdPos = new THREE.Vector3(0, 0, -1.2).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                    held.position.copy(player.position).add(holdPos);
                    held.position.y = 1.45;
                }

                let m = clock.getElapsedTime()/60;
                document.getElementById('timer').innerText = `SMILE_IDX: ${m.toFixed(2)}`;
                if(m >= 3) mouth.scale.x = 1 + (m-3)*2.5;
                if(m >= 5) { mouth.material.color.set(0xff0000); pointLight.color.set(0xff0000); }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
