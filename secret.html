<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // RECOVERY_v23</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #00ffcc; z-index: 1000; cursor: pointer; text-align: center; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 11px; }
        
        /* Brackets / Cursor */
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; 
            transform: translate(-50%, -50%); pointer-events: none; z-index: 20;
            border: 2px solid rgba(0,255,204,0.4);
        }
        #crosshair.active { border-color: #ff00ff; width: 24px; height: 24px; box-shadow: 0 0 10px #ff00ff; }

        /* JOYSTICK FIX: Higher Z-Index and clear separation */
        #joy-base { 
            position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; 
            border: 2px solid #00ffcc; border-radius: 50%; display: none; z-index: 2000; 
            background: rgba(0,255,204,0.1); 
        }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); }
        
        #mobile-e { position: absolute; bottom: 50px; right: 50px; width: 80px; height: 80px; background: rgba(255,0,255,0.4); border: 2px solid #ff00ff; border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-size: 24px; z-index: 2000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay"><h1>VORTEX_v23</h1><p>[ TAP_TO_FIX_MOVEMENT ]</p></div>
    <div id="hud"><div>v23_RECOVERY_MODE</div><div id="hold-status">EMPTY</div></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>

    <script>
        let scene, camera, renderer, clock, raycaster;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, fridgeOpen = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, headMesh, fridgeDoor, interactableObj = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            raycaster = new THREE.Raycaster();

            // Player Setup
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            // Yellow Character
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xFFD700 });
            headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), skinMat);
            headMesh.position.y = 1.8; playerGroup.add(headMesh);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const pL = new THREE.PointLight(0xffffff, 1.2, 50); pL.position.set(0, 5, 0); scene.add(pL);

            // Room
            const createBox = (w,h,d,x,y,z,col,name="") => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col}));
                m.position.set(x,y,z); m.name = name; scene.add(m); return m;
            };
            createBox(100, 0.1, 100, 0, -0.05, 0, 0x1a1a1a); // Floor
            
            // Fridge
            fridgeDoor = new THREE.Group();
            const dMesh = createBox(1.8, 2.8, 0.1, 0.9, 1.4, 0.05, 0xcccccc, "Fridge");
            fridgeDoor.add(dMesh); fridgeDoor.position.set(2.6, 0, -3.35); scene.add(fridgeDoor);

            // Butter (Interactable)
            createBox(0.4, 0.4, 0.4, -1, 1.1, -3.8, 0xFFD700, "Butter");

            setupInput();
            animate();
        }

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    if(isTouch) { 
                        document.getElementById('joy-base').style.display = 'block'; 
                        document.getElementById('mobile-e').style.display = 'flex'; 
                    } else {
                        document.body.requestPointerLock();
                    }
                }
            };

            window.addEventListener('mousedown', start);
            
            // MOBILE MOVEMENT FIX
            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    // Left half is ONLY for Joystick
                    if (t.clientX < window.innerWidth / 2 && joyTouchID === null) {
                        joyTouchID = t.identifier;
                    } 
                    // Right half is ONLY for Looking
                    else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                        lookTouchID = t.identifier;
                        lastLookPos.x = t.clientX;
                        lastLookPos.y = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60);
                        let dist = Math.sqrt(dx*dx+dy*dy); 
                        if(dist > 60) { dx *= 60/dist; dy *= 60/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 60; moveDir.z = dy / 60;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.007;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.007;
                        lastLookPos.x = t.clientX;
                        lastLookPos.y = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { 
                        joyTouchID = null; moveDir = {x:0, z:0}; 
                        document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; 
                    }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });

            // Interaction Trigger (E or Button)
            const interact = () => {
                if(interactableObj) {
                    if(interactableObj.name === "Fridge") fridgeOpen = !fridgeOpen;
                    if(interactableObj.name === "Butter") document.getElementById('hold-status').innerText = "HOLDING: BUTTER";
                }
            };
            document.getElementById('mobile-e').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
            window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'e') interact(); });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if (gameActive) {
                // Smooth Camera
                currentRot.y += (targetRot.y - currentRot.y) * 0.2;
                currentRot.x += (targetRot.x - currentRot.x) * 0.2;
                camera.rotation.y = currentRot.y;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

                // DIRECT MOVEMENT FIX: Vector math ensures movement follows camera
                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();

                playerGroup.position.addScaledVector(f, -moveDir.z * 7 * delta);
                playerGroup.position.addScaledVector(r, moveDir.x * 7 * delta);

                // Raycast for brackets
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const hits = raycaster.intersectObjects(scene.children, true);
                const cross = document.getElementById('crosshair');
                
                if (hits.length > 0 && hits[0].distance < 4 && hits[0].object.name !== "") {
                    interactableObj = hits[0].object;
                    cross.classList.add('active');
                } else {
                    interactableObj = null;
                    cross.classList.remove('active');
                }
            }

            fridgeDoor.rotation.y += (((fridgeOpen ? -1.8 : 0) - fridgeDoor.rotation.y) * 0.1);
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
