<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // PURE_v30</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #00ffcc; z-index: 1000; cursor: pointer; text-align: center; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 11px; }
        
        /* PROTECTED JOYSTICK ZONE */
        #joy-base { position: absolute; bottom: 60px; left: 60px; width: 110px; height: 110px; border: 2px solid #00ffcc; border-radius: 50%; display: none; z-index: 2000; background: rgba(0,255,204,0.1); }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 45px; height: 45px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); }
        
        #mobile-e { position: absolute; bottom: 60px; right: 60px; width: 80px; height: 80px; background: rgba(255,0,255,0.3); border: 2px solid #ff00ff; border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-size: 24px; z-index: 2000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay"><h1>VORTEX_v30</h1><p>[ TAP_TO_RESUME_STABLE_BUILD ]</p></div>
    <div id="hud"><div>v30_STABLE_MOVEMENT</div><div id="status">LOCAL_MODE</div></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Player Setup
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            // Environment
            scene.add(new THREE.GridHelper(100, 40, 0x00ffcc, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            
            // Reference Objects
            const box = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshStandardMaterial({color: 0x333333}));
            box.position.set(0, 1, -5); scene.add(box);

            setupInput();
            animate();
        }

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    if(isTouch) { 
                        document.getElementById('joy-base').style.display = 'block'; 
                        document.getElementById('mobile-e').style.display = 'flex'; 
                    } else document.body.requestPointerLock();
                }
            };

            window.addEventListener('mousedown', start);
            
            // PC Keyboard
            window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
            window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    targetRot.y -= e.movementX * 0.003;
                    targetRot.x -= e.movementY * 0.003;
                }
            });

            // iPad Touch (Split-Screen Logic)
            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else { lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; }
                }
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 55), dy = t.clientY - (rect.top + 55);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 55) { dx *= 55/dist; dy *= 55/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 55; moveDir.z = dy / 55;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.007;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.007;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { 
                        joyTouchID = null; moveDir = {x:0, z:0}; 
                        document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; 
                    }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if (gameActive) {
                currentRot.y += (targetRot.y - currentRot.y) * 0.2;
                currentRot.x += (targetRot.x - currentRot.x) * 0.2;
                camera.rotation.y = currentRot.y;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();

                let speed = 7.5;
                if(keys['w']) playerGroup.position.addScaledVector(f, speed * delta);
                if(keys['s']) playerGroup.position.addScaledVector(f, -speed * delta);
                if(keys['a']) playerGroup.position.addScaledVector(r, -speed * delta);
                if(keys['d']) playerGroup.position.addScaledVector(r, speed * delta);
                
                playerGroup.position.addScaledVector(f, -moveDir.z * speed * delta);
                playerGroup.position.addScaledVector(r, moveDir.x * speed * delta);
            }

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
