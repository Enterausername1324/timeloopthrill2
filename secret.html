<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // LUCID_v38</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        :root { --neon: #00ffcc; --horror: #ff0055; }
        body { margin: 0; background: #fff; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        
        #smile-overlay { 
            position: absolute; bottom: -50px; right: -50px; width: 250px; height: 250px; 
            background: radial-gradient(circle, rgba(255,0,85,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; opacity: 0; pointer-events: none; z-index: 5000;
        }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fff; color: #000; z-index: 1000; cursor: pointer; }
        #hud { position: absolute; top: 20px; left: 20px; color: #333; pointer-events: none; z-index: 10; font-size: 10px; font-weight: bold; }
        #prompt-layer { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); color: var(--neon); font-size: 18px; pointer-events: none; z-index: 15; text-align: center; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,204,0.5); }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1.5px solid #333; }
        #crosshair.active { border: 2.5px solid var(--neon); box-shadow: 0 0 15px var(--neon); }

        #interact-btn { 
            position: absolute; bottom: 40px; right: 40px; width: 110px; height: 110px; 
            background: rgba(255,255,255,0.8); border: 3px solid #000; border-radius: 50%; 
            color: #000; display: none; justify-content: center; align-items: center; 
            font-size: 12px; z-index: 2000; cursor: pointer; font-weight: 900;
        }

        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; border: 3px solid #000; border-radius: 50%; display: none; z-index: 2000; background: rgba(255,255,255,0.5); }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #000; border-radius: 50%; transform: translate(-50%, -50%); }

        #fry-ui { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 200px; height: 10px; background: #eee; border: 2px solid #000; display: none; }
        #fry-bar { width: 0%; height: 100%; background: var(--horror); }
    </style>
</head>
<body>

    <div id="smile-overlay"></div>
    <div id="overlay"><h1>VORTEX_LUCID_v38</h1><p>[ INITIALIZE HI-BRIGHT INTERIOR ]</p></div>
    <div id="hud"><div>LOC: DOMESTIC_LIT</div><div id="timer">SMILE_INDEX: 0.00</div><div id="hold-status">EMPTY</div></div>
    <div id="prompt-layer"></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="interact-btn">INTERACT2</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, butter, fryer;
        let heldItem = null, isCooking = false, cookProgress = 0, interactableObj = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0); // Bright gray background

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            // --- BRIGHT LIGHTING ---
            const amb = new THREE.AmbientLight(0xffffff, 0.8); scene.add(amb);
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 10, 5); scene.add(sun);
            const p1 = new THREE.PointLight(0xffffff, 1, 20);
            p1.position.set(0, 4, 0); scene.add(p1);

            // --- MATERIALS ---
            const wallMat = new THREE.MeshStandardMaterial({color: 0xeeeeee, roughness: 0.9});
            const steelMat = new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.9, roughness: 0.1});
            
            // --- THE ROOM ---
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({color:0xdddddd}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            const backWall = new THREE.Mesh(new THREE.PlaneGeometry(20, 10), wallMat);
            backWall.position.set(0, 5, -5); scene.add(backWall);

            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), wallMat);
            ceiling.rotation.x = Math.PI/2; ceiling.position.y = 8; scene.add(ceiling);

            // --- THE MIRROR ---
            const mirrorGeom = new THREE.PlaneGeometry(3, 2);
            const mirror = new THREE.Reflector(mirrorGeom, {
                clipBias: 0.003,
                textureWidth: window.innerWidth * window.devicePixelRatio,
                textureHeight: window.innerHeight * window.devicePixelRatio,
                color: 0x889999
            });
            mirror.position.set(2, 2.5, -4.95); // Above the sink
            scene.add(mirror);

            // --- APPLIANCES ---
            // Counter
            const counter = new THREE.Mesh(new THREE.BoxGeometry(10, 1, 2), new THREE.MeshStandardMaterial({color:0x333333}));
            counter.position.set(0, 0.5, -4); scene.add(counter);

            // Fridge
            const fridge = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1.8), steelMat);
            fridge.position.set(-4, 2, -4); scene.add(fridge);

            // Washing Machine
            const washer = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.8, 1.8), new THREE.MeshStandardMaterial({color:0xffffff}));
            washer.position.set(4, 0.9, -4); scene.add(washer);

            // Fryer
            fryer = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.2), steelMat);
            fryer.position.set(-1.5, 1.1, -4); scene.add(fryer);

            // Butter
            butter = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({color:0x00ffcc, emissive:0x00ffcc, emissiveIntensity:0.5}));
            butter.position.set(0.5, 1.15, -4); scene.add(butter);

            setupInput();
            animate();
        }

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('interact-btn').style.display = 'flex';
                    if(isTouch) document.getElementById('joy-base').style.display = 'block';
                    else document.body.requestPointerLock();
                }
            };

            const interact = () => {
                if(!interactableObj) return;
                if(interactableObj === "Butter" && !heldItem) {
                    heldItem = butter;
                    document.getElementById('hold-status').innerText = "HOLDING: ITEM";
                }
                if(interactableObj === "Fryer" && heldItem) {
                    isCooking = true; heldItem = null;
                    butter.position.set(-1.5, 1.3, -4);
                    document.getElementById('hold-status').innerText = "FRYING...";
                    document.getElementById('fry-ui').style.display = 'block';
                }
            };

            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { 
                keys[e.key.toLowerCase()] = true; 
                if(e.key.toLowerCase() === 'e') interact();
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    targetRot.y -= e.movementX * 0.0025;
                    targetRot.x -= e.movementY * 0.0025;
                }
            });

            document.getElementById('interact-btn').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
            document.getElementById('interact-btn').addEventListener('mousedown', (e) => { e.preventDefault(); interact(); });

            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else if (t.target.id !== "interact-btn") { 
                        lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; 
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 60) { dx *= 60/dist; dy *= 60/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 60; moveDir.z = dy / 60;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.007;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.007;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            if (gameActive) {
                // SMILE LOGIC
                let smile = document.getElementById('smile-overlay');
                let minutes = time / 60;
                smile.style.opacity = Math.min(0.5, minutes * 0.25);
                smile.style.transform = `scale(${1 + minutes * 4})`;
                document.getElementById('timer').innerText = `SMILE_INDEX: ${minutes.toFixed(2)}`;

                currentRot.y += (targetRot.y - currentRot.y) * 0.15;
                currentRot.x += (targetRot.x - currentRot.x) * 0.15;
                camera.rotation.y = currentRot.y;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();

                let speed = 7.0;
                playerGroup.position.addScaledVector(f, -moveDir.z * speed * delta);
                playerGroup.position.addScaledVector(r, moveDir.x * speed * delta);
                if(keys['w']) playerGroup.position.addScaledVector(f, speed * delta);
                if(keys['s']) playerGroup.position.addScaledVector(f, -speed * delta);
                if(keys['a']) playerGroup.position.addScaledVector(r, -speed * delta);
                if(keys['d']) playerGroup.position.addScaledVector(r, speed * delta);

                if(heldItem) {
                    heldItem.position.copy(playerGroup.position);
                    heldItem.position.add(f.multiplyScalar(1.1));
                    heldItem.position.y = 1.4;
                }

                let dButter = playerGroup.position.distanceTo(butter.position);
                let dFryer = playerGroup.position.distanceTo(fryer.position);
                const cross = document.getElementById('crosshair');
                const prompt = document.getElementById('prompt-layer');
                
                if (dButter < 3.2 && !heldItem) { 
                    interactableObj = "Butter"; cross.classList.add('active'); 
                    prompt.style.display = "block"; prompt.innerText = "[INTERACT2] TO TAKE";
                }
                else if (dFryer < 3.2 && heldItem) { 
                    interactableObj = "Fryer"; cross.classList.add('active'); 
                    prompt.style.display = "block"; prompt.innerText = "PRESS E TO FRY";
                }
                else { 
                    interactableObj = null; cross.classList.remove('active'); 
                    prompt.style.display = "none";
                }

                if (isCooking) {
                    cookProgress += delta * 25;
                    document.getElementById('fry-bar').style.width = cookProgress + "%";
                    if (cookProgress >= 100) {
                        isCooking = false; cookProgress = 0;
                        document.getElementById('fry-ui').style.display = 'none';
                        heldItem = butter;
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
