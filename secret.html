<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 46.7_AXIS_FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; }
        #hud { position: absolute; top: 10px; left: 10px; color: #444; font-size: 10px; pointer-events: none; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; border: 1px solid #333; border-radius: 50%; display: none; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.1; }
    </style>
</head>
<body>

<div id="overlay" onclick="startApp()"><h1>VORTEX_v46.7</h1><p>CLICK / TAP TO START</p></div>
<div id="hud">SMILE_IDX: <span id="timer">0.00</span></div>
<div id="joy-base"><div id="joy-stick"></div></div>

<script>
let scene, camera, renderer, clock, player, body, mouth, mirror, pointLight;
let keys = {}, active = false, yaw = 0, pitch = 0;
let moveDir = {x:0, z:0}, joyID = null, lookID = null, lastLook = {x:0, y:0};

function startApp() {
    active = true;
    document.getElementById('overlay').style.display = 'none';
    if (!('ontouchstart' in window)) {
        document.body.requestPointerLock();
    } else {
        document.getElementById('joy-base').style.display = 'block';
    }
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 7);

    body = new THREE.Group();
    player.add(body);
    body.position.z = -0.2; // v45 POV Fix

    // Character Mesh
    let head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; body.add(head);
    let shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
    shirt.position.y = 0.9; body.add(shirt);
    mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
    mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
    mouth.position.set(0, 1.6, 0.28); head.add(mouth);

    // World
    const add = (w,h,d,x,y,z,c) => {
        let m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:c}));
        m.position.set(x,y,z); scene.add(m); return m;
    };
    add(30, 0.1, 30, 0, 0, 0, 0x1a0f05); // Wood Floor
    add(12, 1, 2.5, 0, 0.5, -4, 0x221105); // Counter
    add(20, 10, 0.5, 0, 5, -5, 0x110a05); // Wall

    mirror = new THREE.Reflector(new THREE.PlaneGeometry(3.5, 2.5), {
        clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0x888888
    });
    mirror.position.set(2, 2.9, -4.73); scene.add(mirror);

    pointLight = new THREE.PointLight(0xffaa44, 1.5, 20);
    pointLight.position.set(0, 4, -2); scene.add(pointLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.1));

    // --- INPUT OVERHAUL ---
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Mouse Look (Works with or without lock)
    window.addEventListener('mousemove', e => {
        if(active) {
            let mx = e.movementX || 0;
            let my = e.movementY || 0;
            yaw -= mx * 0.002;
            pitch -= my * 0.002;
        }
    });

    // Touch Support
    window.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) joyID = t.identifier;
            else { lookID = t.identifier; lastLook = {x:t.clientX, y:t.clientY}; }
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyID) {
                let r = document.getElementById('joy-base').getBoundingClientRect();
                moveDir.x = (t.clientX - (r.left+50))/50;
                moveDir.z = (t.clientY - (r.top+50))/50;
            }
            if(t.identifier === lookID) {
                yaw -= (t.clientX - lastLook.x) * 0.007;
                pitch -= (t.clientY - lastLook.y) * 0.007;
                lastLook = {x:t.clientX, y:t.clientY};
            }
        }
    }, {passive: false});

    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyID) moveDir = {x:0, z:0};
            if(t.identifier === lookID) lookID = null;
        }
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta();

    // Force Axis Application
    player.rotation.y = yaw;
    camera.rotation.x = Math.max(-1.5, Math.min(1.5, pitch));

    // Independent Vector Movement
    let speed = 6.5;
    let x = (keys['KeyD']?1:0) - (keys['KeyA']?1:0) + moveDir.x;
    let z = (keys['KeyS']?1:0) - (keys['KeyW']?1:0) + moveDir.z;

    if(x !== 0 || z !== 0) {
        let fwd = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).multiplyScalar(z);
        let side = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).multiplyScalar(x);
        player.position.x -= (fwd.x + side.x) * speed * dt;
        player.position.z -= (fwd.z + side.z) * speed * dt;
    }

    // Smile Index
    let time = clock.getElapsedTime()/60;
    document.getElementById('timer').innerText = time.toFixed(2);
    if(time > 3) mouth.scale.x = 1 + (time-3)*3;
    if(time > 5) { mouth.material.color.set(0xff0000); pointLight.color.set(0xff0000); }

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
