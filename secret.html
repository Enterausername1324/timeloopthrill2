<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 48.1_IGNITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #boot-screen { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle, #111 0%, #000 100%); 
            z-index: 20000; cursor: default; font-family: 'Courier New', monospace; 
        }
        #start-btn { 
            padding: 20px 50px; border: 2px solid #00ffcc; color: #00ffcc; 
            background: transparent; font-size: 24px; cursor: pointer; 
            transition: 0.3s; letter-spacing: 5px; box-shadow: 0 0 15px rgba(0,255,204,0.2);
        }
        #start-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 30px #00ffcc; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 12px; pointer-events: none; z-index: 1000; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 1000; display: none; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <button id="start-btn" onclick="ignite()">INITIALIZE</button>
    </div>

    <div id="hud">BUTTER_TEMP: <span id="temp">0</span>°C | STATUS: <span id="stat">RAW</span></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, player, butter, fryer, mouth, light;
        let active = false, yaw = 0, pitch = 0, heldItem = null;
        let keys = {}, interactables = [];
        const raycaster = new THREE.Raycaster();

        // Physics/Cooking Variables
        let gravity = -9.8, velocityY = 0, isGrounded = true;
        let cookTime = 0;

        function ignite() {
            // Force focus and attempt lock
            document.body.requestPointerLock();
            active = true;
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            if(!scene) init(); // Safety check
        }

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement !== document.body) {
                // If they exit lock, we don't freeze, we just show the button again
                document.getElementById('boot-screen').style.display = 'flex';
                document.getElementById('start-btn').innerText = "RESUME";
                active = false;
            }
        });

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.07);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            player = new THREE.Group();
            scene.add(player);
            player.position.set(0, 0, 8);

            // Detailed Character
            const body = new THREE.Group();
            body.position.z = -0.2;
            player.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            head.position.y = 1.65; body.add(head);
            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshBasicMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouth.position.set(0, 1.6, 0.28); head.add(mouth);

            // World Environment
            const addObj = (w,h,d,x,y,z,col,name) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col}));
                m.position.set(x,y,z); m.name = name; m.receiveShadow = true; m.castShadow = true;
                scene.add(m); return m;
            };
            addObj(40, 0.1, 40, 0, 0, 0, 0x1a1a1a, "floor");
            addObj(12, 1.1, 2.5, 0, 0.55, -4, 0x2a1a0a, "counter");
            fryer = addObj(1.5, 0.6, 1.5, 3, 1.4, -4, 0x444444, "fryer");
            interactables.push(fryer);

            // The Butter (Physics Object)
            butter = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 0.5}));
            butter.position.set(0, 1.3, -3); butter.castShadow = true;
            scene.add(butter);
            interactables.push(butter);

            // Lighting & Mirror
            light = new THREE.PointLight(0xffaa44, 2, 25);
            light.position.set(0, 5, -2); light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));

            const mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), { clipBias: 0.003, color: 0x777777 });
            mirror.position.set(2.5, 3, -5); scene.add(mirror);

            // Controls
            window.addEventListener('keydown', e => { 
                keys[e.code] = true; 
                if(e.code === 'KeyE') interact();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousemove', e => {
                if(active) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });

            animate();
        }

        function interact() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(interactables);
            if(heldItem) {
                scene.attach(heldItem);
                heldItem.position.y += 0.2; // Slight drop offset
                velocityY = 0; isGrounded = false;
                heldItem = null;
            } else if(hits.length > 0 && hits[0].object === butter) {
                heldItem = butter;
                camera.add(heldItem);
                heldItem.position.set(0.4, -0.3, -0.6);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!active) return;
            let dt = clock.getDelta();

            // Camera Setup
            player.rotation.y = yaw;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            camera.position.set(player.position.x, 1.65, player.position.z);

            // Movement (W = Forward)
            let speed = 7;
            let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
            let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
            if(moveX || moveZ) {
                let dir = new THREE.Vector3(moveX, 0, moveZ).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                player.position.addScaledVector(dir.normalize(), speed * dt);
            }

            // Butter Gravity
            if(butter && !heldItem) {
                let floorY = (butter.position.x > -6 && butter.position.x < 6 && butter.position.z < -2.7) ? 1.3 : 0.2;
                if(butter.position.y > floorY) {
                    velocityY += gravity * dt;
                    isGrounded = false;
                } else {
                    butter.position.y = floorY;
                    velocityY = 0;
                    isGrounded = true;
                }
                butter.position.y += velocityY * dt;
            }

            // Cooking Logic
            if(butter.position.distanceTo(fryer.position) < 0.8) {
                cookTime += dt;
                let p = Math.min(cookTime / 40, 1);
                document.getElementById('temp').innerText = (p * 300).toFixed(0);
                butter.material.color.lerpColors(new THREE.Color(0x00ffcc), new THREE.Color(0x111111), p);
                if(p > 0.8) light.color.set(0xff0000);
            }

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
