<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX // COOK_FRIED_BUTTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #ui-layer {
            position: absolute; top: 20px; left: 20px; color: #0f0;
            pointer-events: none; text-shadow: 0 0 5px #0f0;
            z-index: 10;
        }
        .stats { font-size: 1.2rem; margin-bottom: 5px; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 1px solid #0f0;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #save-notify {
            position: absolute; bottom: 20px; right: 20px;
            color: #0f0; display: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stats">SYSTEM: COOK_FRIED_BUTTER_v1.0</div>
        <div id="heat-display">TEMP: 0°C</div>
        <div id="status-display">STATUS: IDLE</div>
    </div>
    <div id="crosshair"></div>
    <div id="save-notify">DATA_UPLINK_SUCCESSFUL</div>

    <script>
        let scene, camera, renderer, butter, hand, pan;
        let heat = 0;
        let isGrabbing = false;
        let hasSaved = false;
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();

        // YOUR CLOUD BACKEND URL
        const CLOUD_URL = "https://vortex-cloud.onrender.com";

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 5);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lights
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040, 2));

            // Kitchen Floor
            const floorGeo = new THREE.PlaneGeometry(20, 20);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // The Pan
            const panGeo = new THREE.CylinderGeometry(2, 1.8, 0.3, 32);
            const panMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
            pan = new THREE.Mesh(panGeo, panMat);
            scene.add(pan);

            // The Butter
            const butterGeo = new THREE.BoxGeometry(0.8, 0.4, 0.8);
            const butterMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
            butter = new THREE.Mesh(butterGeo, butterMat);
            butter.position.y = 0.3;
            scene.add(butter);

            // The Hand
            const handGeo = new THREE.BoxGeometry(0.4, 0.1, 0.6);
            const handMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 0.5 });
            hand = new THREE.Mesh(handGeo, handMat);
            scene.add(hand);

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', () => isGrabbing = true);
            window.addEventListener('mouseup', () => isGrabbing = false);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function saveCookingData(finalScore, butterStatus) {
            if (hasSaved) return; // Only save once per session
            hasSaved = true;

            try {
                await fetch(`${CLOUD_URL}/save-session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        playerName: "VORTEX_USER",
                        score: finalScore,
                        butterType: "Standard_Salted",
                        status: butterStatus
                    })
                });
                document.getElementById('save-notify').style.display = 'block';
            } catch (err) {
                console.error("CLOUD_SYNC_ERROR:", err);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            hand.position.x = mouse.x * 5;
            hand.position.z = -mouse.y * 5;
            hand.position.y = 0.5;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(butter);

            if (isGrabbing && intersects.length > 0) {
                butter.position.x = hand.position.x;
                butter.position.z = hand.position.z;
                document.getElementById('status-display').innerText = "STATUS: GRABBING_BUTTER";
            }

            const dist = butter.position.distanceTo(pan.position);
            if (dist < 1.8 && butter.position.y < 0.5) {
                heat += 0.5;
                document.getElementById('heat-display').innerText = `TEMP: ${Math.floor(heat)}°C`;
                
                if (heat > 500) {
                    butter.material.color.setHex(0x331100);
                    document.getElementById('status-display').innerText = "STATUS: CRITICAL_BURN";
                    saveCookingData(Math.floor(heat), "BURNT");
                } else if (heat > 250) {
                    butter.material.color.setHex(0xd4af37);
                    document.getElementById('status-display').innerText = "STATUS: PERFECT_FRY";
                    if (heat > 300) saveCookingData(Math.floor(heat), "COOKED");
                }
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
