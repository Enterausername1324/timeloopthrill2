<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // STABLE_KITCHEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95); color: #00ffcc; z-index: 100; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 12px; }
        
        /* Joystick Base */
        #joy-base { 
            position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px;
            border: 2px solid #00ffcc; border-radius: 50%; display: none; background: rgba(0,255,204,0.1);
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 10px #00ffcc;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 10px;">VORTEX_OS</h1>
        <p>TAP TO INITIALIZE SENSORS</p>
    </div>

    <div id="hud">
        <div>CORE: STABLE_V8</div>
        <div id="debug">INPUT: WAITING...</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, butter;
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // State
        let moveDir = { x: 0, z: 0 };
        let keys = {};
        let targetRotation = { y: 0, x: 0 };
        let currentRotation = { y: 0, x: 0 };
        let lastTouch = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const pLight = new THREE.PointLight(0xffffff, 1);
            pLight.position.set(2, 5, 2);
            scene.add(pLight);

            // Objects
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(50,50), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            const counter = new THREE.Mesh(new THREE.BoxGeometry(6, 0.9, 1.2), new THREE.MeshStandardMaterial({color: 0x222222}));
            counter.position.set(0, 0.45, -2); scene.add(counter);

            butter = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.3), new THREE.MeshStandardMaterial({color: 0xffd700}));
            butter.position.set(0, 1.05, -2); scene.add(butter);

            setupInput();
            animate();
        }

        function setupInput() {
            const overlay = document.getElementById('overlay');
            const joyBase = document.getElementById('joy-base');
            const joyStick = document.getElementById('joy-stick');

            overlay.addEventListener('click', () => {
                overlay.style.display = 'none';
                if (!isMobile) document.body.requestPointerLock();
            });

            if (isMobile) {
                joyBase.style.display = 'block';
                document.getElementById('debug').innerText = "INPUT: IPAD_TOUCH";

                window.addEventListener('touchstart', (e) => {
                    lastTouch.x = e.touches[0].clientX;
                    lastTouch.y = e.touches[0].clientY;
                }, {passive: false});

                window.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const t = e.touches[0];
                    
                    // Joystick (Left half)
                    if (t.clientX < window.innerWidth / 2) {
                        const rect = joyBase.getBoundingClientRect();
                        const cx = rect.left + rect.width/2;
                        const cy = rect.top + rect.height/2;
                        let dx = t.clientX - cx;
                        let dy = t.clientY - cy;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        let limit = rect.width/2;
                        if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                        joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / limit; moveDir.z = dy / limit;
                    } 
                    // Smooth Swipe Look (Right half)
                    else {
                        let movementX = t.clientX - lastTouch.x;
                        let movementY = t.clientY - lastTouch.y;
                        targetRotation.y -= movementX * 0.004;
                        targetRotation.x -= movementY * 0.004;
                    }
                    lastTouch.x = t.clientX;
                    lastTouch.y = t.clientY;
                }, {passive: false});

                window.addEventListener('touchend', () => {
                    moveDir = { x: 0, z: 0 };
                    joyStick.style.transform = 'translate(-50%, -50%)';
                });
            } else {
                document.getElementById('debug').innerText = "INPUT: PC_KEYBOARD";
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement) {
                        targetRotation.y -= e.movementX * 0.002;
                        targetRotation.x -= e.movementY * 0.002;
                    }
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            // Smooth Look
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.2;
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.2;
            currentRotation.x = Math.max(-1.5, Math.min(1.5, currentRotation.x));
            
            camera.rotation.y = currentRotation.y;
            camera.rotation.x = currentRotation.x;

            // Move
            if (isMobile) {
                camera.translateX(moveDir.x * 5 * delta);
                camera.translateZ(moveDir.z * 5 * delta);
            } else {
                if (keys['w']) camera.translateZ(-5 * delta);
                if (keys['s']) camera.translateZ(5 * delta);
                if (keys['a']) camera.translateX(-5 * delta);
                if (keys['d']) camera.translateX(5 * delta);
            }

            camera.position.y = 1.7;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
