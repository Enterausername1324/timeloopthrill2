<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // REAL_COLOR_KITCHEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95); color: #00ffcc; z-index: 100; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 12px; text-shadow: 0 0 5px #00ffcc; }
        #joy-base { 
            position: absolute; bottom: 10%; left: 10%; width: 120px; height: 120px;
            border: 2px solid #00ffcc; border-radius: 50%; display: none; background: rgba(0,255,204,0.05);
            box-shadow: inset 0 0 20px rgba(0,255,204,0.2);
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px #00ffcc;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 8px;">VORTEX_KITCHEN_v11</h1>
        <p>[ TAP_ANYWHERE_TO_INITIALIZE_RESOURCES ]</p>
    </div>

    <div id="hud">
        <div>SYS: TRUE_COLOR_RENDER</div>
        <div id="input-mode">SCANNING...</div>
        <div id="fridge-status">FRIDGE: CLOSED</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let moveDir = { x: 0, z: 0 }, keys = {}, targetRot = { y: 0, x: 0 }, currentRot = { y: 0, x: 0 }, lastTouch = { x: 0, y: 0 };
        let textureLoader, fridgeGroup, fridgeDoor, butterSupply = [];
        let fridgeOpen = false;

        function loadTextures() {
            textureLoader = new THREE.TextureLoader();
            
            // Define procedural textures for standalone HTML
            function createProceduralTexture(size, color1, color2, type) {
                const canvas = document.createElement('canvas');
                canvas.width = canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = color1; ctx.fillRect(0,0,size,size);
                
                if (type === 'checker') {
                    ctx.fillStyle = color2; ctx.fillRect(0,0,size/2,size/2);
                    ctx.fillRect(size/2,size/2,size/2,size/2);
                } else if (type === 'granite') {
                    ctx.fillStyle = color2;
                    for(let i=0; i<500; i++) ctx.fillRect(Math.random()*size,Math.random()*size,1,1);
                }
                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                return texture;
            }

            // --- Define Texture Variables ---
            const floorTex = createProceduralTexture(256, '#1a1a1a', '#2a2a2a', 'checker');
            floorTex.repeat.set(10, 10);
            const counterTex = createProceduralTexture(128, '#333333', '#111111', 'granite');
            const wallTex = createProceduralTexture(128, '#444444', '#222222', 'checker');
            wallTex.repeat.set(8, 4);

            return { floorTex, counterTex, wallTex };
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 1, 35);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const mainLight = new THREE.PointLight(0xffffff, 1, 25);
            mainLight.position.set(0, 5, 0); mainLight.castShadow = true;
            scene.add(mainLight);

            const { floorTex, counterTex, wallTex } = loadTextures();

            // --- BUILD ENVIRONMENT ---
            
            // 1. FLOOR (Deep Checker)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(50,50), new THREE.MeshStandardMaterial({map: floorTex, roughness: 0.1, metalness: 0.2}));
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
            scene.add(floor);

            // 2. BACK WALL (Tiled Backsplash)
            const wall = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), new THREE.MeshStandardMaterial({map: wallTex, roughness: 0.6}));
            wall.position.set(0, 2.5, -3.5); scene.add(wall);

            // 3. CABINETS & SINKHOLE COUNTER
            const createMesh = (geo, mat, x, y, z) => { const m = new THREE.Mesh(geo, mat); m.position.set(x, y, z); m.castShadow = m.receiveShadow = true; scene.add(m); return m; };
            const lowerCabs = new THREE.MeshStandardMaterial({ color: 0x221100, roughness: 0.8 }); // Dark Wood
            const counterMat = new THREE.MeshStandardMaterial({ map: counterTex, roughness: 0.2, metalness: 0.3 }); // Dark Granite

            // Lower Cabinets
            createMesh(new THREE.BoxGeometry(6, 0.9, 1.4), lowerCabs, 0, 0.45, -2.8);

            // Countertop with SINKHOLE
            const counterShape = new THREE.Shape();
            counterShape.moveTo(-3, -0.7); counterShape.lineTo(3, -0.7); counterShape.lineTo(3, 0.7); counterShape.lineTo(-3, 0.7);
            const sinkHole = new THREE.Path(); sinkHole.moveTo(-2.2, -0.4); sinkHole.lineTo(-1, -0.4); sinkHole.lineTo(-1, 0.4); sinkHole.lineTo(-2.2, 0.4);
            counterShape.holes.push(sinkHole);
            
            const countertopExtrude = new THREE.ExtrudeGeometry(counterShape, {depth: 0.05, bevelEnabled: false});
            const countertop = createMesh(countertopExtrude, counterMat, 0, 0.92, -2.8);
            countertop.rotation.x = -Math.PI / 2;

            // 4. THE SINK BASIN (Hollow Depth)
            const sinkMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
            createMesh(new THREE.BoxGeometry(1.2, 0.4, 0.8), sinkMat, -1.6, 0.7, -2.8); // Basin Box
            // Faucet
            const faucet = createMesh(new THREE.CylinderGeometry(0.03, 0.03, 0.4), sinkMat, -1.6, 1.1, -3.2);
            faucet.add(createMesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3), sinkMat, 0.14, 0.18, 0).rotateZ(Math.PI/2));

            // 5. FRY STATION
            const panMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
            constpan = createMesh(new THREE.CylinderGeometry(0.4, 0.4, 0.1), panMat, 0.5, 0.98, -2.8);

            const butter = createMesh(new THREE.BoxGeometry(0.2, 0.1, 0.2), new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x444400 }), 0.5, 1.05, -2.8);

            // 6. THE WORKING FRIDGE (Stack of Butter)
            fridgeGroup = new THREE.Group(); scene.add(fridgeGroup);
            const fridgeMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.7, roughness: 0.3 }); // Brushed White Steel
            
            // Main Body (Hollow Shell)
            createMesh(new THREE.BoxGeometry(1.5, 2.4, 1.1), fridgeMat, 2.5, 1.2, -2.85); // Back/Sides
            
            // Fridge Door (Interactive)
            fridgeDoor = new THREE.Group(); fridgeGroup.add(fridgeDoor);
            createMesh(new THREE.BoxGeometry(1.5, 2.4, 0.1), fridgeMat, 0.75, 1.2, 0.05); // Door Mesh
            createMesh(new THREE.BoxGeometry(0.05, 0.8, 0.1), panMat, 0.1, 1.4, 0.15); // Handle
            fridgeDoor.position.set(1.75, 0, -2.3); // Set rotation pivot point

            // Interior Butter Supply (32 Sticks)
            for (let i = 0; i < 32; i++) {
                const b = createMesh(new THREE.BoxGeometry(0.18, 0.08, 0.18), new THREE.MeshStandardMaterial({ color: 0xffe4b5 }), 0,0,0);
                b.position.set(2.2 + (i%4)*0.2, 0.4 + Math.floor(i/4)*0.2, -2.8);
                butterSupply.push(b);
            }

            setupUnifiedInput();
            animate();
        }

        function setupUnifiedInput() {
            const overlay = document.getElementById('overlay'), joyBase = document.getElementById('joy-base'), joyStick = document.getElementById('joy-stick');
            const removeOverlay = () => { overlay.style.display = 'none'; if (!isTouch) document.body.requestPointerLock(); };
            overlay.addEventListener('touchstart', removeOverlay); overlay.addEventListener('mousedown', removeOverlay);

            // Interaction Trigger (Clicking/Tapping)
            const raycaster = new THREE.Raycaster();
            const interact = () => {
                if (overlay.style.display === 'none') {
                    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                    // Check if looking at Fridge Door
                    const intersects = raycaster.intersectObject(fridgeDoor, true);
                    if (intersects.length > 0) {
                        fridgeOpen = !fridgeOpen;
                        document.getElementById('fridge-status').innerText = fridgeOpen ? "FRIDGE: OPEN" : "FRIDGE: CLOSED";
                    }
                }
            };
            window.addEventListener('click', interact); window.addEventListener('touchstart', interact);

            if (isTouch) {
                document.getElementById('input-mode').innerText = "INPUT: TABLET_MODE_v11"; joyBase.style.display = 'block';
                window.addEventListener('touchstart', (e) => { const t = e.touches[e.touches.length - 1]; lastTouch.x = t.clientX; lastTouch.y = t.clientY; }, {passive: false});
                window.addEventListener('touchmove', (e) => {
                    e.preventDefault(); for (let i = 0; i < e.touches.length; i++) {
                        const t = e.touches[i];
                        if (t.clientX < window.innerWidth / 2) {
                            const rect = joyBase.getBoundingClientRect();
                            const cx = rect.left + rect.width/2; const cy = rect.top + rect.height/2;
                            let dx = t.clientX - cx; let dy = t.clientY - cy; let dist = Math.sqrt(dx*dx + dy*dy); let limit = rect.width/2;
                            if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                            joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; moveDir.x = dx / limit; moveDir.z = dy / limit;
                        } else {
                            let mx = t.clientX - lastTouch.x; let my = t.clientY - lastTouch.y;
                            targetRot.y -= mx * 0.0038; targetRot.x -= my * 0.0038;
                        }
                        if (t.clientX > window.innerWidth / 2) { lastTouch.x = t.clientX; lastTouch.y = t.clientY; }
                    }
                }, {passive: false});
                window.addEventListener('touchend', (e) => {
                    let leftSideActive = false;
                    for(let i=0; i<e.touches.length; i++) if(e.touches[i].clientX < window.innerWidth / 2) leftSideActive = true;
                    if(!leftSideActive) { moveDir = { x: 0, z: 0 }; joyStick.style.transform = 'translate(-50%, -50%)'; }
                });
            } else {
                document.getElementById('input-mode').innerText = "INPUT: PC_KEYBOARD_v11";
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true); window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => { if (document.pointerLockElement) { targetRot.y -= e.movementX * 0.002; targetRot.x -= e.movementY * 0.002; } });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            currentRot.y += (targetRot.y - currentRot.y) * 0.22; currentRot.x += (targetRot.x - currentRot.x) * 0.22;
            currentRot.x = Math.max(-1.4, Math.min(1.4, currentRot.x));
            camera.rotation.y = currentRot.y; camera.rotation.x = currentRot.x;
            let speed = 5;
            if (isTouch) { camera.translateX(moveDir.x * speed * delta); camera.translateZ(moveDir.z * speed * delta); }
            else { if (keys['w']) camera.translateZ(-speed * delta); if (keys['s']) camera.translateZ(speed * delta); if (keys['a']) camera.translateX(-speed * delta); if (keys['d']) camera.translateX(speed * delta); }
            
            // Fridge Door Animation Lerp
            const doorPivot = -Math.PI/2;
            fridgeDoor.rotation.y += ( (fridgeOpen ? doorPivot : 0) - fridgeDoor.rotation.y ) * 0.1;

            camera.position.y = 1.7; renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        init();
    </script>
</body>
</html>
