<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // MOBILE_KITCHEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui-layer { position: absolute; top: 10px; left: 10px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 0.8rem; }
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; border: 2px solid rgba(0,255,204,0.3); border-radius: 50%; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(0,255,204,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div>SYSTEM: MOBILE_VORTEX_KITCHEN</div>
        <div id="status">STATUS: TOUCH_INPUT_READY</div>
    </div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock;
        let moveDir = { x: 0, y: 0 };
        let touchStart = { x: 0, y: 0 };
        let isMoving = false;

        // Joystick Logic
        const stick = document.getElementById('joystick-stick');
        const zone = document.getElementById('joystick-zone');

        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (touch.clientX < window.innerWidth / 2) {
                isMoving = true;
                touchStart.x = touch.clientX;
                touchStart.y = touch.clientY;
            }
        });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            
            // Movement (Left Side)
            if (isMoving && touch.clientX < window.innerWidth / 2) {
                let dx = touch.clientX - touchStart.x;
                let dy = touch.clientY - touchStart.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let maxDist = 50;
                
                if (dist > maxDist) {
                    dx *= maxDist / dist;
                    dy *= maxDist / dist;
                }
                
                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                moveDir.x = dx / maxDist;
                moveDir.y = dy / maxDist;
            } 
            // Looking (Right Side)
            else {
                camera.rotation.y -= e.touches[0].radiusX * 0.05 || 0.02; // Basic rotation helper
                // For a more precise look, we calculate delta movement
                if(e.touches[0].force === 0) {
                    camera.rotation.y -= (touch.clientX - (window.innerWidth*0.75)) * 0.0001;
                }
            }
        });

        window.addEventListener('touchend', () => {
            isMoving = false;
            moveDir = { x: 0, y: 0 };
            stick.style.transform = `translate(-50%, -50%)`;
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.7, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); // High DPI for iPads
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Lighting & Basic Kitchen
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const pLight = new THREE.PointLight(0xffffff, 1);
            pLight.position.set(2, 4, 2);
            scene.add(pLight);

            // Floor & Counter
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            const counter = new THREE.Mesh(new THREE.BoxGeometry(4, 0.9, 1), new THREE.MeshStandardMaterial({color: 0x222222}));
            counter.position.set(0, 0.45, -2);
            scene.add(counter);

            // Fridge (The Big Mesh)
            const fridge = new THREE.Mesh(new THREE.BoxGeometry(1, 2.2, 1), new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.8}));
            fridge.position.set(2, 1.1, -2);
            scene.add(fridge);

            // Pan & Butter
            const pan = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.1), new THREE.MeshStandardMaterial({color: 0x000000}));
            pan.position.set(0, 0.95, -2);
            scene.add(pan);

            const butter = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.2), new THREE.MeshStandardMaterial({color: 0xffd700}));
            butter.position.set(0, 1.05, -2);
            scene.add(butter);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Apply Joystick Movement
            if (isMoving) {
                camera.translateZ(moveDir.y * 5 * delta);
                camera.translateX(moveDir.x * 5 * delta);
            }
            camera.position.y = 1.7; // Fixed height

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
