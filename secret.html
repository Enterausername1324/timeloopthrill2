<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Area</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-box {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ffcc;
            padding: 30px;
            border-radius: 15px;
            margin-top: 25px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
            text-align: center;
        }
        .search-input {
            width: 90%;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            outline: none;
            margin-bottom: 20px;
        }
        .search-button {
            padding: 15px 35px;
            background: #00ffcc;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.4s;
        }
        .search-button:hover {
            background: #fff;
            box-shadow: 0 0 30px #fff;
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="secret-body">

    <div class="secret-container">
        <h1 class="secret-title">VORTEX ACCESS</h1>
        <p class="secret-subtitle">Rammerhead Protocol v4.0 Loaded</p>

        <div class="search-box">
            <p style="color: #00ffcc; font-size: 0.8em; margin-bottom: 15px; opacity: 0.7;">ENTER DESTINATION NODE</p>
            
            <input type="text" id="proxyUrl" class="search-input" placeholder="https://discord.com">
            <br>
            <button onclick="launchRammerhead()" class="search-button">ENGAGE</button>
            
            <div style="margin-top: 20px; font-size: 0.75em; color: #444; line-height: 1.6;">
                <p>[P] - Instant Google Drive Cloak</p>
                <p>[H] - Mask Timeline (History Flood)</p>
            </div>
        </div>

        <a href="index.html" class="secret-back" style="margin-top: 40px; display: block; opacity: 0.5;">[ Exit Archive ]</a>
    </div>

    <script>
        // RAMMERHEAD + ABOUT:BLANK INJECTION
        function launchRammerhead() {
            const val = document.getElementById('proxyUrl').value;
            if (!val) return;

            // Ensure the URL starts with https:// for Rammerhead to process it
            let targetUrl = val;
            if (!targetUrl.startsWith('http')) {
                targetUrl = 'https://' + targetUrl;
            }

            // Replace this URL with your current working Rammerhead mirror
            const rammerheadBase = "https://rhead-mirror-example.com/main/";
            const finalLink = rammerheadBase + targetUrl;

            // Open stealth window
            const win = window.open('about:blank', '_blank');

            if (win) {
                const doc = win.document;
                doc.title = "New Tab"; // Keeps the tab name generic
                
                // Set up the stealth container
                const body = doc.body;
                body.style.margin = "0";
                body.style.padding = "0";
                body.style.overflow = "hidden";
                body.style.background = "#000";

                const iframe = doc.createElement('iframe');
                iframe.style.width = "100vw";
                iframe.style.height = "100vh";
                iframe.style.border = "none";
                iframe.src = finalLink;

                body.appendChild(iframe);
            } else {
                alert("Popup blocked! Enable popups to use the Vortex.");
            }
        }

        // EMERGENCY UTILITIES
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            // Panic Mode (Cloak as Google Drive)
            if (key === 'p') {
                document.title = "My Drive - Google Drive";
                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.rel = 'shortcut icon';
                link.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
                document.getElementsByTagName('head')[0].appendChild(link);
                
                document.body.innerHTML = "<div style='background:white; height:100vh; display:flex; align-items:center; justify-content:center;'><h1 style='color:#5f6368; font-family:sans-serif;'>Loading Google Drive...</h1></div>";
                document.body.style.background = "white";
            }

            // History Masker
            if (key === 'h') {
                for (let i = 0; i < 50; i++) {
                    window.history.pushState({}, "", "/google-classroom/auth/session-" + Math.floor(Math.random() * 100000));
                }
                alert("Timeline masked with 50 fake entries.");
            }
        });
    </script>
</body>
</html>
