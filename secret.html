<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // RELATIVE_MOVEMENT_v15</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 100; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 12px; text-shadow: 0 0 5px #00ffcc; }
        #joy-base { 
            position: absolute; bottom: 12%; left: 12%; width: 130px; height: 130px;
            border: 3px solid #00ffcc; border-radius: 50%; display: none; background: rgba(0,255,204,0.1);
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 55px; height: 55px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 20px #00ffcc;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 10px;">VORTEX_v15</h1>
        <p>[ TAP_TO_SYNC_ROBLOX_CONTROLS ]</p>
    </div>

    <div id="hud">
        <div>INPUT: CAMERA_RELATIVE_v15</div>
        <div id="status">SENSITIVITY: HIGH</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, cubeCamera, cubeRenderTarget;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        let moveDir = { x: 0, z: 0 };
        let keys = {};
        let targetRot = { y: 0, x: 0 };
        let currentRot = { y: 0, x: 0 };
        let lastTouch = { x: 0, y: 0 };

        let playerGroup, fridgeDoor;
        let fridgeOpen = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Reflection Setup
            cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, { format: THREE.RGBFormat, generateMipmaps: true });
            cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
            cubeCamera.position.set(-3.9, 1.7, -4.9);
            scene.add(cubeCamera);

            // Puppet Model (The Person in the mirror)
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5);

            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x00ffcc, wireframe: true }));
            body.position.y = 1.0; playerGroup.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            head.position.y = 1.8; playerGroup.add(head);

            playerGroup.add(camera);
            camera.position.y = 1.7;

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const pLight = new THREE.PointLight(0x00ffcc, 1, 30);
            pLight.position.set(0, 5, 0); scene.add(pLight);

            // --- KITCHEN BUILD ---
            const createBox = (w,h,d,x,y,z,col,m=0,r=1) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col, metalness:m, roughness:r}));
                mesh.position.set(x,y,z); scene.add(mesh); return mesh;
            };

            createBox(100, 0.1, 100, 0, -0.05, 0, 0x111111); // Floor
            createBox(12, 5, 0.1, 0, 2.5, -5, 0x222222); // Wall
            
            // Mirror
            const mirror = new THREE.Mesh(new THREE.PlaneGeometry(3, 4), new THREE.MeshStandardMaterial({ envMap: cubeRenderTarget.texture, metalness: 1, roughness: 0 }));
            mirror.position.set(-4, 2.2, -4.9); scene.add(mirror);

            // Sink & Fridge (Spaced out)
            createBox(5, 0.9, 1.4, -1, 0.45, -3.8, 0x151515); // Sink Counter
            createBox(1.2, 0.4, 0.8, -1.8, 0.7, -3.8, 0x000000); // Sinkhole
            
            const fBody = createBox(1.6, 2.6, 1.2, 3.5, 1.3, -3.8, 0xaaaaaa); // Fridge Body
            fridgeDoor = new THREE.Group(); 
            const dMesh = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.6, 0.1), new THREE.MeshStandardMaterial({color:0xeeeeee, metalness:0.6}));
            dMesh.position.set(0.8, 1.3, 0.05); fridgeDoor.add(dMesh);
            fridgeDoor.position.set(2.7, 0, -3.15); scene.add(fridgeDoor);

            setupInput();
            animate();
        }

        function setupInput() {
            const overlay = document.getElementById('overlay');
            overlay.addEventListener('click', () => { 
                overlay.style.display = 'none'; 
                if(!isTouch) document.body.requestPointerLock();
                fridgeOpen = !fridgeOpen;
            });

            if (isTouch) {
                document.getElementById('joy-base').style.display = 'block';
                window.addEventListener('touchstart', (e) => { 
                    const t = e.touches[e.touches.length - 1];
                    lastTouch.x = t.clientX; lastTouch.y = t.clientY; 
                }, {passive: false});

                window.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const t = e.touches[0];
                    if (t.clientX < window.innerWidth / 2) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 65);
                        let dy = t.clientY - (rect.top + 65);
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > 65) { dx *= 65/dist; dy *= 65/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 65; moveDir.z = dy / 65;
                    } else {
                        // High sensitivity look
                        targetRot.y -= (t.clientX - lastTouch.x) * 0.005;
                        targetRot.x -= (t.clientY - lastTouch.y) * 0.005;
                        lastTouch.x = t.clientX; lastTouch.y = t.clientY;
                    }
                }, {passive: false});

                window.addEventListener('touchend', () => { moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; });
            } else {
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => { if(document.pointerLockElement) { targetRot.y -= e.movementX*0.002; targetRot.x -= e.movementY*0.002; } });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            cubeCamera.update(renderer, scene);

            currentRot.y += (targetRot.y - currentRot.y) * 0.22;
            currentRot.x += (targetRot.x - currentRot.x) * 0.22;
            camera.rotation.y = currentRot.y;
            camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

            // --- ROBLOX STYLE MOVEMENT ENGINE ---
            let speed = 6;
            let forward = new THREE.Vector3(0, 0, -1);
            let right = new THREE.Vector3(1, 0, 0);

            // Apply camera rotation to the movement vectors
            forward.applyQuaternion(camera.quaternion);
            right.applyQuaternion(camera.quaternion);
            
            // Lock Y so you don't fly into the air
            forward.y = 0; right.y = 0;
            forward.normalize(); right.normalize();

            if (isTouch) {
                // Move based on Camera Direction + Joystick Input
                playerGroup.position.addScaledVector(forward, -moveDir.z * speed * delta);
                playerGroup.position.addScaledVector(right, moveDir.x * speed * delta);
            } else {
                if (keys['w']) playerGroup.position.addScaledVector(forward, speed * delta);
                if (keys['s']) playerGroup.position.addScaledVector(forward, -speed * delta);
                if (keys['a']) playerGroup.position.addScaledVector(right, -speed * delta);
                if (keys['d']) playerGroup.position.addScaledVector(right, speed * delta);
            }

            fridgeDoor.rotation.y += (((fridgeOpen ? -1.8 : 0) - fridgeDoor.rotation.y) * 0.1);
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
