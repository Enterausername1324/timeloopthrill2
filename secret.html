<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // OMNI_KITCHEN_v6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 100; text-align: center;
        }
        #hud { position: absolute; top: 10px; left: 10px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 10px; }
        
        /* High-Visibility Joystick for iPad */
        #joy-container {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(0, 255, 204, 0.1); border: 2px solid #00ffcc; border-radius: 50%;
            z-index: 50; touch-action: none;
        }
        #joy-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #00ffcc;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>VORTEX_CORE_INIT</h1>
        <p>TAP SCREEN TO START ENGINE</p>
    </div>

    <div id="hud">
        <div id="log">LOG: STANDBY...</div>
        <div id="pos">POS: 0, 0, 0</div>
    </div>

    <div id="joy-container"><div id="joy-knob"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, butter;
        let moveDir = { x: 0, z: 0 };
        let isJoystickActive = false;
        let lookRotation = { y: 0, x: 0 };

        function log(msg) { document.getElementById('log').innerText = "LOG: " + msg; }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // World Objects
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(50,50), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            const counter = new THREE.Mesh(new THREE.BoxGeometry(5, 0.9, 1.5), new THREE.MeshStandardMaterial({color: 0x222222}));
            counter.position.set(0, 0.45, -2); scene.add(counter);

            butter = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.3), new THREE.MeshStandardMaterial({color: 0xffd700}));
            butter.position.set(0, 1.0, -2); scene.add(butter);

            setupUnifiedInput();
            animate();
        }

        function setupUnifiedInput() {
            const joyContainer = document.getElementById('joy-container');
            const joyKnob = document.getElementById('joy-knob');
            const overlay = document.getElementById('overlay');

            overlay.addEventListener('touchstart', () => { overlay.style.display = 'none'; log("ENGINE_START"); }, {passive: false});
            overlay.addEventListener('mousedown', () => { overlay.style.display = 'none'; document.body.requestPointerLock(); });

            // iPad Joystick Logic
            joyContainer.addEventListener('touchstart', (e) => {
                isJoystickActive = true;
                log("JOY_ACTIVE");
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                e.preventDefault(); // Prevents iPad from scrolling
                const touch = e.touches[0];
                
                // Left Side (Joystick)
                if (isJoystickActive && touch.clientX < window.innerWidth / 2) {
                    const rect = joyContainer.getBoundingClientRect();
                    const centerX = rect.left + rect.width/2;
                    const centerY = rect.top + rect.height/2;
                    let dx = touch.clientX - centerX;
                    let dy = touch.clientY - centerY;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let limit = rect.width/2;

                    if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                    joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    moveDir.x = dx / limit;
                    moveDir.z = dy / limit;
                } 
                // Right Side (Look Swipe)
                else {
                    lookRotation.y -= (touch.clientX - (window.innerWidth/2)) * 0.0001;
                }
            }, {passive: false});

            window.addEventListener('touchend', () => {
                isJoystickActive = false;
                moveDir = { x: 0, z: 0 };
                joyKnob.style.transform = `translate(-50%, -50%)`;
                log("JOY_IDLE");
            });

            // PC Mouse Support
            window.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Mobile Movement
            camera.translateX(moveDir.x * 5 * delta);
            camera.translateZ(moveDir.z * 5 * delta);
            
            // iPad Looking
            camera.rotation.y += lookRotation.y;
            lookRotation.y *= 0.9; // Friction for look swipe

            camera.position.y = 1.7;
            document.getElementById('pos').innerText = `POS: ${camera.position.x.toFixed(1)}, ${camera.position.z.toFixed(1)}`;
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
