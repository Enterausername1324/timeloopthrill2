<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // MIRROR_KITCHEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 100; cursor: pointer;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 12px; }
        #joy-base { position: absolute; bottom: 10%; left: 10%; width: 120px; height: 120px; border: 2px solid #00ffcc; border-radius: 50%; display: none; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay"><h1>VORTEX_KITCHEN_v13</h1><p>[ TAP_TO_SYNC ]</p></div>
    <div id="hud"><div id="mode">SCANNING...</div><div id="status">SINK_STABLE // FRIDGE_READY</div></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, cubeCamera, cubeRenderTarget;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let moveDir = { x: 0, z: 0 }, keys = {}, targetRot = { y: 0, x: 0 }, currentRot = { y: 0, x: 0 }, lastTouch = { x: 0, y: 0 };
        let fridgeDoor, fridgeOpen = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Reflection Setup for Mirror
            cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, { format: THREE.RGBFormat, generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter });
            cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
            scene.add(cubeCamera);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const p = new THREE.PointLight(0x00ffcc, 1, 20); p.position.set(0, 5, 0); scene.add(p);

            // --- THE KITCHEN ---
            const createBox = (w,h,d,x,y,z,col,m=0,r=1) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col, metalness:m, roughness:r}));
                mesh.position.set(x,y,z); scene.add(mesh); return mesh;
            };

            // 1. Floor & Walls
            createBox(50, 0.1, 50, 0, -0.05, 0, 0x111111); // Floor
            createBox(12, 5, 0.1, 0, 2.5, -5, 0x222222); // Back Wall

            // 2. THE MIRROR (Actual Reflection)
            const mirrorGeo = new THREE.PlaneGeometry(3, 4);
            const mirrorMat = new THREE.MeshStandardMaterial({ envMap: cubeRenderTarget.texture, metalness: 1, roughness: 0 });
            const mirror = new THREE.Mesh(mirrorGeo, mirrorMat);
            mirror.position.set(-4, 2.2, -4.9);
            scene.add(mirror);

            // 3. THE SINK & COUNTER (No clipping)
            createBox(5, 0.9, 1.5, -1, 0.45, -4, 0x151515); // Cabinet
            createBox(5.1, 0.05, 1.6, -1, 0.92, -4, 0x333333, 0.2, 0.1); // Top
            
            // Realistic Sinkhole
            const basin = createBox(1.2, 0.4, 0.8, -1.5, 0.7, -4, 0x000000); // Hollow look
            createBox(0.05, 0.4, 0.05, -1.5, 1.1, -4.3, 0x888888, 1, 0); // Faucet

            // 4. THE FRIDGE (Moved away from counter)
            const fridge = createBox(1.6, 2.6, 1.3, 3, 1.3, -4, 0xdddddd, 0.6, 0.2);
            fridgeDoor = new THREE.Group(); scene.add(fridgeDoor);
            const dMesh = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.6, 0.1), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            dMesh.position.set(0.8, 1.3, 0.05); fridgeDoor.add(dMesh);
            fridgeDoor.position.set(2.2, 0, -3.35); // Pivot at left edge

            // Interior Butter
            for(let i=0; i<12; i++) {
                const b = createBox(0.2, 0.1, 0.3, 2.5 + (i%3)*0.3, 0.5 + Math.floor(i/3)*0.4, -4, 0xffd700);
            }

            setupInput();
            animate();
        }

        function setupInput() {
            const overlay = document.getElementById('overlay');
            overlay.addEventListener('click', () => { 
                overlay.style.display = 'none'; 
                if(!isTouch) document.body.requestPointerLock();
                fridgeOpen = !fridgeOpen; // Toggle fridge on sync
            });

            if (isTouch) {
                document.getElementById('joy-base').style.display = 'block';
                window.addEventListener('touchstart', (e) => { lastTouch.x = e.touches[0].clientX; lastTouch.y = e.touches[0].clientY; });
                window.addEventListener('touchmove', (e) => {
                    const t = e.touches[0];
                    if (t.clientX < window.innerWidth/2) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        moveDir.x = (t.clientX - (rect.left + 60)) / 60;
                        moveDir.z = (t.clientY - (rect.top + 60)) / 60;
                    } else {
                        targetRot.y -= (t.clientX - lastTouch.x) * 0.004;
                        targetRot.x -= (t.clientY - lastTouch.y) * 0.004;
                        lastTouch.x = t.clientX; lastTouch.y = t.clientY;
                    }
                });
                window.addEventListener('touchend', () => { moveDir = {x:0, z:0}; });
            } else {
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => { if(document.pointerLockElement) { targetRot.y -= e.movementX*0.002; targetRot.x -= e.movementY*0.002; } });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Update Mirror Reflection
            cubeCamera.position.copy(camera.position);
            cubeCamera.update(renderer, scene);

            currentRot.y += (targetRot.y - currentRot.y) * 0.2;
            currentRot.x += (targetRot.x - currentRot.x) * 0.2;
            camera.rotation.y = currentRot.y; camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

            if (isTouch) {
                camera.translateX(moveDir.x * 5 * delta);
                camera.translateZ(moveDir.z * 5 * delta);
            } else {
                if (keys['w']) camera.translateZ(-5 * delta);
                if (keys['s']) camera.translateZ(5 * delta);
                if (keys['a']) camera.translateX(-5 * delta);
                if (keys['d']) camera.translateX(5 * delta);
            }

            fridgeDoor.rotation.y += ((fridgeOpen ? -1.8 : 0) - fridgeDoor.rotation.y) * 0.1;
            camera.position.y = 1.7;
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
