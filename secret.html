<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // DETAILED_KITCHEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 100; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 12px; text-shadow: 0 0 5px #00ffcc; }
        #joy-base { 
            position: absolute; bottom: 10%; left: 10%; width: 120px; height: 120px;
            border: 2px solid #00ffcc; border-radius: 50%; display: none; background: rgba(0,255,204,0.05);
            box-shadow: inset 0 0 20px rgba(0,255,204,0.2);
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px #00ffcc;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 8px;">VORTEX_KITCHEN_v10</h1>
        <p>[ TAP_TO_INITIALIZE_RESOURCES ]</p>
    </div>

    <div id="hud">
        <div>SYS: HIGH_FIDELITY_RENDER</div>
        <div id="input-mode">SCANNING...</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let moveDir = { x: 0, z: 0 }, keys = {}, targetRot = { y: 0, x: 0 }, currentRot = { y: 0, x: 0 }, lastTouch = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 1, 35);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // --- ADVANCED LIGHTING ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const mainLight = new THREE.PointLight(0xffffff, 0.8, 20);
            mainLight.position.set(0, 4, 0);
            mainLight.castShadow = true;
            scene.add(mainLight);

            const counterLight = new THREE.RectAreaLight(0x00ffcc, 2, 4, 0.1);
            counterLight.position.set(0, 2.1, -2.9);
            scene.add(counterLight);

            // --- THE KITCHEN BUILD ---
            
            // 1. FLOOR (Grid Tile)
            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.2 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 2. BACK WALL (Tiled)
            const wallGeo = new THREE.PlaneGeometry(10, 5);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4 });
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(0, 2.5, -3.5);
            scene.add(wall);

            // 3. CABINETS & COUNTER
            const createBox = (w, h, d, x, y, z, color, metal = 0, rough = 1) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: color, metalness: metal, roughness: rough }));
                mesh.position.set(x, y, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                return mesh;
            };

            // Lower Cabinets (Dark Wood)
            createBox(6, 0.9, 1.4, 0, 0.45, -2.8, 0x151515);
            // Countertop (Marble/Granite)
            createBox(6.1, 0.05, 1.5, 0, 0.92, -2.8, 0x333333, 0.2, 0.1);
            // Upper Cabinets
            createBox(6, 0.8, 0.6, 0, 2.6, -3.2, 0x151515);

            // 4. THE SINK & FAUCET
            const faucetBase = createBox(0.05, 0.4, 0.05, -1.5, 1.1, -3, 0x888888, 0.9, 0.1);
            const faucetHead = createBox(0.3, 0.05, 0.05, -1.38, 1.3, -3, 0x888888, 0.9, 0.1);

            // 5. THE FRIDGE (Brushed Steel)
            const fridge = createBox(1.5, 2.4, 1.2, 2.5, 1.2, -2.8, 0x777777, 0.8, 0.2);
            // Fridge Handles
            createBox(0.05, 0.8, 0.1, 1.8, 1.5, -2.2, 0x333333, 0.5);
            createBox(0.05, 0.8, 0.1, 1.8, 0.6, -2.2, 0x333333, 0.5);

            // 6. STOVE & BUTTER
            const stoveGeo = new THREE.PlaneGeometry(1.2, 0.8);
            const stoveMat = new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 1, roughness: 0 });
            const stove = new THREE.Mesh(stoveGeo, stoveMat);
            stove.rotation.x = -Math.PI / 2;
            stove.position.set(0.5, 0.93, -2.8);
            scene.add(stove);

            const pan = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.05, 32), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6 }));
            pan.position.set(0.5, 0.98, -2.8);
            scene.add(pan);

            const butter = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.2), new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x333300 }));
            butter.position.set(0.5, 1.05, -2.8);
            scene.add(butter);

            setupUnifiedInput();
            animate();
        }

        function setupUnifiedInput() {
            const overlay = document.getElementById('overlay');
            const joyBase = document.getElementById('joy-base');
            const joyStick = document.getElementById('joy-stick');

            const removeOverlay = () => {
                overlay.style.display = 'none';
                if (!isTouch) document.body.requestPointerLock();
            };
            overlay.addEventListener('touchstart', removeOverlay);
            overlay.addEventListener('mousedown', removeOverlay);

            if (isTouch) {
                document.getElementById('input-mode').innerText = "INPUT: TABLET_MODE_v10";
                joyBase.style.display = 'block';

                window.addEventListener('touchstart', (e) => {
                    const t = e.touches[e.touches.length - 1]; 
                    lastTouch.x = t.clientX; lastTouch.y = t.clientY;
                }, {passive: false});

                window.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    for (let i = 0; i < e.touches.length; i++) {
                        const t = e.touches[i];
                        if (t.clientX < window.innerWidth / 2) {
                            const rect = joyBase.getBoundingClientRect();
                            const cx = rect.left + rect.width/2;
                            const cy = rect.top + rect.height/2;
                            let dx = t.clientX - cx; let dy = t.clientY - cy;
                            let dist = Math.sqrt(dx*dx + dy*dy); let limit = rect.width/2;
                            if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                            joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                            moveDir.x = dx / limit; moveDir.z = dy / limit;
                        } else {
                            let mx = t.clientX - lastTouch.x; let my = t.clientY - lastTouch.y;
                            targetRot.y -= mx * 0.0038; targetRot.x -= my * 0.0038;
                        }
                        if (t.clientX > window.innerWidth / 2) { lastTouch.x = t.clientX; lastTouch.y = t.clientY; }
                    }
                }, {passive: false});

                window.addEventListener('touchend', (e) => {
                    let leftSideActive = false;
                    for(let i=0; i<e.touches.length; i++) if(e.touches[i].clientX < window.innerWidth / 2) leftSideActive = true;
                    if(!leftSideActive) { moveDir = { x: 0, z: 0 }; joyStick.style.transform = 'translate(-50%, -50%)'; }
                });
            } else {
                document.getElementById('input-mode').innerText = "INPUT: PC_KEYBOARD_v10";
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => { if (document.pointerLockElement) { targetRot.y -= e.movementX * 0.002; targetRot.x -= e.movementY * 0.002; } });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            currentRot.y += (targetRot.y - currentRot.y) * 0.22;
            currentRot.x += (targetRot.x - currentRot.x) * 0.22;
            currentRot.x = Math.max(-1.4, Math.min(1.4, currentRot.x));
            camera.rotation.y = currentRot.y; camera.rotation.x = currentRot.x;
            let speed = 5;
            if (isTouch) { camera.translateX(moveDir.x * speed * delta); camera.translateZ(moveDir.z * speed * delta); }
            else { if (keys['w']) camera.translateZ(-speed * delta); if (keys['s']) camera.translateZ(speed * delta); if (keys['a']) camera.translateX(-speed * delta); if (keys['d']) camera.translateX(speed * delta); }
            camera.position.y = 1.7;
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        init();
    </script>
</body>
</html>
