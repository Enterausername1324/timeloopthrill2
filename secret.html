<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 53.1_RECOVERY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; cursor: pointer; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #bar-box { width: 200px; height: 10px; border: 1px solid #fff; background: #000; display: none; margin-top: 5px; }
        #bar-fill { height: 100%; width: 0%; background: #ffcc00; }
        #label { color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        #joystick-wrapper { position: absolute; bottom: 40px; left: 40px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; border: 1px solid #fff; }
        #joystick-stick { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: #fff; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1>[ V53.1 // RE-INITIALIZE ]</h1>
    <p>TEXTURE MAPPING CORRECTED</p>
</div>

<div id="ui">
    <div id="label">SYSTEM STABLE</div>
    <div id="bar-box"><div id="bar-fill"></div></div>
</div>

<div id="joystick-wrapper"><div id="joystick-stick"></div></div>

<script>
let scene, camera, renderer, clock, player, head, fridgeDoor, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null;
let keys = {}, butters = [], isMobile = false;
let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
let touchLook = { active: false, lastX: 0, lastY: 0 };

const STAGES = [0xfff0ad, 0xffe066, 0xffcc00, 0x8b4513, 0x331100, 0x000000];
const LABELS = ["FRESH", "MELTING", "SIZZLING", "GOLDEN", "CHARRED", "RUINED"];

// Generate textures once at the start to avoid the "Static Bar" bug
function genTex(c1, c2) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 128;
    const ctx = canvas.getContext('2d');
    for(let i=0; i<128; i+=4) {
        for(let j=0; j<128; j+=4) {
            ctx.fillStyle = Math.random() > 0.5 ? c1 : c2;
            ctx.fillRect(i, j, 4, 4);
        }
    }
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.repeat.set(2, 2);
    return t;
}

const tMetal = genTex('#888', '#aaa');
const tMarble = genTex('#fff', '#ddd');
const tWall = genTex('#222', '#111');

function setup() { 
    active = true; 
    document.getElementById('overlay').style.display = 'none'; 
    if(!isMobile) document.body.requestPointerLock();
}

function init() {
    isMobile = ('ontouchstart' in window);
    if(isMobile) document.getElementById('joystick-wrapper').style.display = 'block';

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 5);

    head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; player.add(head);

    // Floor & Walls
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({color: 0x111111}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);

    const room = new THREE.Mesh(new THREE.BoxGeometry(18, 10, 18), new THREE.MeshStandardMaterial({map: tWall, side: THREE.BackSide}));
    room.position.y = 5; scene.add(room);

    // Fridge
    const fridge = new THREE.Group(); fridge.position.set(-5, 0, -5); scene.add(fridge);
    const fBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 2), new THREE.MeshStandardMaterial({map: tMetal}));
    fBody.position.y = 2.5; fridge.add(fBody);
    
    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(1.25, 2.5, 1); fridge.add(fridgeDoor);
    const dMesh = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 0.1), new THREE.MeshStandardMaterial({map: tMetal}));
    dMesh.position.set(-1.25, 0, 0); dMesh.name = "fridge_door"; fridgeDoor.add(dMesh);

    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.25, 0.25), new THREE.MeshStandardMaterial({color: 0xfff0ad}));
        b.position.set((i%2)*0.6 - 0.3, 1 + (Math.floor(i/3)*1.5), 0.5);
        b.name = "butter"; b.userData.cookTime = 0; fridge.add(b); butters.push(b);
    }

    // Counter & Fryer
    const counter = new THREE.Mesh(new THREE.BoxGeometry(8, 1.1, 2.5), new THREE.MeshStandardMaterial({map: tMarble}));
    counter.position.set(1, 0.55, -4.5); scene.add(counter);
    const fryer = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 1.5), new THREE.MeshStandardMaterial({color: 0x222222}));
    fryer.position.set(3, 1.1, -4.5); fryer.name = "fryer"; scene.add(fryer);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const pL = new THREE.PointLight(0xffffff, 1.5, 30); pL.position.set(0, 6, 2); scene.add(pL);

    // Inputs (Simplified)
    window.addEventListener('touchstart', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) { joy.active = true; joy.startX = t.clientX; joy.startY = t.clientY; }
            else { touchLook.active = true; touchLook.lastX = t.clientX; touchLook.lastY = t.clientY; doInteract(); }
        }
    });
    window.addEventListener('touchmove', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(joy.active) {
                let dx = t.clientX - joy.startX, dy = t.clientY - joy.startY;
                joy.x = Math.max(-1, Math.min(1, dx/40)); joy.y = Math.max(-1, Math.min(1, dy/40));
                document.getElementById('joystick-stick').style.transform = `translate(${joy.x*20}px, ${joy.y*20}px)`;
            } else if(touchLook.active) {
                yaw -= (t.clientX - touchLook.lastX) * 0.005;
                pitch -= (t.clientY - touchLook.lastY) * 0.005;
                touchLook.lastX = t.clientX; touchLook.lastY = t.clientY;
            }
        }
    });
    window.addEventListener('touchend', () => { joy.active = false; joy.x = joy.y = 0; touchLook.active = false; document.getElementById('joystick-stick').style.transform = `translate(0,0)`; });
    window.addEventListener('mousemove', e => { if(document.pointerLockElement === document.body) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; }});
    window.addEventListener('mousedown', () => { if(active && !isMobile) doInteract(); });

    animate();
}

function doInteract() {
    const r = new THREE.Raycaster();
    r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let obj = hits[0].object;
        if(heldItem) {
            if(obj.name === "fryer") {
                cookingButter = heldItem; scene.attach(heldItem); heldItem.position.set(3, 1.4, -4.5); heldItem = null;
                document.getElementById('bar-box').style.display = "block";
            } else { scene.attach(heldItem); heldItem.position.y = 0.2; heldItem = null; }
        } else {
            if(obj.name === "butter") { 
                heldItem = obj; player.add(heldItem); heldItem.position.set(0.5, 1.2, -0.8);
                if(heldItem === cookingButter) { cookingButter = null; document.getElementById('bar-box').style.display = "none"; }
            } else if(obj.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta(), t = clock.getElapsedTime();
    if(active) {
        player.rotation.y = yaw;
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        camera.position.set(player.position.x, 1.65, player.position.z);
        fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.6 : 0, 0.1);

        if(t > 10) { head.scale.x = 1 + Math.sin(t*2)*0.2; head.scale.y = 1 + Math.cos(t*4)*0.3; }

        if(cookingButter) {
            cookingButter.userData.cookTime += dt;
            let p = Math.min(cookingButter.userData.cookTime / 30, 1.0);
            cookingButter.material.color.set(STAGES[Math.floor(p*5.99)]);
            document.getElementById('bar-fill').style.width = (p*100)+"%";
            document.getElementById('label').innerText = LABELS[Math.floor(p*5.99)];
        }

        let mZ = joy.y, mX = joy.x;
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, mZ * 5 * dt);
        player.position.addScaledVector(side, mX * 5 * dt);
    }
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
