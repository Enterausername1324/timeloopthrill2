<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Archives</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Cleaned up themed styles */
        .archive-container {
            text-align: center;
            padding: 50px;
            font-family: 'Courier New', Courier, monospace;
            background-color: #0a0a0a;
            color: #00ffcc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .archive-title {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffcc;
        }
        .archive-subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 30px;
        }
        .archive-content {
            border: 1px solid #00ffcc;
            padding: 40px;
            border-radius: 8px;
            background: rgba(0, 255, 204, 0.05);
            max-width: 600px;
        }
        .back-link {
            margin-top: 30px;
            color: #00ffcc;
            text-decoration: none;
            border: 1px solid #00ffcc;
            padding: 10px 20px;
            transition: 0.3s;
        }
        .back-link:hover {
            background: #00ffcc;
            color: #000;
        }
    </style>
</head>

<body>

    <div class="archive-container">
        <div class="archive-content">
            <h1 class="archive-title">ACCESS GRANTED</h1>
            <p class="archive-subtitle">Welcome to the hidden archives.</p>
            <p>This area is now reserved for internal documentation and corporate records.</p>
        </div>

        <a href="index.html" class="back-link">Return to Home</a>
    </div>

</body>
</html>
