<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // ROLLBACK_47.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; }
        #hud { position: absolute; top: 20px; left: 20px; color: #666; pointer-events: none; font-size: 12px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="document.body.requestPointerLock()">
        <h1>VORTEX_v47.2</h1>
        <p>CLICK TO LOCK MOUSE & START</p>
    </div>
    <div id="hud">SMILE_IDX: <span id="timer">0.00</span></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let active = false, yaw = 0, pitch = 0;
        let player, body, mouth, mirror, pointLight;

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                active = true;
                document.getElementById('overlay').style.display = 'none';
            } else {
                active = false;
                document.getElementById('overlay').style.display = 'flex';
            }
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            
            // v45 Clipping Fix: Near 0.2 prevents seeing internal geometry
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            player = new THREE.Group();
            scene.add(player);
            player.position.set(0, 0, 7);

            body = new THREE.Group();
            player.add(body);
            body.position.z = -0.2; // Pivot offset

            // Character
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            head.position.y = 1.65; body.add(head);

            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
            shirt.position.y = 0.9; body.add(shirt);

            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouth.position.set(0, 1.6, 0.28); head.add(mouth);

            camera.position.set(0, 1.65, 0);

            // Kitchen (Original Textures)
            const add = (w, h, d, x, y, z, col) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: col}));
                m.position.set(x, y, z); scene.add(m); return m;
            };
            add(30, 0.1, 30, 0, 0, 0, 0x3a2a1a); // Wood Floor
            add(12, 1, 2.5, 0, 0.5, -4, 0x4a3a2a); // Counter
            add(20, 10, 0.5, 0, 5, -5, 0x1a110a); // Wall

            mirror = new THREE.Reflector(new THREE.PlaneGeometry(3.5, 2.5), {
                clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0x888888
            });
            mirror.position.set(2, 2.9, -4.73); scene.add(mirror);

            pointLight = new THREE.PointLight(0xffaa44, 2.5, 25);
            pointLight.position.set(0, 4, -2); scene.add(pointLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));

            // INPUTS
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousemove', e => {
                if(active) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!active) return;
            let dt = clock.getDelta();

            player.rotation.y = yaw;
            camera.rotation.x = pitch;

            // Movement Logic
            let speed = 6.5;
            let moveZ = (keys['KeyS'] ? 1 : 0) - (keys['KeyW'] ? 1 : 0);
            let moveX = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);

            if(moveX !== 0 || moveZ !== 0) {
                let fwd = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).multiplyScalar(moveZ);
                let side = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).multiplyScalar(moveX);
                player.position.x -= (fwd.x + side.x) * speed * dt;
                player.position.z -= (fwd.z + side.z) * speed * dt;
            }

            let time = clock.getElapsedTime() / 60;
            document.getElementById('timer').innerText = time.toFixed(2);
            if(time > 3) mouth.scale.x = 1 + (time-3)*4;
            if(time > 5) { mouth.material.color.set(0xff0000); pointLight.color.set(0xff0000); }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
