<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // TOUCH_LOCK_v16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 100; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 11px; }
        #joy-base { 
            position: absolute; bottom: 12%; left: 12%; width: 120px; height: 120px;
            border: 2px solid rgba(0,255,204,0.5); border-radius: 50%; display: none; background: rgba(0,255,204,0.05);
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px #00ffcc;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 10px;">VORTEX_v16</h1>
        <p>[ TAP_TO_STABILIZE_INPUT ]</p>
    </div>

    <div id="hud">
        <div>INPUT: TOUCH_LOCK_v16</div>
        <div id="status">JOYSTICK_STABILITY: LOCKED</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, cubeCamera, cubeRenderTarget;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        let moveDir = { x: 0, z: 0 };
        let keys = {};
        let targetRot = { y: 0, x: 0 };
        let currentRot = { y: 0, x: 0 };
        
        // --- TOUCH TRACKING VARS ---
        let joyTouchID = null;
        let lookTouchID = null;
        let lastLookPos = { x: 0, y: 0 };

        let playerGroup, fridgeDoor, fridgeOpen = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Reflection Engine
            cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, { format: THREE.RGBFormat, generateMipmaps: true });
            cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
            cubeCamera.position.set(-3.9, 1.7, -4.9);
            scene.add(cubeCamera);

            // Puppet
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5);
            const b = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x00ffcc, wireframe: true }));
            b.position.y = 1.0; playerGroup.add(b);
            playerGroup.add(camera);
            camera.position.y = 1.7;

            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const pL = new THREE.PointLight(0x00ffcc, 1, 30); pL.position.set(0, 5, 0); scene.add(pL);

            // Kitchen Build
            const createBox = (w,h,d,x,y,z,col) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col}));
                m.position.set(x,y,z); scene.add(m); return m;
            };
            createBox(100, 0.1, 100, 0, -0.05, 0, 0x111111);
            createBox(12, 5, 0.1, 0, 2.5, -5, 0x222222);
            const mirror = new THREE.Mesh(new THREE.PlaneGeometry(3, 4), new THREE.MeshStandardMaterial({ envMap: cubeRenderTarget.texture, metalness: 1, roughness: 0 }));
            mirror.position.set(-4, 2.2, -4.9); scene.add(mirror);

            const fBody = createBox(1.6, 2.6, 1.2, 3.5, 1.3, -3.8, 0xaaaaaa);
            fridgeDoor = new THREE.Group();
            const dMesh = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.6, 0.1), new THREE.MeshStandardMaterial({color:0xeeeeee}));
            dMesh.position.set(0.8, 1.3, 0.05); fridgeDoor.add(dMesh);
            fridgeDoor.position.set(2.7, 0, -3.15); scene.add(fridgeDoor);

            setupInput();
            animate();
        }

        function setupInput() {
            const overlay = document.getElementById('overlay');
            const joyBase = document.getElementById('joy-base');
            const joyStick = document.getElementById('joy-stick');

            overlay.addEventListener('click', () => { 
                overlay.style.display = 'none'; 
                if(!isTouch) document.body.requestPointerLock();
                fridgeOpen = !fridgeOpen;
            });

            if (isTouch) {
                joyBase.style.display = 'block';

                window.addEventListener('touchstart', (e) => {
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];
                        // Left side = Joystick
                        if (t.clientX < window.innerWidth / 2 && joyTouchID === null) {
                            joyTouchID = t.identifier;
                        } 
                        // Right side = Looking
                        else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                            lookTouchID = t.identifier;
                            lastLookPos.x = t.clientX;
                            lastLookPos.y = t.clientY;
                        }
                    }
                }, {passive: false});

                window.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];

                        if (t.identifier === joyTouchID) {
                            const rect = joyBase.getBoundingClientRect();
                            const centerX = rect.left + rect.width/2;
                            const centerY = rect.top + rect.height/2;
                            let dx = t.clientX - centerX;
                            let dy = t.clientY - centerY;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            let limit = rect.width/2;

                            if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                            joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                            moveDir.x = dx / limit;
                            moveDir.z = dy / limit;
                        } 
                        
                        if (t.identifier === lookTouchID) {
                            targetRot.y -= (t.clientX - lastLookPos.x) * 0.006; // Snappy Sensitivity
                            targetRot.x -= (t.clientY - lastLookPos.y) * 0.006;
                            lastLookPos.x = t.clientX;
                            lastLookPos.y = t.clientY;
                        }
                    }
                }, {passive: false});

                window.addEventListener('touchend', (e) => {
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];
                        if (t.identifier === joyTouchID) {
                            joyTouchID = null;
                            moveDir = {x:0, z:0};
                            joyStick.style.transform = 'translate(-50%, -50%)';
                        }
                        if (t.identifier === lookTouchID) {
                            lookTouchID = null;
                        }
                    }
                });
            } else {
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => { if(document.pointerLockElement) { targetRot.y -= e.movementX*0.002; targetRot.x -= e.movementY*0.002; } });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            cubeCamera.update(renderer, scene);

            currentRot.y += (targetRot.y - currentRot.y) * 0.25;
            currentRot.x += (targetRot.x - currentRot.x) * 0.25;
            camera.rotation.y = currentRot.y;
            camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

            let speed = 6.5;
            let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            let right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0; right.y = 0;
            forward.normalize(); right.normalize();

            if (isTouch) {
                playerGroup.position.addScaledVector(forward, -moveDir.z * speed * delta);
                playerGroup.position.addScaledVector(right, moveDir.x * speed * delta);
            } else {
                if (keys['w']) playerGroup.position.addScaledVector(forward, speed * delta);
                if (keys['s']) playerGroup.position.addScaledVector(forward, -speed * delta);
                if (keys['a']) playerGroup.position.addScaledVector(right, -speed * delta);
                if (keys['d']) playerGroup.position.addScaledVector(right, speed * delta);
            }

            fridgeDoor.rotation.y += (((fridgeOpen ? -1.8 : 0) - fridgeDoor.rotation.y) * 0.1);
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
