<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 49.1_FIXED_LOGIC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; color: #00ffcc; z-index: 10000; cursor: pointer; border: 2px solid #00ffcc; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(0,255,204,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #bar-box { width: 200px; height: 10px; border: 1px solid #444; background: #000; display: none; }
        #bar-fill { height: 100%; width: 0%; background: #00ffcc; }
        #label { color: #00ffcc; font-size: 12px; margin-bottom: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()"><h1>[ V49.1_INITIALIZE ]</h1></div>
<div id="ui"><div id="label"></div><div id="bar-box"><div id="bar-fill"></div></div></div>
<div id="crosshair"></div>

<script>
let scene, camera, renderer, clock, player, mouth, butter, fryer, fridgeDoor;
let active = false, yaw = 0, pitch = 0, heldItem = null;
let keys = {}, interactables = [];
let cooking = false, cookTime = 0, fridgeOpen = false;
const raycaster = new THREE.Raycaster();

const COLORS = [0x00ffcc, 0xffff00, 0x8b4513, 0x000000]; // Cyan -> Yellow -> Brown -> Black

function setup() { active = true; document.getElementById('overlay').style.display = 'none'; document.body.requestPointerLock(); }

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    // Camera moved back slightly to ensure face is visible in mirror
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 8);

    const body = new THREE.Group();
    player.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; body.add(head);
    
    // MOUTH: Explicitly pushed forward
    mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshBasicMaterial({color: 0x000000}));
    mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
    mouth.position.set(0, 1.6, 0.28); head.add(mouth);

    // KITCHEN
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshStandardMaterial({color: 0x111111}));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

    const counter = new THREE.Mesh(new THREE.BoxGeometry(8, 1.1, 2.5), new THREE.MeshStandardMaterial({color: 0x221105}));
    counter.position.set(1, 0.55, -4); counter.receiveShadow = true; scene.add(counter);

    // FRIDGE (MOVED LEFT AWAY FROM COUNTER)
    const fridgeBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.5, 2.2), new THREE.MeshStandardMaterial({color: 0x666666, metalness: 0.6}));
    fridgeBody.position.set(-5, 2.25, -4.5); scene.add(fridgeBody);
    fridgeDoor = new THREE.Group();
    fridgeDoor.position.set(-3.75, 2.25, -3.4); scene.add(fridgeDoor);
    const door = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.5, 0.1), new THREE.MeshStandardMaterial({color: 0x888888}));
    door.position.set(-1.25, 0, 0); door.name = "fridge"; fridgeDoor.add(door);

    // FRYER
    fryer = new THREE.Group();
    fryer.position.set(3, 1.1, -4);
    const fBase = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.7, 1.4), new THREE.MeshStandardMaterial({color: 0x333333}));
    fBase.name = "fryer"; fryer.add(fBase);
    scene.add(fryer);

    // BUTTER
    butter = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 0.5}));
    butter.position.set(0, 1.25, -3.5); butter.name = "butter"; scene.add(butter);

    // MIRROR
    const mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), { clipBias: 0.003, color: 0x888888 });
    mirror.position.set(2.5, 3, -5.2); scene.add(mirror);
    scene.add(new THREE.PointLight(0xffaa44, 2, 30), new THREE.AmbientLight(0xffffff, 0.3));

    window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyE') doInteract(); });
    window.addEventListener('keyup', e => { delete keys[e.code]; });
    window.addEventListener('mousedown', () => { if(active) doInteract(); });
    window.addEventListener('mousemove', e => { if(active) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});

    animate();
}

function doInteract() {
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    
    if(heldItem) {
        let obj = hits[0]?.object;
        if(obj && (obj.name === "fryer" || obj.parent.name === "fryer")) {
            cooking = true; scene.attach(heldItem);
            heldItem.position.set(fryer.position.x, 1.4, fryer.position.z);
            heldItem = null;
            document.getElementById('bar-box').style.display = "block";
        } else {
            scene.attach(heldItem); heldItem.position.y = 1.25; heldItem = null;
        }
    } else if(hits.length > 0) {
        let obj = hits[0].object;
        if(obj.name === "butter") { 
            heldItem = obj; player.add(heldItem); 
            heldItem.position.set(0.5, 1.2, -0.8);
            cooking = false; // THE FIX: Picking it up stops the burn
            document.getElementById('bar-box').style.display = "none";
        }
        else if(obj.name === "fridge") fridgeOpen = !fridgeOpen;
    }
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta();

    player.rotation.y = yaw;
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
    camera.position.set(player.position.x, 1.65, player.position.z);

    fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.5 : 0, 0.1);

    let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
    let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
    if(moveX || moveZ) {
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, moveZ * 7 * dt);
        player.position.addScaledVector(side, moveX * 7 * dt);
    }

    // SMILE CREEP (Check mirror after 10s)
    let t = clock.getElapsedTime();
    if(t > 10) { 
        mouth.scale.x = 1 + (t-10) * 0.15;
        mouth.position.z = 0.28 + (t-10) * 0.001;
    }

    // DYNAMIC COOKING COLORS
    if(cooking) {
        cookTime += dt;
        let progress = Math.min(cookTime / 30, 1.0);
        document.getElementById('bar-fill').style.width = (progress * 100) + "%";
        
        let cIdx = Math.floor(progress * (COLORS.length - 1));
        let nextIdx = Math.min(cIdx + 1, COLORS.length - 1);
        let lerpFact = (progress * (COLORS.length - 1)) % 1;
        butter.material.color.lerpColors(new THREE.Color(COLORS[cIdx]), new THREE.Color(COLORS[nextIdx]), lerpFact);
        
        document.getElementById('label').innerText = progress < 0.8 ? "COOKING..." : "BURNING!!!";
    }

    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
