<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 49.8_BRIGHT_CLICK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; color: #ffcc00; z-index: 10000; cursor: pointer; text-align: center; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,204,0,0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; border: 1px solid #fff; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #bar-box { width: 250px; height: 12px; border: 2px solid #444; background: #000; display: none; margin-top: 10px; }
        #bar-fill { height: 100%; width: 0%; background: #ffcc00; box-shadow: 0 0 15px #ffcc00; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1>[ V49.8_LIT_SESSION ]</h1>
    <p>CLICK or 'E' TO INTERACT | 'P' TO RELOCK</p>
</div>

<div id="ui"><div id="bar-box"><div id="bar-fill"></div></div></div>
<div id="crosshair"></div>

<script>
let scene, camera, renderer, clock, player, mouth, fridgeDoor, heldItem;
let active = false, yaw = 0, pitch = 0;
let keys = {}, butters = [];
let fridgeOpen = false, lastInteract = 0, cooking = false, cookTime = 0;
const raycaster = new THREE.Raycaster();

function setup() { active = true; document.getElementById('overlay').style.display = 'none'; document.body.requestPointerLock(); }

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080808);
    // Adjusted near plane to 0.4 to prevent self-clipping while keeping head visible in mirror
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.4, 100);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 5);

    // --- CHARACTER ---
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; player.add(head);
    const mGeom = new THREE.CylinderGeometry(0.12, 0.12, 0.06, 32);
    const mMat = new THREE.MeshBasicMaterial({color: 0x000000});
    mouth = new THREE.Mesh(mGeom, mMat);
    mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
    mouth.position.set(0, 1.58, 0.29); 
    mouth.renderOrder = 999; 
    head.add(mouth);

    // --- ENCLOSED ROOM ---
    const wallMat = new THREE.MeshStandardMaterial({color: 0x333333, roughness: 0.7});
    const floorMat = new THREE.MeshStandardMaterial({color: 0x151515, roughness: 0.9});
    
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,20), floorMat);
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
    
    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(20,20), wallMat);
    ceiling.rotation.x = Math.PI/2; ceiling.position.y = 6; scene.add(ceiling);

    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(20,6), wallMat);
    backWall.position.set(0, 3, -8); scene.add(backWall);

    const sideL = new THREE.Mesh(new THREE.PlaneGeometry(20,6), wallMat);
    sideL.position.set(-8, 3, 0); sideL.rotation.y = Math.PI/2; scene.add(sideL);

    const sideR = new THREE.Mesh(new THREE.PlaneGeometry(20,6), wallMat);
    sideR.position.set(8, 3, 0); sideR.rotation.y = -Math.PI/2; scene.add(sideR);

    // --- KITCHEN (LOCKED) ---
    const counter = new THREE.Mesh(new THREE.BoxGeometry(8, 1.1, 2.5), new THREE.MeshStandardMaterial({color: 0x221a10}));
    counter.position.set(1, 0.55, -4.5); counter.receiveShadow = true; scene.add(counter);

    const sink = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.2, 1.6), new THREE.MeshStandardMaterial({color: 0x999999, metalness: 0.9}));
    sink.position.set(-1.8, 1.0, -4.5); scene.add(sink);

    // FRIDGE (HOLLOW)
    const fridge = new THREE.Group(); fridge.position.set(-5.5, 0, -5); scene.add(fridge);
    const fBox = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.8, 2.2), new THREE.MeshStandardMaterial({color: 0x444444}));
    fBox.position.y = 2.4; fridge.add(fBox);
    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(1.2, 2.4, 1.1); fridge.add(fridgeDoor);
    const dMesh = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.8, 0.1), new THREE.MeshStandardMaterial({color: 0x555555}));
    dMesh.position.set(-1.25, 0, 0); dMesh.name = "fridge_door"; fridgeDoor.add(dMesh);

    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 0.8}));
        b.position.set((i%2)*0.7 - 0.35, 1 + (Math.floor(i/2)*1.3), -0.6);
        b.name = "butter"; fridge.add(b); butters.push(b);
    }

    // FRYER
    const fryer = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 1.5), new THREE.MeshStandardMaterial({color: 0x111111}));
    fryer.position.set(3.5, 1.1, -4.5); fryer.name = "fryer"; scene.add(fryer);

    // MIRROR
    const mirror = new THREE.Reflector(new THREE.PlaneGeometry(5, 3.5), { clipBias: 0.003, color: 0x999999 });
    mirror.position.set(2, 3.2, -6.5); scene.add(mirror);

    // --- BRIGHTER LIGHTING ---
    const sun = new THREE.PointLight(0xfff0dd, 2.5, 30);
    sun.position.set(0, 5, -2); sun.castShadow = true;
    scene.add(sun);
    
    const fill = new THREE.PointLight(0xffffff, 0.8, 20);
    fill.position.set(-4, 4, 4); scene.add(fill);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.2));

    // INPUTS
    window.addEventListener('keydown', e => { 
        keys[e.code] = true; 
        if(e.code === 'KeyE') doInteract(); 
        if(e.code === 'KeyP') document.body.requestPointerLock();
    });
    window.addEventListener('keyup', e => delete keys[e.code]);
    
    // CLICK INTERACT
    window.addEventListener('mousedown', () => { if(active) doInteract(); });
    
    window.addEventListener('mousemove', e => { 
        if(document.pointerLockElement === document.body) {
            yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); 
        }
    });

    animate();
}

function doInteract() {
    const now = Date.now();
    if(now - lastInteract < 200) return;
    lastInteract = now;
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let obj = hits[0].object;
        if(heldItem) {
            if(obj.name === "fryer") {
                cooking = true; scene.attach(heldItem); heldItem.position.set(3.5, 1.5, -4.5);
                heldItem = null; document.getElementById('bar-box').style.display = "block";
            } else { scene.attach(heldItem); heldItem.position.y = 1.2; heldItem = null; cooking = false; document.getElementById('bar-box').style.display = "none"; }
        } else {
            if(obj.name === "butter") { heldItem = obj; player.add(heldItem); heldItem.position.set(0.6, 1.2, -0.9); }
            else if(obj.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta();
    player.rotation.y = yaw;
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
    camera.position.set(player.position.x, 1.65, player.position.z);

    fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.6 : 0, 0.1);

    // SMILE CREEP (Check mirror after 5s)
    let t = clock.getElapsedTime();
    if(t > 5) { 
        mouth.scale.x = 1 + (t-5) * 0.6;
        mouth.position.z = 0.29 + (t-5) * 0.003;
    }

    if(cooking) {
        cookTime += dt;
        document.getElementById('bar-fill').style.width = Math.min((cookTime/25)*100, 100) + "%";
    }

    let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
    let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
    if(moveX || moveZ) {
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, moveZ * 7 * dt);
        player.position.addScaledVector(side, moveX * 7 * dt);
    }
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
