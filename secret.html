<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Area</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffcc;
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            text-align: center;
        }
        .search-input {
            width: 85%;
            padding: 12px;
            background: #050505;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            outline: none;
            margin-bottom: 15px;
        }
        .search-button {
            padding: 12px 25px;
            background: #00ffcc;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .search-button:hover {
            background: #fff;
            box-shadow: 0 0 25px #fff;
            transform: scale(1.05);
        }
    </style>
</head>

<body class="secret-body">

    <div class="secret-container">
        <h1 class="secret-title">ACCESS GRANTED</h1>
        <p class="secret-subtitle">Vortex Proxy Protocol Active</p>

        <div class="search-box">
            <p style="color: #00ffcc; font-size: 0.8em; letter-spacing: 2px; margin-bottom: 15px;">ENCRYPTED STEALTH GATEWAY</p>
            
            <input type="text" id="proxyUrl" class="search-input" placeholder="Enter Destination URL...">
            <br>
            <button onclick="launchStealth()" class="search-button">Launch Protocol</button>
            
            <div style="margin-top: 15px; font-size: 0.7em; color: #555;">
                <p>Press <b style="color:#888">[P]</b> for Emergency Cloak</p>
                <p>Press <b style="color:#888">[H]</b> to Flood History</p>
            </div>
        </div>

        <a href="index.html" class="secret-back" style="margin-top: 30px; display: block; color: #00ffcc; text-decoration: none; font-size: 0.8em;">[ Return to Home ]</a>
    </div>

    <script>
        // ULTIMATE ABOUT:BLANK INJECTION
        function launchStealth() {
            const targetSite = document.getElementById('proxyUrl').value;
            if (!targetSite) return;

            // Step 1: Prepare the Proxy URL (Using Croxy as base)
            const proxyLink = "https://www.croxyproxy.com/_en/search?q=" + encodeURIComponent(targetSite);
            
            // Step 2: Open the about:blank window
            const win = window.open('about:blank', '_blank');

            if (win) {
                // Step 3: Inject the CSS and Iframe directly into the blank page
                // This makes it look like the page has NO URL in the address bar
                const doc = win.document;
                const body = doc.body;

                body.style.margin = "0";
                body.style.height = "100vh";
                body.style.overflow = "hidden";

                const iframe = doc.createElement('iframe');
                iframe.style.width = "100%";
                iframe.style.height = "100%";
                iframe.style.border = "none";
                iframe.style.margin = "0";
                iframe.src = proxyLink;

                body.appendChild(iframe);
            } else {
                alert("Please allow popups for the stealth gateway to function.");
            }
        }

        // PANIC & UTILITY KEYS
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            // [P] PANIC CLOAK
            if (key === 'p') {
                document.title = "My Drive - Google Drive";
                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.rel = 'shortcut icon';
                link.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
                document.getElementsByTagName('head')[0].appendChild(link);
                
                document.body.innerHTML = "<div style='background:white; color:#000; height:100vh; font-family:sans-serif; display:flex; align-items:center; justify-content:center;'><h1>My Drive is Loading...</h1></div>";
                document.body.style.background = "white";
            }

            // [H] HISTORY FLOODER
            if (key === 'h') {
                for (let i = 0; i < 40; i++) {
                    window.history.pushState({}, "", "/google-classroom/assignment/" + Math.random());
                }
                alert("Timeline Purged: 40 fake history entries created.");
            }
        });
    </script>

</body>
</html>
