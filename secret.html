<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 48.3_PHYSICS_FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 10000; cursor: pointer; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 12px; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #prompt { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 18px; display: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="setup()"><h1>VORTEX_v48.3</h1><p>CLICK TO INITIALIZE</p></div>
    <div id="hud">TEMP: <span id="t">0</span>°C | SMILE: <span id="s">NORMAL</span></div>
    <div id="crosshair"></div>
    <div id="prompt">[E] INTERACT</div>

    <script>
        let scene, camera, renderer, clock, player, mouth, butter, fryerGroup;
        let active = false, yaw = 0, pitch = 0, heldItem = null;
        let keys = {}, interactables = [];
        const raycaster = new THREE.Raycaster();

        function setup() {
            active = true;
            document.getElementById('overlay').style.display = 'none';
            document.body.requestPointerLock();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = "YXZ";

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // PLAYER - The camera is placed 0.2m ahead of the body to prevent self-clipping
            player = new THREE.Group();
            scene.add(player);
            player.position.set(0, 0, 7);

            const body = new THREE.Group();
            body.position.z = -0.3; // Pushes body back away from camera eye-line
            player.add(body);

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            head.position.y = 1.65; body.add(head);
            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
            shirt.position.y = 0.9; body.add(shirt);
            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshBasicMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2); mouth.position.set(0, 1.6, 0.28); head.add(mouth);

            // KITCHEN
            const box = (w,h,d,x,y,z,col,name) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: col}));
                m.position.set(x,y,z); m.name = name; m.receiveShadow = true; m.castShadow = true;
                scene.add(m); return m;
            };

            box(40, 0.1, 40, 0, 0, 0, 0x1a110a, "floor");
            box(12, 1.1, 2.5, 0, 0.55, -4, 0x332211, "counter"); // Textured wood look
            
            // THE DETAILED FRYER
            fryerGroup = new THREE.Group();
            fryerGroup.position.set(3, 1.1, -4);
            scene.add(fryerGroup);
            
            const base = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 1.5), new THREE.MeshStandardMaterial({color: 0x555555}));
            fryerGroup.add(base);
            const rim = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.05, 16, 4), new THREE.MeshStandardMaterial({color: 0x888888}));
            rim.rotation.x = Math.PI/2; rim.position.y = 0.45; fryerGroup.add(rim);
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.8), new THREE.MeshStandardMaterial({color: 0x111111}));
            handle.position.set(0, 0.45, 0.8); fryerGroup.add(handle);
            
            const fryerTarget = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.2), new THREE.MeshBasicMaterial({visible: false}));
            fryerTarget.name = "fryer"; fryerGroup.add(fryerTarget);
            interactables.push(fryerTarget);

            // BUTTER
            butter = box(0.35, 0.35, 0.35, 0, 1.3, -3, 0x00ffcc, "butter");
            butter.material.emissive.set(0x00ffcc); butter.material.emissiveIntensity = 0.5;
            butter.velY = 0; interactables.push(butter);

            // MIRROR & LIGHT
            const mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), { clipBias: 0.003, color: 0x888888 });
            mirror.position.set(2.5, 3, -5); scene.add(mirror);
            const light = new THREE.PointLight(0xffaa44, 2.5, 30); light.position.set(0, 6, -2); light.castShadow = true;
            scene.add(light); scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyE') interact(); });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousemove', e => { if(active){ yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, 1.5, pitch); }});
            animate();
        }

        function interact() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(interactables);
            if(heldItem) {
                scene.attach(heldItem); heldItem.position.y += 0.2; heldItem = null;
            } else if(hits.length > 0 && hits[0].object.name === "butter") {
                heldItem = butter; camera.add(heldItem); heldItem.position.set(0.4, -0.3, -0.6);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!active) return;
            let dt = clock.getDelta();

            player.rotation.y = yaw;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            camera.position.set(player.position.x, 1.65, player.position.z);

            // Movement
            let speed = 7;
            let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
            let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
            if(moveX || moveZ) {
                let dir = new THREE.Vector3(moveX, 0, moveZ).applyAxisAngle(new THREE.Vector3(0,1,0), yaw).normalize();
                player.position.addScaledVector(dir, speed * dt);
            }

            // Butter Physics & Fryer Fix
            if(butter && !heldItem) {
                let distToFryer = butter.position.distanceTo(fryerGroup.position);
                let floorY = 0.2;
                if(distToFryer < 0.8) floorY = 1.35; // Inside fryer
                else if(butter.position.x > -6 && butter.position.x < 6 && butter.position.z < -2.7) floorY = 1.25; // On counter

                if(butter.position.y > floorY) { butter.velY -= 9.8 * dt; }
                else { butter.position.y = floorY; butter.velY = 0; }
                butter.position.y += butter.velY * dt;

                if(distToFryer < 0.8 && butter.position.y < 1.6) {
                    let p = Math.min(clock.getElapsedTime()/60, 1);
                    document.getElementById('t').innerText = (p*300).toFixed(0);
                    butter.material.color.lerp(new THREE.Color(0x221100), 0.01);
                }
            }

            // Smile Logic
            let time = clock.getElapsedTime();
            if(time > 120) { 
                mouth.scale.x = 1 + (time-120)*0.1;
                document.getElementById('s').innerText = "CREEPY";
            }

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            document.getElementById('prompt').style.display = raycaster.intersectObjects(interactables).length > 0 ? 'block' : 'none';

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
