<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 49.0_INDIE_PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 10000; cursor: pointer; text-align: center; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; color: #00ffcc; text-shadow: 0 0 5px #000; }
        #bar-box { width: 250px; height: 8px; border: 1px solid #444; background: rgba(0,0,0,0.5); display: none; margin-top: 10px; }
        #bar-fill { height: 100%; width: 0%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <div>
        <h1 style="letter-spacing: 10px;">VORTEX</h1>
        <p style="color: #666;">INDIE_ENGINE_v49.0</p>
        <p>[ CLICK TO ENTER ]</p>
    </div>
</div>

<div id="ui">
    <div id="label"></div>
    <div id="bar-box"><div id="bar-fill"></div></div>
</div>

<div id="crosshair"></div>

<script>
let scene, camera, renderer, clock, player, mouth, butter, fryer, fridgeDoor;
let active = false, yaw = 0, pitch = 0, heldItem = null;
let keys = {}; 
let cooking = false, cookTime = 0, fridgeOpen = false;
const raycaster = new THREE.Raycaster();

const COOK_LEVELS = ["RAW", "QUARTER", "HALF", "THIRD", "DONE", "BURNT", "VOID"];

function setup() {
    active = true;
    document.getElementById('overlay').style.display = 'none';
    document.body.requestPointerLock();
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    scene.fog = new THREE.Fog(0x020202, 5, 25);
    
    // Near clip at 0.3 allows the face/mouth to be seen in mirror without blocking main view
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.3, 1000);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 7);

    // CHARACTER DESIGN (Mirror Visible)
    const body = new THREE.Group();
    player.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00, roughness: 0.2}));
    head.position.y = 1.65; body.add(head);
    
    // MOUTH: Placed at front edge of sphere to avoid internal clipping
    mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.02, 32, 1, false, 0, Math.PI), new THREE.MeshBasicMaterial({color: 0x000000}));
    mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
    mouth.position.set(0, 1.58, 0.29); 
    head.add(mouth);

    // --- REALISTIC KITCHEN ASSETS ---
    
    // Concrete Floor
    const floorMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.8});
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(50,50), floorMat);
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

    // Marble Counter
    const counterMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.1, metalness: 0.2});
    const counter = new THREE.Mesh(new THREE.BoxGeometry(12, 1.1, 2.5), counterMat);
    counter.position.set(0, 0.55, -4); counter.receiveShadow = true; scene.add(counter);

    // Stainless Sink
    const sink = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 1.5), new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.9, roughness: 0.1}));
    sink.position.set(-1.5, 1.1, -4); scene.add(sink);
    const faucet = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.6), new THREE.MeshStandardMaterial({color: 0xaaaaaa, metalness: 1}));
    faucet.position.set(-1.5, 1.4, -4.6); scene.add(faucet);

    // Fridge (Brushed Steel)
    const fridgeBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.8, 2.2), new THREE.MeshStandardMaterial({color: 0x444444, metalness: 0.8, roughness: 0.3}));
    fridgeBody.position.set(-4.5, 2.4, -4.5); scene.add(fridgeBody);
    fridgeDoor = new THREE.Group();
    fridgeDoor.position.set(-3.25, 2.4, -3.4); scene.add(fridgeDoor);
    const doorPanel = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.8, 0.1), new THREE.MeshStandardMaterial({color: 0x555555, metalness: 0.8}));
    doorPanel.position.set(-1.25, 0, 0); doorPanel.name = "fridge";
    fridgeDoor.add(doorPanel);

    // Fryer (Industrial Look)
    fryer = new THREE.Group();
    fryer.position.set(3, 1.1, -4);
    const fBase = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 1.6), new THREE.MeshStandardMaterial({color: 0x333333, metalness: 0.5}));
    const fRim = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.05, 16, 4), new THREE.MeshStandardMaterial({color: 0x999999, metalness: 1}));
    fRim.rotation.x = Math.PI/2; fRim.position.y = 0.4;
    fryer.add(fBase, fRim); fryer.name = "fryer";
    scene.add(fryer);

    // Plates
    for(let i=0; i<2; i++) {
        const plate = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.4, 0.05, 32), new THREE.MeshStandardMaterial({color: 0xeeeeee, roughness: 0.1}));
        plate.position.set(5 + (i*1.5), 1.12, -4); plate.name = "plate";
        scene.add(plate);
    }

    // Butter
    butter = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 0.5}));
    butter.position.set(0, 1.25, -3.5); butter.name = "butter";
    scene.add(butter);

    // Mirror & Lighting
    const mirror = new THREE.Reflector(new THREE.PlaneGeometry(5, 3.5), { clipBias: 0.003, color: 0x777777 });
    mirror.position.set(2.5, 3.2, -5.2); scene.add(mirror);
    
    const pLight = new THREE.PointLight(0xffccaa, 2, 25); 
    pLight.position.set(0, 5, -1); pLight.castShadow = true;
    scene.add(pLight, new THREE.AmbientLight(0xffffff, 0.15));

    // INPUTS
    window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyE') doInteract(); });
    window.addEventListener('keyup', e => { delete keys[e.code]; });
    window.addEventListener('mousedown', () => { if(active) doInteract(); });
    window.addEventListener('mousemove', e => { if(active) { yaw -= e.movementX*0.0015; pitch -= e.movementY*0.0015; pitch = Math.max(-1.4, Math.min(1.4, pitch)); }});

    animate();
}

function doInteract() {
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    
    if(hits.length > 0) {
        let obj = hits[0].object;
        let root = obj;
        while(root.parent && root.parent !== scene) root = root.parent;

        if(heldItem) {
            // RESTRICTED DROPPING
            if(root.name === "fryer") {
                cooking = true; scene.attach(heldItem);
                heldItem.position.set(fryer.position.x, 1.45, fryer.position.z);
                heldItem = null;
                document.getElementById('bar-box').style.display = "block";
            } else if(root.name === "fridge") {
                scene.attach(heldItem); heldItem.position.set(-4.5, 1.5, -4.5); heldItem = null;
            } else if(root.name === "plate") {
                scene.attach(heldItem); heldItem.position.set(root.position.x, 1.25, root.position.z); heldItem = null;
            }
        } else {
            if(obj.name === "butter") { heldItem = obj; player.add(heldItem); heldItem.position.set(0.5, 1.2, -0.8); }
            else if(obj.name === "fridge") fridgeOpen = !fridgeOpen;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta();

    player.rotation.y = yaw;
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
    camera.position.set(player.position.x, 1.65, player.position.z);

    fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.8 : 0, 0.08);

    // MOVEMENT
    let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
    let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
    if(moveX || moveZ) {
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, moveZ * 6 * dt);
        player.position.addScaledVector(side, moveX * 6 * dt);
    }

    // THE SMILE (10s Start)
    let t = clock.getElapsedTime();
    if(t > 10) { 
        mouth.scale.x = 1 + (t-10) * 0.15;
        mouth.position.z = 0.29 + (t-10) * 0.001; 
    }

    // COOKING
    if(cooking) {
        cookTime += dt;
        let progress = Math.min(cookTime / 25, 1.0);
        document.getElementById('bar-fill').style.width = (progress * 100) + "%";
        document.getElementById('label').innerText = COOK_LEVELS[Math.floor(progress * (COOK_LEVELS.length-1))];
        butter.material.color.lerp(new THREE.Color(0x000000), 0.01);
    }

    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
