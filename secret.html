<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Area</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Themed styles for the Unblocker Box */
        .search-box {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ffcc; /* Matches a "glitch/cyber" theme */
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 0 15px #00ffcc;
        }
        .search-input {
            width: 80%;
            padding: 10px;
            background: #111;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }
        .search-button {
            padding: 10px 20px;
            background: #00ffcc;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .search-button:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }
    </style>
</head>

<body class="secret-body">

    <div class="secret-container">
        <h1 class="secret-title">ACCESS GRANTED</h1>
        <p class="secret-subtitle">Welcome to the hidden archive.</p>

        <div class="search-box">
            <p style="color: #00ffcc; font-size: 0.9em; margin-bottom: 10px;">ENCRYPTED PROXY SEARCH</p>
            <input type="text" id="proxyUrl" class="search-input" placeholder="Enter URL (e.g., youtube.com)">
            <button onclick="launchStealth()" class="search-button">GO</button>
            <p style="font-size: 0.7em; color: #888; margin-top: 10px;">Press 'P' to activate Panic Cloak</p>
        </div>

        <a href="index.html" class="secret-back" style="margin-top: 30px; display: block;">Return to Home</a>
    </div>

    <script>
        // FUNCTION 1: Launch in about:blank (Harder for GoGuardian to track)
        function launchStealth() {
            const val = document.getElementById('proxyUrl').value;
            // Uses CroxyProxy as the engine
            const target = "https://www.croxyproxy.com/_en/search?q=" + encodeURIComponent(val);
            
            const win = window.open('about:blank', '_blank');
            if (win) {
                const iframe = win.document.createElement('iframe');
                iframe.src = target;
                iframe.style.position = "fixed";
                iframe.style.top = "0";
                iframe.style.left = "0";
                iframe.style.width = "100vw";
                iframe.style.height = "100vh";
                iframe.style.border = "none";
                win.document.body.appendChild(iframe);
                win.document.body.style.margin = "0";
            }
        }

        // FUNCTION 2: Panic Mode (Press 'P')
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p') {
                // Change Title and Icon to look like Google Drive
                document.title = "My Drive - Google Drive";
                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.type = 'image/x-icon';
                link.rel = 'shortcut icon';
                link.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
                document.getElementsByTagName('head')[0].appendChild(link);
                
                // Optional: Clear the secret page content
                document.body.innerHTML = "<h1 style='color:black; font-family:sans-serif;'>My Drive is Loading...</h1>";
                document.body.style.background = "white";
            }
        });
    </script>

</body>
</html>
