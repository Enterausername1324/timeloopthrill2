<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 48.7_INTERACT_FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; color: #00ffcc; z-index: 10000; cursor: pointer; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1px solid #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        /* THE COOKING BAR */
        #ui-layer { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #cook-bar-container { width: 300px; height: 20px; border: 2px solid #333; background: rgba(0,0,0,0.8); display: none; overflow: hidden; border-radius: 10px; }
        #cook-fill { height: 100%; width: 0%; background: #00ffcc; transition: width 0.1s; }
        #cook-label { color: #00ffcc; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()"><h1>[ INITIALIZE V48.7 ]</h1></div>

<div id="ui-layer">
    <div id="cook-label">RAW</div>
    <div id="cook-bar-container"><div id="cook-fill"></div></div>
</div>

<div id="crosshair"></div>

<script>
let scene, camera, renderer, clock, player, mouth, butter, fryer, fridgeDoor;
let active = false, yaw = 0, pitch = 0, heldItem = null;
let keys = {}, interactables = [];
let cooking = false, cookTime = 0, fridgeOpen = false;
const raycaster = new THREE.Raycaster();

const LEVELS = ["RAW", "QUARTER WAY", "HALF WAY", "THIRD WAY", "DONE", "OVERCOOKED", "DISSOLVED"];

function setup() {
    active = true;
    document.getElementById('overlay').style.display = 'none';
    document.body.requestPointerLock();
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.4, 1000);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 8);

    // CHARACTER WITH VISIBLE SMILE
    const body = new THREE.Group();
    player.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; body.add(head);
    
    mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.06, 32, 1, false, 0, Math.PI), new THREE.MeshBasicMaterial({color: 0x000000}));
    mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
    mouth.position.set(0, 1.6, 0.26); head.add(mouth);

    // KITCHEN (UNCHANGED)
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshStandardMaterial({color: 0x1a110a}));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

    const counter = new THREE.Mesh(new THREE.BoxGeometry(10, 1.1, 2.5), new THREE.MeshStandardMaterial({color: 0x221105}));
    counter.position.set(0, 0.55, -4); counter.receiveShadow = true; scene.add(counter);

    // FRIDGE
    const fridgeBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.5, 2.2), new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.5}));
    fridgeBody.position.set(-4, 2.25, -4.5); scene.add(fridgeBody);
    fridgeDoor = new THREE.Group();
    fridgeDoor.position.set(-2.75, 2.25, -3.4); scene.add(fridgeDoor);
    const doorPanel = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.5, 0.1), new THREE.MeshStandardMaterial({color: 0xaaaaaa, metalness: 0.7}));
    doorPanel.position.set(-1.25, 0, 0); doorPanel.name = "fridge";
    fridgeDoor.add(doorPanel); interactables.push(doorPanel);

    // FRYER
    fryer = new THREE.Group();
    fryer.position.set(3, 1.1, -4);
    const fBase = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.7, 1.4), new THREE.MeshStandardMaterial({color: 0x444444}));
    const fRim = new THREE.Mesh(new THREE.TorusGeometry(0.65, 0.04, 8, 4), new THREE.MeshStandardMaterial({color: 0x888888}));
    fRim.rotation.x = Math.PI/2; fRim.position.y = 0.35;
    fryer.add(fBase, fRim);
    scene.add(fryer);
    const fZone = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1, 1.4), new THREE.MeshBasicMaterial({visible: false}));
    fZone.name = "fryer"; fryer.add(fZone); interactables.push(fZone);

    // BUTTER
    butter = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x00ffcc}));
    butter.position.set(0, 1.25, -3.5); butter.name = "butter";
    scene.add(butter); interactables.push(butter);

    // MIRROR
    const mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), { clipBias: 0.003, color: 0x888888 });
    mirror.position.set(2.5, 3, -5.2); scene.add(mirror);
    const pLight = new THREE.PointLight(0xffaa44, 2, 30); pLight.position.set(0, 6, -2); pLight.castShadow = true;
    scene.add(pLight, new THREE.AmbientLight(0xffffff, 0.4));

    // INPUTS
    window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyE') doInteract(); });
    window.addEventListener('mousedown', () => { if(active) doInteract(); });
    window.addEventListener('mousemove', e => { if(active) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});

    animate();
}

function doInteract() {
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(interactables);
    if(heldItem) {
        // If clicking while holding butter
        if(hits.length > 0 && hits[0].object.name === "fryer") {
            cooking = true; scene.attach(heldItem);
            heldItem.position.set(fryer.position.x, 1.4, fryer.position.z);
            heldItem = null;
            document.getElementById('cook-bar-container').style.display = "block";
        } else {
            scene.attach(heldItem); heldItem = null;
        }
    } else if(hits.length > 0) {
        const obj = hits[0].object;
        if(obj.name === "butter") { heldItem = obj; player.add(heldItem); heldItem.position.set(0.5, 1.2, -0.8); }
        else if(obj.name === "fridge") fridgeOpen = !fridgeOpen;
    }
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta();

    player.rotation.y = yaw;
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
    camera.position.set(player.position.x, 1.65, player.position.z);

    fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.5 : 0, 0.1);

    // MOVEMENT
    let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
    let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
    if(moveX || moveZ) {
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, moveZ * 7 * dt);
        player.position.addScaledVector(side, moveX * 7 * dt);
    }

    // THE SMILE (Watch the mirror!)
    let t = clock.getElapsedTime();
    if(t > 15) { // Starts faster so you can see it
        mouth.scale.x = 1 + (t-15) * 0.1;
        mouth.position.z = 0.26 + (t-15) * 0.001;
    }

    // COOKING ENGINE
    if(cooking) {
        cookTime += dt;
        let progress = Math.min(cookTime / 30, 1.0); // 30 seconds to dissolve
        document.getElementById('cook-fill').style.width = (progress * 100) + "%";
        
        let levelIdx = Math.floor(progress * (LEVELS.length - 1));
        document.getElementById('cook-label').innerText = LEVELS[levelIdx];
        
        butter.material.color.lerp(new THREE.Color(0x000000), 0.005);
        if(progress > 0.9) { butter.scale.multiplyScalar(0.95); }
    }

    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
