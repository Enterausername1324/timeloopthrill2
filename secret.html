<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 53.0_ULTRA_REALISM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); color: #fff; z-index: 1000; cursor: pointer; text-align: center; border: 2px solid #555; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #bar-box { width: 220px; height: 14px; border: 2px solid #fff; background: rgba(0,0,0,0.5); display: none; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        #bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffcc00, #ff6600); }
        #label { color: #fff; font-size: 16px; font-weight: bold; text-transform: uppercase; text-shadow: 2px 2px 4px #000; }
        #joystick-wrapper { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; border: 1px solid #fff; }
        #joystick-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.4; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1 style="letter-spacing: 5px;">VORTEX V53</h1>
    <p>TAP TO ENTER THE KITCHEN</p>
</div>

<div id="ui">
    <div id="label">STABLE</div>
    <div id="bar-box"><div id="bar-fill"></div></div>
</div>

<div id="joystick-wrapper"><div id="joystick-stick"></div></div>

<script>
let scene, camera, renderer, clock, player, head, fridgeDoor, fridgeLight, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null;
let keys = {}, butters = [], isMobile = false;
let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
let touchLook = { active: false, lastX: 0, lastY: 0 };

const STAGES = [0xfff0ad, 0xffe066, 0xffcc00, 0x8b4513, 0x331100, 0x000000];
const LABELS = ["FRESH", "MELTING", "SIZZLING", "GOLDEN", "CHARRED", "RUINED"];

// --- PROCEDURAL TEXTURE GENERATOR ---
function createNoiseTexture(color1, color2, size=256) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');
    for(let i=0; i<size; i+=2) {
        for(let j=0; j<size; j+=2) {
            ctx.fillStyle = Math.random() > 0.5 ? color1 : color2;
            ctx.fillRect(i, j, 2, 2);
        }
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
}

function setup() { 
    active = true; 
    document.getElementById('overlay').style.display = 'none'; 
    if(!isMobile) document.body.requestPointerLock();
}

function init() {
    isMobile = ('ontouchstart' in window);
    if(isMobile) document.getElementById('joystick-wrapper').style.display = 'block';

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 5);

    head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00, roughness: 0.1, metalness: 0.5}));
    head.position.y = 1.65; player.add(head);

    // --- ENVIRONMENT ---
    const wallTex = createNoiseTexture('#222', '#111');
    const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.8 });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.9}));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

    // --- REALISTIC FRIDGE ---
    const fridge = new THREE.Group(); fridge.position.set(-5, 0, -5); scene.add(fridge);
    const metalMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.2 });
    
    // Outer Shell
    const fBody = new THREE.Mesh(new THREE.BoxGeometry(2.6, 5, 2.2), metalMat);
    fBody.position.set(0, 2.5, -0.1); fridge.add(fBody);

    // Interior Carve-out
    const fIntMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.1});
    const fInt = new THREE.Mesh(new THREE.BoxGeometry(2.3, 4.6, 1.8), fIntMat);
    fInt.position.set(0, 2.5, 0.2); fridge.add(fInt);

    // Shelves (Glass)
    const glassMat = new THREE.MeshStandardMaterial({color: 0xaaddff, transparent: true, opacity: 0.3});
    for(let i=0; i<3; i++) {
        const shelf = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.05, 1.7), glassMat);
        shelf.position.set(0, 1.2 + i*1.4, 0.2); fridge.add(shelf);
    }

    // Door
    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(1.3, 2.5, 1); fridge.add(fridgeDoor);
    const dMesh = new THREE.Mesh(new THREE.BoxGeometry(2.6, 5, 0.2), metalMat);
    dMesh.position.set(-1.3, 0, 0); dMesh.name = "fridge_door"; fridgeDoor.add(dMesh);
    
    // Handle
    const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.5, 0.15), new THREE.MeshStandardMaterial({color: 0x333333}));
    handle.position.set(-2.4, 0, 0.15); dMesh.add(handle);

    // Fridge Light
    fridgeLight = new THREE.PointLight(0x88ccff, 0, 5);
    fridgeLight.position.set(0, 4, 0.5); fridge.add(fridgeLight);

    // --- 6 BUTTER BLOCKS (Rows of 3) ---
    const butterTex = createNoiseTexture('#fff0ad', '#ffe066');
    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.3), new THREE.MeshStandardMaterial({map: butterTex, roughness: 0.4}));
        // Row 1 (Bottom), Row 2 (Middle)
        let row = Math.floor(i/3);
        let col = i % 3;
        b.position.set(col*0.6 - 0.6, 1.35 + row*1.4, 0.2);
        b.name = "butter"; b.userData.cookTime = 0; fridge.add(b); butters.push(b);
    }

    // --- KITCHEN ASSETS ---
    const marbleTex = createNoiseTexture('#ffffff', '#cccccc');
    counter = new THREE.Mesh(new THREE.BoxGeometry(8, 1.1, 2.5), new THREE.MeshStandardMaterial({map: marbleTex, roughness: 0.1}));
    counter.position.set(1, 0.55, -4.5); counter.receiveShadow = true; scene.add(counter);

    // Fryer
    const fryerGroup = new THREE.Group(); fryerGroup.position.set(3.5, 1.1, -4.5); scene.add(fryerGroup);
    const fBase = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 1.6), new THREE.MeshStandardMaterial({color: 0x222222, metalness: 0.8}));
    fBase.name = "fryer"; fryerGroup.add(fBase);
    const fTop = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.1, 1.4), new THREE.MeshStandardMaterial({color: 0x111111}));
    fTop.position.y = 0.4; fryerGroup.add(fTop);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const mainLight = new THREE.PointLight(0xffffff, 1.2, 40);
    mainLight.position.set(0, 8, 2); mainLight.castShadow = true; scene.add(mainLight);

    // Mirror
    const mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), { color: 0x888888 });
    mirror.position.set(2.5, 3.2, -5.7); scene.add(mirror);

    // --- INPUTS ---
    window.addEventListener('touchstart', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) { joy.active = true; joy.startX = t.clientX; joy.startY = t.clientY; }
            else { touchLook.active = true; touchLook.lastX = t.clientX; touchLook.lastY = t.clientY; doInteract(); }
        }
    });

    window.addEventListener('touchmove', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(joy.active && t.clientX < window.innerWidth/2) {
                let dx = t.clientX - joy.startX, dy = t.clientY - joy.startY;
                let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                let ang = Math.atan2(dy, dx);
                joy.x = Math.cos(ang) * (dist/40); joy.y = Math.sin(ang) * (dist/40);
                document.getElementById('joystick-stick').style.transform = `translate(${joy.x*30}px, ${joy.y*30}px)`;
            } else if(touchLook.active) {
                yaw -= (t.clientX - touchLook.lastX) * 0.006;
                pitch -= (t.clientY - touchLook.lastY) * 0.006;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                touchLook.lastX = t.clientX; touchLook.lastY = t.clientY;
            }
        }
    });

    window.addEventListener('touchend', () => { joy.active = false; joy.x = 0; joy.y = 0; touchLook.active = false; document.getElementById('joystick-stick').style.transform = `translate(0,0)`; });
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => delete keys[e.code]);
    window.addEventListener('mousemove', e => { if(document.pointerLockElement === document.body) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});
    window.addEventListener('mousedown', () => { if(active && !isMobile) doInteract(); });

    animate();
}

function doInteract() {
    const r = new THREE.Raycaster();
    r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let obj = hits[0].object;
        if(heldItem) {
            if(obj.name === "fryer") {
                cookingButter = heldItem; scene.attach(heldItem); heldItem.position.set(3.5, 1.4, -4.5); heldItem = null;
                document.getElementById('bar-box').style.display = "block";
            } else { scene.attach(heldItem); heldItem.position.y = 0.2; heldItem = null; }
        } else {
            if(obj.name === "butter") { 
                heldItem = obj; player.add(heldItem); heldItem.position.set(0.5, 1.2, -0.8);
                if(heldItem === cookingButter) { cookingButter = null; document.getElementById('bar-box').style.display = "none"; }
            } else if(obj.name === "fridge_door") {
                fridgeOpen = !fridgeOpen;
                fridgeLight.intensity = fridgeOpen ? 2 : 0;
            }
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta(), t = clock.getElapsedTime();
    if(active) {
        player.rotation.y = yaw;
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        camera.position.set(player.position.x, 1.65, player.position.z);
        fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.6 : 0, 0.1);

        // DISTORTION (STILL ACTIVE)
        if(t > 10) {
            head.scale.x = 1 + Math.sin(t * 2) * 0.3;
            head.scale.y = 1 + Math.cos(t * 5) * 0.4;
        }

        if(cookingButter) {
            cookingButter.userData.cookTime += dt;
            let p = Math.min(cookingButter.userData.cookTime / 30, 1.0);
            let s = Math.floor(p * 5.99);
            cookingButter.material.color.set(STAGES[s]);
            document.getElementById('bar-fill').style.width = (p * 100) + "%";
            document.getElementById('label').innerText = LABELS[s];
        }

        let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0) + joy.y;
        let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0) + joy.x;
        if(moveX || moveZ) {
            let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
            let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
            player.position.addScaledVector(fwd, moveZ * 5 * dt);
            player.position.addScaledVector(side, moveX * 5 * dt);
        }
    }
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
