<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // OMNI_KITCHEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); color: #00ffcc; z-index: 100; cursor: pointer;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; }
        
        /* Dynamic Joystick */
        #joystick-wrapper { 
            position: absolute; bottom: 10%; left: 10%; 
            width: 15vw; height: 15vw; max-width: 150px; max-height: 150px;
            border: 2px solid rgba(0,255,204,0.3); border-radius: 50%; 
            display: none; touch-action: none;
        }
        #stick { 
            position: absolute; top: 50%; left: 50%; width: 40%; height: 40%; 
            background: rgba(0,255,204,0.6); border-radius: 50%; transform: translate(-50%, -50%); 
        }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
        }
    </style>
</head>
<body>

    <div id="overlay"><h1>INITIALIZE_VORTEX_SYSTEM</h1><p>(CLICK/TAP TO START)</p></div>
    <div id="hud"><div id="device-info">DETECTING_HARDWARE...</div><div id="temp">HEAT: 0°C</div></div>
    <div id="joystick-wrapper"><div id="stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, butter, pan;
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let moveDir = { x: 0, z: 0 };
        let velocity = new THREE.Vector3();
        let keys = { w: false, a: false, s: false, d: false };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const sun = new THREE.PointLight(0xffffff, 1);
            sun.position.set(5, 5, 5);
            scene.add(sun);

            // Kitchen Build (Counter, Stove, Fridge)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(50,50), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            const counter = new THREE.Mesh(new THREE.BoxGeometry(6, 0.9, 1.2), new THREE.MeshStandardMaterial({color: 0x222222}));
            counter.position.set(0, 0.45, -2); scene.add(counter);

            const fridge = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 1.2), new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.7}));
            fridge.position.set(2.5, 1.1, -2); scene.add(fridge);

            pan = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.1), new THREE.MeshStandardMaterial({color: 0x000000}));
            pan.position.set(0, 0.95, -2); scene.add(pan);

            butter = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.2), new THREE.MeshStandardMaterial({color: 0xffd700}));
            butter.position.set(0, 1.05, -2); scene.add(butter);

            setupControls();
            animate();
        }

        function setupControls() {
            const overlay = document.getElementById('overlay');
            const joyWrapper = document.getElementById('joystick-wrapper');
            const stick = document.getElementById('stick');

            overlay.addEventListener('click', () => {
                overlay.style.display = 'none';
                if (!isMobile) document.body.requestPointerLock();
            });

            if (isMobile) {
                document.getElementById('device-info').innerText = "HARDWARE: TOUCH_INTERFACE_ACTIVE";
                joyWrapper.style.display = 'block';
                
                window.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    if (touch.clientX < window.innerWidth / 2) {
                        const rect = joyWrapper.getBoundingClientRect();
                        const centerX = rect.left + rect.width/2;
                        const centerY = rect.top + rect.height/2;
                        let dx = touch.clientX - centerX;
                        let dy = touch.clientY - centerY;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        let limit = rect.width/2;
                        if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                        stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / limit; moveDir.z = dy / limit;
                    } else {
                        camera.rotation.y -= (touch.clientX - window.innerWidth*0.75) * 0.0002;
                    }
                });
                window.addEventListener('touchend', () => {
                    moveDir = { x: 0, z: 0 };
                    stick.style.transform = `translate(-50%, -50%)`;
                });
            } else {
                document.getElementById('device-info').innerText = "HARDWARE: DESKTOP_KB_MOUSE";
                document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                document.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement) {
                        camera.rotation.y -= e.movementX * 0.002;
                        camera.rotation.x -= e.movementY * 0.002;
                    }
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (isMobile) {
                camera.translateX(moveDir.x * 5 * delta);
                camera.translateZ(moveDir.z * 5 * delta);
            } else {
                if (keys.w) camera.translateZ(-5 * delta);
                if (keys.s) camera.translateZ(5 * delta);
                if (keys.a) camera.translateX(-5 * delta);
                if (keys.d) camera.translateX(5 * delta);
            }
            camera.position.y = 1.7; 
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
