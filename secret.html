<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 52.0_HYBRID</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #00ffcc; z-index: 999; cursor: pointer; text-align: center; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #bar-box { width: 200px; height: 10px; border: 1px solid #00ffcc; background: #000; display: none; margin-top: 5px; }
        #bar-fill { height: 100%; width: 0%; background: #00ffcc; }
        #label { color: #00ffcc; font-size: 12px; text-transform: uppercase; }
        
        /* Mobile Joystick Styles */
        #joystick-wrapper { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; touch-action: none; border: 2px solid rgba(0,255,204,0.3); }
        #joystick-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #00ffcc; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1>[ V52.0 // INITIALIZE ]</h1>
    <p id="start-hint">CLICK TO START</p>
</div>

<div id="ui">
    <div id="label">SYSTEM READY</div>
    <div id="bar-box"><div id="bar-fill"></div></div>
</div>

<div id="joystick-wrapper"><div id="joystick-stick"></div></div>

<script>
let scene, camera, renderer, clock, player, head, fridge, counter, fridgeDoor, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null;
let keys = {}, butters = [], isMobile = false;
let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
let touchLook = { active: false, lastX: 0, lastY: 0 };

const STAGES = [0x00ffcc, 0xffffaa, 0xffcc00, 0x8b4513, 0x222222, 0x000000];
const LABELS = ["RAW", "WARMING", "SIZZLING", "COOKED", "BURNING", "VOID"];

function setup() { 
    active = true; 
    document.getElementById('overlay').style.display = 'none'; 
    if(!isMobile) document.body.requestPointerLock();
    if(!scene) init();
}

function init() {
    isMobile = ('ontouchstart' in window);
    if(isMobile) {
        document.getElementById('joystick-wrapper').style.display = 'block';
        document.getElementById('start-hint').innerText = "TAP TO START\nLEFT: MOVE | RIGHT: LOOK & INTERACT";
    }

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030303);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 4);

    head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; player.add(head);

    // --- ROOM & ASSETS ---
    const wallMat = new THREE.MeshStandardMaterial({color: 0x111111});
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(16,16), new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);
    for(let i=0; i<4; i++) {
        const p = new THREE.Mesh(new THREE.PlaneGeometry(16,6), wallMat);
        p.rotation.y = (i * Math.PI) / 2;
        p.position.set(i%2===0?0:(i===1?-8:8), 3, i%2!==0?0:(i===0?-8:8));
        scene.add(p);
    }

    fridge = new THREE.Group(); fridge.position.set(-5, 0, -4.5); scene.add(fridge);
    const fBack = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.8, 0.1), wallMat); fBack.position.set(0, 2.4, -1.1); fridge.add(fBack);
    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(1.2, 2.4, 1.1); fridge.add(fridgeDoor);
    const dMesh = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.8, 0.1), new THREE.MeshStandardMaterial({color: 0x333333}));
    dMesh.position.set(-1.25, 0, 0); dMesh.name = "fridge_door"; fridgeDoor.add(dMesh);

    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0x00ffcc}));
        b.position.set((i%2)*0.6 - 0.3, 1 + (Math.floor(i/2)*1.2), -0.5);
        b.name = "butter"; b.userData.cookTime = 0; fridge.add(b); butters.push(b);
    }

    counter = new THREE.Mesh(new THREE.BoxGeometry(8, 1.1, 2.5), new THREE.MeshStandardMaterial({color: 0x1a0a05}));
    counter.position.set(1, 0.55, -4); scene.add(counter);
    const fryer = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 1.5), new THREE.MeshStandardMaterial({color: 0x111111}));
    fryer.position.set(3, 1.1, -4); fryer.name = "fryer"; scene.add(fryer);
    const mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), { clipBias: 0.003, color: 0x888888 });
    mirror.position.set(2.5, 3.2, -5.3); scene.add(mirror);
    scene.add(new THREE.PointLight(0xffaa44, 2, 20), new THREE.AmbientLight(0xffffff, 0.1));

    // --- MOBILE CONTROLS ---
    const jWrapper = document.getElementById('joystick-wrapper');
    const jStick = document.getElementById('joystick-stick');

    window.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) {
                joy.active = true; joy.startX = t.clientX; joy.startY = t.clientY;
            } else {
                touchLook.active = true; touchLook.lastX = t.clientX; touchLook.lastY = t.clientY;
                if(active) doInteract(); 
            }
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(joy.active && t.clientX < window.innerWidth/2) {
                let dx = t.clientX - joy.startX; let dy = t.clientY - joy.startY;
                let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                let angle = Math.atan2(dy, dx);
                joy.x = Math.cos(angle) * (dist/40); joy.y = Math.sin(angle) * (dist/40);
                jStick.style.transform = `translate(${joy.x*30}px, ${joy.y*30}px)`;
            } else if(touchLook.active) {
                yaw -= (t.clientX - touchLook.lastX) * 0.005;
                pitch -= (t.clientY - touchLook.lastY) * 0.005;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                touchLook.lastX = t.clientX; touchLook.lastY = t.clientY;
            }
        }
    }, {passive: false});

    window.addEventListener('touchend', () => { joy.active = false; joy.x = 0; joy.y = 0; touchLook.active = false; jStick.style.transform = `translate(0,0)`; });

    // --- PC CONTROLS ---
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => delete keys[e.code]);
    window.addEventListener('mousemove', e => { if(document.pointerLockElement === document.body) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});
    window.addEventListener('mousedown', () => { if(active && !isMobile) doInteract(); });

    animate();
}

function doInteract() {
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let obj = hits[0].object;
        if(heldItem) {
            if(obj.name === "fryer") {
                cookingButter = heldItem; scene.attach(heldItem); heldItem.position.set(3, 1.4, -4); heldItem = null;
                document.getElementById('bar-box').style.display = "block";
            } else { scene.attach(heldItem); heldItem.position.y = 0.2; heldItem = null; }
        } else {
            if(obj.name === "butter") { 
                heldItem = obj; player.add(heldItem); heldItem.position.set(0.5, 1.2, -0.8);
                if(heldItem === cookingButter) { cookingButter = null; document.getElementById('bar-box').style.display = "none"; }
            } else if(obj.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta(), t = clock.getElapsedTime();
    player.rotation.y = yaw;
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
    camera.position.set(player.position.x, 1.65, player.position.z);
    fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.6 : 0, 0.1);

    // DISTORTION
    if(t > 5) {
        head.scale.x = 1 + Math.sin(t * 2) * 0.4;
        head.scale.y = 1 + Math.cos(t * 5) * 0.6;
        if(Math.random() > 0.98) fridge.position.x = -5 + (Math.random()-0.5)*0.3;
    }

    if(cookingButter) {
        cookingButter.userData.cookTime += dt;
        let p = Math.min(cookingButter.userData.cookTime / 30, 1.0);
        let s = Math.floor(p * 5.99);
        cookingButter.material.color.set(STAGES[s]);
        document.getElementById('bar-fill').style.width = (p * 100) + "%";
        document.getElementById('label').innerText = LABELS[s];
    }

    // MOVEMENT
    let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0) + joy.y;
    let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0) + joy.x;
    if(moveX || moveZ) {
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, moveZ * 5 * dt);
        player.position.addScaledVector(side, moveX * 5 * dt);
    }
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
