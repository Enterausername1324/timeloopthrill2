<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 46.4_RAW_INPUT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; }
        #hud { position: absolute; top: 10px; left: 10px; color: #666; font-size: 12px; pointer-events: none; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; border: 2px solid #333; border-radius: 50%; display:block; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.2; }
    </style>
</head>
<body>

<div id="overlay" onclick="start()"><h1>VORTEX_v46.4</h1><p>TAP TO START</p></div>
<div id="hud">SMILE_IDX: <span id="timer">0.00</span></div>
<div id="joy-base"><div id="joy-stick"></div></div>

<script>
let scene, camera, renderer, clock, player, body, mouth, pointLight;
let keys = {}, active = false, yaw = 0, pitch = 0;
let moveDir = {x:0, z:0}, joyID = null, lookID = null, lastLook = {x:0, y:0};

function start() { 
    active = true; 
    document.getElementById('overlay').style.display = 'none'; 
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 7);

    body = new THREE.Group();
    player.add(body);
    body.position.z = -0.2; // v45 View Fix

    // Head & Smile
    let head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; body.add(head);
    mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
    mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
    mouth.position.set(0, 1.6, 0.28); head.add(mouth);

    // Kitchen
    const add = (w,h,d,x,y,z,c) => {
        let m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:c}));
        m.position.set(x,y,z); scene.add(m); return m;
    };
    add(20, 0.1, 20, 0, 0, 0, 0x1a0f05); // Floor
    add(10, 1, 2, 0, 0.5, -4, 0x221105); // Counter
    
    pointLight = new THREE.PointLight(0xffaa44, 1, 20);
    pointLight.position.set(0, 4, -2); scene.add(pointLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.2));

    // --- RAW INPUT HANDLERS ---
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; keys[e.keyCode] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; keys[e.keyCode] = false; });

    window.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) joyID = t.identifier;
            else { lookID = t.identifier; lastLook = {x:t.clientX, y:t.clientY}; }
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyID) {
                let rect = document.getElementById('joy-base').getBoundingClientRect();
                moveDir.x = (t.clientX - (rect.left+50))/50;
                moveDir.z = (t.clientY - (rect.top+50))/50;
            }
            if(t.identifier === lookID) {
                yaw -= (t.clientX - lastLook.x) * 0.007;
                pitch -= (t.clientY - lastLook.y) * 0.007;
                lastLook = {x:t.clientX, y:t.clientY};
            }
        }
    }, {passive: false});

    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyID) { moveDir = {x:0, z:0}; }
            if(t.identifier === lookID) lookID = null;
        }
    });

    // Mouse Fallback for Chromebook
    window.addEventListener('mousemove', e => {
        if(!isTouch && active) {
            if(e.buttons === 1) { // Rotate on Drag
                yaw -= e.movementX * 0.005;
                pitch -= e.movementY * 0.005;
            }
        }
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta();

    // Rotate
    player.rotation.y = yaw;
    camera.rotation.x = Math.max(-1.5, Math.min(1.5, pitch));

    // Move
    let speed = 5;
    let dirX = 0, dirZ = 0;
    if(keys['w'] || keys[87]) dirZ -= 1;
    if(keys['s'] || keys[83]) dirZ += 1;
    if(keys['a'] || keys[65]) dirX -= 1;
    if(keys['d'] || keys[68]) dirX += 1;
    
    dirX += moveDir.x; dirZ += moveDir.z;

    if(dirX !== 0 || dirZ !== 0) {
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, dirZ * speed * dt);
        player.position.addScaledVector(side, dirX * speed * dt);
    }

    // Smile Logic
    let m = clock.getElapsedTime()/60;
    document.getElementById('timer').innerText = m.toFixed(2);
    if(m > 3) mouth.scale.x = 1 + (m-3)*3;
    if(m > 5) { mouth.material.color.set(0xff0000); pointLight.color.set(0xff0000); }

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
