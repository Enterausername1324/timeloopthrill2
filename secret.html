<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 56.0_HYPER_REAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; cursor: pointer; }
        #cursor { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1px solid rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #bar-box { width: 220px; height: 10px; border: 1px solid #ffffff; background: rgba(0,0,0,0.8); display: none; margin-top: 10px; border-radius: 5px; }
        #bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffcc00, #ff6600); }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1 style="letter-spacing: 15px; font-weight: 100;">VORTEX</h1>
    <p style="letter-spacing: 2px; opacity: 0.6;">ULTRA REALISM // v56.0</p>
</div>

<div id="cursor"></div>
<div id="ui"><div id="label" style="color:white; letter-spacing:4px; font-size:12px;">SYSTEM_ACTIVE</div><div id="bar-box"><div id="bar-fill"></div></div></div>

<script>
let scene, camera, renderer, clock, player, head, fridgeDoor, windowShutter, lever, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null, windowOpen = false, fridgeOpen = false;
let keys = {}, butters = [], isMobile = false, colliders = [];

// Realistic Texture Gen
function genNoise(c1, c2, w=512, h=512, mode='noise') {
    const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d'); ctx.fillStyle = c1; ctx.fillRect(0,0,w,h);
    for(let i=0; i<3000; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? c1 : c2;
        ctx.globalAlpha = 0.1;
        let sw = mode === 'brushed' ? 200 : 4;
        let sh = mode === 'brushed' ? 1 : 4;
        ctx.fillRect(Math.random()*w, Math.random()*h, sw, sh);
    }
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
}

const tSteel = genNoise('#777', '#999', 512, 512, 'brushed');
const tCeil = genNoise('#222', '#333', 256, 256, 'noise');

function setup() { 
    active = true; document.getElementById('overlay').style.display = 'none'; 
    if(!isMobile) document.body.requestPointerLock();
}

function init() {
    isMobile = ('ontouchstart' in window);
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1525);
    scene.fog = new THREE.FogExp2(0x1a1a2e, 0.005); // Atmospheric depth

    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 2000);
    camera.rotation.order = "YXZ";

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group(); scene.add(player);
    player.position.set(0, 0, 1);

    // --- THE OUTSIDE (REALISTIC) ---
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x152010, roughness: 1}));
    ground.rotation.x = -Math.PI/2; scene.add(ground);

    // Procedural Forest & City
    for(let i=0; i<300; i++) {
        let x = (Math.random()-0.5)*400; let z = (Math.random()-0.5)*400;
        if(Math.abs(x) < 20 && Math.abs(z) < 20) continue; 
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 4), new THREE.MeshStandardMaterial({color: 0x2a1a0a}));
        trunk.position.set(x, 2, z); scene.add(trunk);
        const leaves = new THREE.Mesh(new THREE.ConeGeometry(2, 5, 8), new THREE.MeshStandardMaterial({color: 0x0a2a0a}));
        leaves.position.set(x, 6, z); scene.add(leaves);
    }
    // Towers
    for(let i=0; i<12; i++) {
        const h = 50 + Math.random()*100;
        const t = new THREE.Mesh(new THREE.BoxGeometry(10, h, 10), new THREE.MeshStandardMaterial({color: 0x111111, emissive: 0x222244}));
        t.position.set((Math.random()-0.5)*300, h/2, -300 - Math.random()*100); scene.add(t);
    }

    // --- THE TRUCK (INTERIOR REALISM) ---
    const truckGroup = new THREE.Group(); scene.add(truckGroup);
    const wallMat = new THREE.MeshStandardMaterial({map: tSteel, metalness: 0.9, roughness: 0.2, side: THREE.DoubleSide});

    // FLOOR & CEILING
    const f = new THREE.Mesh(new THREE.PlaneGeometry(8, 12), new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.5}));
    f.rotation.x = -Math.PI/2; scene.add(f);
    const c = new THREE.Mesh(new THREE.PlaneGeometry(8, 12), new THREE.MeshStandardMaterial({map: tCeil, roughness: 0.9, metalness: 0.5}));
    c.rotation.x = Math.PI/2; c.position.y = 3.95; scene.add(c);

    // Physical Walls
    function wall(w,h,d,x,y,z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wallMat);
        m.position.set(x,y,z); scene.add(m);
        colliders.push(new THREE.Box3().setFromObject(m));
    }
    wall(0.2, 4, 12, -4, 2, 0); // Left
    wall(8, 4, 0.2, 0, 2, -6); // Back
    wall(8, 4, 0.2, 0, 2, 6);  // Front
    wall(0.2, 4, 4, 4, 2, -4); wall(0.2, 4, 4, 4, 2, 4); // Right sides
    wall(0.2, 1, 4, 4, 0.5, 0); wall(0.2, 1, 4, 4, 3.5, 0); // Window frame

    // WINDOW SHUTTER
    windowShutter = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.2, 4.2), new THREE.MeshStandardMaterial({color: 0x222222, metalness: 1}));
    windowShutter.position.set(3.92, 2, 0); scene.add(windowShutter);

    // KITCHEN LIGHTS
    const lightFix1 = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 4), new THREE.MeshStandardMaterial({emissive: 0xffffff, emissiveIntensity: 2}));
    lightFix1.position.set(0, 3.9, -2); scene.add(lightFix1);
    const pL1 = new THREE.PointLight(0xffffff, 1.5, 15); pL1.position.set(0, 3.5, -2); scene.add(pL1);

    // FRIDGE & APPLIANCES
    const fridge = new THREE.Group(); fridge.position.set(-3.2, 0, -4.5); scene.add(fridge);
    const fBody = new THREE.Mesh(new THREE.BoxGeometry(1.4, 3.8, 1.5), wallMat);
    fBody.position.y = 1.9; fridge.add(fBody);
    colliders.push(new THREE.Box3().setFromObject(fBody).translate(new THREE.Vector3(-3.2, 0, -4.5)));

    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(0.7, 1.9, 0.75); fridge.add(fridgeDoor);
    const dM = new THREE.Mesh(new THREE.BoxGeometry(1.4, 3.8, 0.1), wallMat);
    dM.position.set(-0.7, 0, 0); dM.name = "fridge_door"; fridgeDoor.add(dM);

    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.25, 0.3), new THREE.MeshStandardMaterial({color: 0xfff0ad, roughness: 0.1}));
        b.position.set((i%2)*0.6 - 0.3, 0.8 + (Math.floor(i/3)*1.2), 0); b.name = "butter";
        b.userData.cookTime = 0; fridge.add(b); butters.push(b);
    }

    const leverBase = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0x000}));
    leverBase.position.set(3.8, 1.5, 2.2); scene.add(leverBase);
    lever = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.6), new THREE.MeshStandardMaterial({color: 0xaa0000}));
    lever.position.set(3.8, 1.7, 2.2); lever.name = "lever"; scene.add(lever);

    const fryer = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 1.2), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 1}));
    fryer.position.set(3.2, 1, -2); fryer.name = "fryer"; scene.add(fryer);

    scene.add(new THREE.AmbientLight(0xffffff, 0.1));
    const moon = new THREE.DirectionalLight(0x5566ff, 0.5); moon.position.set(-10, 50, -20); scene.add(moon);

    window.addEventListener('mousemove', e => { if(document.pointerLockElement === document.body) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});
    window.addEventListener('mousedown', () => { if(active) interact(); });
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => delete keys[e.code]);

    animate();
}

function interact() {
    const r = new THREE.Raycaster(); r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let o = hits[0].object;
        if(o.name === "lever") windowOpen = !windowOpen;
        else if(heldItem) {
            if(o.name === "fryer") { cookingButter = heldItem; scene.attach(heldItem); heldItem.position.set(3.2, 1.3, -2); heldItem = null; document.getElementById('bar-box').style.display = "block"; }
            else { scene.attach(heldItem); heldItem.position.y = 0.1; heldItem = null; }
        } else {
            if(o.name === "butter") { heldItem = o; player.add(heldItem); heldItem.position.set(0.5, 1.2, -0.8); }
            else if(o.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta();
    if(active) {
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        camera.position.set(player.position.x, 1.65, player.position.z);
        fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? 1.8 : 0, 0.1);
        windowShutter.position.y = THREE.MathUtils.lerp(windowShutter.position.y, windowOpen ? 4.2 : 2, 0.1);
        lever.rotation.x = THREE.MathUtils.lerp(lever.rotation.x, windowOpen ? -1 : 1, 0.1);

        if(cookingButter) {
            cookingButter.userData.cookTime += dt;
            document.getElementById('bar-fill').style.width = Math.min((cookingButter.userData.cookTime/30)*100, 100) + "%";
        }

        let mZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
        let mX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
        if(mZ || mX) {
            let move = new THREE.Vector3(mX, 0, mZ).applyAxisAngle(new THREE.Vector3(0,1,0), yaw).multiplyScalar(4*dt);
            let test = player.position.clone().add(move);
            let hit = false;
            let pBB = new THREE.Box3().setFromCenterAndSize(test, new THREE.Vector3(0.5, 2, 0.5));
            for(let b of colliders) if(pBB.intersectsBox(b)) hit = true;
            if(!hit) player.position.copy(test);
        }
    }
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
