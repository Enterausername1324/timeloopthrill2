<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 47.6_STOVE_INTERACT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); color: #fff; z-index: 10000; cursor: pointer; }
        #hud { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px 2px #000; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; transition: scale 0.1s; }
        #prompt { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 18px; display: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="document.body.requestPointerLock()">
        <h1>VORTEX_v47.6</h1>
        <p>CLICK TO ENGAGE KITCHEN</p>
    </div>
    <div id="hud">HOLDING: <span id="item-name">NONE</span></div>
    <div id="crosshair"></div>
    <div id="prompt">[E] INTERACT</div>

    <script>
        let scene, camera, renderer, clock, player, body, mouth, mirror, pointLight;
        let active = false, yaw = 0, pitch = 0, heldItem = null;
        let keys = {}, interactables = [];
        const raycaster = new THREE.Raycaster();

        document.addEventListener('pointerlockchange', () => {
            active = document.pointerLockElement === document.body;
            document.getElementById('overlay').style.display = active ? 'none' : 'flex';
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            player = new THREE.Group();
            scene.add(player);
            player.position.set(0, 0, 7);

            // Character
            body = new THREE.Group();
            player.add(body);
            body.position.z = -0.15;
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            head.position.y = 1.65; body.add(head);
            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouth.position.set(0, 1.6, 0.28); head.add(mouth);

            // Kitchen Build
            const add = (w, h, d, x, y, z, col, name) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: col}));
                m.position.set(x, y, z); m.name = name; scene.add(m); return m;
            };

            add(30, 0.1, 30, 0, 0, 0, 0x332211, "floor");
            add(12, 1.1, 2.5, 0, 0.55, -4, 0x442211, "counter");
            
            // Stove & Fryer
            const stove = add(2, 0.1, 2, -3, 1.15, -4, 0x222222, "stove");
            const fryer = add(1.5, 0.6, 1.5, 3, 1.4, -4, 0x666666, "fryer");
            interactables.push(fryer);

            // Butter (Pickable)
            const butter = add(0.4, 0.4, 0.4, 0, 1.3, -3.5, 0x00ffcc, "butter");
            butter.material.emissive.set(0x00ffcc);
            butter.material.emissiveIntensity = 0.5;
            interactables.push(butter);

            mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), {
                clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0x888888
            });
            mirror.position.set(2.5, 3, -5); scene.add(mirror);

            pointLight = new THREE.PointLight(0xffaa44, 2, 25);
            pointLight.position.set(0, 5, -2); scene.add(pointLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyE') handleInteraction();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousemove', e => {
                if(active) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });

            animate();
        }

        function handleInteraction() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(interactables);
            
            if(heldItem) {
                // Drop logic
                if(hits.length > 0 && hits[0].object.name === "fryer") {
                    heldItem.position.set(3, 1.8, -4);
                } else {
                    heldItem.position.set(player.position.x, 1.3, player.position.z - 1);
                }
                scene.add(heldItem);
                heldItem = null;
                document.getElementById('item-name').innerText = "NONE";
            } else if(hits.length > 0 && hits[0].object.name === "butter") {
                // Pick logic
                heldItem = hits[0].object;
                document.getElementById('item-name').innerText = "BUTTER";
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!active) return;
            let dt = clock.getDelta();

            player.rotation.y = yaw;
            camera.position.copy(player.position);
            camera.position.y = 1.65;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');

            // Movement (Vectored correctly)
            let speed = 7;
            let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
            let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);

            if(moveX !== 0 || moveZ !== 0) {
                let dir = new THREE.Vector3(moveX, 0, moveZ).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                player.position.addScaledVector(dir, speed * dt);
            }

            // Raycast for Crosshair
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const lookAt = raycaster.intersectObjects(interactables);
            const crosshair = document.getElementById('crosshair');
            const prompt = document.getElementById('prompt');
            
            if(lookAt.length > 0) {
                crosshair.style.scale = "2";
                crosshair.style.background = "#00ffcc";
                prompt.style.display = "block";
            } else {
                crosshair.style.scale = "1";
                crosshair.style.background = "rgba(255,255,255,0.5)";
                prompt.style.display = "none";
            }

            if(heldItem) {
                heldItem.position.set(0.3, -0.3, -0.6);
                camera.add(heldItem); // Attach to view
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
