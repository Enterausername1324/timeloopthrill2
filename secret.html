<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // CHRONOS_v44</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        :root { --neon: #00ffcc; --horror: #ff0055; }
        body { margin: 0; background: #020202; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; cursor: pointer; text-shadow: 0 0 15px #fff; }
        #hud { position: absolute; top: 20px; left: 20px; color: #aaa; pointer-events: none; z-index: 10; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
        #prompt-layer { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: var(--neon); font-size: 18px; pointer-events: none; z-index: 15; text-align: center; font-weight: bold; text-shadow: 0 0 10px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 50%; }
        #crosshair.active { border-color: var(--neon); box-shadow: 0 0 20px var(--neon); width: 20px; height: 20px; }
        #mobile-e { position: absolute; bottom: 60px; right: 60px; width: 95px; height: 95px; background: rgba(0,255,204,0.1); border: 3px solid var(--neon); border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-size: 36px; z-index: 2000; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px rgba(0,255,204,0.3); }
        #joy-base { position: absolute; bottom: 60px; left: 60px; width: 130px; height: 130px; border: 2px solid #333; border-radius: 50%; display: none; z-index: 2000; background: rgba(255,255,255,0.02); }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.3; }
        #fry-ui { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); width: 250px; height: 5px; background: #111; border: 1px solid var(--neon); display: none; }
        #fry-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>

    <div id="overlay"><h1>VORTEX_v44</h1><p>[ INITIATE CORE ]</p></div>
    <div id="hud"><div>RENDER: PATH_TRACE_ULTRA</div><div id="timer">SMILE_IDX: 0.00</div><div id="hold-status">EMPTY</div></div>
    <div id="prompt-layer"></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, playerBody, mirror, mouth;
        let butter, fryer, pointLight;
        let heldItem = null, isCooking = false, cookProgress = 0, interactableObj = null;
        let colliders = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.08);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000); // Near clip fixed
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 7);

            // --- THE CHARACTER (ULTRA DETAIL) ---
            playerBody = new THREE.Group();
            playerGroup.add(playerBody);
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00, roughness: 0.3}));
            head.position.y = 1.7; playerBody.add(head);

            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.32, 1.2, 32), new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 1}));
            shirt.position.y = 0.9; playerBody.add(shirt);

            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouth.position.set(0, 1.6, 0.28); playerBody.add(mouth);

            playerGroup.add(camera);
            camera.position.set(0, 1.7, 0.05);

            // --- THE KITCHEN (WOODEN & DETAILED) ---
            const addObj = (w, h, d, x, y, z, mat, isSolid=true) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
                mesh.position.set(x, y, z); mesh.receiveShadow = true; mesh.castShadow = true;
                scene.add(mesh);
                if(isSolid) colliders.push(new THREE.Box3().setFromObject(mesh));
                return mesh;
            };

            const woodMat = new THREE.MeshStandardMaterial({color: 0x2a1a0a, roughness: 0.6});
            const darkWoodMat = new THREE.MeshStandardMaterial({color: 0x150c05, roughness: 0.8});
            const steelMat = new THREE.MeshStandardMaterial({color: 0xffffff, metalness: 0.9, roughness: 0.1});

            addObj(30, 0.1, 30, 0, 0, 0, woodMat, false); // Floor
            addObj(20, 10, 0.5, 0, 5, -5, darkWoodMat); // Back Wall
            addObj(12, 1, 2.5, 0, 0.5, -4, woodMat); // Counter

            // Appliances
            addObj(2.2, 4.2, 2.2, -4.5, 2.1, -4, steelMat); // Fridge
            addObj(2, 2, 2, 4.5, 1, -4, new THREE.MeshStandardMaterial({color:0xffffff})); // Washer
            
            fryer = addObj(1.6, 0.4, 1.6, -1.2, 1.1, -4, steelMat, false);
            butter = addObj(0.4, 0.4, 0.4, 1.5, 1.2, -4, new THREE.MeshStandardMaterial({color:0x00ffcc, emissive:0x00ffcc, emissiveIntensity:1.5}), false);

            // --- THE MIRROR (FIXED & HIGH QUALITY) ---
            mirror = new THREE.Reflector(new THREE.PlaneGeometry(3.5, 2.5), {
                clipBias: 0.003, textureWidth: window.innerWidth * window.devicePixelRatio, textureHeight: window.innerHeight * window.devicePixelRatio, color: 0x888888
            });
            mirror.position.set(2, 3, -4.73); scene.add(mirror);

            // --- LIGHTING ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            pointLight = new THREE.PointLight(0xffaa44, 2, 25);
            pointLight.position.set(0, 4, -2); pointLight.castShadow = true; scene.add(pointLight);

            setupInput();
            animate();
        }

        const interact = () => {
            if(!interactableObj) return;
            if(interactableObj === "Butter" && !heldItem) { heldItem = butter; document.getElementById('hold-status').innerText = "HOLDING_ITEM"; }
            if(interactableObj === "Fryer" && heldItem) { isCooking = true; heldItem = null; butter.position.set(-1.2, 1.35, -4); document.getElementById('fry-ui').style.display = 'block'; }
        };

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true; document.getElementById('overlay').style.display = 'none';
                    if(isTouch) { document.getElementById('joy-base').style.display = 'block'; document.getElementById('mobile-e').style.display = 'flex'; }
                    else document.body.requestPointerLock();
                } else if(!isTouch) interact();
            };
            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase() === 'e') interact(); });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => { if(document.pointerLockElement) { targetRot.y -= e.movementX * 0.002; targetRot.x -= e.movementY * 0.002; }});
            document.getElementById('mobile-e').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
            window.addEventListener('touchstart', (e) => { if(!gameActive) { start(); return; } for (let t of e.changedTouches) { if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier; else if (t.target.id !== "mobile-e") { lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; } } });
            window.addEventListener('touchmove', (e) => { if(!gameActive) return; for (let t of e.changedTouches) { if (t.identifier === joyTouchID) { const rect = document.getElementById('joy-base').getBoundingClientRect(); let dx = t.clientX - (rect.left + 65), dy = t.clientY - (rect.top + 65); let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 65) { dx *= 65/dist; dy *= 65/dist; } document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; moveDir.x = dx / 65; moveDir.z = dy / 65; } if (t.identifier === lookTouchID) { targetRot.y -= (t.clientX - lastLookPos.x) * 0.007; targetRot.x -= (t.clientY - lastLookPos.y) * 0.007; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; } } });
            window.addEventListener('touchend', (e) => { for (let t of e.changedTouches) { if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; } if (t.identifier === lookTouchID) lookTouchID = null; } });
        }

        function checkCollisions(pos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(0.8, 1.8, 0.8));
            for(let box of colliders) if(playerBox.intersectsBox(box)) return true;
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            if (gameActive) {
                let minutes = time / 60;
                document.getElementById('timer').innerText = `SMILE_IDX: ${minutes.toFixed(2)}`;
                pointLight.intensity = 1.8 + Math.sin(time*12)*0.4; // Realistic Flicker

                if (minutes >= 5.0) {
                    mirror.material.opacity = 0.4 + Math.random()*0.2; // Crack simulation
                    pointLight.color.set(0xff0000);
                    mouth.scale.x = 4.0; mouth.material.color.set(0xff0000);
                }

                currentRot.y += (targetRot.y - currentRot.y) * 0.15;
                currentRot.x += (targetRot.x - currentRot.x) * 0.15;
                playerBody.rotation.y = currentRot.y;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

                // --- FIXED MOVEMENT VECTOR ---
                let forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), currentRot.y);
                let right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), currentRot.y);

                let moveStep = new THREE.Vector3();
                if(keys['w']) moveStep.addScaledVector(forward, 8 * delta);
                if(keys['s']) moveStep.addScaledVector(forward, -8 * delta);
                if(keys['a']) moveStep.addScaledVector(right, -8 * delta);
                if(keys['d']) moveStep.addScaledVector(right, 8 * delta);
                moveStep.addScaledVector(forward, -moveDir.z * 8 * delta);
                moveStep.addScaledVector(right, moveDir.x * 8 * delta);

                let nextPos = playerGroup.position.clone().add(moveStep);
                if(!checkCollisions(nextPos)) playerGroup.position.copy(nextPos);

                if(heldItem) {
                    heldItem.position.copy(playerGroup.position).add(forward.multiplyScalar(1.2));
                    heldItem.position.y = 1.45 + Math.sin(time*3)*0.05;
                }

                let dButter = playerGroup.position.distanceTo(butter.position);
                let dFryer = playerGroup.position.distanceTo(fryer.position);
                const cross = document.getElementById('crosshair');
                const prompt = document.getElementById('prompt-layer');
                
                if (dButter < 3.0 && !heldItem) { interactableObj = "Butter"; cross.classList.add('active'); prompt.innerText = isTouch ? "TAP BUTTER" : "CLICK BUTTER"; }
                else if (dFryer < 3.0 && heldItem) { interactableObj = "Fryer"; cross.classList.add('active'); prompt.innerText = isTouch ? "TAP FRYER" : "CLICK FRYER"; }
                else { interactableObj = null; cross.classList.remove('active'); prompt.innerText = ""; }

                if (isCooking) {
                    cookProgress += delta * 30; document.getElementById('fry-bar').style.width = cookProgress + "%";
                    if (cookProgress >= 100) { isCooking = false; cookProgress = 0; document.getElementById('fry-ui').style.display = 'none'; heldItem = butter; }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
