<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // SMILE_v46</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        :root { --neon: #00ffcc; --horror: #ff0055; --pc: #00ff00; }
        body { margin: 0; background: #010101; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        
        #smile-overlay { position: absolute; bottom: -50px; right: -50px; width: 250px; height: 250px; background: radial-gradient(circle, rgba(255,0,85,0.1) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; opacity: 0; pointer-events: none; z-index: 5000; transition: transform 0.5s; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; cursor: pointer; text-shadow: 0 0 10px #fff; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: #555; pointer-events: none; z-index: 10; font-size: 10px; line-height: 1.4; text-transform: uppercase; }
        
        #prompt-layer { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); color: var(--neon); font-size: 16px; pointer-events: none; z-index: 15; text-align: center; font-weight: bold; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1.5px solid rgba(255,255,255,0.3); border-radius: 50%; opacity: 0.5; }
        #crosshair.active { opacity: 1; border-color: var(--neon); transform: translate(-50%, -50%) scale(1.6); box-shadow: 0 0 10px var(--neon); }
        
        #mobile-e { position: absolute; bottom: 60px; right: 60px; width: 90px; height: 90px; background: rgba(0,255,204,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-size: 32px; z-index: 2000; cursor: pointer; }
        
        #joy-base { position: absolute; bottom: 60px; left: 60px; width: 120px; height: 120px; border: 1px solid #444; border-radius: 50%; display: none; z-index: 2000; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 45px; height: 45px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.15; }
        
        #fry-ui { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 220px; height: 3px; background: #111; border: 1px solid var(--neon); display: none; }
        #fry-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

    <div id="smile-overlay"></div>
    <div id="overlay"><h1>VORTEX_SMILE_v46</h1><p>[ CLICK ANYWHERE TO MANIFEST ]</p></div>
    <div id="hud"><div>INCARNATION: COMPLETE</div><div id="input-mode">INPUT: PC (MOUSE/KEY)</div><div id="timer">SMILE: 0.00</div><div id="hold-status">EMPTY</div></div>
    <div id="prompt-layer"></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let pitch = 0, yaw = 0; // CAMERA ROTATION TRACKING
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, playerBody, faceGroup, mouthMesh, leftEye, rightEye;
        let mirror, butter, fryer, pointLight;
        let heldItem = null, isCooking = false, cookProgress = 0, interactableObj = null;
        let colliders = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.15, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 7);

            // --- THE CHARACTER (YELLOW SKINNED, DETAILED FACE) ---
            playerBody = new THREE.Group();
            playerGroup.add(playerBody);
            playerBody.position.z = -0.15; // Offset backward so look-down is clean
            playerBody.castShadow = true;

            const skin = new THREE.MeshStandardMaterial({color: 0xffcc00, roughness: 0.4}); // Yellow Skin
            
            // Head
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 32), skin);
            head.position.y = 1.65; head.castShadow = true; playerBody.add(head);

            // Detailed Eyes (PC & CHROMBOOK Click Context)
            const eyeGeom = new THREE.SphereGeometry(0.06, 16, 16);
            const eyeMat = new THREE.MeshStandardMaterial({color: 0xffffff});
            
            leftEye = new THREE.Mesh(eyeGeom, eyeMat);
            leftEye.position.set(-0.12, 1.7, 0.25); head.add(leftEye);
            rightEye = new THREE.Mesh(eyeGeom, eyeMat);
            rightEye.position.set(0.12, 1.7, 0.25); head.add(rightEye);
            
            for(let eye of [leftEye, rightEye]) {
                let pupil = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), new THREE.MeshStandardMaterial({color: 0x000000}));
                pupil.position.z = 0.05; eye.add(pupil);
            }

            // DETAILED SMILE MESH (Starts Normal)
            const mouthMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 1, side: THREE.DoubleSide});
            // A semi-circle model (SMILE) on the head
            mouthMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.04, 32, 1, false, 0, Math.PI), mouthMat);
            mouthMesh.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouthMesh.position.set(0, 1.58, 0.28); head.add(mouthMesh);

            // Body (White Shirt)
            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
            shirt.position.y = 0.9; shirt.castShadow = true; playerBody.add(shirt);
            
            camera.position.set(0, 1.65, 0); // Camera at head height

            // --- THE ROOM ---
            const addObj = (w, h, d, x, y, z, col, solid=true) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: col, roughness: 0.8}));
                mesh.position.set(x, y, z); mesh.receiveShadow = true; mesh.castShadow = true;
                scene.add(mesh);
                if(solid) colliders.push(new THREE.Box3().setFromObject(mesh));
                return mesh;
            };

            // Wood detailed kitchen
            addObj(30, 0.1, 30, 0, 0, 0, 0x1a0f00, false); // Wood Floor
            addObj(20, 10, 0.5, 0, 5, -5, 0x110a00); // Back Wall
            addObj(10, 1, 2, 0, 0.5, -4, 0x0a0500); // Counter

            // --- THE MIRROR (Fixed) ---
            mirror = new THREE.Reflector(new THREE.PlaneGeometry(3.5, 2.5), {
                clipBias: 0.003, textureWidth: window.innerWidth * window.devicePixelRatio, textureHeight: window.innerHeight * window.devicePixelRatio, color: 0x777777
            });
            mirror.position.set(1.5, 2.8, -4.72); scene.add(mirror);

            // Fryer (PC Click Interaction Point)
            fryer = addObj(1.2, 0.3, 1.2, -1, 1.05, -4, 0x666666, false);
            
            // Anomalous Butter (Click point)
            butter = addBox(0.3, 0.3, 0.3, 1, 1.15, -4, 0x00ffcc, false);
            butter.material.emissive.set(0x00ffcc); butter.material.emissiveIntensity = 0.5;

            setupInput();
            animate();
        }

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true; document.getElementById('overlay').style.display = 'none';
                    if(isTouch) { 
                        document.getElementById('joy-base').style.display = 'block'; 
                        document.getElementById('mobile-e').style.display = 'flex';
                        document.getElementById('input-mode').innerText = "INPUT: MOBILE (TOUCH)";
                    }
                    else { 
                        document.body.requestPointerLock(); 
                        document.getElementById('input-mode').innerText = "INPUT: PC (MOUSE/KEY)";
                    }
                } else if (!isTouch) {
                    // PC & CHROMBOOK CLICK FUNCTIONALITY
                    // If you click while PointerLocked, and a click-target is active
                    interact();
                }
            };

            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase() === 'e') interact(); });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            
            // PC Look Controls (Fixed & Clamped Yaw/Pitch)
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                }
            });

            // "E" Button interaction point for mobile
            document.getElementById('mobile-e').addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                interact(); 
            });

            // Touch Look Controls (Fixed)
            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else if (t.target.id !== "mobile-e") { lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; }
                }
            });
            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 60) { dx *= 60/dist; dy *= 60/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 60; moveDir.z = dy / 60;
                    } 
                    if (t.identifier === lookTouchID) {
                        yaw -= (t.clientX - lastLookPos.x) * 0.005;
                        pitch -= (t.clientY - lastLookPos.y) * 0.005;
                        pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            });
            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
        }

        // --- INTERACTION LOGIC (Click and E) ---
        function interact() {
            if(!interactableObj) return;
            if(interactableObj === "Butter" && !heldItem) {
                heldItem = butter;
                document.getElementById('hold-status').innerText = "HOLDING: BUTTER";
            }
            if(interactableObj === "Fryer" && heldItem) {
                isCooking = true; heldItem = null;
                butter.position.set(-1, 1.3, -4);
                document.getElementById('hold-status').innerText = "FRYING...";
                document.getElementById('fry-ui').style.display = 'block';
            }
        }

        // --- AXIS-BY-AXIS COLLISION (SOLID PHYSICS) ---
        function checkCollisions(pos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(0.8, 1.8, 0.8));
            for(let box of colliders) if(playerBox.intersectsBox(box)) return true;
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            if (gameActive) {
                let smile = document.getElementById('smile-overlay');
                let minutes = time / 60;
                smile.style.opacity = Math.min(0.4, minutes * 0.15);
                smile.style.transform = `scale(${1 + minutes * 5})`;
                document.getElementById('timer').innerText = `SMILE: ${minutes.toFixed(2)}`;

                // --- SMILE DECAY PROTOCOL (Real-Time creep) ---
                if (minutes >= 3.00 && minutes < 5.00) {
                    // Phase 1: Smile widens unnaturally (model stretches)
                    mouthMesh.scale.x = 1.0 + (minutes - 3.0) * 1.5;
                }
                if (minutes >= 5.00) {
                    // Phase 2: Critical creep. Reached 5 mins.
                    mouthMesh.material.color.set(0xff0055); // Mouth turns neon red
                    mouthMesh.scale.x = 4.0;
                    
                    // Eyes start to rotate unnaturally (simulated with random rotation)
                    leftEye.rotation.z = Math.sin(time*10);
                    rightEye.rotation.z = Math.cos(time*10);
                    
                    document.getElementById('hud').style.color = "#ff0000";
                    pointLight.color.set(0xff0000);
                }

                // --- APPLY ROTATIONS (Correct independent look) ---
                playerGroup.rotation.y = yaw;
                camera.rotation.set(pitch, 0, 0);

                // --- MOVE LOGIC (Correct independent of look) ---
                let forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                let right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                let step = new THREE.Vector3();
                if(keys['w']) step.addScaledVector(forward, 7 * delta);
                if(keys['s']) step.addScaledVector(forward, -7 * delta);
                if(keys['a']) step.addScaledVector(right, -7 * delta);
                if(keys['d']) step.addScaledVector(right, 7 * delta);
                step.addScaledVector(forward, -moveDir.z * 7 * delta);
                step.addScaledVector(right, moveDir.x * 7 * delta);

                // FIXED SOLID MOVMENT (Can't ghost through fridge/counter)
                let nextX = playerGroup.position.clone().add(new THREE.Vector3(step.x, 0, 0));
                if(!checkCollisions(nextX)) playerGroup.position.x = nextX.x;
                let nextZ = playerGroup.position.clone().add(new THREE.Vector3(0, 0, step.z));
                if(!checkCollisions(nextZ)) playerGroup.position.z = nextPosZ.z;

                if(heldItem) {
                    heldItem.position.copy(playerGroup.position).add(forward.multiplyScalar(1.2));
                    heldItem.position.y = 1.4 + Math.sin(time*2.5)*0.04; // Hold sway
                }

                const dButter = playerGroup.position.distanceTo(butter.position);
                const dFryer = playerGroup.position.distanceTo(fryer.position);
                const cross = document.getElementById('crosshair');
                const prompt = document.getElementById('prompt-layer');
                
                // FIXED INTERACTION ZONE (PC Click + Mobile E)
                if (dButter < 3.0 && !heldItem) { 
                    interactableObj = "Butter"; cross.classList.add('active'); 
                    prompt.innerText = isTouch ? "TAP E TO TAKE" : "CLICK/E TO TAKE";
                }
                else if (dFryer < 3.0 && heldItem) { 
                    interactableObj = "Fryer"; cross.classList.add('active'); 
                    prompt.innerText = isTouch ? "TAP E TO USE" : "CLICK/E TO USE";
                }
                else { 
                    interactableObj = null; cross.classList.remove('active'); 
                    prompt.innerText = "";
                }

                if (isCooking) {
                    cookProgress += delta * 25;
                    document.getElementById('fry-bar').style.width = cookProgress + "%";
                    if (cookProgress >= 100) {
                        isCooking = false; cookProgress = 0;
                        document.getElementById('fry-ui').style.display = 'none';
                        document.getElementById('hold-status').innerText = "COOKED BUTTER";
                        heldItem = butter;
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
