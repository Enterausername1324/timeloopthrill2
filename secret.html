<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // ASCENSION_v17</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95); color: #00ffcc; z-index: 100; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 11px; text-shadow: 0 0 5px #00ffcc; }
        #joy-base { 
            position: absolute; bottom: 12%; left: 12%; width: 120px; height: 120px;
            border: 2px solid rgba(0,255,204,0.3); border-radius: 50%; display: none; background: rgba(0,255,204,0.05);
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px #00ffcc;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 12px; font-size: 3rem;">VORTEX_CORE</h1>
        <p>[ TAP_ANYWHERE_TO_INITIALIZE_ASCENSION_PROTOCOL ]</p>
    </div>

    <div id="hud">
        <div>SYS: OMNI_v17_STABLE</div>
        <div id="status">STATUS: CALM</div>
        <div id="horror-factor">HORROR_FACTOR: 0.000</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, cubeCamera, cubeRenderTarget;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        // Input & State
        let moveDir = { x: 0, z: 0 }, keys = {}, targetRot = { y: 0, x: 0 }, currentRot = { y: 0, x: 0 };
        let joyTouchID = null, lookTouchID = null, lastLookPos = { x: 0, y: 0 };
        let playerGroup, fridgeDoor, headMesh;
        
        // Progression
        let playTime = 0, fridgeOpen = false, currentHorrorFactor = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Reflection Engine (Required for v17 Horror)
            cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, { format: THREE.RGBFormat, generateMipmaps: true });
            cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
            cubeCamera.position.set(-3.9, 1.7, -4.9); // Mirror Position
            scene.add(cubeCamera);

            // --- BUILD THE HORRIFYING PUPPET ---
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5); // Start Position

            // Define Materials
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.2 }); // Skin Color: Yellow
            const clothesMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 }); // Stark black clothes

            // 1. Torso & Arms (Simple geometric clothes)
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.2, 1.1, 8), clothesMat);
            torso.position.y = 1.0; playerGroup.add(torso);
            const rArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.9, 8), skinMat);
            rArm.position.set(0.4, 1.1, 0); rArm.rotateZ(-0.2); playerGroup.add(rArm);
            const lArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.9, 8), skinMat);
            lArm.position.set(-0.4, 1.1, 0); lArm.rotateZ(0.2); playerGroup.add(lArm);

            // 2. THE GEOMETRIC HORROR HEAD (Requires Morph Targets)
            const headGeo = new THREE.SphereGeometry(0.25, 32, 32);
            // Internal Geometry for Morph (HORRIFYING GRIN)
            headGeo.morphAttributes.position = [];
            const positions = headGeo.attributes.position.array;
            const grinPositions = new Float32Array(positions.length);
            for (let i = 0; i < positions.length; i += 3) {
                let x = positions[i], y = positions[i+1], z = positions[i+2];
                if (z > 0.15 && y < 0) { // Target the mouth area
                    grinPositions[i] = x * 3;     // Distort horizontally (stretch face)
                    grinPositions[i+1] = y * 4;   // Distort vertically (pull chin down)
                    grinPositions[i+2] = z + 0.1; // Pull face out forward
                } else {
                    grinPositions[i] = x; grinPositions[i+1] = y; grinPositions[i+2] = z;
                }
            }
            headGeo.morphAttributes.position[0] = new THREE.Float32BufferAttribute(grinPositions, 3);
            
            headMesh = new THREE.Mesh(headGeo, skinMat);
            headMesh.position.y = 1.8;
            playerGroup.add(headMesh);
            
            // Add eye indents (to accentuate the crazy grin later)
            const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const eyeMat = new THREE.MeshStandardMaterial({color:0x111111});
            const rEye = new THREE.Mesh(eyeGeo, eyeMat); rEye.position.set(0.1, 0.05, 0.23); headMesh.add(rEye);
            const lEye = new THREE.Mesh(eyeGeo, eyeMat); lEye.position.set(-0.1, 0.05, 0.23); headMesh.add(lEye);

            // Add the main camera to the group (INVISIBLE TO SELF)
            playerGroup.add(camera);
            camera.position.y = 1.75; // Eye Level

            // Kitchen Build & Lighting (Preserved)
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
            const pL = new THREE.PointLight(0x00ffcc, 1, 30); pL.position.set(0, 5, 0); scene.add(pL);
            const createBox = (w,h,d,x,y,z,col) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col}));
                m.position.set(x,y,z); scene.add(m); return m;
            };
            createBox(100, 0.1, 100, 0, -0.05, 0, 0x111111);
            createBox(12, 5, 0.1, 0, 2.5, -5, 0x222222);
            // The Mirror (The only place you can see your own face)
            const mirror = new THREE.Mesh(new THREE.PlaneGeometry(3, 4), new THREE.MeshStandardMaterial({ envMap: cubeRenderTarget.
