<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // KITCHEN_v31</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #00ffcc; z-index: 1000; cursor: pointer; text-align: center; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 11px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1px solid rgba(0,255,204,0.4); }
        #crosshair.active { border: 2px double #ff00ff; width: 28px; height: 28px; box-shadow: 0 0 10px #ff00ff; }
        #joy-base { position: absolute; bottom: 60px; left: 60px; width: 110px; height: 110px; border: 2px solid #00ffcc; border-radius: 50%; display: none; z-index: 2000; background: rgba(0,255,204,0.1); }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 45px; height: 45px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); }
        #mobile-e { position: absolute; bottom: 60px; right: 60px; width: 80px; height: 80px; background: rgba(255,0,255,0.3); border: 2px solid #ff00ff; border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-size: 24px; z-index: 2000; font-weight: bold; }
        #fry-ui { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 150px; height: 10px; background: #111; border: 1px solid #ff00ff; display: none; }
        #fry-bar { width: 0%; height: 100%; background: #ff00ff; }
    </style>
</head>
<body>

    <div id="overlay"><h1>VORTEX_v31</h1><p>[ INITIALIZE_KITCHEN_CORE ]</p></div>
    <div id="hud"><div>v31_KITCHEN_RESTORED</div><div id="hold-status">EMPTY</div></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, fryer, butter, interactableObj = null;
        let heldItem = null, isCooking = false, cookProgress = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            // KITCHEN ASSETS
            scene.add(new THREE.GridHelper(100, 40, 0x333333, 0x111111));
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const pL = new THREE.PointLight(0xffffff, 1, 50); pL.position.set(0, 5, 0); scene.add(pL);

            const createBox = (w,h,d,x,y,z,col,name) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col}));
                m.position.set(x,y,z); m.name = name; scene.add(m); return m;
            };

            // Floor & Counter
            createBox(10, 0.1, 10, 0, -0.05, 0, 0x222222, "Floor");
            createBox(4, 1, 1.5, -2, 0.5, -3, 0x444444, "Counter");
            
            // The Fryer
            fryer = createBox(1.2, 0.8, 1.2, -2, 0.9, -3, 0x666666, "Fryer");
            
            // The Butter
            butter = createBox(0.3, 0.3, 0.3, 1, 1.15, -3, 0xFFD700, "Butter");

            setupInput();
            animate();
        }

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    if(isTouch) { 
                        document.getElementById('joy-base').style.display = 'block'; 
                        document.getElementById('mobile-e').style.display = 'flex'; 
                    } else document.body.requestPointerLock();
                }
            };

            const interact = () => {
                if(!interactableObj) return;
                if(interactableObj === "Butter" && !heldItem) {
                    heldItem = butter;
                    document.getElementById('hold-status').innerText = "HOLDING: BUTTER";
                }
                if(interactableObj === "Fryer" && heldItem) {
                    isCooking = true; heldItem = null;
                    butter.position.set(-2, 1.1, -3);
                    document.getElementById('hold-status').innerText = "COOKING...";
                    document.getElementById('fry-ui').style.display = 'block';
                }
            };

            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { 
                keys[e.key.toLowerCase()] = true; 
                if(e.key.toLowerCase() === 'e') interact();
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    targetRot.y -= e.movementX * 0.003;
                    targetRot.x -= e.movementY * 0.003;
                }
            });

            // Touch (Protected Zones)
            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else { lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; }
                }
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 55), dy = t.clientY - (rect.top + 55);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 55) { dx *= 55/dist; dy *= 55/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 55; moveDir.z = dy / 55;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.007;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.007;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });

            document.getElementById('mobile-e').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if (gameActive) {
                currentRot.y += (targetRot.y - currentRot.y) * 0.2;
                currentRot.x += (targetRot.x - currentRot.x) * 0.2;
                camera.rotation.y = currentRot.y;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();

                let speed = 7.5;
                if(keys['w']) playerGroup.position.addScaledVector(f, speed * delta);
                if(keys['s']) playerGroup.position.addScaledVector(f, -speed * delta);
                if(keys['a']) playerGroup.position.addScaledVector(r, -speed * delta);
                if(keys['d']) playerGroup.position.addScaledVector(r, speed * delta);
                
                playerGroup.position.addScaledVector(f, -moveDir.z * speed * delta);
                playerGroup.position.addScaledVector(r, moveDir.x * speed * delta);

                if(heldItem) {
                    heldItem.position.copy(playerGroup.position);
                    heldItem.position.add(f.multiplyScalar(0.9));
                    heldItem.position.y = 1.3;
                }

                // Cursor Detection (Stable Distance)
                let distToButter = playerGroup.position.distanceTo(butter.position);
                let distToFryer = playerGroup.position.distanceTo(fryer.position);
                const cross = document.getElementById('crosshair');
                
                if (distToButter < 3.0) { interactableObj = "Butter"; cross.classList.add('active'); }
                else if (distToFryer < 3.0) { interactableObj = "Fryer"; cross.classList.add('active'); }
                else { interactableObj = null; cross.classList.remove('active'); }

                if (isCooking) {
                    cookProgress += delta * 25;
                    document.getElementById('fry-bar').style.width = cookProgress + "%";
                    if (cookProgress >= 100) {
                        isCooking = false; cookProgress = 0;
                        document.getElementById('fry-ui').style.display = 'none';
                        document.getElementById('hold-status').innerText = "READY!";
                        heldItem = butter;
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
