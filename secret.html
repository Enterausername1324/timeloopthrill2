<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 54.0_ULTRA_FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; cursor: pointer; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #bar-box { width: 200px; height: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); display: none; margin-top: 10px; border-radius: 4px; overflow: hidden; }
        #bar-fill { height: 100%; width: 0%; background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        #label { color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px #000; }
        #joystick-wrapper { position: absolute; bottom: 50px; left: 50px; width: 80px; height: 80px; background: rgba(255,255,255,0.05); border-radius: 50%; display: none; border: 1px solid rgba(255,255,255,0.2); }
        #joystick-stick { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: #fff; border-radius: 50%; opacity: 0.3; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1 style="font-weight: 200; letter-spacing: 10px;">VORTEX</h1>
    <p style="font-size: 10px; opacity: 0.5;">[ VERSION 54.0 // REALISM_PATCH ]</p>
</div>

<div id="ui">
    <div id="label">SYSTEM READY</div>
    <div id="bar-box"><div id="bar-fill"></div></div>
</div>
<div id="joystick-wrapper"><div id="joystick-stick"></div></div>

<script>
let scene, camera, renderer, clock, player, head, fridgeDoor, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null;
let keys = {}, butters = [], isMobile = false;
let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
let touchLook = { active: false, lastX: 0, lastY: 0 };

const STAGES = [0xfff0ad, 0xffe066, 0xffcc00, 0x8b4513, 0x331100, 0x000000];
const LABELS = ["FRESH", "WARM", "SIZZLE", "GOLDEN", "BURNT", "VOID"];

// IMPROVED TEXTURE GEN (Tiling fixed)
function createTexture(c1, c2, type) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = c1;
    ctx.fillRect(0,0,512,512);
    
    for(let i=0; i<2000; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? c1 : c2;
        let w = type === 'brushed' ? 64 : 4;
        let h = type === 'brushed' ? 1 : 4;
        ctx.globalAlpha = 0.2;
        ctx.fillRect(Math.random()*512, Math.random()*512, w, h);
    }
    
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
}

const tSteel = createTexture('#888', '#aaa', 'brushed');
const tGranite = createTexture('#111', '#333', 'noise');
const tWall = createTexture('#1a1a1a', '#111', 'noise');

function setup() { 
    active = true; 
    document.getElementById('overlay').style.display = 'none'; 
    if(!isMobile) document.body.requestPointerLock();
}

function init() {
    isMobile = ('ontouchstart' in window);
    if(isMobile) document.getElementById('joystick-wrapper').style.display = 'block';

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 6);

    // Player Head
    head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00, metalness: 0.8, roughness: 0.1}));
    head.position.y = 1.65; player.add(head);

    // Environment
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(30,30), new THREE.MeshStandardMaterial({color: 0x080808, roughness: 0.1, metalness: 0.2}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);

    const room = new THREE.Mesh(new THREE.BoxGeometry(20, 12, 20), new THREE.MeshStandardMaterial({map: tWall, side: THREE.BackSide}));
    room.position.y = 6; scene.add(room);

    // Realistic Fridge
    const fridge = new THREE.Group(); fridge.position.set(-6, 0, -6); scene.add(fridge);
    const fBody = new THREE.Mesh(new THREE.BoxGeometry(3, 6, 2.5), new THREE.MeshStandardMaterial({map: tSteel, metalness: 0.9, roughness: 0.3}));
    fBody.position.y = 3; fridge.add(fBody);
    
    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(1.5, 3, 1.25); fridge.add(fridgeDoor);
    const dMesh = new THREE.Mesh(new THREE.BoxGeometry(3, 6, 0.2), new THREE.MeshStandardMaterial({map: tSteel, metalness: 0.9, roughness: 0.3}));
    dMesh.position.set(-1.5, 0, 0); dMesh.name = "fridge_door"; fridgeDoor.add(dMesh);

    // Butter Arrangement (6 Blocks)
    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0xfff0ad, roughness: 0.3, emissive: 0x443300, emissiveIntensity: 0.2}));
        b.position.set((i%2)*0.8 - 0.4, 1.5 + (Math.floor(i/3)*2), 0.5);
        b.name = "butter"; b.userData.cookTime = 0; fridge.add(b); butters.push(b);
    }

    // Granite Countertop
    const counter = new THREE.Mesh(new THREE.BoxGeometry(10, 1.2, 3), new THREE.MeshStandardMaterial({map: tGranite, roughness: 0.05}));
    counter.position.set(2, 0.6, -5.5); scene.add(counter);

    // Fryer
    const fryer = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1, 1.8), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 1, roughness: 0.2}));
    fryer.position.set(4, 1.1, -5.5); fryer.name = "fryer"; scene.add(fryer);

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.2));
    const pL1 = new THREE.PointLight(0xffffff, 1.5, 40); pL1.position.set(0, 10, 5); scene.add(pL1);
    const pL2 = new THREE.PointLight(0x5588ff, 0.5, 20); pL2.position.set(-8, 5, -8); scene.add(pL2);

    // Mirror
    const mirror = new THREE.Reflector(new THREE.PlaneGeometry(5, 4), { color: 0x777777 });
    mirror.position.set(2, 3.5, -6.9); scene.add(mirror);

    // Inputs
    window.addEventListener('touchstart', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) { joy.active = true; joy.startX = t.clientX; joy.startY = t.clientY; }
            else { touchLook.active = true; touchLook.lastX = t.clientX; touchLook.lastY = t.clientY; doInteract(); }
        }
    });
    window.addEventListener('touchmove', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(joy.active) {
                let dx = t.clientX - joy.startX, dy = t.clientY - joy.startY;
                joy.x = Math.max(-1, Math.min(1, dx/50)); joy.y = Math.max(-1, Math.min(1, dy/50));
                document.getElementById('joystick-stick').style.transform = `translate(${joy.x*25}px, ${joy.y*25}px)`;
            } else if(touchLook.active) {
                yaw -= (t.clientX - touchLook.lastX) * 0.005;
                pitch -= (t.clientY - touchLook.lastY) * 0.005;
                touchLook.lastX = t.clientX; touchLook.lastY = t.clientY;
            }
        }
    });
    window.addEventListener('touchend', () => { joy.active = false; joy.x = joy.y = 0; touchLook.active = false; document.getElementById('joystick-stick').style.transform = `translate(0,0)`; });
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => delete keys[e.code]);
    window.addEventListener('mousemove', e => { if(document.pointerLockElement === document.body) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; }});
    window.addEventListener('mousedown', () => { if(active && !isMobile) doInteract(); });

    animate();
}

function doInteract() {
    const r = new THREE.Raycaster();
    r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let obj = hits[0].object;
        if(heldItem) {
            if(obj.name === "fryer") {
                cookingButter = heldItem; scene.attach(heldItem); heldItem.position.set(4, 1.6, -5.5); heldItem = null;
                document.getElementById('bar-box').style.display = "block";
            } else { scene.attach(heldItem); heldItem.position.y = 0.2; heldItem = null; }
        } else {
            if(obj.name === "butter") { 
                heldItem = obj; player.add(heldItem); heldItem.position.set(0.6, 1.2, -1);
                if(heldItem === cookingButter) { cookingButter = null; document.getElementById('bar-box').style.display = "none"; }
            } else if(obj.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta(), t = clock.getElapsedTime();
    if(active) {
        player.rotation.y = yaw;
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        camera.position.set(player.position.x, 1.65, player.position.z);
        fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.6 : 0, 0.1);

        // Subtler Proportion Jitter
        if(t > 15) { head.scale.x = 1 + Math.sin(t)*0.1; head.scale.z = 1 + Math.cos(t)*0.1; }

        if(cookingButter) {
            cookingButter.userData.cookTime += dt;
            let p = Math.min(cookingButter.userData.cookTime / 30, 1.0);
            let s = Math.floor(p*5.99);
            cookingButter.material.color.set(STAGES[s]);
            cookingButter.material.emissiveIntensity = p > 0.5 ? p : 0.2;
            document.getElementById('bar-fill').style.width = (p*100)+"%";
            document.getElementById('label').innerText = LABELS[s];
        }

        let mZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0) + joy.y;
        let mX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0) + joy.x;
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, mZ * 4.5 * dt);
        player.position.addScaledVector(side, mX * 4.5 * dt);
    }
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
