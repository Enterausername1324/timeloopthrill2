<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // REALISM_v43</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        :root { --neon: #00ffcc; --horror: #ff0055; }
        body { margin: 0; background: #010101; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #smile-overlay { position: absolute; bottom: -50px; right: -50px; width: 250px; height: 250px; background: radial-gradient(circle, rgba(255,0,85,0.08) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; opacity: 0; pointer-events: none; z-index: 5000; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; cursor: pointer; text-shadow: 0 0 10px #fff; }
        #hud { position: absolute; top: 20px; left: 20px; color: #888; pointer-events: none; z-index: 10; font-size: 11px; line-height: 1.4; text-transform: uppercase; }
        #prompt-layer { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); color: var(--neon); font-size: 16px; pointer-events: none; z-index: 15; text-align: center; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1.5px solid rgba(255,255,255,0.3); }
        #crosshair.active { border: 2.5px solid var(--neon); box-shadow: 0 0 15px var(--neon); transform: translate(-50%, -50%) rotate(45deg); }
        #mobile-e { position: absolute; bottom: 50px; right: 50px; width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 2px solid #fff; border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-size: 28px; z-index: 2000; cursor: pointer; }
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; border: 1px solid #444; border-radius: 50%; display: none; z-index: 2000; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.15; }
        #fry-ui { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 220px; height: 4px; background: #111; border: 1px solid var(--neon); display: none; }
        #fry-bar { width: 0%; height: 100%; background: var(--neon); }
    </style>
</head>
<body>

    <div id="smile-overlay"></div>
    <div id="overlay"><h1>VORTEX_REALISM_v43</h1><p>[TAP/CLICK TO REIFY INTERIOR]</p></div>
    <div id="hud"><div>INCARNATION: COMPLETE (v1.5)</div><div id="timer">SMILE: 0.00</div><div id="hold-status">EMPTY</div></div>
    <div id="prompt-layer"></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, playerBody, mirrorReflector, eyesGroup, mouthMesh;
        let butter, fryer, pointLight, mainLight, fog;
        let heldItem = null, isCooking = false, cookProgress = 0, interactableObj = null;
        let colliders = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            fog = new THREE.FogExp2(0x010101, 0.12);
            scene.fog = fog;

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Enables high-quality shadows
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 7);
            
            // --- DETAILED CHARACTER (Yellow, White Shirt) ---
            playerBody = new THREE.Group();
            playerGroup.add(playerBody);

            // Detailed Materials
            const skinMat = new THREE.MeshStandardMaterial({color: 0xEEBB00, roughness: 0.4, metalness: 0.1}); // Yellow Skin
            const shirtMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.9}); // White Shirt

            // Head (Anatomical Sphere)
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), skinMat);
            head.position.y = 1.75; head.castShadow = true; playerBody.add(head);

            // Detailed Eyes (v1.5)
            eyesGroup = new THREE.Group(); head.add(eyesGroup);
            for(let i=0; i<2; i++) {
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), new THREE.MeshStandardMaterial({color: 0xffffff}));
                eye.position.set(i==0?-0.1:0.1, 0, 0.25);
                const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), new THREE.MeshStandardMaterial({color: 0x000000}));
                pupil.position.set(0, 0, 0.05); eye.add(pupil);
                eyesGroup.add(eye);
            }

            // Detailed Mouth (3D model, not texture)
            mouthMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x330000}));
            mouthMesh.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouthMesh.position.set(0, -0.15, 0.25); head.add(mouthMesh);

            // Detailed Torso (Cylinder shirt with taper)
            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.3, 1, 32), shirtMat);
            shirt.position.y = 1.05; shirt.castShadow = true; playerBody.add(shirt);
            
            playerGroup.add(camera);
            camera.position.set(0, 1.75, 0.15); // Adjust camera for correct reflection alignment

            // --- HIGH-FIDELITY LIGHTING ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.1)); // Dimmish Ambient
            mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 8, 2); mainLight.castShadow = true; scene.add(mainLight);
            
            pointLight = new THREE.PointLight(0xffffff, 1.5, 30); // Realistic overhead flickering point
            pointLight.position.set(0, 5, 0); pointLight.castShadow = true; scene.add(pointLight);

            // --- PHOTOREALISTIC KITCHEN MAPS ---
            const addBox = (w, h, d, x, y, z, mat, solid=true) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
                mesh.position.set(x, y, z); mesh.castShadow = true; mesh.receiveShadow = true;
                scene.add(mesh);
                if(solid) colliders.push(new THREE.Box3().setFromObject(mesh));
                return mesh;
            };

            // Material Definitions
            const floorMat = new THREE.MeshStandardMaterial({color: 0x333333, roughness: 0.9, metalness: 0.1}); // Dark Tiles
            const wallWoodMat = new THREE.MeshStandardMaterial({color: 0x221100, roughness: 0.8}); // Wall Wood Grain
            const counterWoodMat = new THREE.MeshStandardMaterial({color: 0x1a1a1a, roughness: 0.7}); // Counter Wood Grain
            const steelMat = new THREE.MeshStandardMaterial({color: 0x888888, roughness: 0.2, metalness: 0.9}); // Brushed Steel
            const washerMat = new THREE.MeshStandardMaterial({color: 0xeeeeee, roughness: 0.9}); // Clean White
            const waterMat = new THREE.MeshStandardMaterial({color: 0x00ccff, transparent:true, opacity:0.3, metalness:0.9}); // Water

            addBox(30, 0.1, 30, 0, 0, 0, floorMat, false); // Floor
            addBox(20, 10, 0.5, 0, 5, -5, wallWoodMat); // Back Wall
            addBox(0.5, 10, 20, -10, 5, 0, wallWoodMat); // Left Wall

            // --- DETAILED COUNTER & SINK ---
            addBox(12, 1, 2, 0, 0.5, -4, counterWoodMat); // Main Wood Counter
            
            // Sink basin (using subtraction geometry simulated with mesh)
            addBox(2, 0.5, 1.2, 3, 0.8, -4, floorMat);
            const water = addBox(1.9, 0.1, 1.1, 3, 0.95, -4, waterMat, false);

            // --- THE MIRROR (Fixed Reflection) ---
            mirrorReflector = new THREE.Reflector(new THREE.PlaneGeometry(3.5, 2.5), {
                clipBias: 0.003, textureWidth: window.innerWidth * window.devicePixelRatio, textureHeight: window.innerHeight * window.devicePixelRatio, color: 0x777777
            });
            mirrorReflector.position.set(2, 2.9, -4.73); scene.add(mirrorReflector);

            // --- APPLIANCES (Realistic Materials) ---
            addBox(2, 4, 1.8, -5, 2, -4, steelMat); // Fridge
            addBox(1.8, 1.8, 1.8, 5, 0.9, -4, washerMat); // Washer
            const door = addBox(1.5, 1.5, 0.1, 5, 1.0, -3.1, new THREE.MeshStandardMaterial({color:0x000000, transparent:true, opacity:0.5}), false); // Washer Door

            fryer = addBox(1.5, 0.5, 1.5, -1, 1.0, -4, steelMat, false); // Steel Fryer

            // Anomalous Butter (Glowing Refractive block)
            butter = addBox(0.4, 0.4, 0.4, 1.5, 1.2, -4, new THREE.MeshStandardMaterial({color:0x00ffcc, emissive:0x00ffcc, emissiveIntensity:1, transparent:true, opacity:0.6}), false);

            setupInput();
            animate();
        }

        // --- INTERACTION LOGIC (PC CLICK/Tap) ---
        function interact() {
            if(!interactableObj) return;
            if(interactableObj === "Butter" && !heldItem) {
                heldItem = butter;
                document.getElementById('hold-status').innerText = "HOLDING: ITEM";
            }
            if(interactableObj === "Fryer" && heldItem) {
                isCooking = true; heldItem = null;
                butter.position.set(-1, 1.35, -4);
                document.getElementById('hold-status').innerText = "VORTEX_FRYING...";
                document.getElementById('fry-ui').style.display = 'block';
            }
        }

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    if(isTouch) {
                        document.getElementById('joy-base').style.display = 'block';
                        document.getElementById('mobile-e').style.display = 'flex';
                    } else {
                        document.body.requestPointerLock();
                    }
                } else if (!isTouch) {
                    interact(); // LEFT CLICK INTERACT
                }
            };

            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { 
                keys[e.key.toLowerCase()] = true; 
                if(e.key.toLowerCase() === 'e') interact();
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    targetRot.y -= e.movementX * 0.0025;
                    targetRot.x -= e.movementY * 0.0025;
                }
            });

            document.getElementById('mobile-e').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });

            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else if (t.target.id !== "mobile-e") { 
                        lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; 
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 60) { dx *= 60/dist; dy *= 60/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 60; moveDir.z = dy / 60;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.007;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.007;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
        }

        function checkCollisions(pos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(0.8, 1.8, 0.8));
            for(let box of colliders) { if(playerBox.intersectsBox(box)) return true; }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            if (gameActive) {
                // LIGHT FLICKER (Realistic overhead)
                pointLight.intensity = 1.6 + Math.sin(time * 15) * 0.7 + (Math.random() * 0.4);

                let smile = document.getElementById('smile-overlay');
                let minutes = time / 60;
                smile.style.opacity = Math.min(0.5, minutes * 0.2);
                smile.style.transform = `scale(${1 + minutes * 5})`;
                document.getElementById('timer').innerText = `SMILE: ${minutes.toFixed(2)}`;

                // --- SMILE DECAY PROTOCOL (Real-Time Distortion) ---
                if (minutes >= 3.00 && minutes < 5.00) {
                    let d = (minutes - 3.0) * 0.6;
                    mouthMesh.scale.x = 1 + d; // Mouth gets wide
                    eyesGroup.children[0].position.y = -d; // Eyes start to separate vertically
                    eyesGroup.children[1].position.y = d;
                }
                if (minutes >= 5.00) {
                    // Reached critical creep level
                    mouthMesh.material.color.set(0xff0055); // Mouth turns red
                    pointLight.color.set(0xff0055); mainLight.color.set(0xff0055); fog.color.set(0xff0055);
                    scene.background.set(0x050002);
                    
                    // --- MIRROR FRACTURE (Fixed) ---
                    // High-distortion crack effect simulated with opacity flicker
                    mirrorReflector.material.opacity = 0.3 + (Math.sin(time*20)*0.5); 
                }

                currentRot.y += (targetRot.y - currentRot.y) * 0.15;
                currentRot.x += (targetRot.x - currentRot.x) * 0.15;
                
                // Separate Body and Camera logic for fixed reflection
                playerBody.rotation.y = currentRot.y;
                camera.rotation.set(Math.max(-1.4, Math.min(1.4, currentRot.x)), 0, 0);

                let f = new THREE.Vector3(0,0,-1).applyQuaternion(playerBody.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(playerBody.quaternion); r.y = 0; r.normalize();

                let speed = 7.5;
                let step = new THREE.Vector3();
                if(keys['w']) step.addScaledVector(f, speed * delta);
                if(keys['s']) step.addScaledVector(f, -speed * delta);
                if(keys['a']) step.addScaledVector(r, -speed * delta);
                if(keys['d']) step.addScaledVector(r, speed * delta);
                step.addScaledVector(f, -moveDir.z * speed * delta);
                step.addScaledVector(r, moveDir.x * speed * delta);

                let nextPosX = playerGroup.position.clone().add(new THREE.Vector3(step.x, 0, 0));
                if(!checkCollisions(nextPosX)) playerGroup.position.x = nextPosX.x;
                let nextPosZ = playerGroup.position.clone().add(new THREE.Vector3(0, 0, step.z));
                if(!checkCollisions(nextPosZ)) playerGroup.position.z = nextPosZ.z;

                if(heldItem) {
                    heldItem.position.copy(playerGroup.position);
                    heldItem.position.add(f.multiplyScalar(1.2));
                    heldItem.position.y = 1.45 + Math.sin(time*3)*0.06;
                }

                let dButter = playerGroup.position.distanceTo(butter.position);
                let dFryer = playerGroup.position.distanceTo(fryer.position);
                const cross = document.getElementById('crosshair');
                const prompt = document.getElementById('prompt-layer');
                
                if (dButter < 3.0 && !heldItem) { 
                    interactableObj = "Butter"; cross.classList.add('active'); 
                    prompt.innerText = isTouch ? "TAP BUTTER" : "CLICK BUTTER";
                }
                else if (dFryer < 3.0 && heldItem) { 
                    interactableObj = "Fryer"; cross.classList.add('active'); 
                    prompt.innerText = isTouch ? "TAP FRYER" : "CLICK FRYER";
                }
                else { 
                    interactableObj = null; cross.classList.remove('active'); 
                    prompt.innerText = "";
                }

                if (isCooking) {
                    cookProgress += delta * 25;
                    document.getElementById('fry-bar').style.width = cookProgress + "%";
                    if (cookProgress >= 100) {
                        isCooking = false; cookProgress = 0;
                        document.getElementById('fry-ui').style.display = 'none';
                        heldItem = butter;
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
