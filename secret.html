<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX // REAL_KITCHEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; text-align: center; background: rgba(0,0,0,0.9);
            padding: 30px; border: 2px solid #00ffcc; z-index: 20;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            border: 1px solid #00ffcc; border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h1 style="letter-spacing: 5px;">KITCHEN_SIM_v3</h1>
        <p>CLICK TO ENTER ENVIRONMENT</p>
        <p>WASD to Move | Mouse to Look</p>
    </div>

    <div id="hud">
        <div style="font-size: 1.5rem; margin-bottom: 10px;">> SECTOR: DOMESTIC_ZONE_01</div>
        <div id="status">OBJECTIVE: LOCATE_BUTTER</div>
    </div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 0, 30);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.7, 5); // Eye level

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // --- LIGHTING ---
            const ceilingLight = new THREE.RectAreaLight(0xffffff, 2, 10, 10);
            ceilingLight.position.set(0, 4, 0);
            ceilingLight.lookAt(0, 0, 0);
            scene.add(ceilingLight);
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);

            // --- ENVIRONMENT BUILDER ---
            
            // 1. FLOOR (Large Tiled Floor)
            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.2 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 2. COUNTERTOP SYSTEM (L-Shape)
            const createCounter = (w, h, d, x, y, z) => {
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshStandardMaterial({ color: 0x222222 }); // Dark Granite
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, y, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
            };
            createCounter(6, 0.9, 1, 0, 0.45, -3); // Main Counter
            createCounter(1, 0.9, 4, -2.5, 0.45, -1); // Side Counter

            // 3. THE STOVE (Embedded)
            const stoveGeo = new THREE.BoxGeometry(1.2, 0.05, 0.8);
            const stoveMat = new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 1, roughness: 0 });
            const stove = new THREE.Mesh(stoveGeo, stoveMat);
            stove.position.set(0, 0.92, -3);
            scene.add(stove);

            // Stove Burners (4 Red Glowing Rings)
            for(let i=0; i<4; i++) {
                const burnerGeo = new THREE.TorusGeometry(0.15, 0.01, 16, 32);
                const burnerMat = new THREE.MeshBasicMaterial({ color: 0xff3300 });
                const burner = new THREE.Mesh(burnerGeo, burnerMat);
                burner.rotation.x = Math.PI/2;
                burner.position.set(i < 2 ? -0.3 : 0.3, 0.93, i % 2 === 0 ? -3.2 : -2.8);
                scene.add(burner);
            }

            // 4. THE REFRIGERATOR (Stainless Steel)
            const fridgeGeo = new THREE.BoxGeometry(1.2, 2.2, 1.2);
            const fridgeMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
            const fridge = new THREE.Mesh(fridgeGeo, fridgeMat);
            fridge.position.set(2.4, 1.1, -2.9);
            scene.add(fridge);

            // 5. UPPER CABINETS
            const cabGeo = new THREE.BoxGeometry(6, 0.8, 0.4);
            const cabMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const cab = new THREE.Mesh(cabGeo, cabMat);
            cab.position.set(0, 2.2, -3.3);
            scene.add(cab);

            // 6. THE PAN & BUTTER
            const panGeo = new THREE.CylinderGeometry(0.4, 0.35, 0.1, 32);
            const panMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5 });
            const pan = new THREE.Mesh(panGeo, panMat);
            pan.position.set(0, 1.0, -3);
            scene.add(pan);

            const butterGeo = new THREE.BoxGeometry(0.2, 0.1, 0.2);
            const butterMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
            const butter = new THREE.Mesh(butterGeo, butterMat);
            butter.position.set(0, 1.1, -3);
            scene.add(butter);

            // --- CONTROLS ---
            document.addEventListener('keydown', (e) => toggleKey(e.code, true));
            document.addEventListener('keyup', (e) => toggleKey(e.code, false));
            document.getElementById('instructions').addEventListener('click', () => document.body.requestPointerLock());

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                }
            });

            animate();
        }

        function toggleKey(code, isDown) {
            if (code === 'KeyW') moveForward = isDown;
            if (code === 'KeyS') moveBackward = isDown;
            if (code === 'KeyA') moveLeft = isDown;
            if (code === 'KeyD') moveRight = isDown;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (document.pointerLockElement) {
                document.getElementById('instructions').style.display = 'none';
                
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

                camera.translateX(-velocity.x * delta);
                camera.translateZ(velocity.z * delta);
                camera.position.y = 1.7; // Eye level lock
            } else {
                document.getElementById('instructions').style.display = 'block';
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
