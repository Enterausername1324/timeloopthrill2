<script>
    // THE PHYSICAL SMILE LOGIC
    // Inside the character init:
    const mouthGeom = new THREE.CylinderGeometry(0.1, 0.1, 0.05, 32);
    const mouthMat = new THREE.MeshBasicMaterial({color: 0x000000});
    mouth = new THREE.Mesh(mouthGeom, mouthMat);
    
    // Positioned horizontally across the face
    mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
    mouth.position.set(0, 1.6, 0.32); 
    head.add(mouth);

    // Inside the animate() loop:
    let t = clock.getElapsedTime();
    if(t > 5) { 
        // This math stretches the black bar wider and wider
        mouth.scale.x = 1 + (t-5) * 0.5; 
        // This pushes it forward slightly so it doesn't sink into the head
        mouth.position.z = 0.32 + (t-5) * 0.005; 
    }
</script>
