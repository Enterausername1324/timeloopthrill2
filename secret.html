<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Area</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-box {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ffcc;
            padding: 30px;
            border-radius: 15px;
            margin-top: 25px;
            box-shadow: 0 0 20px #00ffcc;
            text-align: center;
        }
        .search-input {
            width: 90%;
            padding: 15px;
            background: #000;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            outline: none;
            margin-bottom: 20px;
        }
        .search-button {
            padding: 15px 40px;
            background: #00ffcc;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .search-button:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }
    </style>
</head>

<body class="secret-body">

    <div class="secret-container">
        <h1 class="secret-title">VORTEX TERMINAL</h1>
        
        <div class="search-box">
            <input type="text" id="proxyUrl" class="search-input" placeholder="Enter URL (e.g. discord.com)">
            <br>
            <button onclick="launchRammerhead()" class="search-button">LAUNCH STEALTH</button>
            <p style="font-size: 0.7em; color: #444; margin-top: 15px;">Press [P] to Panic | Press [H] to Mask History</p>
        </div>

        <a href="index.html" class="secret-back" style="margin-top: 30px; display: block;">Return to Home</a>
    </div>

    <script>
        function launchRammerhead() {
            const val = document.getElementById('proxyUrl').value;
            if (!val) return;

            // 1. Clean the URL
            let target = val.trim();
            if (!target.startsWith('http')) {
                target = 'https://' + target;
            }

            // 2. Set your active Rammerhead Mirror here
            // Note: These change often. Replace this URL if it gets blocked.
            const rammerheadMirror = "https://rhead-mirror-example.com/main/";
            const finalDestination = rammerheadMirror + target;

            // 3. Create the about:blank stealth window
            const win = window.open('about:blank', '_blank');
            if (win) {
                const doc = win.document;
                doc.title = "New Tab"; // Disguise the tab title
                
                const iframe = doc.createElement('iframe');
                iframe.src = finalDestination;
                iframe.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden;";
                
                doc.body.style.margin = "0";
                doc.body.appendChild(iframe);
            }
        }

        // Global Panic & History Keys
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p') { // Panic
                document.title = "My Drive - Google Drive";
                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.rel = 'shortcut icon';
                link.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
                document.getElementsByTagName('head')[0].appendChild(link);
                document.body.innerHTML = "<div style='background:white; height:100vh; padding:50px;'><h1 style='color:#5f6368; font-family:sans-serif;'>Loading...</h1></div>";
            }
            if (e.key.toLowerCase() === 'h') { // History Mask
                for (let i = 0; i < 30; i++) {
                    window.history.pushState({}, "", "/google-classroom-login?id=" + Math.random());
                }
                alert("History Masked.");
            }
        });
    </script>
</body>
</html>
