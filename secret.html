<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // ATOMIC_47.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            background: #000; color: #fff; z-index: 10000; cursor: pointer; font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="overlay" id="starter"><h1>CLICK TO ENGAGE ENGINE</h1></div>

    <script>
        let scene, camera, renderer, clock;
        let keys = {}, active = false, yaw = 0, pitch = 0;
        let player, body, mouth, pointLight;

        function init() {
            scene = new THREE.Scene();
            // Near clip 0.2 is the v45 "No-Shirt" fix
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Structure
            player = new THREE.Group();
            scene.add(player);
            player.position.set(0, 0, 7);

            body = new THREE.Group();
            player.add(body);
            body.position.z = -0.2;

            // Character
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            head.position.y = 1.65; body.add(head);
            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouth.position.set(0, 1.6, 0.28); head.add(mouth);

            // World
            const floor = new THREE.Mesh(new THREE.BoxGeometry(40, 0.1, 40), new THREE.MeshStandardMaterial({color: 0x3a2a1a}));
            scene.add(floor);
            const counter = new THREE.Mesh(new THREE.BoxGeometry(10, 1, 2), new THREE.MeshStandardMaterial({color: 0x4a3a2a}));
            counter.position.set(0, 0.5, -4); scene.add(counter);

            pointLight = new THREE.PointLight(0xffaa44, 2, 20);
            pointLight.position.set(0, 4, -2); scene.add(pointLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));

            // --- THE CRITICAL INPUT BINDING ---
            const canvas = renderer.domElement;

            document.getElementById('overlay').addEventListener('click', () => {
                canvas.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === canvas) {
                    active = true;
                    document.getElementById('overlay').style.display = 'none';
                } else {
                    active = false;
                    document.getElementById('overlay').style.display = 'flex';
                }
            });

            // Listen directly to the window but handle with simple velocity
            window.addEventListener('keydown', (e) => { keys[e.code || e.keyCode] = true; });
            window.addEventListener('keyup', (e) => { keys[e.code || e.keyCode] = false; });
            
            window.addEventListener('mousemove', (e) => {
                if (active) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!active) return;
            
            let dt = clock.getDelta();
            player.rotation.y = yaw;
            camera.rotation.x = pitch;

            // Simple movement check
            let speed = 6.0;
            let x = 0, z = 0;
            if (keys['KeyW'] || keys[87]) z -= 1;
            if (keys['KeyS'] || keys[83]) z += 1;
            if (keys['KeyA'] || keys[65]) x -= 1;
            if (keys['KeyD'] || keys[68]) x += 1;

            if (x !== 0 || z !== 0) {
                let fwd = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).multiplyScalar(z);
                let side = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).multiplyScalar(x);
                player.position.x += (fwd.x + side.x) * speed * dt;
                player.position.z += (fwd.z + side.z) * speed * dt;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
