\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // REAL_KITCHEN_v12</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #020202; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95); color: #00ffcc; z-index: 100; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 12px; text-shadow: 0 0 5px #00ffcc; }
        #joy-base { 
            position: absolute; bottom: 10%; left: 10%; width: 120px; height: 120px;
            border: 2px solid #00ffcc; border-radius: 50%; display: none; background: rgba(0,255,204,0.05);
            box-shadow: inset 0 0 20px rgba(0,255,204,0.2);
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px #00ffcc;
        }
        /* Reactive Crosshair */
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 1px solid rgba(0, 255, 204, 0.5); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 20; 
            transition: all 0.1s ease-out;
        }
        #crosshair.active {
            width: 20px; height: 20px;
            border-width: 2px;
            border-color: #ff00ff; /* Interaction Highlight Color */
            box-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 10px; font-size: 3rem;">VORTEX_OS</h1>
        <p>[ TAP_ANYWHERE_TO_LOAD_KITCHEN_v12 ]</p>
    </div>

    <div id="hud">
        <div>CORE: v12_STABLE</div>
        <div id="status">STATUS: INITIALIZED</div>
        <div id="item">HELD_ITEM: NONE</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, textureLoader, raycaster;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let moveDir = { x: 0, z: 0 }, keys = {}, targetRot = { y: 0, x: 0 }, currentRot = { y: 0, x: 0 }, lastTouch = { x: 0, y: 0 };
        let fridgeGroup, fridgeDoor, butterSupply = [], heldItem = null;
        let fridgeOpen = false, isCooking = false, cookingProgress = 0;
        let interactiveObjects = [];

        function loadTextures() {
            textureLoader = new THREE.TextureLoader();
            
            // Define procedural textures for standalone HTML
            function createProceduralTexture(size, color1, color2, type) {
                const canvas = document.createElement('canvas');
                canvas.width = canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = color1; ctx.fillRect(0,0,size,size);
                
                if (type === 'checker') {
                    ctx.fillStyle = color2; ctx.fillRect(0,0,size/2,size/2);
                    ctx.fillRect(size/2,size/2,size/2,size/2);
                } else if (type === 'marble') {
                    ctx.fillStyle = color2;
                    for(let i=0; i<100; i++) {
                        ctx.beginPath();
                        ctx.moveTo(Math.random()*size, Math.random()*size);
                        ctx.lineTo(Math.random()*size, Math.random()*size);
                        ctx.stroke();
                    }
                }
                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                return texture;
            }

            // --- Define Texture Variables ---
            const floorTex = createProceduralTexture(512, '#0c0c0c', '#1a1a1a', 'checker');
            floorTex.repeat.set(12, 12);
            const counterTex = createProceduralTexture(256, '#222222', '#111111', 'marble');
            const backsplashTex = createProceduralTexture(256, '#333333', '#000000', 'checker');
            backsplashTex.repeat.set(8, 4);

            return { floorTex, counterTex, backsplashTex };
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            scene.fog = new THREE.Fog(0x010101, 1, 35);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            raycaster = new THREE.Raycaster();

            // --- High Fidelity Lighting ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
            const mainLight = new THREE.PointLight(0xffffff, 1.2, 25);
            mainLight.position.set(0, 5, 0); mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048; mainLight.shadow.mapSize.height = 2048;
            scene.add(mainLight);

            const counterLight = new THREE.RectAreaLight(0x00ffcc, 1.5, 6, 0.1);
            counterLight.position.set(0, 2.1, -3.1);
            scene.add(counterLight);

            const { floorTex, counterTex, backsplashTex } = loadTextures();

            // --- BUILD ENVIRONMENT ---
            const createMesh = (geo, mat, x, y, z) => { const m = new THREE.Mesh(geo, mat); m.position.set(x, y, z); m.castShadow = m.receiveShadow = true; scene.add(m); return m; };

            // 1. FLOOR (High Res Tiling)
            const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.15, metalness: 0.25 });
            const floor = createMesh(new THREE.PlaneGeometry(50,50), floorMat, 0, 0, 0);
            floor.rotation.x = -Math.PI / 2;

            // 2. BACK WALL (Procedural Backsplash)
            const backsplash = createMesh(new THREE.PlaneGeometry(12, 5), new THREE.MeshStandardMaterial({map: backsplashTex, roughness: 0.7}), 0, 2.5, -3.5);

            // 3. COUNTERTOP SYSTEM (Fixed Z-Fighting Sinkhole)
            const counterMat = new THREE.MeshStandardMaterial({ map: counterTex, roughness: 0.05, metalness: 0.4 });
            
            // Build Counter Slab with procedural Shape (Creates true depth)
            const counterShape = new THREE.Shape();
            counterShape.moveTo(-4, -0.8); counterShape.lineTo(4, -0.8); counterShape.lineTo(4, 0.8); counterShape.lineTo(-4, 0.8);
            
            // The Sinkhole Path
            const sinkholePath = new THREE.Path();
            sinkholePath.moveTo(-2.8, -0.5); sinkholePath.lineTo(-1.6, -0.5); sinkholePath.lineTo(-1.6, 0.5); sinkholePath.lineTo(-2.8, 0.5);
            counterShape.holes.push(sinkholePath);
            
            const countertopExtrude = new THREE.ExtrudeGeometry(counterShape, {depth: 0.05, bevelEnabled: false});
            const countertop = createMesh(countertopExtrude, counterMat, 0, 0.95, -3.1); // Shifted up slightly
            countertop.rotation.x = -Math.PI / 2;

            // 4. THE SINK BASIN (Hollow Hollow)
            const sinkMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.95, roughness: 0 }); // Polished Chrome
            createMesh(new THREE.BoxGeometry(1.2, 0.4, 0.8), sinkMat, -2.2, 0.75, -3.1); // Hollow box base
            // Faucet
            createBox(0.05, 0.5, 0.05, -2.2, 1.2, -3.4, 0x888888, 1, 0); // Polished

            // 5. FRY STATION
            const fryerMat = new THREE.MeshStandardMaterial({ color: 0xff4500, emissive: 0xff0000, emissiveIntensity: 2 });
            constpan = createMesh(new THREE.CylinderGeometry(0.4, 0.4, 0.1), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 1}), 1.0, 1.0, -3.1);

            // Interactive Butter
            butter = createMesh(new THREE.BoxGeometry(0.2, 0.1, 0.2), new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x444400 }), 1.0, 1.1, -3.1);
            butter.name = "Butter_Active";
            interactiveObjects.push(butter);

            // 6. THE WORKING FRIDGE (Fixed Door Orientation)
            fridgeGroup = new THREE.Group(); scene.add(fridgeGroup);
            const fridgeMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, metalness: 0.7, roughness: 0.2 }); 
            
            // Body (Hollow Shell)
            createBox(1.5, 2.4, 1.1, 3.2, 1.2, -3.2, 0xdddddd, 0.7, 0.2); // Main
            
            // Fridge Door (Interactive) - FIXED ORIENTATION & PIVOT
            fridgeDoor = new THREE.Group(); fridgeGroup.add(fridgeDoor);
            // The actual door mesh
            const doorMesh = createBox(1.5, 2.4, 0.1, 0.75, 1.2, 0.05, 0xeeeeee, 0.7, 0.2); // Mesh
            // The handle
            createBox(0.05, 0.8, 0.1, 0.1, 1.4, 0.15, 0x111111, 0.5); // Handle
            fridgeDoor.add(doorMesh);
            fridgeDoor.position.set(2.45, 0, -2.7); // Pivot point at left edge
            fridgeDoor.name = "Fridge_Door";
            interactiveObjects.push(fridgeDoor);

            // 7. INTERACTIVE TOOLS
            const spatula = createMesh(new THREE.BoxGeometry(0.1, 0.01, 0.6), new THREE.MeshStandardMaterial({color: 0x999999, metalness: 1}), -0.5, 1.0, -2.8);
            spatula.name = "Spatula";
            interactiveObjects.push(spatula);

            setupUnifiedInput();
            animate();
        }

        // --- Standard Box Helper ---
        function createBox(w, h, d, x, y, z, color, metal = 0, rough = 1) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: color, metalness: metal, roughness: rough }));
            mesh.position.set(x, y, z);
            mesh.castShadow = mesh.receiveShadow = true;
            if(scene) scene.add(mesh); // Safe check
            return mesh;
        }

        function setupUnifiedInput() {
            const overlay = document.getElementById('overlay'), joyBase = document.getElementById('joy-base'), joyStick = document.getElementById('joy-stick'), crosshair = document.getElementById('crosshair');
            const removeOverlay = () => { overlay.style.display = 'none'; if (!isTouch) document.body.requestPointerLock(); };
            overlay.addEventListener('touchstart', removeOverlay); overlay.addEventListener('mousedown', removeOverlay);

            // Unified Interaction Logic
            const interact = () => {
                if (overlay.style.display === 'none') {
                    // Raycast from crosshair
                    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                    const intersects = raycaster.intersectObjects(interactiveObjects, true);

                    if (intersects.length > 0) {
                        const obj = intersects[0].object;
                        
                        // Action: Open Fridge Door
                        if (obj.name === "Fridge_Door" || obj.parent.name === "Fridge_Door") {
                            fridgeOpen = !fridgeOpen;
                            document.getElementById('status').innerText = fridgeOpen ? "STATUS: FRIDGE_OPEN" : "STATUS: FRIDGE_CLOSED";
                        }
                        
                        // Action: Pick up Spatula
                        else if (obj.name === "Spatula") {
                            heldItem = obj;
                            obj.visible = false; // Hide world mesh
                            document.getElementById('item').innerText = "HELD_ITEM: SPATULA";
                            document.getElementById('status').innerText = "STATUS: GRABBED_SPATULA";
                        }

                        // Action: Interact with Butter (Place in Pan)
                        else if (obj.name === "Butter_Active" && heldItem && heldItem.name === "Spatula") {
                            isCooking = true;
                            document.getElementById('status').innerText = "STATUS: FRYING_BUTTER";
                        }
                    }
                }
            };
            window.addEventListener('click', interact); window.addEventListener('touchstart', interact);

            // Touch Interface
            if (isTouch) {
                joyBase.style.display = 'block';
                window.addEventListener('touchstart', (e) => { const t = e.touches[e.touches.length - 1]; lastTouch.x = t.clientX; lastTouch.y = t.clientY; }, {passive: false});
                window.addEventListener('touchmove', (e) => {
                    e.preventDefault(); for (let i = 0; i < e.touches.length; i++) {
                        const t = e.touches[i];
                        if (t.clientX < window.innerWidth / 2) {
                            const rect = joyBase.getBoundingClientRect();
                            const cx = rect.left + rect.width/2; const cy = rect.top + rect.height/2;
                            let dx = t.clientX - cx; let dy = t.clientY - cy; let dist = Math.sqrt(dx*dx + dy*dy); let limit = rect.width/2;
                            if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                            joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; moveDir.x = dx / limit; moveDir.z = dy / limit;
                        } else {
                            let mx = t.clientX - lastTouch.x; let my = t.clientY - lastTouch.y;
                            targetRot.y -= mx * 0.0038; targetRot.x -= my * 0.0038;
                        }
                        if (t.clientX > window.innerWidth / 2) { lastTouch.x = t.clientX; lastTouch.y = t.clientY; }
                    }
                }, {passive: false});
                window.addEventListener('touchend', (e) => {
                    let leftSideActive = false;
                    for(let i=0; i<e.touches.length; i++) if(e.touches[i].clientX < window.innerWidth / 2) leftSideActive = true;
                    if(!leftSideActive) { moveDir = { x: 0, z: 0 }; joyStick.style.transform = 'translate(-50%, -50%)'; }
                });
            } else {
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true); window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => { if (document.pointerLockElement) { targetRot.y -= e.movementX * 0.002; targetRot.x -= e.movementY * 0.002; } });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            
            // Smooth Camera Look (Lerp)
            currentRot.y += (targetRot.y - currentRot.y) * 0.22; currentRot.x += (targetRot.x - currentRot.x) * 0.22;
            currentRot.x = Math.max(-1.4, Math.min(1.4, currentRot.x));
            camera.rotation.y = currentRot.y; camera.rotation.x = currentRot.x;
            
            // Movement Engine
            let speed = 5;
            if (isTouch) { camera.translateX(moveDir.x * speed * delta); camera.translateZ(moveDir.z * speed * delta); }
            else { if (keys['w']) camera.translateZ(-speed * delta); if (keys['s']) camera.translateZ(speed * delta); if (keys['a']) camera.translateX(-speed * delta); if (keys['d']) camera.translateX(speed * delta); }
            
            // Reactive Crosshair Logic
            if(camera && scene) {
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const intersects = raycaster.intersectObjects(interactiveObjects, true);
                if (intersects.length > 0) {
                    document.getElementById('crosshair').classList.add('active');
                } else {
                    document.getElementById('crosshair').classList.remove('active');
                }
            }

            // Fridge Door Animation Lerp
            const doorPivot = -Math.PI/2.2; // ~80 degrees open
            fridgeDoor.rotation.y += ( (fridgeOpen ? doorPivot : 0) - fridgeDoor.rotation.y ) * 0.1;

            // Cooking Logic
            if (isCooking) {
                cookingProgress += delta;
                butter.position.y -= 0.001; // Melt down
                butter.material.color.setRGB(1, 1 - (cookingProgress*0.1), 0); // Brown
                
                if (cookingProgress > 5) {
                    isCooking = false;
                    document.getElementById('status').innerText = "STATUS: BUTTER_IS_DONE";
                }
            }

            camera.position.y = 1.7; renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        init();
    </script>
</body>
</html>
