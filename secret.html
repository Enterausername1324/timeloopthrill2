// --- SCENE DISTORTION SHADER (Glitch & Noise) ---
const DistortShader = {
    uniforms: {
        "tDiffuse": { value: null },
        "uTime": { value: 0 },
        "uDistort": { value: 0 } // 0.0 to 1.0
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
    fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float uTime;
        uniform float uDistort;
        varying vec2 vUv;

        // Simplex Noise
        float noise(vec2 p) { return frac(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

        void main() {
            vec2 uv = vUv;
            
            // Apply a shifting glitch effect based on uDistort
            float sNoise = noise(vec2(uTime * 0.01, uv.y));
            if(uDistort > 0.1 && sNoise > (1.0 - uDistort)) {
                uv.x += (sin(uTime * 50.0 + uv.y * 100.0) * 0.05) * uDistort;
            }

            vec4 color = texture2D(tDiffuse, uv);
            
            // Blend with a creeping red vignette/stain as distortion peaks
            if(uDistort > 0.5) {
                float dist = distance(uv, vec2(0.5));
                float vignette = smoothstep(0.4, 0.7 - (uDistort * 0.2), dist);
                color.r = mix(color.r, 1.0, vignette * (uDistort * 0.5));
            }
            
            gl_FragColor = color;
        }`
};

        if(uDistortion > 0.1) {
            float noisy = sin(pos.y * 50.0 + uTime * 5.0) * uDistortion;
            pos.x += noisy * 0.1;
        }

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
`;

    varying vec2 vUv;

    uniform float uTime;

    void main() {

        vec4 core = vec4(0.0, 0.0, 0.0, 1.0);
        
        // Dynamic, Pulsating Red Ink Bleed
        float ink = smoothstep(0.3, 1.0, uDistortion);
        float pulse = sin(uTime * 10.0 + vPos.y * 20.0) * 0.2;
        float bleedThreshold = 0.5 + pulse + (uDistortion * 0.3);

        vec3 color = vec3(0.0);
        float alpha = 1.0;

        // The closer to the edge, the redder the ink
        if (vUv.y < bleedThreshold) {
            color = mix(core.rgb, vec3(0.5, 0.0, 0.0), ink);
        } else {
            alpha = 0.0;
        }
        
        gl_FragColor = vec4(color, alpha);
    }
`;
