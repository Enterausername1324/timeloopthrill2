<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // CREEPING_SMILE_v36</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --horror: #ff0055; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        
        /* THE CREEPING SMILE */
        #smile-overlay { 
            position: absolute; bottom: -20px; right: -20px; width: 150px; height: 150px; 
            background: url('https://i.imgur.com/vU1768G.png') no-repeat; /* Placeholder for a creepy smile vector */
            background-size: contain; opacity: 0.1; pointer-events: none; z-index: 5000;
            transition: transform 60s linear, opacity 60s linear; transform: scale(0.5);
            filter: grayscale(1) contrast(2);
        }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: var(--horror); z-index: 1000; cursor: pointer; border: 2px solid var(--horror); box-sizing: border-box; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: var(--horror); pointer-events: none; z-index: 10; font-size: 11px; letter-spacing: 2px; }
        #prompt-layer { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); color: var(--neon); font-size: 16px; pointer-events: none; z-index: 15; text-align: center; font-weight: bold; text-shadow: 0 0 15px var(--neon); }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1px solid rgba(255,0,85,0.2); }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: var(--horror); transform: translate(-50%, -50%); }
        #crosshair.active { border: 2px solid var(--neon); box-shadow: 0 0 20px var(--neon); transform: translate(-50%, -50%) rotate(45deg); }

        /* ADAPTIVE INTERACT BUTTON (Chromebook/Mobile Friendly) */
        #interact-btn { 
            position: absolute; bottom: 50px; right: 50px; width: 120px; height: 120px; 
            background: rgba(0,255,204,0.05); border: 3px double var(--neon); border-radius: 50%; 
            color: var(--neon); display: none; justify-content: center; align-items: center; 
            font-size: 12px; z-index: 2000; cursor: pointer; transition: 0.2s;
            box-shadow: 0 0 10px rgba(0,255,204,0.2);
        }
        #interact-btn:active { background: var(--neon); color: #000; transform: scale(0.9); }

        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; border: 2px solid var(--horror); border-radius: 50%; display: none; z-index: 2000; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 45px; height: 45px; background: var(--horror); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.4; }

        #fry-ui { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); width: 250px; height: 6px; background: #111; border: 1px solid var(--neon); display: none; }
        #fry-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>

    <div id="smile-overlay"></div>
    <div id="overlay"><h1>VORTEX_SYS_RELOAD</h1><p>[ CLICK / TAP TO FEED THE VOID ]</p></div>
    <div id="hud"><div>STATUS: UNSTABLE</div><div id="timer">EVOLUTION: 0s</div><div id="hold-status">EMPTY</div></div>
    <div id="prompt-layer"></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="interact-btn">INTERACT2</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, fryer, butter, fridge, pointLight;
        let heldItem = null, isCooking = false, cookProgress = 0, interactableObj = null;
        let smileLevel = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            scene.fog = new THREE.FogExp2(0x010101, 0.15);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 6);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            // Lights - Subtle Horror Glow
            scene.add(new THREE.AmbientLight(0xff0055, 0.05));
            pointLight = new THREE.PointLight(0xffffff, 1.2, 35);
            pointLight.position.set(0, 5, -2);
            scene.add(pointLight);

            const mat = (c, e=0) => new THREE.MeshStandardMaterial({color:c, emissive:c, emissiveIntensity:e});
            
            // Floor - High Detail Tiling
            const floorGeom = new THREE.PlaneGeometry(40, 40, 20, 20);
            const floor = new THREE.Mesh(floorGeom, new THREE.MeshStandardMaterial({color:0x080808, wireframe: false}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            // Detailed Counter
            const counter = new THREE.Mesh(new THREE.BoxGeometry(10, 1.1, 2), mat(0x151515));
            counter.position.set(0, 0.55, -5); scene.add(counter);
            
            // The Sink (Deep Detail)
            const sinkHole = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 1.2), mat(0x000000));
            sinkHole.position.set(3, 0.9, -5); scene.add(sinkHole);
            const water = new THREE.Mesh(new THREE.PlaneGeometry(1.7, 1.1), mat(0x003344, 0.2));
            water.rotation.x = -Math.PI/2; water.position.set(3, 1.05, -5); scene.add(water);

            // Detailed Fryer
            fryer = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 1.4), mat(0x222222));
            fryer.position.set(-3, 1.1, -5); scene.add(fryer);
            const oil = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.2), mat(0x332200, 0.1));
            oil.rotation.x = -Math.PI/2; oil.position.set(-3, 1.4, -5); scene.add(oil);

            // The Butter (The Focal Point)
            butter = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat(0x00ffcc, 0.8));
            butter.position.set(0, 1.3, -5); scene.add(butter);

            // Fridge (Background Horror)
            fridge = new THREE.Mesh(new THREE.BoxGeometry(2, 3.5, 1.8), mat(0x111111));
            fridge.position.set(6, 1.75, -5); scene.add(fridge);

            setupInput();
            animate();
        }

        function setupInput() {
            const start = (e) => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    if(isTouch) { 
                        document.getElementById('joy-base').style.display = 'block'; 
                        document.getElementById('interact-btn').style.display = 'flex'; 
                    } else {
                        document.body.requestPointerLock();
                        document.getElementById('interact-btn').style.display = 'flex'; // Visible for Chromebook clicks
                    }
                }
            };

            const interact = () => {
                if(!interactableObj) return;
                if(interactableObj === "Butter" && !heldItem) {
                    heldItem = butter;
                    document.getElementById('hold-status').innerText = "HOLDING: VOID_FAT";
                }
                if(interactableObj === "Fryer" && heldItem) {
                    isCooking = true; heldItem = null;
                    butter.position.set(-3, 1.45, -5);
                    document.getElementById('hold-status').innerText = "BOILING...";
                    document.getElementById('fry-ui').style.display = 'block';
                }
            };

            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { 
                keys[e.key.toLowerCase()] = true; 
                if(e.key.toLowerCase() === 'e') interact();
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            
            // Pointer Lock for Chromebook Mouse
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    targetRot.y -= e.movementX * 0.002;
                    targetRot.x -= e.movementY * 0.002;
                }
            });

            // Universal Interaction Button Logic
            const btn = document.getElementById('interact-btn');
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); interact(); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });

            // iPad/Touch Controls
            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else if (t.target.id !== "interact-btn") { 
                        lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; 
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 60) { dx *= 60/dist; dy *= 60/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 60; moveDir.z = dy / 60;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.006;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.006;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const elapsedTime = clock.getElapsedTime();

            if (gameActive) {
                // LIGHT FLICKER
                pointLight.intensity = 1.0 + Math.sin(elapsedTime * 10) * 0.5 + (Math.random() * 0.2);
                
                // SMILE EVOLUTION (Gets bigger/creepier every minute)
                if (Math.floor(elapsedTime % 60) === 0 && elapsedTime > 5) {
                    smileLevel += 0.01;
                    const smile = document.getElementById('smile-overlay');
                    smile.style.opacity = 0.1 + (smileLevel * 5);
                    smile.style.transform = `scale(${0.5 + smileLevel * 10})`;
                    document.getElementById('timer').innerText = `EVOLUTION: ${Math.floor(elapsedTime)}s`;
                }

                currentRot.y += (targetRot.y - currentRot.y) * 0.15;
                currentRot.x += (targetRot.x - currentRot.x) * 0.15;
                camera.rotation.y = currentRot.y;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();

                let speed = 8.0;
                if(keys['w']) playerGroup.position.addScaledVector(f, speed * delta);
                if(keys['s']) playerGroup.position.addScaledVector(f, -speed * delta);
                if(keys['a']) playerGroup.position.addScaledVector(r, -speed * delta);
                if(keys['d']) playerGroup.position.addScaledVector(r, speed * delta);
                
                playerGroup.position.addScaledVector(f, -moveDir.z * speed * delta);
                playerGroup.position.addScaledVector(r, moveDir.x * speed * delta);

                if(heldItem) {
                    heldItem.position.copy(playerGroup.position);
                    heldItem.position.add(f.multiplyScalar(1.1));
                    heldItem.position.y = 1.4 + Math.sin(elapsedTime * 2) * 0.05;
                }

                // DYNAMIC INTERACTIONS
                let dButter = playerGroup.position.distanceTo(butter.position);
                let dFryer = playerGroup.position.distanceTo(fryer.position);
                const cross = document.getElementById('crosshair');
                const prompt = document.getElementById('prompt-layer');
                
                if (dButter < 3.5 && !heldItem) { 
                    interactableObj = "Butter"; cross.classList.add('active'); 
                    prompt.style.display = "block"; prompt.innerText = "[INTERACT2] TO FEED";
                }
                else if (dFryer < 3.5 && heldItem) { 
                    interactableObj = "Fryer"; cross.classList.add('active'); 
                    prompt.style.display = "block"; prompt.innerText = "Press E to put in Butter";
                }
                else { 
                    interactableObj = null; cross.classList.remove('active'); 
                    prompt.style.display = "none";
                }

                if (isCooking) {
                    cookProgress += delta * 18;
                    document.getElementById('fry-bar').style.width = cookProgress + "%";
                    if (cookProgress >= 100) {
                        isCooking = false; cookProgress = 0;
                        document.getElementById('fry-ui').style.display = 'none';
                        document.getElementById('hold-status').innerText = "SATISFIED";
                        heldItem = butter;
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
