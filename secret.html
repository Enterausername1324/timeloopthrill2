<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // INTERACT_v22</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #00ffcc; z-index: 1000; cursor: pointer; text-align: center; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 11px; }
        
        /* The Interaction Brackets */
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; 
            transform: translate(-50%, -50%); pointer-events: none; z-index: 20;
            border: 2px solid rgba(0,255,204,0.2); transition: all 0.1s;
        }
        #crosshair.active { width: 30px; height: 30px; border: 2px solid #ff00ff; border-radius: 5px; box-shadow: 0 0 10px #ff00ff; }
        #interact-label { position: absolute; top: calc(50% + 40px); left: 50%; transform: translateX(-50%); color: #ff00ff; font-size: 10px; display: none; text-shadow: 0 0 5px #000; }

        #joy-base { position: absolute; bottom: 12%; left: 12%; width: 120px; height: 120px; border: 2px solid #00ffcc; border-radius: 50%; display: none; z-index: 5; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); }
        
        /* Mobile Interact Button */
        #mobile-e { position: absolute; bottom: 15%; right: 15%; width: 70px; height: 70px; background: rgba(255,0,255,0.3); border: 2px solid #ff00ff; border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-weight: bold; z-index: 10; }
        
        /* Cooking Progress Bar */
        #fry-ui { position: absolute; width: 100px; height: 10px; background: #222; border: 1px solid #ff00ff; display: none; pointer-events: none; }
        #fry-bar { width: 0%; height: 100%; background: #ff00ff; }
    </style>
</head>
<body>

    <div id="overlay"><h1>VORTEX_v22</h1><p>[ INITIALIZE_PHYSICAL_SYSTEMS ]</p></div>
    <div id="hud"><div>v22_RAYCAST</div><div id="horror-val">0.0%</div><div id="hold-status">EMPTY</div></div>
    <div id="crosshair"></div>
    <div id="interact-label">[E] INTERACT</div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, cubeCamera, cubeRenderTarget, raycaster;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, playTime = 0, horror = 0;
        let moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0}, keys = {};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, headMesh, fridgeDoor, fridgeOpen = false;

        // Gameplay State
        let interactableObj = null;
        let heldItem = null;
        let isCooking = false, cookProgress = 0;
        let fryerKnob, fryerMesh;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            raycaster = new THREE.Raycaster();

            // Reflection & Player (v21 Assets)
            cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256);
            cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
            scene.add(cubeCamera);
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            // Character
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xFFD700 });
            headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), skinMat);
            headMesh.position.y = 1.8; playerGroup.add(headMesh);

            // Kitchen Build
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const pL = new THREE.PointLight(0xffffff, 1.5, 40); pL.position.set(0, 5, 0); scene.add(pL);
            const createBox = (w,h,d,x,y,z,col,name="") => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col}));
                m.position.set(x,y,z); m.name = name; scene.add(m); return m;
            };
            createBox(100, 0.1, 100, 0, -0.05, 0, 0x1a1a1a); // Floor
            
            // Interaction Objects
            fridgeDoor = new THREE.Group();
            const dMesh = createBox(1.8, 2.8, 0.1, 0.9, 1.4, 0.05, 0xcccccc, "Fridge");
            fridgeDoor.add(dMesh); fridgeDoor.position.set(2.6, 0, -3.35); scene.add(fridgeDoor);

            // --- THE FRYER ---
            fryerMesh = createBox(1.5, 1, 1.5, -2, 0.5, -3, 0x444444, "Fryer");
            const oil = createBox(1.3, 0.1, 1.3, -2, 0.9, -3, 0x997700); // Oil surface
            fryerKnob = createBox(0.2, 0.2, 0.1, -2, 0.7, -2.25, 0xff0000, "Knob");

            // Pick-up Food
            createBox(0.4, 0.4, 0.4, -1, 1.2, -3.8, 0xFFD700, "Butter");

            setupInput();
            animate();
        }

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    if(isTouch) { document.getElementById('joy-base').style.display = 'block'; document.getElementById('mobile-e').style.display = 'flex'; }
                    else document.body.requestPointerLock();
                } else { performAction(); }
            };
            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { 
                keys[e.key.toLowerCase()] = true; 
                if(e.key.toLowerCase() === 'e') performAction();
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            
            // Re-using your specific Roblox/Touch tracking from v21
            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else { lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; }
                }
            });
            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 60) { dx *= 60/dist; dy *= 60/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 60; moveDir.z = dy / 60;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.008;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.008;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            }, {passive: false});
            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
            document.getElementById('mobile-e').addEventListener('touchstart', (e) => { e.stopPropagation(); performAction(); });
        }

        function performAction() {
            if (!interactableObj) return;

            if (interactableObj.name === "Fridge") fridgeOpen = !fridgeOpen;
            
            if (interactableObj.name === "Butter" && !heldItem) {
                heldItem = interactableObj;
                document.getElementById('hold-status').innerText = "HOLDING: BUTTER";
            }

            if (interactableObj.name === "Fryer" || interactableObj.name === "Knob") {
                if (heldItem && !isCooking) {
                    isCooking = true;
                    heldItem.position.set(-2, 1, -3); // Place in oil
                    heldItem = null;
                    document.getElementById('hold-status').innerText = "COOKING...";
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            if(gameActive) playTime += delta;

            // --- RAYCASTING (THE BRACKETS) ---
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            let found = false;
            const cross = document.getElementById('crosshair');
            const label = document.getElementById('interact-label');

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                let dist = intersects[0].distance;
                if (dist < 3.5 && (obj.name === "Fridge" || obj.name === "Butter" || obj.name === "Fryer" || obj.name === "Knob")) {
                    interactableObj = obj;
                    found = true;
                }
            }

            if (found) {
                cross.classList.add('active');
                label.style.display = 'block';
            } else {
                interactableObj = null;
                cross.classList.remove('active');
                label.style.display = 'none';
            }

            // --- FRYER LOGIC ---
            if (isCooking) {
                cookProgress += delta * 15;
                document.getElementById('fry-ui').style.display = 'block';
                document.getElementById('fry-bar').style.width = cookProgress + "%";
                fryerKnob.rotation.x += 0.1;
                if (cookProgress >= 100) {
                    isCooking = false; cookProgress = 0;
                    document.getElementById('fry-ui').style.display = 'none';
                    document.getElementById('hold-status').innerText = "COOKED!";
                }
            }

            // Movement & Rotation (Restored v21 Logic)
            currentRot.y += (targetRot.y - currentRot.y) * 0.25;
            currentRot.x += (targetRot.x - currentRot.x) * 0.25;
            camera.rotation.y = currentRot.y;
            camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

            if (gameActive) {
                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0;
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0;
                playerGroup.position.addScaledVector(f.normalize(), -moveDir.z * 7 * delta).addScaledVector(r.normalize(), moveDir.x * 7 * delta);
                
                if (heldItem) { // Item follows player
                    heldItem.position.copy(playerGroup.position);
                    heldItem.position.add(f.multiplyScalar(0.8));
                    heldItem.position.y = 1.2;
                }
            }

            fridgeDoor.rotation.y += (((fridgeOpen ? -1.8 : 0) - fridgeDoor.rotation.y) * 0.1);
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
