<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // UNIVERSAL_KITCHEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 100; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 12px; text-shadow: 0 0 5px #00ffcc; }
        #joy-base { 
            position: absolute; bottom: 10%; left: 10%; width: 120px; height: 120px;
            border: 2px solid #00ffcc; border-radius: 50%; display: none; background: rgba(0,255,204,0.05);
            box-shadow: inset 0 0 20px rgba(0,255,204,0.2);
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px #00ffcc;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 8px;">VORTEX_SYSTEM_ONLINE</h1>
        <p>[ TAP_ANYWHERE_TO_SYNC ]</p>
    </div>

    <div id="hud">
        <div>OS: OMNI_v9.1_STABLE</div>
        <div id="input-mode">SCANNING_HARDWARE...</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        let moveDir = { x: 0, z: 0 };
        let keys = {};
        let targetRot = { y: 0, x: 0 };
        let currentRot = { y: 0, x: 0 };
        let lastTouch = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 0, 40);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const spot = new THREE.PointLight(0x00ffcc, 1, 20);
            spot.position.set(0, 5, 0);
            scene.add(spot);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            const counter = new THREE.Mesh(new THREE.BoxGeometry(7, 0.9, 1.4), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
            counter.position.set(0, 0.45, -3); scene.add(counter);

            const fridge = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.4, 1.2), new THREE.MeshStandardMaterial({color: 0x444444, metalness: 0.8}));
            fridge.position.set(3.5, 1.2, -3); scene.add(fridge);

            const butter = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.3), new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0x222200}));
            butter.position.set(0, 1.0, -3); scene.add(butter);

            setupUnifiedInput();
            animate();
        }

        function setupUnifiedInput() {
            const overlay = document.getElementById('overlay');
            const joyBase = document.getElementById('joy-base');
            const joyStick = document.getElementById('joy-stick');

            // Fix: Overlay removal on any touch interaction
            const removeOverlay = () => {
                overlay.style.display = 'none';
                if (!isTouch) document.body.requestPointerLock();
            };
            overlay.addEventListener('touchstart', removeOverlay);
            overlay.addEventListener('mousedown', removeOverlay);

            if (isTouch) {
                document.getElementById('input-mode').innerText = "MODE: MOBILE_TOUCH";
                joyBase.style.display = 'block';

                window.addEventListener('touchstart', (e) => {
                    // Always capture the first touch point to prevent "stuck" joystick
                    const t = e.touches[e.touches.length - 1]; 
                    lastTouch.x = t.clientX;
                    lastTouch.y = t.clientY;
                }, {passive: false});

                window.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    
                    for (let i = 0; i < e.touches.length; i++) {
                        const t = e.touches[i];
                        
                        // Movement (Left side of screen)
                        if (t.clientX < window.innerWidth / 2) {
                            const rect = joyBase.getBoundingClientRect();
                            const cx = rect.left + rect.width/2;
                            const cy = rect.top + rect.height/2;
                            let dx = t.clientX - cx;
                            let dy = t.clientY - cy;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            let limit = rect.width/2;
                            if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                            joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                            moveDir.x = dx / limit; moveDir.z = dy / limit;
                        } 
                        // Smooth Look (Right side of screen)
                        else {
                            let mx = t.clientX - lastTouch.x;
                            let my = t.clientY - lastTouch.y;
                            // Fix: Lowered sensitivity from 0.005 to 0.0025 for "smoother" swipe
                            targetRot.y -= mx * 0.0025;
                            targetRot.x -= my * 0.0025;
                        }
                        
                        // Always update lastTouch globally to keep tracking sync
                        if (t.clientX > window.innerWidth / 2) {
                            lastTouch.x = t.clientX;
                            lastTouch.y = t.clientY;
                        }
                    }
                }, {passive: false});

                window.addEventListener('touchend', (e) => {
                    // Only reset joystick if the finger on the left side is lifted
                    let leftSideActive = false;
                    for(let i=0; i<e.touches.length; i++) {
                        if(e.touches[i].clientX < window.innerWidth / 2) leftSideActive = true;
                    }
                    if(!leftSideActive) {
                        moveDir = { x: 0, z: 0 };
                        joyStick.style.transform = 'translate(-50%, -50%)';
                    }
                });
            } else {
                document.getElementById('input-mode').innerText = "MODE: DESKTOP_KB";
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement) {
                        targetRot.y -= e.movementX * 0.002;
                        targetRot.x -= e.movementY * 0.002;
                    }
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            currentRot.y += (targetRot.y - currentRot.y) * 0.2;
            currentRot.x += (targetRot.x - currentRot.x) * 0.2;
            currentRot.x = Math.max(-1.4, Math.min(1.4, currentRot.x));
            
            camera.rotation.y = currentRot.y;
            camera.rotation.x = currentRot.x;

            let speed = 5;
            if (isTouch) {
                camera.translateX(moveDir.x * speed * delta);
                camera.translateZ(moveDir.z * speed * delta);
            } else {
                if (keys['w']) camera.translateZ(-speed * delta);
                if (keys['s']) camera.translateZ(speed * delta);
                if (keys['a']) camera.translateX(-speed * delta);
                if (keys['d']) camera.translateX(speed * delta);
            }

            camera.position.y = 1.7;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
