<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // MASTER_MOVE_v21</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; color: #00ffcc; z-index: 1000; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 11px; text-shadow: 1px 1px 2px #000; }
        #joy-base { 
            position: absolute; bottom: 12%; left: 12%; width: 130px; height: 130px;
            border: 3px solid #00ffcc; border-radius: 50%; display: none; z-index: 5; background: rgba(0,255,204,0.15);
        }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 55px; height: 55px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #00ffcc; }
        #glitch-vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 15px; font-size: 2.5rem;">VORTEX_CORE</h1>
        <p>[ TAP_TO_INITIALIZE_ALL_SYSTEMS ]</p>
    </div>

    <div id="glitch-vignette"></div>

    <div id="hud">
        <div>CORE: v21_MASTER_FIX</div>
        <div id="status">MOVEMENT: ROBLOX_RELATIVE</div>
        <div id="horror-val">HORROR: 0.0%</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>

    <script>
        let scene, camera, renderer, clock, cubeCamera, cubeRenderTarget, mainLight;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, playTime = 0, horror = 0;
        
        let moveDir = { x: 0, z: 0 }, targetRot = { y: 0, x: 0 }, currentRot = { y: 0, x: 0 };
        let joyTouchID = null, lookTouchID = null, lastLookPos = { x: 0, y: 0 };
        let playerGroup, headMesh, fridgeDoor, fridgeOpen = false, keys = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Reflection Setup
            cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, { format: THREE.RGBFormat, generateMipmaps: true });
            cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
            cubeCamera.position.set(-3.9, 1.7, -4.9);
            scene.add(cubeCamera);

            // Player Group (The Puppet)
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 4);

            const skinMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.3 });
            const clothesMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

            // Character Body
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.1, 8), clothesMat);
            torso.position.y = 1.0; playerGroup.add(torso);

            // Horrifying Head Morph
            const headGeo = new THREE.SphereGeometry(0.25, 32, 32);
            headGeo.morphAttributes.position = [];
            const pos = headGeo.attributes.position.array;
            const grin = new Float32Array(pos.length);
            for (let i = 0; i < pos.length; i += 3) {
                if (pos[i+2] > 0.12 && pos[i+1] < 0.05) {
                    grin[i] = pos[i] * 3.5; grin[i+1] = pos[i+1] * 5.5; grin[i+2] = pos[i+2] + 0.35;
                } else { grin[i] = pos[i]; grin[i+1] = pos[i+1]; grin[i+2] = pos[i+2]; }
            }
            headGeo.morphAttributes.position[0] = new THREE.Float32BufferAttribute(grin, 3);
            headMesh = new THREE.Mesh(headGeo, skinMat);
            headMesh.position.y = 1.8;
            playerGroup.add(headMesh);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            // Environment & Bright Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            mainLight = new THREE.PointLight(0xffffff, 1.8, 50);
            mainLight.position.set(0, 5, 0); 
            scene.add(mainLight);

            const createBox = (w,h,d,x,y,z,col) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col}));
                m.position.set(x,y,z); scene.add(m); return m;
            };

            createBox(100, 0.1, 100, 0, -0.05, 0, 0x1a1a1a); // Floor
            createBox(12, 6, 0.1, 0, 3, -5, 0x222222); // Wall
            
            // Mirror
            const mirror = new THREE.Mesh(new THREE.PlaneGeometry(3, 4.5), new THREE.MeshStandardMaterial({ envMap: cubeRenderTarget.texture, metalness: 1, roughness: 0 }));
            mirror.position.set(-4, 2.2, -4.9); scene.add(mirror);

            // Counter & Fridge
            createBox(6, 0.9, 1.5, -1, 0.45, -4, 0x151515); 
            createBox(6.1, 0.05, 1.6, -1, 0.92, -4, 0x444444);
            createBox(1.3, 0.4, 0.9, -1.8, 0.7, -4, 0x000000); 

            createBox(1.8, 2.8, 1.3, 3.5, 1.4, -4, 0xbbbbbb);
            fridgeDoor = new THREE.Group();
            const dMesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.8, 0.1), new THREE.MeshStandardMaterial({color: 0xcccccc}));
            dMesh.position.set(0.9, 1.4, 0.05); fridgeDoor.add(dMesh);
            fridgeDoor.position.set(2.6, 0, -3.35); scene.add(fridgeDoor);

            setupMasterInput();
            animate();
        }

        function setupMasterInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    if(isTouch) document.getElementById('joy-base').style.display = 'block';
                    else document.body.requestPointerLock();
                } else { fridgeOpen = !fridgeOpen; }
            };

            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => { if(document.pointerLockElement) { targetRot.y -= e.movementX*0.003; targetRot.x -= e.movementY*0.003; } });

            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.clientX < window.innerWidth / 2 && joyTouchID === null) {
                        joyTouchID = t.identifier;
                    } else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                        lookTouchID = t.identifier;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return; e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + rect.width/2);
                        let dy = t.clientY - (rect.top + rect.height/2);
                        let limit = rect.width/2;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / limit; moveDir.z = dy / limit;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.008;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.008;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            if(gameActive) playTime += delta;

            cubeCamera.update(renderer, scene);

            horror = Math.min(1.0, playTime / 150);
            headMesh.morphTargetInfluences[0] = horror;
            document.getElementById('horror-val').innerText = "HORROR: " + (horror * 100).toFixed(1) + "%";

            // Camera Shake & Glitch
            let s = horror * 0.06;
            camera.position.set((Math.random()-0.5)*s, 1.75 + (Math.random()-0.5)*s, (Math.random()-0.5)*s);
            document.getElementById('glitch-vignette').style.boxShadow = `inset 0 0 ${horror*250}px rgba(255,0,0,${horror*0.5})`;

            // Lighting Pulsing (Brighter start)
            mainLight.intensity = (1.8 - horror * 1.2) + (Math.sin(playTime*8)*horror*0.6);

            // Smooth Rotations
            currentRot.y += (targetRot.y - currentRot.y) * 0.25;
            currentRot.x += (targetRot.x - currentRot.x) * 0.25;
            camera.rotation.y = currentRot.y;
            camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

            // --- THE MOVEMENT MASTER ENGINE ---
            if (gameActive) {
                let speed = 7.0; // Snappy speed
                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();

                // Mobile Movement (Camera Relative)
                if (isTouch) {
                    playerGroup.position.addScaledVector(f, -moveDir.z * speed * delta);
                    playerGroup.position.addScaledVector(r, moveDir.x * speed * delta);
                } 
                // PC Movement
                else {
                    if (keys['w']) playerGroup.position.addScaledVector(f, speed * delta);
                    if (keys['s']) playerGroup.position.addScaledVector(f, -speed * delta);
                    if (keys['a']) playerGroup.position.addScaledVector(r, -speed * delta);
                    if (keys['d']) playerGroup.position.addScaledVector(r, speed * delta);
                }
            }

            fridgeDoor.rotation.y += (((fridgeOpen ? -1.8 : 0) - fridgeDoor.rotation.y) * 0.1);
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
