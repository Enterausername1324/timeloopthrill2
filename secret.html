<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // DECAY_48.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: #000; color: #fff; z-index: 10000; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 11px; pointer-events: none; z-index: 1000; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            transform: translate(-50%, -50%); border: 1.5px solid rgba(255,255,255,0.2); 
            border-radius: 50%; pointer-events: none; z-index: 1000; transition: all 0.1s; 
        }
        #crosshair.active { border-color: #00ffcc; width: 14px; height: 14px; box-shadow: 0 0 10px #00ffcc; }
        #prompt { 
            position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); 
            color: #00ffcc; font-size: 16px; display: none; z-index: 1000; 
        }

        #mobile-joystick { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; display:none; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 50%; transform: translate(-50%, -50%); }
        #mobile-e { position: absolute; bottom: 40px; right: 40px; width: 90px; height: 90px; background: rgba(0,255,204,0.1); border: 2px solid #00ffcc; border-radius: 50%; color: #00ffcc; display:none; justify-content:center; align-items:center; font-size: 32px; font-weight:bold; }
    </style>
</head>
<body>

    <div id="overlay" onclick="setupGame()">
        <h1 style="color:#00ffcc">VORTEX_v48.2</h1>
        <p>[ CLICK TO BEGIN PC SESSION ]</p>
        <p style="font-size:10px; color:#444">HIFI_RENDER || PHYSICAL_PHYSICS || TEMPORAL_DECAY_v2.1</p>
    </div>

    <div id="hud">BUTTER_TEMP: <span id="butter-temp">0.0</span>C</div>
    <div id="cooking-bar">
        <div id="bar-labels">
            <span>RAW</span><span>QTR</span><span>HALF</span><span>TRD</span><span>DONE</span><span>BURN</span><span>MELT</span>
        </div>
        <div class="bar-segment" data-min="0" data-max="0.10"></div>
        <div class="bar-segment" data-min="0.10" data-max="0.25"></div>
        <div class="bar-segment" data-min="0.25" data-max="0.40"></div>
        <div class="bar-segment" data-min="0.40" data-max="0.55"></div>
        <div class="bar-segment" data-min="0.55" data-max="0.70"></div>
        <div class="bar-segment" data-min="0.70" data-max="0.85"></div>
        <div class="bar-segment" data-min="0.85" data-max="1.0"></div>
    </div>

    <div id="prompt">[E] INTERACT</div>
    <div id="crosshair"></div>

    <div id="mobile-joystick"><div id="joystick-stick"></div></div>
    <div id="mobile-e">E</div>

    <script>
        let scene, camera, renderer, clock, player, head, mouth, mirror, pointLight;
        let active = false, yaw = 0, pitch = 0, heldItem = null;
        let keys = {}, interactables = [];
        const raycaster = new THREE.Raycaster();
        
        // Physics & Cooking
        let gravity = new THREE.Vector3(0, -9.8, 0);
        let butter, fryer, fridge;
        let cookTime = 0, isBurnt = false;
        let originalFov = 75;

        // Mobile Handlers
        let joyActive = false, joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let moveDir = {x:0, z:0};

        function setupGame() {
            active = true;
            document.getElementById('overlay').style.display = 'none';
            if (!('ontouchstart' in window)) {
                document.body.requestPointerLock();
            } else {
                document.getElementById('mobile-joystick').style.display = 'block';
                document.getElementById('mobile-e').style.display = 'flex';
            }
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
            camera.rotation.order = "YXZ";

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            clock = new THREE.Clock();

            player = new THREE.Group();
            scene.add(player);
            player.position.set(0, 0, 7);

            const bodyGroup = new THREE.Group();
            player.add(bodyGroup);
            bodyGroup.position.z = -0.15; // v45 neck fix

            // Character Design
            head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.1, metalness: 0.1 }));
            head.position.y = 1.65; bodyGroup.add(head);
            
            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.1, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, metalness: 0 }));
            shirt.position.y = 0.9; bodyGroup.add(shirt);

            // THE CREEPING MOUTH
            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouth.position.set(0, 1.6, 0.28); head.add(mouth);

            // UPGRADED TEXTURES (PBR Materials)
            const addObj = (w, h, d, x, y, z, col, rough, met, name) => {
                const mat = new THREE.MeshStandardMaterial({ color: col, roughness: rough, metalness: met });
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
                m.position.set(x,y,z); m.name = name; m.receiveShadow = true; m.castShadow = true;
                scene.add(m); return m;
            };

            // UPGRADED WOOD TEXTURES (Simulation)
            addObj(40, 0.1, 40, 0, 0, 0, 0x1a0a05, 0.9, 0, "floor"); // Rich Mahogany Floor
            addObj(25, 12, 0.5, 0, 6, -5.2, 0x22110a, 1, 0, "wall"); // Dark Wood Walls

            // The Scratched Oak Counter
            const counter = addObj(12, 1.1, 2.5, 0, 0.55, -4, 0x332211, 0.7, 0, "counter"); 
            counter.material.bumpScale = 0.1;

            // Standalone Metallic Fridge
            fridge = addObj(2.5, 4, 2.5, -3, 2, -4.5, 0xaaaaaa, 0.1, 0.9, "fridge");

            // Counter-top Fryer
            fryer = addObj(1.5, 0.6, 1.5, 3, 1.4, -4, 0x555555, 0.8, 0.2, "fryer");
            interactables.push(fryer);

            // The Glowing Butter
            butter = addObj(0.4, 0.4, 0.4, 0, 1.3, -3, 0x00ffcc, 0.1, 0.1, "butter");
            butter.material.emissive.set(0x00ffcc); butter.material.emissiveIntensity = 0.5;
            butter.velocity = new THREE.Vector3(0, 0, 0); 
            interactables.push(butter);

            // The Mirror (Watch the creep)
            mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), {
                clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0x888888
            });
            mirror.position.set(2.5, 3, -5.1); scene.add(mirror);

            // Bright, Clear Lighting
            pointLight = new THREE.PointLight(0xffaa44, 2.5, 30); // Brightest Point
            pointLight.position.set(0, 6, -2); 
            pointLight.castShadow = true;
            scene.add(pointLight);

            scene.add(new THREE.AmbientLight(0xffffff, 0.45)); // Boosted Ambient for visibility

            // INPUT
            window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyE') handleInteraction(); });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousemove', e => { if(active) { yaw -= e.movementX * 0.0022; pitch -= e.movementY * 0.0022; pitch = Math.max(-1.5, Math.min(1.5, pitch)); } });

            // MOBILE BINDING
            document.getElementById('mobile-joystick').addEventListener('touchstart', e => { joyActive = true; joyTouchID = e.touches[0].identifier; });
            document.getElementById('mobile-joystick').addEventListener('touchmove', handleJoystickMove);
            document.getElementById('mobile-joystick').addEventListener('touchend', e => { if(e.changedTouches[0].identifier === joyTouchID) joyActive = false; moveDir = {x:0, z:0}; document.getElementById('joystick-stick').style.transform = 'translate(-50%, -50%)'; });
            document.getElementById('mobile-e').addEventListener('touchstart', (e) => {e.preventDefault(); handleInteraction();});

            animate();
        }

        // MOBILE JOYSTICK CALC
        function handleJoystickMove(e) {
            if (!joyActive) return;
            const touch = Array.from(e.touches).find(t => t.identifier === joyTouchID);
            const joyBase = document.getElementById('mobile-joystick').getBoundingClientRect();
            const dx = touch.clientX - (joyBase.left + 60); const dy = touch.clientY - (joyBase.top + 60);
            const dist = Math.sqrt(dx*dx + dy*dy); const norm = Math.min(dist, 60);
            const stickX = (dist === 0) ? 0 : (dx / dist) * norm; const stickY = (dist === 0) ? 0 : (dy / dist) * norm;
            document.getElementById('joystick-stick').style.transform = `translate(calc(-50% + ${stickX}px), calc(-50% + ${stickY}px))`;
            moveDir.x = stickX / 60; moveDir.z = stickY / 60;
        }

        function handleInteraction() {
            if(!active) return;
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(interactables);
            
            if(heldItem) {
                // DROP LOGIC
                scene.attach(heldItem);
                heldItem.position.copy(camera.position).add(new THREE.Vector3(0,0,-1.2).applyAxisAngle(new THREE.Vector3(0,1,0), yaw));
                heldItem.position.y = camera.position.y - 0.2;
                heldItem.velocity.set(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw); 
                heldItem.velocity.y = 1; heldItem = null;
                document.getElementById('hud').innerText = "HOLDING: NONE";
            } else if(hits.length > 0 && hits[0].object.name === "butter") {
                // PICK LOGIC
                heldItem = hits[0].object; heldItem.velocity.set(0,0,0);
                camera.add(heldItem); heldItem.position.set(0.4, -0.3, -0.7); // Viewport position
                document.getElementById('hud').innerText = "HOLDING: BUTTER";
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!active) return;
            let dt = Math.min(clock.getDelta(), 0.1);

            // View Application
            player.rotation.y = yaw;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            camera.position.set(player.position.x, 1.65, player.position.z);

            // Unified Movement (PC & Mobile)
            let speed = 7.5;
            let xInput = (keys['KeyD']?1:0) - (keys['KeyA']?1:0) + moveDir.x;
            let zInput = (keys['KeyS']?1:0) - (keys['KeyW']?1:0) + moveDir.z;

            if(xInput !== 0 || zInput !== 0) {
                let dir = new THREE.Vector3(xInput, 0, zInput).applyAxisAngle(new THREE.Vector3(0,1,0), yaw).normalize();
                player.position.addScaledVector(dir, speed * dt);
            }

            // BUTTER PHYSICS
            if(butter && !heldItem) {
                butter.velocity.addScaledVector(gravity, dt);
                butter.position.addScaledVector(butter.velocity, dt);
                // Floor collision (y=0.2 settle)
                if(butter.position.y < 0.2) { butter.position.y = 0.2; butter.velocity.set(0,0,0); }
                // Countertop collision (y=1.3 settle)
                if(butter.position.z < -2.8 && butter.position.z > -5.2 && butter.position.x > -6 && butter.position.x < 6 && butter.position.y < 1.3 ) {
                   butter.position.y = 1.3; butter.velocity.set(0,0,0);
                }
            }

            // TEMPORAL SMILE DECAY ( Watch the Mirror)
            let timeElapsed = clock.getElapsedTime() / 60; // Minutes
            
            if(timeElapsed > 3) {
                // Exponential Smile stretch (3 min)
                let smileIndex = Math.pow(timeElapsed - 3, 2) * 5; 
                mouth.scale.x = 1 + smileIndex; 
            }
            if(timeElapsed > 5) {
                // Critical Phase (5 min): Stop growth, turn Red
                mouth.scale.x = Math.min(mouth.scale.x, 20); // Cap stretch
                mouth.material.color.set(0xaa0000); // Decayed Red
            }

            // FRYING STATE ENGINE
            const inFryer = (butter.position.distanceTo(fryer.position) < 0.9 && butter.position.y < 1.6);

            if(inFryer) {
                cookTime += dt;
                let cookP = Math.min(cookTime / 60.0, 1.0); // 1 minute to done/burn

                document.getElementById('butter-temp').innerText = (cookP * 250).toFixed(1);

                const m = butter.material;
                // Cyan (Raw) -> Done (Gold) -> Burn (Black)
                if(cookP < 0.55) {
                   m.color.lerpColors(new THREE.Color(0x00ffcc), new THREE.Color(0xffcc00), cookP / 0.55); m.emissive.set(m.color);
                } else if(cookP < 0.85) {
                   m.color.lerpColors(new THREE.Color(0xffcc00), new THREE.Color(0x111111), (cookP-0.55) / 0.3); m.emissive.set(0x000000);
                   if(!isBurnt) isBurnt = true;
                } else {
                   // Melted/Void Phase (Red void)
                   m.color.set(0x000000); butter.position.set(0,-10,0); // Hide butter
                   pointLight.color.lerpColors(new THREE.Color(0xffaa44), new THREE.Color(0xff0000), (cookP - 0.85)/0.15);
                   camera.fov = 75 + (cookP-0.85)*200; camera.updateProjectionMatrix(); // Distortion
                }

            } else {
                if(isBurnt) pointLight.color.set(0xaa0000); else pointLight.color.set(0xffaa44);
                camera.fov = 75; camera.updateProjectionMatrix();
            }

            // Raycast for Crosshair Prompt
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const lookAt = raycaster.intersectObjects(interactables);
            const crosshair = document.getElementById('crosshair');
            const prompt = document.getElementById('prompt');
            
            if(lookAt.length > 0) { crosshair.classList.add('active'); prompt.style.display = "block"; } 
            else { crosshair.classList.remove('active'); prompt.style.display = "none"; }

            if(heldItem) heldItem.position.set(0.3, -0.3, -0.7);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
