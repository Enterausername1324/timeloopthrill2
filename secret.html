<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // FULL_KITCHEN_v37</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --horror: #ff0055; --steel: #888888; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        
        #smile-overlay { 
            position: absolute; bottom: -40px; right: -40px; width: 200px; height: 200px; 
            background: radial-gradient(circle, rgba(255,0,85,0.2) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; opacity: 0; pointer-events: none; z-index: 5000;
            transition: transform 1s ease-out; filter: blur(10px);
        }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: var(--horror); z-index: 1000; cursor: pointer; text-shadow: 0 0 10px var(--horror); }
        #hud { position: absolute; top: 20px; left: 20px; color: var(--horror); pointer-events: none; z-index: 10; font-size: 10px; line-height: 1.5; }
        #prompt-layer { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); color: var(--neon); font-size: 16px; pointer-events: none; z-index: 15; text-align: center; font-weight: bold; text-shadow: 0 0 15px var(--neon); }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1px solid rgba(255,0,85,0.4); border-radius: 2px; }
        #crosshair.active { border: 2px solid var(--neon); box-shadow: 0 0 20px var(--neon); transform: translate(-50%, -50%) rotate(45deg); }

        #interact-btn { 
            position: absolute; bottom: 40px; right: 40px; width: 130px; height: 130px; 
            background: rgba(0,255,204,0.05); border: 2px solid var(--neon); border-radius: 50%; 
            color: var(--neon); display: none; justify-content: center; align-items: center; 
            font-size: 13px; z-index: 2000; cursor: pointer; backdrop-filter: blur(5px);
        }
        #interact-btn:active { background: var(--neon); color: #000; }

        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; border: 2px solid var(--horror); border-radius: 50%; display: none; z-index: 2000; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: var(--horror); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.3; }

        #fry-ui { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); width: 280px; height: 8px; background: #111; border: 1px solid var(--neon); display: none; }
        #fry-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>

    <div id="smile-overlay"></div>
    <div id="overlay"><h1>VORTEX_PRESTIGE_v37</h1><p>[ CLICK TO REIFY INTERIOR ]</p></div>
    <div id="hud"><div>LOC: DOMESTIC_SECTOR_01</div><div id="timer">SMILE_INDEX: 0.00</div><div id="hold-status">EMPTY</div></div>
    <div id="prompt-layer"></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="interact-btn">INTERACT2</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, pointLight, butter, fryer;
        let heldItem = null, isCooking = false, cookProgress = 0, interactableObj = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.1);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 7);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            // --- ADVANCED LIGHTING ---
            const amb = new THREE.AmbientLight(0x404040, 0.5); scene.add(amb);
            pointLight = new THREE.PointLight(0xffffff, 2, 40);
            pointLight.position.set(0, 5, 0); scene.add(pointLight);

            // --- MATERIALS ---
            const steelMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.2, metalness: 0.8 });
            const tileMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.3 });
            const stoveMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.1 });

            // Floor (Grid Texture)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50, 50, 50), new THREE.MeshStandardMaterial({color: 0x050505, wireframe: false}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            // --- APPLIANCE LAYOUT ---
            
            // 1. Counter (Polished Stone)
            const mainCounter = new THREE.Mesh(new THREE.BoxGeometry(12, 1, 2), new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.1}));
            mainCounter.position.set(0, 0.5, -5); scene.add(mainCounter);

            // 2. Fridge (Steel Monolith)
            const fridge = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), steelMat);
            fridge.position.set(-5, 2, -5); scene.add(fridge);

            // 3. Stove (With Emissive Elements)
            const stove = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), stoveMat);
            stove.position.set(-2, 0.5, -5); scene.add(stove);
            for(let i=0; i<4; i++) {
                const burner = new THREE.Mesh(new THREE.CircleGeometry(0.3, 32), new THREE.MeshStandardMaterial({color:0xff3300, emissive:0xff0000, emissiveIntensity:2}));
                burner.rotation.x = -Math.PI/2; burner.position.set(-2 + (i<2?-0.4:0.4), 1.01, -5 + (i%2==0?-0.4:0.4));
                scene.add(burner);
            }

            // 4. The Fryer
            fryer = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 1.5), steelMat);
            fryer.position.set(1, 1.0, -5); scene.add(fryer);

            // 5. Washing Machine
            const washer = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.8, 2), new THREE.MeshStandardMaterial({color:0xeeeeee}));
            washer.position.set(4.5, 0.9, -5); scene.add(washer);
            const door = new THREE.Mesh(new THREE.CircleGeometry(0.6, 32), glassMat);
            door.position.set(4.5, 0.9, -3.99); scene.add(door);

            // 6. The Butter (Anomalous)
            butter = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color:0x00ffcc, emissive:0x00ffcc, emissiveIntensity:1}));
            butter.position.set(2.5, 1.2, -5); scene.add(butter);

            setupInput();
            animate();
        }

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('interact-btn').style.display = 'flex';
                    if(isTouch) document.getElementById('joy-base').style.display = 'block';
                    else document.body.requestPointerLock();
                }
            };

            const interact = () => {
                if(!interactableObj) return;
                if(interactableObj === "Butter" && !heldItem) {
                    heldItem = butter;
                    document.getElementById('hold-status').innerText = "HOLDING: ANOMALY";
                }
                if(interactableObj === "Fryer" && heldItem) {
                    isCooking = true; heldItem = null;
                    butter.position.set(1, 1.4, -5);
                    document.getElementById('hold-status').innerText = "VORTEX_BOIL...";
                    document.getElementById('fry-ui').style.display = 'block';
                }
            };

            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { 
                keys[e.key.toLowerCase()] = true; 
                if(e.key.toLowerCase() === 'e') interact();
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    targetRot.y -= e.movementX * 0.0025;
                    targetRot.x -= e.movementY * 0.0025;
                }
            });

            const btn = document.getElementById('interact-btn');
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); interact(); });

            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else if (t.target.id !== "interact-btn") { 
                        lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; 
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 65), dy = t.clientY - (rect.top + 65);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 65) { dx *= 65/dist; dy *= 65/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 65; moveDir.z = dy / 65;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.006;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.006;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            if (gameActive) {
                // LIGHT FLICKER
                pointLight.intensity = 1.5 + Math.sin(time * 12) * 0.6 + (Math.random() * 0.3);

                // SMILE LOGIC (CREEPIER BY THE MINUTE)
                let minutes = time / 60;
                let smile = document.getElementById('smile-overlay');
                smile.style.opacity = Math.min(0.6, minutes * 0.2);
                smile.style.transform = `scale(${1 + minutes * 5}) translate(${(Math.sin(time)*5)}px, ${(Math.cos(time)*5)}px)`;
                document.getElementById('timer').innerText = `SMILE_INDEX: ${minutes.toFixed(2)}`;

                currentRot.y += (targetRot.y - currentRot.y) * 0.15;
                currentRot.x += (targetRot.x - currentRot.x) * 0.15;
                camera.rotation.y = currentRot.y;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();

                let speed = 8.5;
                if(keys['w']) playerGroup.position.addScaledVector(f, speed * delta);
                if(keys['s']) playerGroup.position.addScaledVector(f, -speed * delta);
                if(keys['a']) playerGroup.position.addScaledVector(r, -speed * delta);
                if(keys['d']) playerGroup.position.addScaledVector(r, speed * delta);
                
                playerGroup.position.addScaledVector(f, -moveDir.z * speed * delta);
                playerGroup.position.addScaledVector(r, moveDir.x * speed * delta);

                if(heldItem) {
                    heldItem.position.copy(playerGroup.position);
                    heldItem.position.add(f.multiplyScalar(1.2));
                    heldItem.position.y = 1.45 + Math.sin(time * 3) * 0.1;
                }

                // DYNAMIC INTERACTIONS
                let dButter = playerGroup.position.distanceTo(butter.position);
                let dFryer = playerGroup.position.distanceTo(fryer.position);
                const cross = document.getElementById('crosshair');
                const prompt = document.getElementById('prompt-layer');
                
                if (dButter < 3.5 && !heldItem) { 
                    interactableObj = "Butter"; cross.classList.add('active'); 
                    prompt.style.display = "block"; prompt.innerText = "[INTERACT2] TO TAKE";
                }
                else if (dFryer < 3.5 && heldItem) { 
                    interactableObj = "Fryer"; cross.classList.add('active'); 
                    prompt.style.display = "block"; prompt.innerText = "Press E to put in Butter";
                }
                else { 
                    interactableObj = null; cross.classList.remove('active'); 
                    prompt.style.display = "none";
                }

                if (isCooking) {
                    cookProgress += delta * 22;
                    document.getElementById('fry-bar').style.width = cookProgress + "%";
                    if (cookProgress >= 100) {
                        isCooking = false; cookProgress = 0;
                        document.getElementById('fry-ui').style.display = 'none';
                        heldItem = butter;
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
