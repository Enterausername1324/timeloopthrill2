<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 50.2_STABLE_FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: #000; color: #ffcc00; z-index: 99999; cursor: pointer; 
            border: 10px solid #222; box-sizing: border-box;
        }
        #overlay:hover { border-color: #ffcc00; color: #fff; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,204,0,0.9); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; border: 1px solid #fff; z-index: 10; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #bar-box { width: 250px; height: 12px; border: 2px solid #444; background: #000; display: none; margin-top: 10px; }
        #bar-fill { height: 100%; width: 0%; background: #ffcc00; box-shadow: 0 0 15px #ffcc00; }
        #label { color: #ffcc00; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1>[ V50.2 // CLICK TO START ]</h1>
    <p>PRESS 'P' IF MOUSE ESCAPES | 'E' OR CLICK TO INTERACT</p>
</div>

<div id="ui">
    <div id="label">WAITING...</div>
    <div id="bar-box"><div id="bar-fill"></div></div>
</div>
<div id="crosshair"></div>

<script>
let scene, camera, renderer, clock, player, mouth, fridgeDoor, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null;
let keys = {}, butters = [];
let fridgeOpen = false, lastInteract = 0;
const raycaster = new THREE.Raycaster();

const STAGES = [0x00ffcc, 0xffffaa, 0xffcc00, 0x8b4513, 0x222222, 0x000000];
const LABELS = ["RAW", "WARMING", "SIZZLING", "COOKED", "BURNING", "VOID"];

function setup() { 
    active = true; 
    document.getElementById('overlay').style.display = 'none'; 
    document.body.requestPointerLock(); 
    if(!scene) init(); // Safety check to ensure init runs
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.4, 100);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 4);

    // --- CHARACTER & SMILE (v50 Position) ---
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; player.add(head);
    
    const mGeom = new THREE.TorusGeometry(0.15, 0.02, 8, 20, Math.PI);
    mouth = new THREE.Mesh(mGeom, new THREE.MeshBasicMaterial({color: 0x000000}));
    mouth.rotation.set(Math.PI, 0, 0);
    mouth.position.set(0, 1.55, 0.28); 
    mouth.renderOrder = 999; head.add(mouth);

    // --- 4 WALLS ---
    const wallMat = new THREE.MeshStandardMaterial({color: 0x222222});
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(16,16), new THREE.MeshStandardMaterial({color: 0x111111}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);
    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(16,16), wallMat);
    ceiling.position.y = 6; ceiling.rotation.x = Math.PI/2; scene.add(ceiling);

    for(let i=0; i<4; i++) {
        const p = new THREE.Mesh(new THREE.PlaneGeometry(16,6), wallMat);
        p.rotation.y = (i * Math.PI) / 2;
        p.position.set(i%2===0?0:(i===1?-8:8), 3, i%2!==0?0:(i===0?-8:8));
        scene.add(p);
    }

    // --- HOLLOW FRIDGE ---
    const fridge = new THREE.Group(); fridge.position.set(-5, 0, -4.5); scene.add(fridge);
    const fMat = new THREE.MeshStandardMaterial({color: 0x333333});
    const fBack = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.8, 0.1), fMat); fBack.position.set(0, 2.4, -1.1); fridge.add(fBack);
    const fSideL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 4.8, 2.2), fMat); fSideL.position.set(-1.2, 2.4, 0); fridge.add(fSideL);
    const fSideR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 4.8, 2.2), fMat); fSideR.position.set(1.2, 2.4, 0); fridge.add(fSideR);
    const fTop = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 2.2), fMat); fTop.position.set(0, 4.8, 0); fridge.add(fTop);

    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(1.2, 2.4, 1.1); fridge.add(fridgeDoor);
    const dMesh = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.8, 0.1), new THREE.MeshStandardMaterial({color: 0x444444}));
    dMesh.position.set(-1.25, 0, 0); dMesh.name = "fridge_door"; fridgeDoor.add(dMesh);

    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x00ffcc}));
        b.position.set((i%2)*0.6 - 0.3, 1 + (Math.floor(i/2)*1.2), -0.5);
        b.name = "butter"; b.userData.cookTime = 0; fridge.add(b); butters.push(b);
    }

    // KITCHEN
    const counter = new THREE.Mesh(new THREE.BoxGeometry(8, 1.1, 2.5), new THREE.MeshStandardMaterial({color: 0x1a110a}));
    counter.position.set(1, 0.55, -4); scene.add(counter);
    const fryer = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 1.5), new THREE.MeshStandardMaterial({color: 0x111111}));
    fryer.position.set(3, 1.1, -4); fryer.name = "fryer"; scene.add(fryer);
    const mirror = new THREE.Reflector(new THREE.PlaneGeometry(5, 3.5), { clipBias: 0.003, color: 0x888888 });
    mirror.position.set(2.5, 3.2, -5.3); scene.add(mirror);
    const l1 = new THREE.PointLight(0xffaa44, 2, 25); l1.position.set(0, 5, -2); scene.add(l1, new THREE.AmbientLight(0xffffff, 0.1));

    window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyE') doInteract(); if(e.code === 'KeyP') document.body.requestPointerLock(); });
    window.addEventListener('keyup', e => delete keys[e.code]);
    window.addEventListener('mousedown', () => { if(active) doInteract(); });
    window.addEventListener('mousemove', e => { if(document.pointerLockElement === document.body) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});

    animate();
}

function doInteract() {
    const now = Date.now(); if(now - lastInteract < 200) return; lastInteract = now;
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let obj = hits[0].object;
        if(heldItem) {
            if(obj.name === "fryer") {
                cookingButter = heldItem; scene.attach(heldItem); 
                heldItem.position.set(3, 1.4, -4); heldItem = null;
                document.getElementById('bar-box').style.display = "block";
            } else { scene.attach(heldItem); heldItem.position.y = 0.18; heldItem = null; }
        } else {
            if(obj.name === "butter") { 
                heldItem = obj; player.add(heldItem); heldItem.position.set(0.6, 1.2, -0.9);
                if(heldItem === cookingButter) { cookingButter = null; document.getElementById('bar-box').style.display = "none"; }
            } else if(obj.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta(), t = clock.getElapsedTime();
    player.rotation.y = yaw;
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
    camera.position.set(player.position.x, 1.65, player.position.z);
    fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.6 : 0, 0.1);

    if(t > 5) { 
        mouth.scale.x = 1 + (t-5) * 0.4;
        mouth.scale.y = 1 + (t-5) * 0.2;
        mouth.position.z = 0.28 + (t-5) * 0.002;
    }

    if(cookingButter) {
        cookingButter.userData.cookTime += dt;
        let progress = Math.min(cookingButter.userData.cookTime / 30, 1.0);
        let stageIdx = Math.floor(progress * 5.99);
        cookingButter.material.color.set(STAGES[stageIdx]);
        cookingButter.material.emissive.set(STAGES[stageIdx]);
        document.getElementById('bar-fill').style.width = (progress * 100) + "%";
        document.getElementById('bar-fill').style.background = "#" + STAGES[stageIdx].toString(16).padStart(6, '0');
        document.getElementById('label').innerText = LABELS[stageIdx];
    }

    let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0), moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
    if(moveX || moveZ) {
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, moveZ * 6 * dt);
        player.position.addScaledVector(side, moveX * 6 * dt);
    }
    renderer.render(scene, camera);
}
init(); // Run once at load
</script>
</body>
</html>
