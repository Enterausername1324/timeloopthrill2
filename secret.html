<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // FULL_RESTORE_47.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: rgba(0,0,0,0.85); color: #fff; z-index: 10000; cursor: pointer;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px 2px #000; pointer-events: none; font-size: 14px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="requestLock()">
        <h1>VORTEX_v47.5</h1>
        <p>CLICK TO LOCK MOUSE & ENTER KITCHEN</p>
    </div>
    <div id="hud">SMILE_STATUS: <span id="timer">NORMAL</span></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, player, body, mouth, mirror, pointLight;
        let active = false, yaw = 0, pitch = 0;
        let keys = {};

        function requestLock() {
            document.body.requestPointerLock();
        }

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                active = true;
                document.getElementById('overlay').style.display = 'none';
            } else {
                active = false;
                document.getElementById('overlay').style.display = 'flex';
            }
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            
            // Camera (v45 Near-Clip Fix: 0.2)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
            camera.rotation.order = "YXZ";

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Player Group
            player = new THREE.Group();
            scene.add(player);
            player.position.set(0, 0, 7);

            body = new THREE.Group();
            player.add(body);
            body.position.z = -0.2; // Neck offset

            // Character Design
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            head.position.y = 1.65; body.add(head);

            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
            shirt.position.y = 0.9; body.add(shirt);

            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouth.position.set(0, 1.6, 0.28); head.add(mouth);

            // Kitchen Build (v46.8 Brightness)
            const add = (w, h, d, x, y, z, col) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: col, roughness: 0.6}));
                m.position.set(x, y, z); scene.add(m); return m;
            };
            add(40, 0.1, 40, 0, 0, 0, 0x3a2a1a); // Wood Floor
            add(12, 1.1, 2.5, 0, 0.55, -4, 0x4a3a2a); // Counter
            add(25, 12, 0.5, 0, 6, -5.2, 0x221108); // Wall

            // The Mirror
            mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), {
                clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0xaaaaaa
            });
            mirror.position.set(2.5, 3, -5.1); scene.add(mirror);

            // Lighting
            pointLight = new THREE.PointLight(0xffcc88, 2.5, 30);
            pointLight.position.set(0, 5, -1); scene.add(pointLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            // Listeners
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousemove', e => {
                if(active) {
                    yaw -= e.movementX * 0.0025;
                    pitch -= e.movementY * 0.0025;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!active) return;
            let dt = clock.getDelta();

            // Apply Rotations
            player.rotation.y = yaw;
            camera.position.copy(player.position);
            camera.position.y = 1.65;
            camera.rotation.x = pitch;
            camera.rotation.y = yaw;

            // Camera-Relative Movement
            let speed = 7.5;
            let xInput = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
            let zInput = (keys['KeyS']?1:0) - (keys['KeyW']?1:0); // W is negative Z (Forward)

            if(xInput !== 0 || zInput !== 0) {
                let fwd = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).multiplyScalar(zInput);
                let side = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).multiplyScalar(xInput);
                player.position.x -= (fwd.x + side.x) * speed * dt;
                player.position.z -= (fwd.z + side.z) * speed * dt;
            }

            // Smile Index (3 and 5 min marks)
            let m = clock.getElapsedTime()/60;
            if(m > 3) {
                document.getElementById('timer').innerText = "DECAYING";
                mouth.scale.x = 1 + (m-3)*5;
            }
            if(m > 5) {
                document.getElementById('timer').innerText = "HORRIFYING";
                mouth.material.color.set(0xaa0000);
                pointLight.color.set(0xff0000);
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
