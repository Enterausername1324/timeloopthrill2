<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // SINK_REBUILD_v35</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #ff0055; z-index: 1000; cursor: pointer; text-align: center; }
        #hud { position: absolute; top: 20px; left: 20px; color: #ff0055; pointer-events: none; z-index: 10; font-size: 11px; text-transform: uppercase; }
        #prompt-layer { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: #00ffcc; font-size: 14px; pointer-events: none; z-index: 15; text-shadow: 0 0 10px #00ffcc; display: none; text-align: center; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1px solid rgba(255,0,85,0.3); }
        #crosshair.active { border: 2px solid #00ffcc; width: 35px; height: 35px; box-shadow: 0 0 15px #00ffcc; transform: translate(-50%, -50%) rotate(45deg); }
        
        #joy-base { position: absolute; bottom: 60px; left: 60px; width: 110px; height: 110px; border: 1px solid #ff0055; border-radius: 50%; display: none; z-index: 2000; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #ff0055; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.5; }
        
        #mobile-e { position: absolute; bottom: 60px; right: 60px; width: 110px; height: 110px; background: rgba(0,255,204,0.1); border: 2px solid #00ffcc; border-radius: 50%; color: #00ffcc; display: none; justify-content: center; align-items: center; font-size: 14px; z-index: 2000; font-weight: bold; text-align: center; }
        
        #fry-ui { position: absolute; bottom: 22%; left: 50%; transform: translateX(-50%); width: 200px; height: 4px; background: #111; border: 1px solid #00ffcc; display: none; }
        #fry-bar { width: 0%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

    <div id="overlay"><h1>VORTEX_v35</h1><p>[ TAP_TO_INITIALIZE ]</p></div>
    <div id="hud"><div>LOC: KITCHEN_CORE</div><div id="hold-status">EMPTY</div></div>
    <div id="prompt-layer"></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">INTERACT2</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, fryer, butter, sink, pointLight;
        let heldItem = null, isCooking = false, cookProgress = 0, interactableObj = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            // Lights
            scene.add(new THREE.AmbientLight(0xff0055, 0.1));
            pointLight = new THREE.PointLight(0xffffff, 1.5, 30);
            pointLight.position.set(0, 5, 0);
            scene.add(pointLight);

            const mat = (c) => new THREE.MeshStandardMaterial({color:c});
            
            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), mat(0x111111));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            // COUNTER REBUILD
            const counter = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 1.5), mat(0x222222));
            counter.position.set(0, 0.5, -4); scene.add(counter);
            
            // THE SINK (Hole in counter with "water")
            sink = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.4, 1), mat(0x050505));
            sink.position.set(2, 0.8, -4); scene.add(sink);
            
            const water = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.9), new THREE.MeshStandardMaterial({color:0x00ccff, transparent:true, opacity:0.5}));
            water.rotation.x = -Math.PI/2; water.position.set(2, 0.95, -4); scene.add(water);

            // THE FRYER
            fryer = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.4, 1.2), mat(0x444444));
            fryer.position.set(-2, 1.0, -4); scene.add(fryer);

            // THE BUTTER
            butter = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), new THREE.MeshStandardMaterial({color:0x00ffcc, emissive:0x00ffcc, emissiveIntensity:0.5}));
            butter.position.set(0, 1.18, -4); scene.add(butter);

            setupInput();
            animate();
        }

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    if(isTouch) { 
                        document.getElementById('joy-base').style.display = 'block'; 
                        document.getElementById('mobile-e').style.display = 'flex'; 
                    } else document.body.requestPointerLock();
                }
            };

            const interact = () => {
                if(!interactableObj) return;
                if(interactableObj === "Butter" && !heldItem) {
                    heldItem = butter;
                    document.getElementById('hold-status').innerText = "HOLDING: BUTTER";
                }
                if(interactableObj === "Fryer" && heldItem) {
                    isCooking = true; heldItem = null;
                    butter.position.set(-2, 1.2, -4);
                    document.getElementById('hold-status').innerText = "FRYING...";
                    document.getElementById('fry-ui').style.display = 'block';
                }
            };

            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { 
                keys[e.key.toLowerCase()] = true; 
                if(e.key.toLowerCase() === 'e') interact();
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    targetRot.y -= e.movementX * 0.003;
                    targetRot.x -= e.movementY * 0.003;
                }
            });

            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else { lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; }
                }
            });

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 55), dy = t.clientY - (rect.top + 55);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 55) { dx *= 55/dist; dy *= 55/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 55; moveDir.z = dy / 55;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.007;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.007;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });

            document.getElementById('mobile-e').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if (gameActive) {
                pointLight.intensity = 1.2 + Math.random() * 0.4; // Flicker

                currentRot.y += (targetRot.y - currentRot.y) * 0.2;
                currentRot.x += (targetRot.x - currentRot.x) * 0.2;
                camera.rotation.y = currentRot.y;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();

                let speed = 7.5;
                if(keys['w']) playerGroup.position.addScaledVector(f, speed * delta);
                if(keys['s']) playerGroup.position.addScaledVector(f, -speed * delta);
                if(keys['a']) playerGroup.position.addScaledVector(r, -speed * delta);
                if(keys['d']) playerGroup.position.addScaledVector(r, speed * delta);
                
                playerGroup.position.addScaledVector(f, -moveDir.z * speed * delta);
                playerGroup.position.addScaledVector(r, moveDir.x * speed * delta);

                if(heldItem) {
                    heldItem.position.copy(playerGroup.position);
                    heldItem.position.add(f.multiplyScalar(0.95));
                    heldItem.position.y = 1.35;
                }

                let dButter = playerGroup.position.distanceTo(butter.position);
                let dFryer = playerGroup.position.distanceTo(fryer.position);
                const cross = document.getElementById('crosshair');
                const prompt = document.getElementById('prompt-layer');
                
                if (dButter < 3.2 && !heldItem) { 
                    interactableObj = "Butter"; cross.classList.add('active'); 
                    prompt.style.display = "block"; prompt.innerText = "INTERACT2 to Pick Up Butter";
                }
                else if (dFryer < 3.2 && heldItem) { 
                    interactableObj = "Fryer"; cross.classList.add('active'); 
                    prompt.style.display = "block"; prompt.innerText = "Press E to put in Butter";
                }
                else { 
                    interactableObj = null; cross.classList.remove('active'); 
                    prompt.style.display = "none";
                }

                if (isCooking) {
                    cookProgress += delta * 25;
                    document.getElementById('fry-bar').style.width = cookProgress + "%";
                    if (cookProgress >= 100) {
                        isCooking = false; cookProgress = 0;
                        document.getElementById('fry-ui').style.display = 'none';
                        document.getElementById('hold-status').innerText = "COOKED_BUTTER";
                        heldItem = butter;
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
