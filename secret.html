<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEX // 47.4_RAW_BYPASS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: monospace; }
        #hud { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px; pointer-events: none; }
    </style>
</head>
<body>

<div id="hud">
    VORTEX_v47.4<br>
    - HOLD MOUSE BUTTON to Turn<br>
    - WASD to Walk
</div>

<script>
let scene, camera, renderer, player, clock;
let yaw = 0, pitch = 0;
let keys = {};
let isDragging = false;
let lastMouse = { x: 0, y: 0 };

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    
    // POV Fix: Near 0.2
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
    camera.rotation.order = "YXZ"; // Critical for FPS movement

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    clock = new THREE.Clock();

    // Player Setup
    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 7);

    // Visual Marker (The Counter)
    const counter = new THREE.Mesh(
        new THREE.BoxGeometry(10, 1, 2), 
        new THREE.MeshStandardMaterial({color: 0x4a3a2a})
    );
    counter.position.set(0, 0.5, -4);
    scene.add(counter);

    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(50, 50),
        new THREE.MeshStandardMaterial({color: 0x222222})
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const light = new THREE.PointLight(0xffaa44, 2, 20);
    light.position.set(0, 5, -2);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    // --- DIRECT INPUT BINDING ---
    window.addEventListener('keydown', (e) => { keys[e.code] = true; });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    window.addEventListener('mousedown', (e) => {
        isDragging = true;
        lastMouse = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            let dx = e.clientX - lastMouse.x;
            let dy = e.clientY - lastMouse.y;
            
            yaw -= dx * 0.005;
            pitch -= dy * 0.005;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            
            lastMouse = { x: e.clientX, y: e.clientY };
        }
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta();

    // Apply Camera
    player.rotation.y = yaw;
    camera.position.copy(player.position);
    camera.position.y = 1.65; // Eye level
    camera.rotation.x = pitch;
    camera.rotation.y = yaw;

    // Movement
    let speed = 7;
    let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
    let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);

    if (moveX !== 0 || moveZ !== 0) {
        let fwd = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).multiplyScalar(moveZ);
        let side = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).multiplyScalar(moveX);
        player.position.x -= (fwd.x + side.x) * speed * dt;
        player.position.z -= (fwd.z + side.z) * speed * dt;
    }

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
