<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Archives</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link rel="stylesheet" href="style.css">
    <style>
        /* Themed styles for the Corporate Archive */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .archive-container {
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffcc;
        }
        .archive-title {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffcc;
            letter-spacing: 2px;
        }
        .archive-subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 30px;
        }
        .archive-content {
            border: 1px solid #00ffcc;
            padding: 40px;
            border-radius: 8px;
            background: rgba(0, 255, 204, 0.05);
            max-width: 500px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        .back-link {
            margin-top: 30px;
            color: #00ffcc;
            text-decoration: none;
            border: 1px solid #00ffcc;
            padding: 10px 20px;
            display: inline-block;
            transition: 0.3s;
        }
        .back-link:hover {
            background: #00ffcc;
            color: #000;
        }
    </style>
</head>

<body>

    <div class="archive-container">
        <div class="archive-content">
            <h1 class="archive-title">ACCESS GRANTED</h1>
            <p class="archive-subtitle">Welcome to the hidden archives.</p>
            <p style="color: #ccc; line-height: 1.6;">
                This directory is now restricted to authorized personnel. 
                System protocols updated for company transition.
            </p>
        </div>

        <a href="index.html" class="back-link">Return to Home</a>
    </div>

</body>
</html>
