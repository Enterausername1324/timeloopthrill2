<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // CLICK_v41</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        :root { --neon: #00ffcc; --horror: #ff0055; }
        body { margin: 0; background: #080808; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #smile-overlay { position: absolute; bottom: -50px; right: -50px; width: 250px; height: 250px; background: radial-gradient(circle, rgba(255,0,85,0.08) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; opacity: 0; pointer-events: none; z-index: 5000; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; cursor: pointer; }
        #hud { position: absolute; top: 20px; left: 20px; color: #666; pointer-events: none; z-index: 10; font-size: 10px; }
        #prompt-layer { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); color: var(--neon); font-size: 14px; pointer-events: none; z-index: 15; text-align: center; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1px solid rgba(255,255,255,0.3); transition: 0.1s; }
        #crosshair.active { border: 2px solid var(--neon); transform: translate(-50%, -50%) scale(1.3); }
        #mobile-e { position: absolute; bottom: 50px; right: 50px; width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 2px solid #fff; border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-size: 28px; z-index: 2000; cursor: pointer; }
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; border: 1px solid #444; border-radius: 50%; display: none; z-index: 2000; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.15; }
        #fry-ui { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 220px; height: 3px; background: #111; border: 1px solid var(--neon); display: none; }
        #fry-bar { width: 0%; height: 100%; background: var(--neon); }
    </style>
</head>
<body>
    <div id="smile-overlay"></div>
    <div id="overlay"><h1>VORTEX_CLICK_v41</h1><p>[ CLICK ANYWHERE TO BOOT ]</p></div>
    <div id="hud"><div>MODE: HYBRID_CLICK</div><div id="timer">SMILE: 0.00</div><div id="hold-status">EMPTY</div></div>
    <div id="prompt-layer"></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>
    <div id="fry-ui"><div id="fry-bar"></div></div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, moveDir = {x:0, z:0}, targetRot = {y:0, x:0}, currentRot = {y:0, x:0};
        let joyTouchID = null, lookTouchID = null, lastLookPos = {x:0, y:0};
        let playerGroup, butter, fryer, pointLight;
        let heldItem = null, isCooking = false, cookProgress = 0, interactableObj = null;
        let colliders = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x060606);
            scene.fog = new THREE.FogExp2(0x060606, 0.08);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 6);
            playerGroup.add(camera);
            camera.position.y = 1.75;

            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
            pointLight = new THREE.PointLight(0xffffff, 0.6, 25);
            pointLight.position.set(0, 4, -2);
            scene.add(pointLight);

            const addBox = (w, h, d, x, y, z, col, solid=true) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: col, roughness: 0.5}));
                mesh.position.set(x, y, z);
                scene.add(mesh);
                if(solid) colliders.push(new THREE.Box3().setFromObject(mesh));
                return mesh;
            };

            addBox(30, 0.1, 30, 0, 0, 0, 0x0f0f0f, false); // Floor
            addBox(20, 10, 0.5, 0, 5, -5, 0x121212); // Back Wall
            
            const mirror = new THREE.Reflector(new THREE.PlaneGeometry(3.2, 2.2), {
                clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0x555555
            });
            mirror.position.set(2, 2.8, -4.73); scene.add(mirror);

            addBox(10, 1, 2, 0, 0.5, -4, 0x1a1a1a); // Counter
            addBox(1.8, 3.8, 1.8, -4, 1.9, -4, 0x222222); // Fridge
            addBox(1.8, 1.8, 1.8, 4, 0.9, -4, 0xcccccc); // Washer
            
            fryer = addBox(1.2, 0.4, 1.2, -1.5, 1.1, -4, 0x333333, false);
            butter = addBox(0.3, 0.3, 0.3, 0.5, 1.15, -4, 0x00ffcc, false);
            butter.material.emissive.set(0x00ffcc);
            butter.material.emissiveIntensity = 0.2;

            setupInput();
            animate();
        }

        const interact = () => {
            if(!interactableObj) return;
            if(interactableObj === "Butter" && !heldItem) {
                heldItem = butter;
                document.getElementById('hold-status').innerText = "HOLDING: BUTTER";
            }
            if(interactableObj === "Fryer" && heldItem) {
                isCooking = true; heldItem = null;
                butter.position.set(-1.5, 1.3, -4);
                document.getElementById('hold-status').innerText = "VORTEX_FRYING...";
                document.getElementById('fry-ui').style.display = 'block';
            }
        };

        function setupInput() {
            const start = () => {
                if(!gameActive) {
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    if(isTouch) {
                        document.getElementById('joy-base').style.display = 'block';
                        document.getElementById('mobile-e').style.display = 'flex';
                    } else {
                        document.body.requestPointerLock();
                    }
                } else if (!isTouch) {
                    // IF PC AND ACTIVE, LEFT CLICK INTERACTS
                    interact();
                }
            };

            window.addEventListener('mousedown', start);
            window.addEventListener('keydown', (e) => { 
                keys[e.key.toLowerCase()] = true; 
                if(e.key.toLowerCase() === 'e') interact();
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    targetRot.y -= e.movementX * 0.002;
                    targetRot.x -= e.movementY * 0.002;
                }
            });

            document.getElementById('mobile-e').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });

            window.addEventListener('touchstart', (e) => {
                if(!gameActive) { start(); return; }
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) joyTouchID = t.identifier;
                    else if (t.target.id !== "mobile-e") { 
                        lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY; 
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                if(!gameActive) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) {
                        const rect = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60);
                        let dist = Math.sqrt(dx*dx+dy*dy); if(dist > 60) { dx *= 60/dist; dy *= 60/dist; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / 60; moveDir.z = dy / 60;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.007;
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.007;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
        }

        function checkCollisions(pos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(0.8, 1.8, 0.8));
            for(let box of colliders) { if(playerBox.intersectsBox(box)) return true; }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            if (gameActive) {
                let smile = document.getElementById('smile-overlay');
                let minutes = time / 60;
                smile.style.opacity = Math.min(0.4, minutes * 0.15);
                smile.style.transform = `scale(${1 + minutes * 5})`;
                document.getElementById('timer').innerText = `SMILE: ${minutes.toFixed(2)}`;

                currentRot.y += (targetRot.y - currentRot.y) * 0.15;
                currentRot.x += (targetRot.x - currentRot.x) * 0.15;
                camera.rotation.y = currentRot.y;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

                let f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                let r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();

                let speed = 7.0;
                let step = new THREE.Vector3();
                if(keys['w']) step.addScaledVector(f, speed * delta);
                if(keys['s']) step.addScaledVector(f, -speed * delta);
                if(keys['a']) step.addScaledVector(r, -speed * delta);
                if(keys['d']) step.addScaledVector(r, speed * delta);
                step.addScaledVector(f, -moveDir.z * speed * delta);
                step.addScaledVector(r, moveDir.x * speed * delta);

                let nextPosX = playerGroup.position.clone().add(new THREE.Vector3(step.x, 0, 0));
                if(!checkCollisions(nextPosX)) playerGroup.position.x = nextPosX.x;
                let nextPosZ = playerGroup.position.clone().add(new THREE.Vector3(0, 0, step.z));
                if(!checkCollisions(nextPosZ)) playerGroup.position.z = nextPosZ.z;

                if(heldItem) {
                    heldItem.position.copy(playerGroup.position);
                    heldItem.position.add(f.multiplyScalar(1.2));
                    heldItem.position.y = 1.4 + Math.sin(time*2.5)*0.04;
                }

                let dButter = playerGroup.position.distanceTo(butter.position);
                let dFryer = playerGroup.position.distanceTo(fryer.position);
                const cross = document.getElementById('crosshair');
                const prompt = document.getElementById('prompt-layer');
                
                if (dButter < 3.0 && !heldItem) { 
                    interactableObj = "Butter"; cross.classList.add('active'); 
                    prompt.innerText = isTouch ? "TAP BUTTER TO TAKE" : "CLICK BUTTER TO TAKE";
                }
                else if (dFryer < 3.0 && heldItem) { 
                    interactableObj = "Fryer"; cross.classList.add('active'); 
                    prompt.innerText = isTouch ? "TAP FRYER TO USE" : "CLICK FRYER TO USE";
                }
                else { 
                    interactableObj = null; cross.classList.remove('active'); 
                    prompt.innerText = "";
                }

                if (isCooking) {
                    cookProgress += delta * 25;
                    document.getElementById('fry-bar').style.width = cookProgress + "%";
                    if (cookProgress >= 100) {
                        isCooking = false; cookProgress = 0;
                        document.getElementById('fry-ui').style.display = 'none';
                        heldItem = butter;
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
