<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // KINETIC_v18</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        /* The Overlay Fix: pointer-events: all ensures this catches the first tap */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95); color: #00ffcc; z-index: 1000; cursor: pointer; text-align: center;
            pointer-events: all; 
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 11px; }
        #joy-base { 
            position: absolute; bottom: 12%; left: 12%; width: 120px; height: 120px;
            border: 2px solid rgba(0,255,204,0.3); border-radius: 50%; display: none; background: rgba(0,255,204,0.05);
            z-index: 5;
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 12px; font-size: 2.5rem;">VORTEX_CORE</h1>
        <p style="color: #ff00ff;">[ CLICK_TO_WAKE_UP ]</p>
    </div>

    <div id="hud">
        <div>CORE: v18_KINETIC</div>
        <div id="status">STATUS: STANDBY</div>
        <div id="timer">0.000</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>

    <script>
        let scene, camera, renderer, clock, cubeCamera, cubeRenderTarget;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let gameActive = false, playTime = 0;
        
        let moveDir = { x: 0, z: 0 }, targetRot = { y: 0, x: 0 }, currentRot = { y: 0, x: 0 };
        let joyTouchID = null, lookTouchID = null, lastLookPos = { x: 0, y: 0 };
        let playerGroup, fridgeDoor, headMesh, fridgeOpen = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Reflection
            cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, { format: THREE.RGBFormat, generateMipmaps: true });
            cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
            cubeCamera.position.set(-3.9, 1.7, -4.9);
            scene.add(cubeCamera);

            // Player Setup
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5);

            const skinMat = new THREE.MeshStandardMaterial({ color: 0xFFD700 }); // Yellow Skin
            const headGeo = new THREE.SphereGeometry(0.25, 32, 32);
            
            // Create the Morph for the Horror Grin
            headGeo.morphAttributes.position = [];
            const pos = headGeo.attributes.position.array;
            const grin = new Float32Array(pos.length);
            for (let i = 0; i < pos.length; i += 3) {
                if (pos[i+2] > 0.15 && pos[i+1] < 0) {
                    grin[i] = pos[i] * 2.5; grin[i+1] = pos[i+1] * 4; grin[i+2] = pos[i+2] + 0.2;
                } else { grin[i] = pos[i]; grin[i+1] = pos[i+1]; grin[i+2] = pos[i+2]; }
            }
            headGeo.morphAttributes.position[0] = new THREE.Float32BufferAttribute(grin, 3);
            
            headMesh = new THREE.Mesh(headGeo, skinMat);
            headMesh.position.y = 1.8;
            playerGroup.add(headMesh);
            playerGroup.add(camera);

            // Lighting & Room
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
            const pL = new THREE.PointLight(0x00ffcc, 1, 30); pL.position.set(0, 5, 0); scene.add(pL);
            
            const createBox = (w,h,d,x,y,z,col) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col}));
                m.position.set(x,y,z); scene.add(m); return m;
            };
            createBox(100, 0.1, 100, 0, -0.05, 0, 0x111111); // Floor
            const mirror = new THREE.Mesh(new THREE.PlaneGeometry(3, 4), new THREE.MeshStandardMaterial({ envMap: cubeRenderTarget.texture, metalness: 1, roughness: 0 }));
            mirror.position.set(-4, 2.2, -4.9); scene.add(mirror);

            setupUnifiedInput();
            animate();
        }

        function setupUnifiedInput() {
            const overlay = document.getElementById('overlay');
            const joyBase = document.getElementById('joy-base');
            const joyStick = document.getElementById('joy-stick');

            // --- THE FIX: Listening to the window instead of just the overlay ---
            window.addEventListener('mousedown', (e) => {
                if (!gameActive) {
                    gameActive = true;
                    overlay.style.display = 'none';
                    if (!isTouch) document.body.requestPointerLock();
                    if (isTouch) joyBase.style.display = 'block';
                    return;
                }
                // Interaction with objects after game starts
                fridgeOpen = !fridgeOpen;
            });

            // Touch support for starting
            window.addEventListener('touchstart', (e) => {
                if (!gameActive) {
                    gameActive = true;
                    overlay.style.display = 'none';
                    joyBase.style.display = 'block';
                }
                
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.clientX < window.innerWidth / 2 && joyTouchID === null) joyTouchID = t.identifier;
                    else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                        lookTouchID = t.identifier; lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                if (!gameActive) return;
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === joyTouchID) {
                        const rect = joyBase.getBoundingClientRect();
                        let dx = t.clientX - (rect.left + rect.width/2), dy = t.clientY - (rect.top + rect.height/2);
                        let limit = rect.width/2;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                        joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / limit; moveDir.z = dy / limit;
                    } 
                    if (t.identifier === lookTouchID) {
                        targetRot.y -= (t.clientX - lastLookPos.x) * 0.007; // Very sensitive
                        targetRot.x -= (t.clientY - lastLookPos.y) * 0.007;
                        lastLookPos.x = t.clientX; lastLookPos.y = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === joyTouchID) { joyTouchID = null; moveDir = {x:0, z:0}; joyStick.style.transform = 'translate(-50%, -50%)'; }
                    if (t.identifier === lookTouchID) lookTouchID = null;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            if(gameActive) playTime += delta;

            cubeCamera.update(renderer, scene);

            currentRot.y += (targetRot.y - currentRot.y) * 0.25;
            currentRot.x += (targetRot.x - currentRot.x) * 0.25;
            camera.rotation.y = currentRot.y;
            camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

            if (gameActive) {
                let speed = 6.5;
                let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); forward.y = 0; forward.normalize();
                let right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion); right.y = 0; right.normalize();

                playerGroup.position.addScaledVector(forward, -moveDir.z * speed * delta).addScaledVector(right, moveDir.x * speed * delta);
                
                // Horror Grin Progression (Over 180 seconds)
                let horror = Math.min(1.0, playTime / 180);
                headMesh.morphTargetInfluences[0] = horror;
                document.getElementById('timer').innerText = playTime.toFixed(3);
            }

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
