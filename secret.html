<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 55.1_HORIZON</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; cursor: pointer; }
        #cursor { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1px solid black; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #bar-box { width: 200px; height: 6px; border: 1px solid #fff; background: rgba(0,0,0,0.5); display: none; margin-top: 10px; }
        #bar-fill { height: 100%; width: 0%; background: #ffcc00; }
        #joystick-wrapper { position: absolute; bottom: 50px; left: 50px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; border: 1px solid #fff; }
        #joystick-stick { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: #fff; border-radius: 50%; opacity: 0.3; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1>VORTEX TRUCK</h1>
    <p>TAP TO START // PULL LEVER FOR VIEW</p>
</div>

<div id="cursor"></div>
<div id="ui"><div id="label" style="color:white; letter-spacing:2px;">READY</div><div id="bar-box"><div id="bar-fill"></div></div></div>
<div id="joystick-wrapper"><div id="joystick-stick"></div></div>

<script>
let scene, camera, renderer, clock, player, head, fridgeDoor, windowShutter, lever, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null, windowOpen = false;
let keys = {}, butters = [], isMobile = false, colliders = [];
let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
let touchLook = { active: false, lastX: 0, lastY: 0 };

function setup() { 
    active = true; 
    document.getElementById('overlay').style.display = 'none'; 
    if(!isMobile) document.body.requestPointerLock();
}

function init() {
    isMobile = ('ontouchstart' in window);
    if(isMobile) document.getElementById('joystick-wrapper').style.display = 'block';

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Sky blue
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.rotation.order = "YXZ"; 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 0); // Spawning in center to avoid collision lock

    // --- OUTSIDE WORLD ---
    const grassGeo = new THREE.PlaneGeometry(500, 500);
    const grassMat = new THREE.MeshStandardMaterial({color: 0x2d5a27});
    const grass = new THREE.Mesh(grassGeo, grassMat);
    grass.rotation.x = -Math.PI/2; grass.position.y = -0.1; scene.add(grass);

    // Distant Towers
    for(let i=0; i<15; i++) {
        const h = 20 + Math.random()*40;
        const tower = new THREE.Mesh(new THREE.BoxGeometry(5, h, 5), new THREE.MeshStandardMaterial({color: 0x444444}));
        tower.position.set(Math.random()*200-100, h/2, -100 - Math.random()*50);
        scene.add(tower);
    }

    // --- TRUCK ---
    const truckMat = new THREE.MeshStandardMaterial({color: 0xaaaaaa, metalness: 0.8, roughness: 0.2});
    
    // Floor
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 12), new THREE.MeshStandardMaterial({color: 0x222222}));
    floor.rotation.x = -Math.PI/2; floor.position.y = 0.01; scene.add(floor);

    // Walls (with collision)
    function makeWall(w,h,d,x,y,z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), truckMat);
        m.position.set(x,y,z); scene.add(m);
        colliders.push(new THREE.Box3().setFromObject(m));
        return m;
    }
    makeWall(0.2, 4, 12, -4, 2, 0); // Left
    makeWall(8, 4, 0.2, 0, 2, -6); // Back
    makeWall(8, 4, 0.2, 0, 2, 6);  // Front
    
    // Right Wall (Split for window)
    makeWall(0.2, 4, 4.5, 4, 2, -3.75);
    makeWall(0.2, 4, 4.5, 4, 2, 3.75);
    makeWall(0.2, 1.2, 3, 4, 0.6, 0); // Below window
    makeWall(0.2, 1.3, 3, 4, 3.35, 0); // Above window

    // The Shutter
    windowShutter = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.6, 3.2), new THREE.MeshStandardMaterial({color: 0x333333, metalness: 0.9}));
    windowShutter.position.set(3.9, 2, 0); scene.add(windowShutter);

    // The Lever
    const leverBase = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0x111111}));
    leverBase.position.set(3.8, 1.5, 1.8); scene.add(leverBase);
    lever = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5), new THREE.MeshStandardMaterial({color: 0xff0000}));
    lever.position.set(3.8, 1.7, 1.8); lever.name = "lever"; scene.add(lever);

    // --- KITCHEN UNITS ---
    const fridge = new THREE.Group(); fridge.position.set(-3.2, 0.02, -4.5); scene.add(fridge);
    const fBody = new THREE.Mesh(new THREE.BoxGeometry(1.4, 3.5, 1.4), truckMat);
    fBody.position.y = 1.75; fridge.add(fBody);
    colliders.push(new THREE.Box3().setFromObject(fBody).translate(new THREE.Vector3(-3.2, 0, -4.5)));

    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(0.7, 1.75, 0.7); fridge.add(fridgeDoor);
    const dM = new THREE.Mesh(new THREE.BoxGeometry(1.4, 3.5, 0.1), truckMat);
    dM.position.set(-0.7, 0, 0); dM.name = "fridge_door"; fridgeDoor.add(dM);

    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0xfff0ad}));
        b.position.set((i%2)*0.5 - 0.25, 0.8 + (Math.floor(i/3)*1), 0); b.name = "butter"; b.userData.cookTime = 0;
        fridge.add(b); butters.push(b);
    }

    const counter = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.1, 5), new THREE.MeshStandardMaterial({color: 0x111111}));
    counter.position.set(3.2, 0.55, -2); scene.add(counter);
    colliders.push(new THREE.Box3().setFromObject(counter));

    const fryer = new THREE.Mesh(new THREE.BoxGeometry(1, 0.4, 1), new THREE.MeshStandardMaterial({color: 0x050505}));
    fryer.position.set(3.2, 1.1, -2); fryer.name = "fryer"; scene.add(fryer);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(10, 20, 10); scene.add(sun);

    // Inputs
    window.addEventListener('touchstart', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) { joy.active = true; joy.startX = t.clientX; joy.startY = t.clientY; }
            else { touchLook.active = true; touchLook.lastX = t.clientX; touchLook.lastY = t.clientY; doInteract(); }
        }
    });
    window.addEventListener('touchmove', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(joy.active && t.clientX < window.innerWidth/2) {
                let dx = t.clientX - joy.startX, dy = t.clientY - joy.startY;
                joy.x = Math.max(-1, Math.min(1, dx/40)); joy.y = Math.max(-1, Math.min(1, dy/40));
                document.getElementById('joystick-stick').style.transform = `translate(${joy.x*20}px, ${joy.y*20}px)`;
            } else if(touchLook.active) {
                yaw -= (t.clientX - touchLook.lastX) * 0.005;
                pitch -= (t.clientY - touchLook.lastY) * 0.005;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                touchLook.lastX = t.clientX; touchLook.lastY = t.clientY;
            }
        }
    });
    window.addEventListener('touchend', () => { joy.active = false; joy.x = joy.y = 0; touchLook.active = false; document.getElementById('joystick-stick').style.transform = `translate(0,0)`; });
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => delete keys[e.code]);
    window.addEventListener('mousemove', e => { if(document.pointerLockElement === document.body) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});
    window.addEventListener('mousedown', () => { if(active && !isMobile) doInteract(); });

    animate();
}

function doInteract() {
    const r = new THREE.Raycaster();
    r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let obj = hits[0].object;
        if(obj.name === "lever") windowOpen = !windowOpen;
        else if(heldItem) {
            if(obj.name === "fryer") {
                cookingButter = heldItem; scene.attach(heldItem); heldItem.position.set(3.2, 1.25, -2); heldItem = null;
                document.getElementById('bar-box').style.display = "block";
            } else { scene.attach(heldItem); heldItem.position.y = 0.1; heldItem = null; }
        } else {
            if(obj.name === "butter") { heldItem = obj; player.add(heldItem); heldItem.position.set(0.4, 1.2, -0.6); }
            else if(obj.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

let fridgeOpen = false;
function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta();
    if(active) {
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        camera.position.set(player.position.x, 1.65, player.position.z);
        fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? Math.PI/1.8 : 0, 0.1);
        windowShutter.position.y = THREE.MathUtils.lerp(windowShutter.position.y, windowOpen ? 3.6 : 2, 0.1);
        lever.rotation.x = THREE.MathUtils.lerp(lever.rotation.x, windowOpen ? -0.8 : 0.8, 0.1);

        if(cookingButter) {
            cookingButter.userData.cookTime += dt;
            let p = Math.min(cookingButter.userData.cookTime / 30, 1.0);
            document.getElementById('bar-fill').style.width = (p*100)+"%";
        }

        let mZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0) + joy.y;
        let mX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0) + joy.x;
        if(mX || mZ) {
            let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
            let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
            let moveVec = new THREE.Vector3().addScaledVector(fwd, mZ * 4 * dt).addScaledVector(side, mX * 4 * dt);
            let testPos = player.position.clone().add(moveVec);
            
            // Loose AABB Collision
            let hit = false;
            let pBB = new THREE.Box3().setFromCenterAndSize(testPos, new THREE.Vector3(0.5, 2, 0.5));
            for(let box of colliders) { if(pBB.intersectsBox(box)) hit = true; }
            if(!hit) player.position.copy(testPos);
        }
    }
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
