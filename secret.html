<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 47.1_FAILSAFE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: monospace; touch-action: none; user-select: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; }
        #hud { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 10px; pointer-events: none; }
        #instr { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #555; font-size: 12px; pointer-events: none; text-align: center; }
    </style>
</head>
<body>

<div id="overlay" onclick="this.style.display='none'; active=true;">
    <h1>VORTEX_v47.1</h1>
    <p>[ CLICK TO START ]</p>
</div>

<div id="hud">SMILE_IDX: <span id="timer">0.00</span></div>
<div id="instr">WASD to Walk | CLICK + DRAG to Look</div>

<script>
let scene, camera, renderer, clock, player, body, mouth, mirror, pointLight;
let active = false, yaw = 0, pitch = 0;
let keys = {}, lastMouse = {x:0, y:0}, isDown = false;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 7);

    body = new THREE.Group();
    player.add(body);
    body.position.z = -0.2; // v45 View Fix

    // Player Mesh
    let head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; body.add(head);
    let shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
    shirt.position.y = 0.9; body.add(shirt);
    mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
    mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
    mouth.position.set(0, 1.6, 0.28); head.add(mouth);

    // Bright Wood Kitchen (Restored)
    const add = (w,h,d,x,y,z,c) => {
        let m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:c, roughness: 0.6}));
        m.position.set(x,y,z); scene.add(m); return m;
    };
    add(40, 0.1, 40, 0, 0, 0, 0x4a3a2a); // Floor
    add(12, 1.1, 2.5, 0, 0.55, -4, 0x5a3a2a); // Counter
    add(25, 12, 0.5, 0, 6, -5.2, 0x221108); // Wall

    mirror = new THREE.Reflector(new THREE.PlaneGeometry(4, 3), {
        clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0xaaaaaa
    });
    mirror.position.set(2.5, 3, -5.1); scene.add(mirror);

    pointLight = new THREE.PointLight(0xffcc88, 2.5, 30);
    pointLight.position.set(0, 5, -1); scene.add(pointLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    // --- FAIL-SAFE INPUT ---
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    window.addEventListener('mousedown', e => { isDown = true; lastMouse = {x:e.clientX, y:e.clientY}; });
    window.addEventListener('mouseup', () => { isDown = false; });
    window.addEventListener('mousemove', e => {
        if(active && isDown) {
            let dx = e.clientX - lastMouse.x;
            let dy = e.clientY - lastMouse.y;
            yaw -= dx * 0.005;
            pitch -= dy * 0.005;
            lastMouse = {x:e.clientX, y:e.clientY};
        }
    });

    // Mobile Support
    window.addEventListener('touchstart', e => {
        isDown = true;
        lastMouse = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    });
    window.addEventListener('touchmove', e => {
        if(active) {
            let dx = e.touches[0].clientX - lastMouse.x;
            let dy = e.touches[0].clientY - lastMouse.y;
            yaw -= dx * 0.008;
            pitch -= dy * 0.008;
            lastMouse = {x:e.touches[0].clientX, y:e.touches[0].clientY};
        }
    });
    window.addEventListener('touchend', () => isDown = false);

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = Math.min(clock.getDelta(), 0.1);

    // Apply View
    player.rotation.y = yaw;
    camera.rotation.x = Math.max(-1.5, Math.min(1.5, pitch));

    // Simple Movement Math
    let speed = 7.0;
    let moveX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
    let moveZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);

    if(moveX !== 0 || moveZ !== 0) {
        // Move relative to where you look
        let fwd = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).multiplyScalar(moveZ);
        let side = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).multiplyScalar(moveX);
        player.position.x -= (fwd.x + side.x) * speed * dt;
        player.position.z -= (fwd.z + side.z) * speed * dt;
    }

    let m = clock.getElapsedTime()/60;
    document.getElementById('timer').innerText = m.toFixed(2);
    if(m > 3) mouth.scale.x = 1 + (m-3)*4;
    if(m > 5) { mouth.material.color.set(0xff0000); pointLight.color.set(0xff0000); }

    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
