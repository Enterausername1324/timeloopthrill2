<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 46.2_FIXED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        :root { --neon: #00ffcc; --horror: #ff0055; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        
        /* FIXED OVERLAY: Higher z-index and more responsive */
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: #000; color: #fff; z-index: 9999; cursor: pointer; text-align: center;
        }
        
        #hud { position: absolute; top: 20px; left: 20px; color: #444; pointer-events: none; z-index: 10; font-size: 10px; text-transform: uppercase; }
        #prompt { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: var(--neon); font-size: 16px; pointer-events: none; z-index: 15; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1.5px solid #333; border-radius: 50%; }
        #crosshair.active { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); transform: translate(-50%, -50%) scale(1.4); }
        
        #mobile-e { position: absolute; bottom: 60px; right: 60px; width: 90px; height: 90px; background: rgba(0,255,204,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; display: none; justify-content: center; align-items: center; font-size: 32px; z-index: 2000; }
        #joy-base { position: absolute; bottom: 60px; left: 60px; width: 120px; height: 120px; border: 1px solid #222; border-radius: 50%; display: none; z-index: 2000; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 45px; height: 45px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.1; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:var(--horror)">VORTEX_FIXED_v46.2</h1>
        <p>[ CLICK / TAP / PRESS SPACE TO START ]</p>
        <p style="font-size:10px; color:#444">VERIFYING INPUT STREAMS...</p>
    </div>

    <div id="hud">
        <div id="timer">SMILE_IDX: 0.00</div>
        <div id="hold">HOLDING: NOTHING</div>
    </div>
    <div id="prompt"></div>
    <div id="crosshair"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="mobile-e">E</div>

    <script>
        let scene, camera, renderer, clock, keys = {};
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let active = false, yaw = 0, pitch = 0, moveDir = {x:0, z:0};
        let joyID = null, lookID = null, lastTouch = {x:0, y:0};
        let player, body, mouth, lEye, rEye, mirror, pointLight;
        let butter, fryer, held = null, target = null;
        let colliders = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            scene.fog = new THREE.FogExp2(0x010101, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            player = new THREE.Group();
            scene.add(player);
            player.position.set(0, 0, 7);

            body = new THREE.Group();
            player.add(body);
            body.position.z = -0.2; // v45/v46.1 FIX: Offset body so POV is clear

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            head.position.y = 1.65; body.add(head);

            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
            shirt.position.y = 0.9; body.add(shirt);

            lEye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), new THREE.MeshBasicMaterial({color: 0xffffff}));
            lEye.position.set(-0.12, 1.75, 0.25); head.add(lEye);
            rEye = lEye.clone(); rEye.position.x = 0.12; head.add(rEye);

            mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
            mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
            mouth.position.set(0, 1.6, 0.28); head.add(mouth);

            camera.position.set(0, 1.65, 0);

            // --- WORLD ---
            const add = (w, h, d, x, y, z, col, solid=true) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: col, roughness: 1}));
                mesh.position.set(x, y, z); mesh.receiveShadow = true; mesh.castShadow = true;
                scene.add(mesh);
                if(solid) colliders.push(new THREE.Box3().setFromObject(mesh));
                return mesh;
            };

            add(30, 0.1, 30, 0, 0, 0, 0x1a0f05, false); // Floor
            add(20, 10, 0.5, 0, 5, -5, 0x110a05); // Wall
            add(12, 1, 2.5, 0, 0.5, -4, 0x221105); // Counter

            mirror = new THREE.Reflector(new THREE.PlaneGeometry(3.5, 2.5), {
                clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0x888888
            });
            mirror.position.set(2, 2.9, -4.73); scene.add(mirror);

            fryer = add(1.5, 0.4, 1.5, -1, 1.1, -4, 0x444444, false);
            butter = add(0.4, 0.4, 0.4, 1.5, 1.2, -4, 0x00ffcc, false);
            butter.material.emissive.set(0x00ffcc);

            pointLight = new THREE.PointLight(0xffaa44, 1.5, 20);
            pointLight.position.set(0, 4, -2); scene.add(pointLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));

            setupHandlers();
            animate();
        }

        function setupHandlers() {
            const forceStart = () => {
                if(active) return;
                active = true;
                document.getElementById('overlay').style.display = 'none';
                if(isTouch) {
                    document.getElementById('joy-base').style.display = 'block';
                    document.getElementById('mobile-e').style.display = 'flex';
                } else {
                    document.body.requestPointerLock();
                }
            };

            // MULTI-STREAM START LISTENER
            window.addEventListener('mousedown', forceStart);
            window.addEventListener('touchstart', forceStart, {passive: false});
            window.addEventListener('keydown', (e) => {
                if(e.code === 'Space' || e.code === 'Enter') forceStart();
                keys[e.key.toLowerCase()] = true;
                if(e.key.toLowerCase() === 'e') interact();
            });

            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            
            // Mouse Look
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });

            // Mobile Handlers
            window.addEventListener('touchstart', (e) => {
                if(!active) return;
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) joyID = t.identifier;
                    else if(t.target.id != "mobile-e") { lookID = t.identifier; lastTouch.x = t.clientX; lastTouch.y = t.clientY; }
                }
            });

            window.addEventListener('touchmove', (e) => {
                if(!active) return;
                for(let t of e.changedTouches) {
                    if(t.identifier == joyID) {
                        const r = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (r.left+60), dy = t.clientY - (r.top+60);
                        let d = Math.sqrt(dx*dx+dy*dy); if(d>60) { dx*=60/d; dy*=60/d; }
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx/60; moveDir.z = dy/60;
                    } 
                    if(t.identifier == lookID) {
                        yaw -= (t.clientX - lastTouch.x)*0.006;
                        pitch -= (t.clientY - lastTouch.y)*0.006;
                        pitch = Math.max(-1.5, Math.min(1.5, pitch));
                        lastTouch.x = t.clientX; lastTouch.y = t.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier == joyID) { joyID = null; moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
                    if(t.identifier == lookID) lookID = null;
                }
            });
            
            document.getElementById('mobile-e').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
        }

        function interact() {
            if(!target) return;
            if(target == "Butter" && !held) { held = butter; document.getElementById('hold').innerText = "HOLDING: BUTTER"; }
            if(target == "Fryer" && held) { held = null; butter.position.set(-1, 1.25, -4); document.getElementById('hold').innerText = "USED FRYER"; }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            if(active) {
                player.rotation.y = yaw;
                camera.rotation.x = pitch;

                let f = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                let r = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                let s = new THREE.Vector3();
                if(keys['w']) s.addScaledVector(f, 7*dt); if(keys['s']) s.addScaledVector(f, -7*dt);
                if(keys['a']) s.addScaledVector(r, -7*dt); if(keys['d']) s.addScaledVector(r, 7*dt);
                s.addScaledVector(f, -moveDir.z*7*dt); s.addScaledVector(r, moveDir.x*7*dt);

                let next = player.position.clone().add(s);
                let pBox = new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(0.8, 1.8, 0.8));
                let hit = false; for(let b of colliders) if(pBox.intersectsBox(b)) hit = true;
                if(!hit) player.position.copy(next);

                if(held) { held.position.copy(player.position).add(f.multiplyScalar(1.2)); held.position.y = 1.45 + Math.sin(time*3)*0.05; }

                let dBut = player.position.distanceTo(butter.position);
                let dFry = player.position.distanceTo(fryer.position);
                if(dBut < 3 && !held) { target = "Butter"; document.getElementById('crosshair').classList.add('active'); }
                else if(dFry < 3 && held) { target = "Fryer"; document.getElementById('crosshair').classList.add('active'); }
                else { target = null; document.getElementById('crosshair').classList.remove('active'); }

                let m = time/60; 
                document.getElementById('timer').innerText = `SMILE_IDX: ${m.toFixed(2)}`;
                if(m >= 3) mouth.scale.x = 1 + (m-3)*2.5;
                if(m >= 5) { mouth.material.color.set(0xff0000); pointLight.color.set(0xff0000); }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
