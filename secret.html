<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // HYBRID_v46.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Reflector.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; cursor: pointer; }
        #hud { position: absolute; top: 15px; left: 15px; color: #555; font-size: 11px; pointer-events: none; }
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 110px; height: 110px; border: 1px solid #333; border-radius: 50%; display:none; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.15; }
        #mobile-e { position: absolute; bottom: 50px; right: 50px; width: 80px; height: 80px; border: 2px solid #00ffcc; border-radius: 50%; color: #00ffcc; display:none; justify-content:center; align-items:center; font-size: 24px; }
    </style>
</head>
<body>

<div id="overlay" onclick="setupGame()"><h1>VORTEX_v46.6</h1><p>CLICK (PC) OR TAP (MOBILE)</p></div>
<div id="hud">SMILE_IDX: <span id="timer">0.00</span></div>
<div id="joy-base"><div id="joy-stick"></div></div>
<div id="mobile-e">E</div>

<script>
let scene, camera, renderer, clock, player, body, mouth, mirror, pointLight, butter, fryer;
let keys = {}, active = false, yaw = 0, pitch = 0, held = null;
let moveDir = {x:0, z:0}, joyID = null, lookID = null, lastLook = {x:0, y:0};
let isMobile = ('ontouchstart' in window);

function setupGame() {
    active = true;
    document.getElementById('overlay').style.display = 'none';
    if(!isMobile) {
        document.body.requestPointerLock();
    } else {
        document.getElementById('joy-base').style.display = 'block';
        document.getElementById('mobile-e').style.display = 'flex';
    }
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.2, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group();
    scene.add(player);
    player.position.set(0, 0, 7);

    body = new THREE.Group();
    player.add(body);
    body.position.z = -0.2; // View Fix

    // Char
    let head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({color: 0xffcc00}));
    head.position.y = 1.65; body.add(head);
    let shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
    shirt.position.y = 0.9; body.add(shirt);
    mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 32, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x000000}));
    mouth.rotation.set(Math.PI/2, Math.PI, Math.PI/2);
    mouth.position.set(0, 1.6, 0.28); head.add(mouth);

    // World
    const add = (w,h,d,x,y,z,c) => {
        let m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:c}));
        m.position.set(x,y,z); scene.add(m); return m;
    };
    add(30, 0.1, 30, 0, 0, 0, 0x1a0f05); // Floor
    add(12, 1, 2.5, 0, 0.5, -4, 0x221105); // Counter
    add(20, 10, 0.5, 0, 5, -5, 0x110a05); // Wall

    mirror = new THREE.Reflector(new THREE.PlaneGeometry(3.5, 2.5), {
        clipBias: 0.003, textureWidth: window.innerWidth, textureHeight: window.innerHeight, color: 0x888888
    });
    mirror.position.set(2, 2.9, -4.73); scene.add(mirror);

    fryer = add(1.5, 0.4, 1.5, -1, 1.1, -4, 0x444444);
    butter = add(0.4, 0.4, 0.4, 1.5, 1.2, -4, 0x00ffcc);
    butter.material.emissive.set(0x00ffcc);

    pointLight = new THREE.PointLight(0xffaa44, 1.5, 20);
    pointLight.position.set(0, 4, -2); scene.add(pointLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.1));

    // Listeners
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousemove', e => {
        if(document.pointerLockElement) {
            yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
        }
    });

    window.addEventListener('touchstart', e => {
        if(!active) return;
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) joyID = t.identifier;
            else lookID = t.identifier, lastLook = {x:t.clientX, y:t.clientY};
        }
    }, {passive:false});

    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyID) {
                let r = document.getElementById('joy-base').getBoundingClientRect();
                moveDir.x = (t.clientX - (r.left+55))/55; moveDir.z = (t.clientY - (r.top+55))/55;
                document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${moveDir.x*30}px), calc(-50% + ${moveDir.z*30}px))`;
            }
            if(t.identifier === lookID) {
                yaw -= (t.clientX - lastLook.x) * 0.006; pitch -= (t.clientY - lastLook.y) * 0.006;
                lastLook = {x:t.clientX, y:t.clientY};
            }
        }
    }, {passive:false});

    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyID) { moveDir = {x:0, z:0}; document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)'; }
            if(t.identifier === lookID) lookID = null;
        }
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(!active) return;
    let dt = clock.getDelta();

    player.rotation.y = yaw;
    camera.rotation.x = Math.max(-1.5, Math.min(1.5, pitch));

    let speed = 6;
    let dirX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0) + moveDir.x;
    let dirZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0) + moveDir.z;

    if(dirX !== 0 || dirZ !== 0) {
        let fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        let side = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        player.position.addScaledVector(fwd, dirZ * speed * dt);
        player.position.addScaledVector(side, dirX * speed * dt);
    }

    let time = clock.getElapsedTime()/60;
    document.getElementById('timer').innerText = time.toFixed(2);
    if(time > 3) mouth.scale.x = 1 + (time-3)*3;
    if(time > 5) { mouth.material.color.set(0xff0000); pointLight.color.set(0xff0000); }

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
