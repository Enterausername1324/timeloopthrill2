<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // SMOOTH_KITCHEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 100; cursor: pointer;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; opacity: 0.6; }
        
        /* Joystick - Left Side */
        #joy-base { 
            position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px;
            border: 2px solid rgba(0,255,204,0.3); border-radius: 50%; display: none;
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay"><h1>SYSTEM_READY</h1><p>CLICK / TAP TO ENGAGE</p></div>
    <div id="hud"><div>MODE: <span id="mode-text">DETECTING</span></div></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock;
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // Input States
        let moveDir = { x: 0, z: 0 };
        let keys = { w: false, a: false, s: false, d: false };
        let targetRotation = { y: 0, x: 0 };
        let currentRotation = { y: 0, x: 0 };
        
        // Touch Tracking
        let lastTouchX = 0;
        let lastTouchY = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ'; // Prevents "Gimbal Lock" spinning

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // World Building
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(50,50), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            const counter = new THREE.Mesh(new THREE.BoxGeometry(6, 0.9, 1.2), new THREE.MeshStandardMaterial({color: 0x222222}));
            counter.position.set(0, 0.45, -2); scene.add(counter);

            setupControls();
            animate();
        }

        function setupControls() {
            const overlay = document.getElementById('overlay');
            const joyBase = document.getElementById('joy-base');
            const joyStick = document.getElementById('joy-stick');

            overlay.addEventListener('mousedown', () => {
                overlay.style.display = 'none';
                if (!isMobile) document.body.requestPointerLock();
            });

            if (isMobile) {
                document.getElementById('mode-text').innerText = "IPAD_TOUCH";
                joyBase.style.display = 'block';

                window.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    lastTouchX = touch.clientX;
                    lastTouchY = touch.clientY;
                }, {passive: false});

                window.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = joyBase.getBoundingClientRect();

                    // Movement (Left half)
                    if (touch.clientX < window.innerWidth / 2) {
                        let dx = touch.clientX - (rect.left + rect.width/2);
                        let dy = touch.clientY - (rect.top + rect.height/2);
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        let limit = rect.width/2;
                        if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                        joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / limit; moveDir.z = dy / limit;
                    } 
                    // Smooth Look (Right half)
                    else {
                        let deltaX = touch.clientX - lastTouchX;
                        let deltaY = touch.clientY - lastTouchY;
                        targetRotation.y -= deltaX * 0.005;
                        targetRotation.x -= deltaY * 0.005;
                        lastTouchX = touch.clientX;
                        lastTouchY = touch.clientY;
                    }
                }, {passive: false});

                window.addEventListener('touchend', () => {
                    moveDir = { x: 0, z: 0 };
                    joyStick.style.transform = `translate(-50%, -50%)`;
                });
            } else {
                document.getElementById('mode-text').innerText = "PC_DESKTOP";
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement) {
                        targetRotation.y -= e.movementX * 0.002;
                        targetRotation.x -= e.movementY * 0.002;
                    }
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 1. SMOOTH CAMERA LERP (The "Realistic" feel)
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.15;
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.15;
            
            // Limit looking up/down
            currentRotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, currentRotation.x));
            
            camera.rotation.y = currentRotation.y;
            camera.rotation.x = currentRotation.x;

            // 2. MOVEMENT
            if (isMobile) {
                camera.translateX(moveDir.x * 4 * delta);
                camera.translateZ(moveDir.z * 4 * delta);
            } else {
                if (keys.w) camera.translateZ(-4 * delta);
                if (keys.s) camera.translateZ(4 * delta);
                if (keys.a) camera.translateX(-4 * delta);
                if (keys.d) camera.translateX(4 * delta);
            }

            camera.position.y = 1.7; // Keep eye level
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
