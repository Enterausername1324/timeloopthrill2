<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX // KITCHEN_ENV_v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; text-align: center; background: rgba(0,0,0,0.8);
            padding: 20px; border: 1px solid #00ffcc; cursor: pointer; z-index: 20;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>VORTEX_KITCHEN_OS</h1>
        <p>(CLICK TO INITIALIZE CAMERA)</p>
        <p>W,A,S,D = MOVE | MOUSE = LOOK | ESC = UNLOCK</p>
    </div>

    <div id="hud">
        <div>LOCATION: SECTOR_KITCHEN_01</div>
        <div id="temp">BUTTER_TEMP: 0°C</div>
    </div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, butter, stove, pan;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();

        // 1. INITIALIZE WORLD
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.Fog(0x0a0a0a, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.7; // Human eye level

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.PointLight(0xffffff, 1, 20);
            light.position.set(0, 4, 0);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // --- THE KITCHEN ARCHITECTURE ---
            
            // Floor (Tile Texture Effect)
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // The Counter (L-Shape)
            const counterGeo = new THREE.BoxGeometry(8, 0.9, 1.5);
            const counterMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const counter = new THREE.Mesh(counterGeo, counterMat);
            counter.position.set(0, 0.45, -2);
            scene.add(counter);

            // The Stove (Black Glass Top)
            const stoveGeo = new THREE.BoxGeometry(1.5, 0.1, 1.2);
            const stoveMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x110000 });
            stove = new THREE.Mesh(stoveGeo, stoveMat);
            stove.position.set(0, 0.95, -2);
            scene.add(stove);

            // Decorative Dishes (Stacked Plates)
            for(let i=0; i<5; i++) {
                const plateGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.05, 32);
                const plateMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
                const plate = new THREE.Mesh(plateGeo, plateMat);
                plate.position.set(-2, 0.95 + (i * 0.06), -2);
                scene.add(plate);
            }

            // The Frying Pan
            const panGeo = new THREE.CylinderGeometry(0.5, 0.45, 0.1, 32);
            const panMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            pan = new THREE.Mesh(panGeo, panMat);
            pan.position.set(0, 1.05, -2);
            scene.add(pan);

            // The Butter
            const butterGeo = new THREE.BoxGeometry(0.2, 0.1, 0.2);
            const butterMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
            butter = new THREE.Mesh(butterGeo, butterMat);
            butter.position.set(0, 1.15, -2);
            scene.add(butter);

            // CONTROLS SETUP
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.getElementById('instructions').addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                const inst = document.getElementById('instructions');
                inst.style.display = document.pointerLockElement ? 'none' : 'block';
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                }
            });

            animate();
        }

        // 2. INPUT HANDLING
        function onKeyDown(e) {
            switch(e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        }
        function onKeyUp(e) {
            switch(e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        }

        // 3. GAME LOOP
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

            camera.translateX(-velocity.x * delta);
            camera.translateZ(velocity.z * delta);
            camera.position.y = 1.7; // Keep eye level locked

            renderer.render(scene, camera);
            prevTime = time;
        }

        init();
    </script>
</body>
</html>
