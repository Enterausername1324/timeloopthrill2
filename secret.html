<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // PUPPET_KITCHEN_v14</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95); color: #00ffcc; z-index: 100; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 10; font-size: 12px; text-shadow: 0 0 5px #00ffcc; }
        #joy-base { 
            position: absolute; bottom: 10%; left: 10%; width: 120px; height: 120px;
            border: 2px solid #00ffcc; border-radius: 50%; display: none; background: rgba(0,255,204,0.05);
            box-shadow: inset 0 0 20px rgba(0,255,204,0.2);
        }
        #joy-stick { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
            background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px #00ffcc;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border: 1px solid #00ffcc; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 10px;">VORTEX_CORE_v14</h1>
        <p>[ TAP_ANYWHERE_TO_LOAD_REFLECTION_ENGINE ]</p>
    </div>

    <div id="hud">
        <div>SYS: REFLECTION_OMNI_v14</div>
        <div id="input-mode">SCANNING...</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="crosshair"></div>

    <script>
        let scene, camera, renderer, clock, cubeCamera, cubeRenderTarget;
        let isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        let moveDir = { x: 0, z: 0 };
        let keys = {};
        let targetRot = { y: 0, x: 0 };
        let currentRot = { y: 0, x: 0 };
        let lastTouch = { x: 0, y: 0 };

        let playerGroup, fridgeDoor;
        let fridgeOpen = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 0, 40);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // --- THE PLAYER (INVISIBLE TO SELF, VISIBLE TO MIRROR) ---
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            playerGroup.position.set(0, 0, 5); // Start position

            // 1. Torso (Body)
            const torsoGeo = new THREE.CylinderGeometry(0.3, 0.1, 1.2, 8);
            const torsoMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, wireframe: true }); // Vortex Color
            const torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 1.0; playerGroup.add(torso);

            // 2. Head
            const headGeo = new THREE.SphereGeometry(0.2, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffffff }); // Stark white
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.8; playerGroup.add(head);

            // 3. Legs (A simple cylinder)
            const legsGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 8);
            const legs = new THREE.Mesh(legsGeo, torsoMat);
            legs.position.y = 0.25; playerGroup.add(legs);

            // Add camera to the player group so it follows the puppet
            playerGroup.add(camera);
            camera.position.y = 1.7; // Head height (approx)

            // --- ADVANCED MIRROR & LIGHTING ---
            
            // Reflection Capture Engine
            cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, { format: THREE.RGBFormat, generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter });
            cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
            // Move CubeCamera slightly inside the mirror plane to avoid self-clipping
            cubeCamera.position.set(-3.9, 1.7, -4.9);
            scene.add(cubeCamera);

            // Basic Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const spotlight = new THREE.PointLight(0x00ffcc, 1, 20);
            spotlight.position.set(0, 5, 0); scene.add(spotlight);

            // --- BUILD THE KITCHEN ---
            const createBox = (w,h,d,x,y,z,col,metal=0,rough=1) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col, metalness:metal, roughness:rough}));
                mesh.position.set(x,y,z); scene.add(mesh); return mesh;
            };

            // Floor & Walls
            createBox(100, 0.1, 100, 0, -0.05, 0, 0x111111); // Floor
            createBox(12, 5, 0.1, 0, 2.5, -5, 0x222222); // Back Wall

            // 1. THE MIRROR (Plane that uses the CubeCamera Texture)
            const mirrorGeo = new THREE.PlaneGeometry(3, 4);
            const mirrorMat = new THREE.MeshStandardMaterial({ envMap: cubeRenderTarget.texture, metalness: 1, roughness: 0 });
            const mirror = new THREE.Mesh(mirrorGeo, mirrorMat);
            mirror.position.set(-4, 2.2, -4.9);
            scene.add(mirror);

            // 2. THE SINK (Depth Fix Applied)
            createBox(6, 0.9, 1.4, -1, 0.45, -3.8, 0x151515); // Cabinet
            createBox(6.1, 0.05, 1.5, -1, 0.92, -3.8, 0x333333, 0.2, 0.1); // Marble Top
            
            // Realistic sink basin
            createBox(1.2, 0.4, 0.8, -1.8, 0.7, -3.8, 0x0a0a0a); // Sink Basin Box
            createBox(0.05, 0.5, 0.05, -1.8, 1.15, -4.2, 0x888888, 1, 0); // Faucet Chrome

            // 3. THE FRIDGE (Moved away from Counter)
            const fridgeMat = new THREE.MeshStandardMaterial({color: 0xdddddd, metalness: 0.7, roughness: 0.2});
            createBox(1.6, 2.6, 1.2, 3.5, 1.3, -3.8, 0xaaaaaa); // Body

            fridgeDoor = new THREE.Group(); scene.add(fridgeDoor);
            const dMesh = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.6, 0.1), fridgeMat);
            dMesh.position.set(0.8, 1.3, 0.05); // Set geometry so pivot is at the edge
            fridgeDoor.add(dMesh);
            fridgeDoor.position.set(2.7, 0, -3.15); // Pivot at the corner

            // Interior Butter
            for(let i=0; i<12; i++) {
                const b = createBox(0.2, 0.1, 0.2, 3.0 + (i%3)*0.3, 0.4 + Math.floor(i/3)*0.4, -3.8, 0xffd700);
            }

            setupUnifiedInput();
            animate();
        }

        function setupUnifiedInput() {
            const overlay = document.getElementById('overlay'), joyBase = document.getElementById('joy-base'), joyStick = document.getElementById('joy-stick');

            overlay.addEventListener('click', () => {
                overlay.style.display = 'none';
                if (!isTouch) document.body.requestPointerLock();
                fridgeOpen = !fridgeOpen; // Toggle fridge for now
            });

            if (isTouch) {
                joyBase.style.display = 'block';
                document.getElementById('input-mode').innerText = "MODE: TABLET_MODE_v14";

                window.addEventListener('touchstart', (e) => { const t = e.touches[e.touches.length - 1]; lastTouch.x = t.clientX; lastTouch.y = t.clientY; }, {passive: false});

                window.addEventListener('touchmove', (e) => {
                    e.preventDefault(); const t = e.touches[0];
                    
                    // Joystick (Left half)
                    if (t.clientX < window.innerWidth / 2) {
                        const rect = joyBase.getBoundingClientRect();
                        let dx = t.clientX - (rect.left + 60);
                        let dy = t.clientY - (rect.top + 60);
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        let limit = 60;
                        if (dist > limit) { dx *= limit/dist; dy *= limit/dist; }
                        joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        moveDir.x = dx / limit; moveDir.z = dy / limit;
                    } 
                    // Look Swipe (Right half)
                    else {
                        targetRot.y -= (t.clientX - lastTouch.x) * 0.0035;
                        targetRot.x -= (t.clientY - lastTouch.y) * 0.0035;
                        lastTouch.x = t.clientX; lastTouch.y = t.clientY;
                    }
                }, {passive: false});

                window.addEventListener('touchend', () => { moveDir = { x: 0, z: 0 }; joyStick.style.transform = 'translate(-50%, -50%)'; });
            } else {
                document.getElementById('input-mode').innerText = "MODE: PC_DESKTOP_v14";
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => { if (document.pointerLockElement) { targetRot.y -= e.movementX * 0.002; targetRot.x -= e.movementY * 0.002; } });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            // 1. UPDATE REFLECTION (The core requirement)
            // The CubeCamera updates the scene *before* the main camera renders,
            // capturing the current environment (including the puppet model).
            cubeCamera.update(renderer, scene);

            // 2. Camera Smoother
            currentRot.y += (targetRot.y - currentRot.y) * 0.22;
            currentRot.x += (targetRot.x - currentRot.x) * 0.22;
            camera.rotation.y = currentRot.y;
            camera.rotation.x = Math.max(-1.4, Math.min(1.4, currentRot.x));

            // 3. APPLY MOVEMENT TO THE PLAYER PUPPET (Not the Camera)
            let speed = 5;
            if (isTouch) {
                playerGroup.translateX(moveDir.x * speed * delta);
                playerGroup.translateZ(moveDir.z * speed * delta);
            } else {
                if (keys['w']) playerGroup.translateZ(-speed * delta);
                if (keys['s']) playerGroup.translateZ(speed * delta);
                if (keys['a']) playerGroup.translateX(-speed * delta);
                if (keys['d']) playerGroup.translateX(speed * delta);
            }
            playerGroup.position.y = 0; // Lock to floor

            // Fridge Door Animation
            fridgeDoor.rotation.y += (((fridgeOpen ? -1.8 : 0) - fridgeDoor.rotation.y) * 0.1);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
