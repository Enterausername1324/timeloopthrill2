<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX // COOK_FRIED_BUTTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Courier New', monospace; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            pointer-events: none; text-shadow: 0 0 8px #00ffcc; z-index: 10;
        }
        .metric { font-size: 1.4rem; margin-bottom: 10px; border-left: 3px solid #00ffcc; padding-left: 10px; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 1px solid rgba(0, 255, 204, 0.5);
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        #terminal-log {
            position: absolute; bottom: 20px; left: 20px; color: #00ffcc; font-size: 0.8rem;
            max-height: 100px; overflow: hidden; opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="metric">MODULE: BUTTER_FRYER_v1.0</div>
        <div class="metric" id="temp">HEAT_FLUX: 0°C</div>
        <div class="metric" id="quality">QUALITY: RAW</div>
    </div>
    <div id="crosshair"></div>
    <div id="terminal-log"></div>

    <script>
        let scene, camera, renderer, butter, hand, pan, floor;
        let heat = 0;
        let isGrabbing = false;
        let velocity = new THREE.Vector3(0, 0, 0);
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        const CLOUD_URL = "https://vortex-cloud.onrender.com";

        function log(msg) {
            const logDiv = document.getElementById('terminal-log');
            logDiv.innerHTML += `> ${msg}<br>`;
            if (logDiv.childNodes.length > 10) logDiv.removeChild(logDiv.firstChild);
        }

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 6);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting System
            const mainLight = new THREE.PointLight(0xffffff, 1.5, 50);
            mainLight.position.set(2, 8, 4);
            mainLight.castShadow = true;
            scene.add(mainLight);
            scene.add(new THREE.AmbientLight(0x222222));

            // Countertop (Texture Simulation)
            const floorGeo = new THREE.BoxGeometry(20, 0.5, 20);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.position.y = -0.4;
            floor.receiveShadow = true;
            scene.add(floor);

            // Cast Iron Pan
            const panBaseGeo = new THREE.CylinderGeometry(2.5, 2.2, 0.4, 32);
            const panMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5, roughness: 0.8 });
            pan = new THREE.Mesh(panBaseGeo, panMat);
            pan.receiveShadow = true;
            scene.add(pan);

            // The Butter (The Core System)
            const butterGeo = new THREE.BoxGeometry(0.8, 0.4, 0.8);
            const butterMat = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.2 });
            butter = new THREE.Mesh(butterGeo, butterMat);
            butter.position.y = 0.3;
            butter.castShadow = true;
            scene.add(butter);

            // The Manipulator Hand
            const handGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const handMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 1 });
            hand = new THREE.Mesh(handGeo, handMat);
            scene.add(hand);

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('mousedown', () => isGrabbing = true);
            window.addEventListener('mouseup', () => isGrabbing = false);
            
            log("VORTEX_CORE_LOADED");
            animate();
        }

        async function uploadData(h, q) {
            try {
                await fetch(`${CLOUD_URL}/save-session`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ playerName: "VORTEX_PILOT", score: h, butterType: "UNSALTED", status: q })
                });
                log("CLOUD_UPLINK_SUCCESS");
            } catch(e) { log("UPLINK_OFFLINE"); }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update Hand Position
            hand.position.x = mouse.x * 6;
            hand.position.z = -mouse.y * 6;
            hand.position.y = 0.8;

            // Physics Raycasting
            raycaster.setFromCamera(mouse, camera);
            const canGrab = raycaster.intersectObject(butter).length > 0;

            if (isGrabbing && canGrab) {
                butter.position.lerp(new THREE.Vector3(hand.position.x, 0.3, hand.position.z), 0.2);
                velocity.set(0,0,0);
            } else {
                // Slipperiness Physics (Momentum)
                butter.position.add(velocity);
                velocity.multiplyScalar(0.95); // Friction
            }

            // Cooking Engine
            const dist = butter.position.distanceTo(pan.position);
            if (dist < 2.3) {
                heat += 0.4;
                document.getElementById('temp').innerText = `HEAT_FLUX: ${Math.floor(heat)}°C`;
                
                // Chemical Change Simulation
                if (heat > 600) {
                    butter.material.color.setHex(0x1a0d00);
                    document.getElementById('quality').innerText = "QUALITY: CARBONIZED";
                } else if (heat > 200) {
                    butter.material.color.setHex(0xb8860b);
                    document.getElementById('quality').innerText = "QUALITY: GOLDEN_BROWN";
                    if(Math.floor(heat) % 100 === 0) uploadData(Math.floor(heat), "COOKED");
                }
            } else {
                // Cooling down when off the pan
                if (heat > 0) heat -= 0.1;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
