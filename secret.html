<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIMELOOP // VORTEX_OMNI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ff00; }
        
        /* LOBBY UI */
        #lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #051005 0%, #000 100%);
            z-index: 2000; transition: opacity 1s;
        }
        .btn {
            background: transparent; border: 1px solid #00ff00; color: #00ff00;
            padding: 15px 30px; margin: 10px; cursor: pointer; font-family: 'Courier New';
            letter-spacing: 3px; text-transform: uppercase;
        }
        .btn:hover { background: rgba(0,255,0,0.2); box-shadow: 0 0 15px #00ff00; }

        /* GAME UI */
        #cursor { position: absolute; top: 50%; left: 50%; width: 2px; height: 15px; background: #00ff00; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 3000; }
        #cursor-h { position: absolute; top: 50%; left: 50%; width: 15px; height: 2px; background: #00ff00; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 3000; }
        #ui-layer { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; display: none; z-index: 10; }
        #bar-box { width: 200px; height: 4px; border: 1px solid #00ff00; background: rgba(0,0,0,0.8); margin: 10px auto; }
        #bar-fill { height: 100%; width: 0%; background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="letter-spacing: 10px;">TIMELOOP_GAMES</h1>
    <p>STABILITY: STABLE // VERSION: 57.0</p>
    <button class="btn" onclick="alert('Please use the Access Key to initialize.')">INITIALIZE</button>
    <button class="btn" id="secretButton">???</button>
</div>

<div id="cursor"></div><div id="cursor-h"></div>
<div id="ui-layer">
    <div id="label">VORTEX_CORE_ACTIVE</div>
    <div id="bar-box"><div id="bar-fill"></div></div>
</div>

<script>
let scene, camera, renderer, clock, player, windowShutter, lever, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null, windowOpen = false;
let keys = {}, butters = [], colliders = [];

// ==============================
// 1. SECRET ACCESS LOGIC (FIXED)
// ==============================
document.getElementById("secretButton").addEventListener("click", () => {
    const code = prompt("ENTER ACCESS KEY:");
    
    // Key: donate100 (Base64: ZG9uYXRlMTAw)
    if (code !== null && btoa(code) === "ZG9uYXRlMTAw") {
        startEngine();
    } else {
        alert("ACCESS DENIED. TIMELINE REMAINS LOCKED.");
    }
});

function startEngine() {
    document.getElementById('lobby').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('cursor').style.display = 'block';
        document.getElementById('cursor-h').style.display = 'block';
        document.getElementById('ui-layer').style.display = 'block';
        active = true;
        document.body.requestPointerLock();
        init();
    }, 1000);
}

// ==============================
// 2. ULTRA-REALISTIC GENERATOR
// ==============================
function createAdvancedTexture(c1, c2, mode) {
    const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = c1; ctx.fillRect(0,0,512,512);
    for(let i=0; i<2000; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? c1 : c2;
        ctx.globalAlpha = mode === 'steel' ? 0.05 : 0.2;
        ctx.fillRect(Math.random()*512, Math.random()*512, mode === 'steel' ? 256 : 5, mode === 'steel' ? 1 : 5);
    }
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020408);
    scene.fog = new THREE.FogExp2(0x020408, 0.015);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.rotation.order = "YXZ";

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group(); scene.add(player);
    player.position.set(0, 0, 2);

    // MATERIALS
    const texSteel = createAdvancedTexture('#333', '#555', 'steel');
    const wallMat = new THREE.MeshStandardMaterial({map: texSteel, metalness: 0.9, roughness: 0.2});

    // TRUCK
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 12), new THREE.MeshStandardMaterial({color: 0x050505}));
    floor.rotation.x = -Math.PI/2; floor.position.y = -0.05; scene.add(floor);

    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(8, 12), wallMat);
    ceiling.rotation.x = Math.PI/2; ceiling.position.y = 3.95; scene.add(ceiling);

    function wall(w,h,d,x,y,z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wallMat);
        m.position.set(x,y,z); scene.add(m);
        colliders.push(new THREE.Box3().setFromObject(m));
    }
    wall(0.2, 4, 12, -4, 2, 0); // L
    wall(8, 4, 0.2, 0, 2, -6); // B
    wall(0.2, 1, 4, 4, 0.5, 0); wall(0.2, 1, 4, 4, 3.5, 0); // Window Frame

    // SHUTTER & LEVER
    windowShutter = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.2, 4.2), new THREE.MeshStandardMaterial({color: 0x000}));
    windowShutter.position.set(3.9, 2, 0); scene.add(windowShutter);

    lever = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5), new THREE.MeshStandardMaterial({color: 0xff0000}));
    lever.position.set(3.7, 1.5, 2); lever.name = "lever"; scene.add(lever);

    // OUTSIDE
    for(let i=0; i<100; i++) {
        const tree = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 1), new THREE.MeshStandardMaterial({color: 0x051005}));
        tree.position.set((Math.random()-0.5)*200, 5, -50 - Math.random()*100); scene.add(tree);
    }

    scene.add(new THREE.AmbientLight(0xffffff, 0.1));
    const pL = new THREE.PointLight(0xffffff, 1.5, 10); pL.position.set(0, 3, 0); scene.add(pL);

    window.addEventListener('mousemove', e => { if(document.pointerLockElement) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});
    window.addEventListener('mousedown', interact);
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => delete keys[e.code]);

    animate();
}

function interact() {
    const r = new THREE.Raycaster(); r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children);
    if(hits.length > 0 && hits[0].object.name === "lever") windowOpen = !windowOpen;
}

function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta();
    if(active) {
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        camera.position.set(player.position.x, 1.6, player.position.z);
        windowShutter.position.y = THREE.MathUtils.lerp(windowShutter.position.y, windowOpen ? 4.5 : 2, 0.1);
        lever.rotation.x = THREE.MathUtils.lerp(lever.rotation.x, windowOpen ? -1 : 1, 0.1);

        let mZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
        let mX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
        if(mZ || mX) {
            let move = new THREE.Vector3(mX, 0, mZ).applyAxisAngle(new THREE.Vector3(0,1,0), yaw).multiplyScalar(5*dt);
            player.position.add(move);
        }
        renderer.render(scene, camera);
    }
}
</script>
</body>
</html>
