<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX // 57.0_ULTRA_EXTERIOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #00ff00; z-index: 1000; cursor: pointer; text-shadow: 0 0 10px #00ff00; }
        #cursor { position: absolute; top: 50%; left: 50%; width: 2px; height: 15px; background: #00ff00; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.5; }
        #cursor-h { position: absolute; top: 50%; left: 50%; width: 15px; height: 2px; background: #00ff00; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.5; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #bar-box { width: 240px; height: 4px; border: 1px solid #00ff00; background: rgba(0,255,0,0.1); display: none; margin-top: 10px; }
        #bar-fill { height: 100%; width: 0%; background: #00ff00; box-shadow: 0 0 15px #00ff00; }
    </style>
</head>
<body>

<div id="overlay" onclick="setup()">
    <h1 style="letter-spacing: 20px;">VORTEX</h1>
    <p>[ MATERIAL_STABILITY_FIX_ACTIVE ]</p>
</div>

<div id="cursor"></div><div id="cursor-h"></div>
<div id="ui"><div id="label" style="color:#00ff00; font-size:10px;">CORE.RENDER_STABLE</div><div id="bar-box"><div id="bar-fill"></div></div></div>

<script>
let scene, camera, renderer, clock, player, head, fridgeDoor, windowShutter, lever, heldItem;
let active = false, yaw = 0, pitch = 0, cookingButter = null, windowOpen = false, fridgeOpen = false;
let keys = {}, butters = [], colliders = [];

// SHADER-STYLE TEXTURE GENERATION
function createAdvancedTexture(c1, c2, mode) {
    const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = c1; ctx.fillRect(0,0,1024,1024);
    
    for(let i=0; i<5000; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? c1 : c2;
        ctx.globalAlpha = mode === 'steel' ? 0.05 : 0.2;
        let w = mode === 'steel' ? 512 : 10;
        let h = mode === 'steel' ? 2 : 10;
        ctx.fillRect(Math.random()*1024, Math.random()*1024, w, h);
    }
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.repeat.set(1, 1);
    return t;
}

const texSteel = createAdvancedTexture('#333', '#555', 'steel');
const texFloor = createAdvancedTexture('#111', '#1a1a1a', 'grit');

function setup() { 
    active = true; document.getElementById('overlay').style.display = 'none'; 
    document.body.requestPointerLock();
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020408);
    scene.fog = new THREE.FogExp2(0x020408, 0.015);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
    camera.rotation.order = "YXZ";

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    player = new THREE.Group(); scene.add(player);
    player.position.set(0, 0, 1.5);

    // --- OUTSIDE (THE "REAL" WORLD) ---
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x050805, roughness: 1}));
    ground.rotation.x = -Math.PI/2; ground.position.y = -0.5; scene.add(ground);

    // Forest & Horizon
    for(let i=0; i<500; i++) {
        let x = (Math.random()-0.5)*600; let z = (Math.random()-0.5)*600;
        if(Math.abs(x) < 25 && Math.abs(z) < 25) continue; 
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.5, 8, 0.5), new THREE.MeshStandardMaterial({color: 0x0a0502}));
        const leaves = new THREE.Mesh(new THREE.ConeGeometry(3, 10, 6), new THREE.MeshStandardMaterial({color: 0x051a05}));
        leaves.position.y = 7; tree.add(trunk); tree.add(leaves);
        tree.position.set(x, 0, z); scene.add(tree);
    }
    // Towers with Windows
    for(let i=0; i<8; i++) {
        const h = 80 + Math.random()*150;
        const tower = new THREE.Mesh(new THREE.BoxGeometry(15, h, 15), new THREE.MeshStandardMaterial({color: 0x000000, emissive: 0x001122}));
        tower.position.set((Math.random()-0.5)*400, h/2 - 0.5, -400 - Math.random()*100); scene.add(tower);
    }

    // --- FOOD TRUCK (NO Z-FIGHTING) ---
    const truck = new THREE.Group(); scene.add(truck);
    const wallMat = new THREE.MeshStandardMaterial({map: texSteel, metalness: 0.9, roughness: 0.3, side: THREE.DoubleSide});

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 12), new THREE.MeshStandardMaterial({map: texFloor, roughness: 0.6}));
    floor.rotation.x = -Math.PI/2; floor.position.y = -0.05; scene.add(floor);

    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(8, 12), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.8}));
    ceiling.rotation.x = Math.PI/2; ceiling.position.y = 3.9; scene.add(ceiling);

    // Structural Walls
    function wall(w,h,d,x,y,z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wallMat);
        m.position.set(x,y,z); scene.add(m);
        colliders.push(new THREE.Box3().setFromObject(m));
    }
    wall(0.3, 4, 12.2, -4.1, 2, 0); // Left
    wall(8.2, 4, 0.3, 0, 2, -6.1); // Back
    wall(8.2, 4, 0.3, 0, 2, 6.1);  // Front
    wall(0.3, 4, 4, 4.1, 2, -4); wall(0.3, 4, 4, 4.1, 2, 4); // Right sides
    wall(0.3, 1, 4, 4.1, 0.5, 0); wall(0.3, 1, 4, 4.1, 3.5, 0); // Window Frame

    // SHUTTER
    windowShutter = new THREE.Mesh(new THREE.BoxGeometry(0.15, 2.1, 4.1), new THREE.MeshStandardMaterial({color: 0x000, metalness: 1}));
    windowShutter.position.set(4.0, 2, 0); scene.add(windowShutter);

    // KITCHEN
    const pL = new THREE.PointLight(0xffffff, 1.8, 12); pL.position.set(0, 3.5, -2); scene.add(pL);
    const fridge = new THREE.Group(); fridge.position.set(-3.2, 0.01, -4.5); scene.add(fridge);
    const fBody = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3.8, 1.6), wallMat);
    fBody.position.y = 1.9; fridge.add(fBody);
    colliders.push(new THREE.Box3().setFromObject(fBody).translate(new THREE.Vector3(-3.2, 0, -4.5)));

    fridgeDoor = new THREE.Group(); fridgeDoor.position.set(0.75, 1.9, 0.8); fridge.add(fridgeDoor);
    const dM = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3.8, 0.1), wallMat);
    dM.position.set(-0.75, 0, 0); dM.name = "fridge_door"; fridgeDoor.add(dM);

    for(let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0xfff0ad}));
        b.position.set((i%2)*0.6 - 0.3, 0.8 + (Math.floor(i/3)*1.2), 0); b.name = "butter";
        b.userData.cookTime = 0; fridge.add(b); butters.push(b);
    }

    const leverBase = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0x000}));
    leverBase.position.set(3.8, 1.5, 2.2); scene.add(leverBase);
    lever = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.6), new THREE.MeshStandardMaterial({color: 0xff0000}));
    lever.position.set(3.8, 1.7, 2.2); lever.name = "lever"; scene.add(lever);

    const fryer = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.6, 1.3), new THREE.MeshStandardMaterial({color: 0x050505, metalness: 1}));
    fryer.position.set(3.2, 1, -2); fryer.name = "fryer"; scene.add(fryer);

    scene.add(new THREE.AmbientLight(0xffffff, 0.1));
    
    window.addEventListener('mousemove', e => { if(document.pointerLockElement === document.body) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); }});
    window.addEventListener('mousedown', () => { if(active) interact(); });
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => delete keys[e.code]);

    animate();
}

function interact() {
    const r = new THREE.Raycaster(); r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        let o = hits[0].object;
        if(o.name === "lever") windowOpen = !windowOpen;
        else if(heldItem) {
            if(o.name === "fryer") { cookingButter = heldItem; scene.attach(heldItem); heldItem.position.set(3.2, 1.3, -2); heldItem = null; document.getElementById('bar-box').style.display = "block"; }
            else { scene.attach(heldItem); heldItem.position.y = 0.1; heldItem = null; }
        } else {
            if(o.name === "butter") { heldItem = o; player.add(heldItem); heldItem.position.set(0.6, 1.2, -0.8); }
            else if(o.name === "fridge_door") fridgeOpen = !fridgeOpen;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta();
    if(active) {
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        camera.position.set(player.position.x, 1.65, player.position.z);
        fridgeDoor.rotation.y = THREE.MathUtils.lerp(fridgeDoor.rotation.y, fridgeOpen ? 1.8 : 0, 0.1);
        windowShutter.position.y = THREE.MathUtils.lerp(windowShutter.position.y, windowOpen ? 4.1 : 2, 0.1);
        lever.rotation.x = THREE.MathUtils.lerp(lever.rotation.x, windowOpen ? -1 : 1, 0.1);

        if(cookingButter) {
            cookingButter.userData.cookTime += dt;
            document.getElementById('bar-fill').style.width = Math.min((cookingButter.userData.cookTime/30)*100, 100) + "%";
        }

        let mZ = (keys['KeyS']?1:0) - (keys['KeyW']?1:0);
        let mX = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
        if(mZ || mX) {
            let move = new THREE.Vector3(mX, 0, mZ).applyAxisAngle(new THREE.Vector3(0,1,0), yaw).multiplyScalar(4.5*dt);
            let test = player.position.clone().add(move);
            let hit = false;
            let pBB = new THREE.Box3().setFromCenterAndSize(test, new THREE.Vector3(0.6, 2, 0.6));
            for(let b of colliders) if(pBB.intersectsBox(b)) hit = true;
            if(!hit) player.position.copy(test);
        }
    }
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
